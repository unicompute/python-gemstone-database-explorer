  async function openMB(classOop, className) {
    const mb = body.querySelector(`#${id}-mb`);
    mb.classList.remove('hidden');
    body.querySelector(`#${id}-mb-class`).textContent = className + ' methods';
    const catsEl   = body.querySelector(`#${id}-mb-cats`);
    const selsEl   = body.querySelector(`#${id}-mb-sels`);
    const srcEl    = body.querySelector(`#${id}-mb-src`);
    const statusEl = body.querySelector(`#${id}-mb-status`);
    const preserveSelection = mbClassOop === classOop && mbClassName === className;
    const preferredSelector = preserveSelection ? mbCurrentSelector : null;
    const preferredCategory = preserveSelection ? mbCurrentCategory : null;
    catsEl.innerHTML = '<div class="mb-cat" style="color:#6c7086"><span class="spinner"></span></div>';
    selsEl.innerHTML = '';
    srcEl.value = '';
    mbClassOop = classOop;
    mbClassName = className;
    if (!preserveSelection) {
      mbCurrentCategory = null;
      mbCurrentSelector = null;
    }
    updateMethodBrowserActions();
    try {
      mbData = await fetchMethodBrowserCached('selectors', {classOop}, async () => {
        const d = await api(`/code/selectors/${classOop}`);
        if (!d.success) throw new Error(d.exception);
        return d.result || {};
      });
      const cats = Object.keys(mbData).sort();
      catsEl.innerHTML = '';
      if (!cats.length) {
        catsEl.innerHTML = '<div class="mb-cat" style="color:#6c7086">(no methods)</div>';
        statusEl.textContent = className + ' — 0 categories';
        return;
      }
      async function selectSelector(selectorName, selectorEl) {
        selsEl.querySelectorAll('.mb-sel').forEach(e => e.classList.remove('active'));
        selectorEl?.classList.add('active');
        srcEl.value = 'Loading…';
        statusEl.textContent = 'Loading…';
        mbCurrentSelector = selectorName;
        updateMethodBrowserActions();
        try {
          const source = await fetchMethodBrowserCached('source', {classOop, selector: selectorName}, async () => {
            const sd = await api(`/code/code/${classOop}?selector=${encodeURIComponent(selectorName)}`);
            if (!sd.success) throw new Error(sd.exception);
            return sd.result || '';
          });
          if (mbClassOop !== classOop || mbCurrentSelector !== selectorName) return;
          srcEl.value = source;
          statusEl.textContent = `${className} >> ${selectorName}`;
        }
        catch(err) {
          if (mbClassOop !== classOop || mbCurrentSelector !== selectorName) return;
          srcEl.value = 'Error: ' + err.message;
          statusEl.textContent = 'Error';
        }
      }
      cats.forEach(cat => {
        const el = document.createElement('div'); el.className = 'mb-cat'; el.textContent = cat || '(uncategorized)';
        el.addEventListener('click', () => {
          catsEl.querySelectorAll('.mb-cat').forEach(e => e.classList.remove('active'));
          el.classList.add('active');
          mbCurrentCategory = cat;
          const sels = (mbData[cat]||[]).slice().sort();
          selsEl.innerHTML = '';
          sels.forEach(sel => {
            const s = document.createElement('div'); s.className='mb-sel'; s.textContent=sel;
            s.addEventListener('click', () => selectSelector(sel, s));
            s.addEventListener('dblclick', () => openCurrentCodeInClassBrowser(sel));
            selsEl.appendChild(s);
          });
          const selectorToSelect = sels.includes(mbCurrentSelector) ? mbCurrentSelector : sels[0];
          if (selectorToSelect) {
            const selectorEl = Array.from(selsEl.querySelectorAll('.mb-sel')).find(node => node.textContent === selectorToSelect);
            selectorEl?.click();
          } else {
            mbCurrentSelector = null;
            srcEl.value = '';
            statusEl.textContent = `${className} — ${cat}`;
            updateMethodBrowserActions();
          }
        });
        catsEl.appendChild(el);
      });
      const initialCategory = (preferredSelector && findSelectorCategory(mbData, preferredSelector))
        || (preferredCategory && cats.includes(preferredCategory) ? preferredCategory : null)
        || cats[0];
      const initialCategoryEl = Array.from(catsEl.querySelectorAll('.mb-cat')).find(node => node.textContent === initialCategory);
      initialCategoryEl?.click();
      statusEl.textContent = className + ' — ' + cats.length + ' categories';
    } catch(e) {
      catsEl.innerHTML = `<div class="mb-cat" style="color:#f38ba8">${escHtml(e.message)}</div>`;
      statusEl.textContent = 'Error loading';
    }
  }

  async function doEval() {
    if (!evalCode || !evalRes) return;
    if (!currentOop) return;
    const evalOop = currentOop;
    const code = evalCode.value.trim(); if (!code) return;
    evalRes.textContent = ''; evalRes.className = 'eval-result';
    const sp = document.createElement('span'); sp.className='spinner'; evalRes.appendChild(sp);
    try {
      const d = await apiEvaluate(evalOop, {code, language: 'smalltalk', depth: 2});
      evalRes.innerHTML = '';
      if (!d.success) { evalRes.className='eval-result error'; evalRes.textContent='Error: '+d.exception; return; }
      const [isExc, rv] = d.result;
      if (isExc) {
        evalRes.className='eval-result error';
        evalRes.textContent='⚑ '+(rv.inspection||'Exception');
        maybeOpenEvalDebugger(rv, code);
      }
      else {
        evalRes.textContent = rv.inspection || 'nil';
        const isLeaf = isLeafBasetype(rv.basetype);
        if (!isLeaf && rv.oop) {
          const chip = makeChip(rv.inspection||'result', rv.oop, id);
          evalRes.appendChild(document.createTextNode(' ')); evalRes.appendChild(chip);
          const nav = document.createElement('a'); nav.className='link-oop'; nav.style.marginLeft='8px'; nav.textContent='Navigate →';
          nav.addEventListener('click', () => { const l=rv.inspection||'result'; history.push({label:l,oop:rv.oop}); loadObj(rv.oop,l); });
          evalRes.appendChild(nav);
        }
      }
    } catch(e) { evalRes.innerHTML=''; evalRes.className='eval-result error'; evalRes.textContent='Error: '+e.message; }
    finally { clearInspectorTabCache(evalOop); }
  }

  if (initialOop) { history = [{label: initialLabel||'object', oop: initialOop}]; loadObj(initialOop, initialLabel||'object'); }
  return win;
}

// ═══════════════════════════════════════════════════════════════════════════════
// WORKSPACE WINDOW
// ═══════════════════════════════════════════════════════════════════════════════
function openWorkspace() {
  const {win, body, id} = createWindow({title:'Workspace', width:520, height:440, taskbarLabel:'Workspace'});
  upsertWindowState(id, {kind: 'workspace'});
  // The outer div must be display:flex;flex-direction:column so ws-history can flex:1
  // and ws-input-row / txbar stay at the bottom.
  body.style.cssText = 'display:flex;flex-direction:column;overflow:hidden;min-height:0';
  body.innerHTML = `
    <div class="ws-history" id="${id}-wsh" style="flex:1;min-height:0;overflow-y:auto;padding:6px 10px;font-family:monospace;font-size:12px"></div>
    <div class="ws-input-row" style="flex-shrink:0">
      <textarea class="ws-code-area" id="${id}-wsc" placeholder="Smalltalk expression… (Ctrl+Enter)"></textarea>
      <div class="ws-controls">
        <button class="btn" id="${id}-doit">Do it</button>
        <button class="btn-ghost" id="${id}-clr">Clear</button>
        <span class="ws-hint">Ctrl+Enter</span>
      </div>
    </div>
    <div class="txbar" style="flex-shrink:0">
      <span>Transaction:</span>
      <button class="btn-tx" id="${id}-abort">Abort</button>
      <button class="btn-tx" id="${id}-commit">Commit</button>
      <button class="btn-tx" id="${id}-continue" style="background:#4a90d9">Continue</button>
    </div>
  `;
  const wsh = body.querySelector(`#${id}-wsh`);
  const wsc = body.querySelector(`#${id}-wsc`);
  body.querySelector(`#${id}-doit`).addEventListener('click', wsDoIt);
  body.querySelector(`#${id}-clr`).addEventListener('click', () => { wsh.innerHTML = ''; });
  wsc.addEventListener('keydown', e => { if (e.ctrlKey && e.key==='Enter') wsDoIt(); });
  body.querySelector(`#${id}-abort`).addEventListener('click', async () => {
    try { const d=await apiTransaction('/transaction/abort'); setStatus(d.success, d.success?'aborted':d.exception); } catch(e){setStatus(false,e.message);}
  });
  body.querySelector(`#${id}-commit`).addEventListener('click', async () => {
    try { const d=await apiTransaction('/transaction/commit'); setStatus(d.success, d.success?'committed':d.exception); } catch(e){setStatus(false,e.message);}
  });
  body.querySelector(`#${id}-continue`).addEventListener('click', async () => {
    try { const d=await apiTransaction('/transaction/continue'); setStatus(d.success, d.success?'continued':d.exception); } catch(e){setStatus(false,e.message);}
  });

  async function wsDoIt() {
    const code = wsc.value.trim(); if (!code) return;
    const entry = document.createElement('div'); entry.className='ws-entry';
    const codeEl = document.createElement('div'); codeEl.className='ws-code'; codeEl.textContent=code;
    const resEl  = document.createElement('div'); resEl.className='ws-result';
    const textSpan = document.createElement('span'); textSpan.className='ws-result-text'; textSpan.textContent='…';
    resEl.appendChild(textSpan);
    entry.append(codeEl, resEl); wsh.appendChild(entry); wsh.scrollTop=wsh.scrollHeight;
    const globOop = roots['Globals'] || roots['UserGlobals'];
    if (!globOop) { resEl.className='ws-result error'; textSpan.textContent='Not connected'; return; }
    try {
      const d = await apiEvaluate(globOop, {code, language: 'smalltalk', depth: 1});
      if (!d.success) { resEl.className='ws-result error'; textSpan.textContent='Error: '+d.exception; return; }
      const [isExc, rv] = d.result;
      if (isExc) {
        resEl.className='ws-result error';
        textSpan.textContent='⚑ '+(rv.inspection||'Exception');
        maybeOpenEvalDebugger(rv, code);
      }
      else {
        textSpan.textContent = '=> ' + (rv.inspection||'nil');
        const isLeaf = isLeafBasetype(rv.basetype);
        if (!isLeaf && rv.oop) {
          const chip = makeChip(rv.inspection||'result', rv.oop, id);
          resEl.appendChild(chip);
          const nav = document.createElement('span'); nav.className='ws-nav'; nav.textContent='inspect →';
          nav.addEventListener('click', () => openLinkedObjectWindow({oop: rv.oop, text: rv.inspection||'result', sourceWinId: id}));
          resEl.appendChild(nav);
        }
      }
    } catch(e) { resEl.className='ws-result error'; textSpan.textContent='Error: '+e.message; }
    wsh.scrollTop=wsh.scrollHeight;
  }
  return win;
}

function openWebBrowser(initialUrl) {

  upsertWindowState(id, {kind: 'web-browser'});
  const defaultUrl = initialUrl || 'https://pandas.pydata.org';
  body.style.cssText = 'display:flex;flex-direction:column;overflow:hidden;min-height:0';
  body.innerHTML = `
    <div class="wb-urlbar" style="flex-shrink:0">
      <label>URL</label>
      <input class="wb-url-input" id="${id}-url" type="text" value="${escHtml(defaultUrl)}">
      <button class="btn-ghost" id="${id}-go">Go</button>
      <button class="btn-ghost" id="${id}-reload">↺</button>
    </div>
    <div class="wb-iframe-wrap" style="flex:1;min-height:0;overflow:hidden">
      <iframe id="${id}-iframe" src="${escHtml(defaultUrl)}" style="width:100%;height:100%;border:none;background:#fff"></iframe>

// ═══════════════════════════════════════════════════════════════════════════════
// DEBUGGER WINDOW
// ═══════════════════════════════════════════════════════════════════════════════
function openDebugger(threadOrOop, threadName) {
  const thread = (threadOrOop && typeof threadOrOop === 'object')
    ? threadOrOop
    : { oop: threadOrOop, printString: threadName || '', exceptionText: '', sourcePreview: '' };
  const threadOop = thread.oop;
  const threadLabel = thread.sourcePreview || thread.exceptionText || thread.printString || '';
  const {win, body, id} = createWindow({
    title: 'Debugger — ' + threadLabel.slice(0,40),
    width: 660, height: 600, taskbarLabel: 'Debugger'
  });
  upsertWindowState(id, {kind: 'debugger', threadOop});

  let currentFrameIdx = 0;
  let frames = [];
  let currentFrameVars = [];

  body.innerHTML = `
    <div class="tab-strip">
      <div class="tab-item active" data-dtab="stack">Stack Trace</div>
      <div class="tab-item" data-dtab="tls">Thread Local Storage</div>
    </div>
    <div id="${id}-stack" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
      <div class="dbg-summary" id="${id}-summary">
        <div class="dbg-summary-source hidden" id="${id}-summary-source"></div>
        <div class="dbg-summary-error hidden" id="${id}-summary-error"></div>
      </div>
      <div class="dbg-frames-pane" id="${id}-frames">
        <span class="spinner" style="margin:8px"></span>
      </div>
      <div class="dbg-action-bar">
        <button class="btn-dbg" id="${id}-proceed">Proceed</button>
        <button class="btn-dbg" id="${id}-stepinto">Step into</button>
        <button class="btn-dbg" id="${id}-stepover">Step over</button>
        <button class="btn-dbg" id="${id}-trim">Trim stack</button>
      </div>
      <div class="dbg-source-pane" id="${id}-srcp">
        <div class="dbg-source-meta hidden" id="${id}-srcmeta"></div>
        <pre class="dbg-source-code" id="${id}-src" tabindex="-1"></pre>
        <div class="dbg-self-bar">
          <span class="dbg-self-label">self:</span>
          <span class="dbg-self-val" id="${id}-selfval"></span>
        </div>
        <div class="dbg-var-row">
          <select id="${id}-vars"><option value="">— variables —</option></select>
          <span class="dbg-var-val" id="${id}-varval"></span>
        </div>
      </div>
    </div>
    <div id="${id}-tls" style="display:none;flex:1;overflow-y:auto;padding:6px">
      <span class="spinner" id="${id}-tls-spin"></span>
      <ul class="dbg-tls-list" id="${id}-tls-list"></ul>
    </div>
  `;

  const summarySourceEl = body.querySelector(`#${id}-summary-source`);
  const summaryErrorEl = body.querySelector(`#${id}-summary-error`);
  const summaryEl = body.querySelector(`#${id}-summary`);
  if (thread.sourcePreview) {
    summarySourceEl.textContent = thread.sourcePreview;
    summarySourceEl.classList.remove('hidden');
  }
  if (thread.exceptionText) {
    summaryErrorEl.textContent = '⚑ ' + thread.exceptionText;
    summaryErrorEl.classList.remove('hidden');
  }
  if (!thread.sourcePreview && !thread.exceptionText) {
    summaryEl.classList.add('hidden');
  }

  body.querySelector('.tab-strip').addEventListener('click', e => {
    const tab = e.target.closest('.tab-item'); if (!tab) return;
    body.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active')); tab.classList.add('active');
    const name = tab.dataset.dtab;
    body.querySelector(`#${id}-stack`).style.display = name==='stack' ? 'flex' : 'none';
    body.querySelector(`#${id}-tls`).style.display   = name==='tls'   ? 'block' : 'none';
    if (name==='tls') loadTLS();
  });

  body.querySelector(`#${id}-proceed`).addEventListener('click', async () => {
    try {
      await apiPost(`/debug/proceed/${threadOop}`, {});
      refreshHaltedThreadsBar();
      setStatus(true,'resumed');
      closeWindow(win, id);
    } catch(e){setStatus(false,e.message);}
  });
  body.querySelector(`#${id}-stepinto`).addEventListener('click', async () => {
    try { await apiPost(`/debug/step-into/${threadOop}`, {}); loadFrames(); } catch(e){setStatus(false,e.message);}
  });
  body.querySelector(`#${id}-stepover`).addEventListener('click', async () => {
    try { await apiPost(`/debug/step-over/${threadOop}`, {index:currentFrameIdx}); loadFrames(); } catch(e){setStatus(false,e.message);}
  });
  body.querySelector(`#${id}-trim`).addEventListener('click', async () => {
    try { await apiPost(`/debug/trim/${threadOop}`, {index:currentFrameIdx}); loadFrames(); } catch(e){setStatus(false,e.message);}
  });

  function renderDebuggerValue(container, ref, fallbackText='') {
    container.innerHTML = '';
    const text = ref?.inspection || fallbackText || '';
    if (ref?.oop != null && !isLeafBasetype(ref.basetype)) {
      const chip = makeChip(shortLabel(text, 48) || `oop:${ref.oop}`, ref.oop, id);
      chip.title = text || `oop:${ref.oop}`;
      container.appendChild(chip);
      return;
    }
    container.textContent = text;
    container.title = text;
  }

  body.querySelector(`#${id}-vars`).addEventListener('change', e => {
    const sel = e.target;
    const varvalEl = body.querySelector(`#${id}-varval`);
    if (!sel.value) {
      renderDebuggerValue(varvalEl, null, '');
      return;
    }
    const selectedVar = currentFrameVars.find(v => v.name === sel.value);
    renderDebuggerValue(varvalEl, selectedVar?.valueObject, selectedVar?.value || '');
  });

  async function loadFrames() {
    const framesEl = body.querySelector(`#${id}-frames`);
    framesEl.innerHTML = '<span class="spinner" style="margin:8px"></span>';
    try {
      const d = await api(`/debug/frames/${threadOop}`);
      if (!d.success) throw new Error(d.exception);
      frames = d.frames;
      framesEl.innerHTML = '';
      frames.forEach(f => {
        const el = document.createElement('div'); el.className='dbg-frame-item';
        el.tabIndex = 0;
        // frame type icon: Smalltalk (gold) vs Ruby (red) detected from method name
        const isRuby = f.name.includes('(Ruby)') || f.name.startsWith('Ruby');
        const icon = document.createElement('span');
        icon.className = 'dbg-frame-icon' + (isRuby ? ' ruby' : '');
        icon.textContent = isRuby ? 'R' : 'S';
        el.appendChild(icon);
        el.appendChild(document.createTextNode(f.name));
        el.dataset.idx = f.index;
        el.addEventListener('click', () => selectFrame(f.index, el, true));
        el.addEventListener('keydown', event => {
          if (!frames.length) return;
          const currentPos = frames.findIndex(frame => frame.index === f.index);
          if (event.key === 'ArrowDown') {
            event.preventDefault();
            const nextPos = Math.min(frames.length - 1, currentPos + 1);
            const nextEl = framesEl.querySelector(`.dbg-frame-item[data-idx="${frames[nextPos]?.index}"]`);
            if (nextEl) selectFrame(frames[nextPos].index, nextEl, true);
            return;
          }
          if (event.key === 'ArrowUp') {
            event.preventDefault();
            const prevPos = Math.max(0, currentPos - 1);
            const prevEl = framesEl.querySelector(`.dbg-frame-item[data-idx="${frames[prevPos]?.index}"]`);
            if (prevEl) selectFrame(frames[prevPos].index, prevEl, true);
            return;
          }
          if (event.key === 'Home') {
            event.preventDefault();
            const firstEl = framesEl.querySelector(`.dbg-frame-item[data-idx="${frames[0]?.index}"]`);
            if (firstEl) selectFrame(frames[0].index, firstEl, true);
            return;
          }
          if (event.key === 'End') {
            event.preventDefault();
            const lastFrame = frames[frames.length - 1];
            const lastEl = framesEl.querySelector(`.dbg-frame-item[data-idx="${lastFrame?.index}"]`);
            if (lastEl && lastFrame) selectFrame(lastFrame.index, lastEl, true);
          }
        });
        framesEl.appendChild(el);
      });
      if (frames.length) selectFrame(0, framesEl.querySelector('.dbg-frame-item'), true);
    } catch(e) { framesEl.innerHTML = `<p style="color:#f38ba8;padding:8px">${escHtml(e.message)}</p>`; }
  }

  function fallbackSourceText(frameData, idx) {
    return frameData.source || (idx === 0 ? (thread.sourcePreview || '') : '') || frameData.methodName || '(no source)';
  }

  function computeDebuggerLineNumber(sourceText, sourceOffset) {
    const offset = Number(sourceOffset || 0);
    if (!(offset > 0) || !sourceText) return 0;
    let line = 1;
    for (let i = 0; i < Math.min(offset - 1, sourceText.length); i += 1) {
      const ch = sourceText[i];
      if (ch === '\n') {
        line += 1;
      } else if (ch === '\r') {
        line += 1;
        if (sourceText[i + 1] === '\n') i += 1;
      }
    }
    return line;
  }

  function renderDebuggerSource(frameData, idx) {
    const srcEl = body.querySelector(`#${id}-src`);
    const srcMetaEl = body.querySelector(`#${id}-srcmeta`);
    const sourceText = fallbackSourceText(frameData, idx);
    const activeLine = Number(frameData.lineNumber || 0) || computeDebuggerLineNumber(sourceText, frameData.sourceOffset);
    const stepPoint = Number(frameData.stepPoint || 0);
    const sourceOffset = Number(frameData.sourceOffset || 0);
    const ipOffset = Number(frameData.ipOffset || 0);
    const metaBits = [];
    if (stepPoint > 0) metaBits.push(`Step ${stepPoint}`);
    if (activeLine > 0) metaBits.push(`Line ${activeLine}`);
    if (ipOffset > 0) metaBits.push(`PC ${ipOffset}`);
    if (sourceOffset > 0) metaBits.push(`Offset ${sourceOffset}`);
    srcMetaEl.textContent = metaBits.join(' • ');
    srcMetaEl.classList.toggle('hidden', !metaBits.length);

    const normalized = String(sourceText || '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');
    const lines = normalized ? normalized.split('\n') : ['(no source)'];
    srcEl.innerHTML = lines.map((line, lineIndex) => {
      const lineNumber = lineIndex + 1;
      const active = activeLine > 0 && lineNumber === activeLine ? ' active' : '';
      const text = line.length ? escHtml(line) : '&nbsp;';
      return `<span class="dbg-source-line${active}" data-line="${lineNumber}"><span class="dbg-source-lno">${lineNumber}</span><span class="dbg-source-text">${text}</span></span>`;
    }).join('');

    const activeLineEl = activeLine > 0 ? srcEl.querySelector(`.dbg-source-line[data-line="${activeLine}"]`) : null;
    if (activeLineEl) {
      activeLineEl.scrollIntoView({block: 'nearest'});
    } else {
      srcEl.scrollTop = 0;
    }
  }

  async function selectFrame(idx, el, focusEl=false) {
    currentFrameIdx = idx;
    body.querySelectorAll('.dbg-frame-item').forEach(e=>e.classList.remove('active'));
    if (el) {
      el.classList.add('active');
      el.scrollIntoView({ block: 'nearest' });
      if (focusEl) el.focus({ preventScroll: true });
    }
    const srcEl    = body.querySelector(`#${id}-src`);
    const srcMetaEl = body.querySelector(`#${id}-srcmeta`);
    const varsEl   = body.querySelector(`#${id}-vars`);
    const varvalEl = body.querySelector(`#${id}-varval`);
    const selfEl   = body.querySelector(`#${id}-selfval`);
    srcMetaEl.classList.add('hidden');
    srcMetaEl.textContent = '';
    srcEl.textContent = 'Loading…';
    varsEl.innerHTML = '<option value="">— variables —</option>';
    currentFrameVars = [];
    renderDebuggerValue(varvalEl, null, '');
    renderDebuggerValue(selfEl, null, '');
    try {
      const d = await api(`/debug/frame/${threadOop}?index=${idx}`);
      if (!d.success) throw new Error(d.exception);
      renderDebuggerSource(d, idx);
      renderDebuggerValue(selfEl, d.selfObject, d.selfPrintString || '');
      currentFrameVars = Array.isArray(d.variables) ? d.variables : [];
      if (d.variables && d.variables.length) {
        d.variables.forEach(v => {
          const opt = document.createElement('option');
          opt.value = v.name; opt.textContent = v.name + ' = ' + String(v.value).slice(0,40);
          varsEl.appendChild(opt);
        });
      }
    } catch(e) {
      srcMetaEl.classList.add('hidden');
      srcEl.textContent = 'Error: ' + e.message;
    }
  }

  async function loadTLS() {
    const spin = body.querySelector(`#${id}-tls-spin`);
    const lst  = body.querySelector(`#${id}-tls-list`);
    spin.style.display='inline-block'; lst.innerHTML = '';
    try {
      const d = await api(`/debug/thread-local/${threadOop}`);
      spin.style.display='none';
      if (!d.success) throw new Error(d.exception);
      if (!d.entries.length) { lst.innerHTML='<li style="color:#6c7086">(empty)</li>'; return; }
      d.entries.forEach(e => {
        const li = document.createElement('li');
        const keySpan = document.createElement('span'); keySpan.className = 'tls-key';
        const valSpan = document.createElement('span'); valSpan.className = 'tls-val';
        renderDebuggerValue(keySpan, e.keyObject, e.key || '');
        renderDebuggerValue(valSpan, e.valueObject, e.value || '');
        li.append(keySpan, valSpan);
        lst.appendChild(li);
      });
    } catch(e) { spin.style.display='none'; lst.innerHTML=`<li style="color:#f38ba8">${escHtml(e.message)}</li>`; }
  }

  loadFrames();
}

    try {
      const d=await api(`/symbol-list/dictionaries/${encodeURIComponent(user)}`); if(!d.success)throw new Error(d.exception);

  function makeDictItem(name) {
    const li=document.createElement('li');

      catch(err){setStatus(false,'Error: '+err.message);}

    const ul=body.querySelector(`#${id}-entries`);
    ul.innerHTML='<li style="color:#6c7086;cursor:default"><span class="spinner"></span></li>';
    try {
      const d=await api(`/symbol-list/entries/${encodeURIComponent(user)}/${encodeURIComponent(dict)}`); if(!d.success)throw new Error(d.exception);
      ul.innerHTML='';
      const sorted=d.entries.slice().sort((a,b)=>a.localeCompare(b,undefined,{sensitivity:'base'}));
      for(const key of sorted)ul.appendChild(makeEntryItem(key));
    } catch(e){ul.innerHTML=`<li style="color:#f38ba8;cursor:default">${escHtml(e.message)}</li>`;}
  }

  function makeEntryItem(key) {
    const li=document.createElement('li');
    const sp=document.createElement('span');sp.className='sl-name';sp.textContent=key;
    const del=document.createElement('button');del.className='sl-del';del.textContent='✕';
    del.addEventListener('click',async e=>{
      e.stopPropagation();
      const confirmed = await requestConfirmModal('Remove Entry', `Remove "${key}"?`, {okLabel:'Remove'});
      if(!confirmed)return;
      try{const r=await apiPost('/symbol-list/remove-entry',{user:slUser,dictionary:slDict,key});if(!r.success)throw new Error(r.exception);li.remove();if(slKey===key){slKey=slKeyOop=null;clearKV();}}
      catch(err){setStatus(false,'Error: '+err.message);}
    });
    li.append(sp,del);
    li.addEventListener('click',()=>selectEntry(key,li));
    return li;
  }

  async function selectEntry(key,liEl) {
    slKey=key;slKeyOop=null;
    body.querySelector(`#${id}-entries`).querySelectorAll('li').forEach(l=>l.classList.remove('active'));
    liEl.classList.add('active');
    body.querySelector(`#${id}-selval`).textContent=key;
    body.querySelector(`#${id}-inspect`).classList.add('hidden');
    clearKV();
    const kv=body.querySelector(`#${id}-kv`);
    kv.innerHTML='<tr><td colspan="2" style="color:#6c7086"><span class="spinner"></span> Loading…</td></tr>';
    try {
      const d=await api(`/symbol-list/preview/${encodeURIComponent(slUser)}/${encodeURIComponent(slDict)}/${encodeURIComponent(key)}`);
      if(!d.success)throw new Error(d.exception);
      slKeyOop=d.oop||null;
      if(slKeyOop)body.querySelector(`#${id}-inspect`).classList.remove('hidden');
      body.querySelector(`#${id}-ps`).textContent=d.inspection||'nil';
      kv.innerHTML='';
      const pairs=Object.values(d.instVars||{});
      if(!pairs.length){kv.innerHTML='<tr><td colspan="2" style="color:#6c7086;font-style:italic">(no entries)</td></tr>';return;}
      for(const [nv,vv] of pairs){
        const tr=document.createElement('tr');
        const tk=document.createElement('td');tk.className='col-key';tk.textContent=nv.inspection||'';
        const tv=document.createElement('td');tv.className='col-val';
        const isLeaf = isLeafBasetype(vv.basetype);
        if(!isLeaf&&vv.oop){
          const chip = makeChip(vv.inspection||`oop:${vv.oop}`, vv.oop, id);
          tv.appendChild(chip);
        } else{tv.textContent=vv.inspection||'nil';}
        tr.append(tk,tv);kv.appendChild(tr);
      }
      if(d.instVarsSize>pairs.length){const tr=document.createElement('tr');tr.innerHTML=`<td colspan="2" style="color:#6c7086;font-size:10px">${pairs.length} of ${d.instVarsSize}</td>`;kv.appendChild(tr);}
    } catch(e){kv.innerHTML=`<tr><td colspan="2" style="color:#f38ba8">${escHtml(e.message)}</td></tr>`;}
  }

  function clearKV() {
    body.querySelector(`#${id}-selval`).textContent='';
    body.querySelector(`#${id}-inspect`).classList.add('hidden');
    body.querySelector(`#${id}-kv`).innerHTML='';
    body.querySelector(`#${id}-ps`).textContent='';
  }

  setTimeout(loadUsers, 1500);
  return win;
}

function parseMethodReference(ref) {
  if (ref && typeof ref === 'object' && !Array.isArray(ref)) {
    let className = String(ref.className || '').trim();
    const selector = String(ref.selector || '').trim();
    const meta = !!ref.meta;
    if (!className || !selector) return null;
    return {
      className,
      selector,
      meta,
      dictionary: String(ref.dictionary || '').trim(),
      label: String(ref.label || `${meta ? `${className} class` : className}>>${selector}`).trim(),
    };
  }
  const split = String(ref || '').indexOf('>>');
  if (split < 0) return null;
  let className = String(ref).slice(0, split).trim();
  const selector = String(ref).slice(split + 2).trim();
  const meta = className.endsWith(' class');
  if (meta) className = className.slice(0, -6).trim();
  return className && selector ? {
    className,
    selector,
    meta,
    dictionary: '',
    label: String(ref).trim(),
  } : null;
}

function parseHierarchyEntry(entry) {
  if (entry && typeof entry === 'object' && !Array.isArray(entry)) {
    return {
      className: String(entry.className || '').trim(),
      dictionary: String(entry.dictionary || '').trim(),
    };
  }
  return {
    className: String(entry || '').trim(),
    dictionary: '',
  };
}

function openMethodQueryWindow(title, results, options = {}) {
  const canLoadResult = typeof options.onLoadResult === 'function';
  const {body} = createWindow({title, width: 760, height: 520, taskbarLabel:'Method Query'});
  body.innerHTML = `
    <div class="qv-wrap">
      <div class="qv-list"></div>
      <div class="qv-main">
        <div class="qv-toolbar">
          <span class="qv-title">Select a result</span>
          ${canLoadResult ? `<button class="btn-ghost" id="qv-load" disabled>${escHtml(options.loadLabel || 'Load Into Browser')}</button>` : ''}
          <button class="btn-ghost" id="qv-open" disabled>Open In Browser</button>
        </div>
        <textarea class="qv-preview" readonly></textarea>
      </div>
    </div>
  `;

  const listEl = body.querySelector('.qv-list');
  const titleEl = body.querySelector('.qv-title');
  const previewEl = body.querySelector('.qv-preview');
  const loadBtn = body.querySelector('#qv-load');
  const openBtn = body.querySelector('#qv-open');
  let currentRef = null;

  async function selectRef(ref, row) {
    currentRef = ref;
    listEl.querySelectorAll('.qv-item').forEach(el => el.classList.remove('active'));
    row?.classList.add('active');
    const parsed = parseMethodReference(ref);
    if (!parsed) {
      titleEl.textContent = ref;
      previewEl.value = ref;
      if (loadBtn) loadBtn.disabled = true;
      openBtn.disabled = true;
      return;
    }
    if (loadBtn) loadBtn.disabled = false;
    openBtn.disabled = false;
    titleEl.textContent = parsed.meta ? `${parsed.className} class >> ${parsed.selector}` : `${parsed.className} >> ${parsed.selector}`;
    previewEl.value = 'Loading…';
    try {
      const params = {
        class: parsed.className,
        selector: parsed.selector,
        meta: parsed.meta ? 1 : 0,
      };
      if (parsed.dictionary) params.dictionary = parsed.dictionary;
      const d = await apiWithParams('/class-browser/source', params);
      if (!d.success) throw new Error(d.exception);
      previewEl.value = d.source || '';
    } catch (e) {
      previewEl.value = 'Error: ' + e.message;
    }
  }

  loadBtn?.addEventListener('click', async () => {
    const parsed = parseMethodReference(currentRef);
    if (!parsed) return;
    loadBtn.disabled = true;
    openBtn.disabled = true;
    try {
      await options.onLoadResult(parsed, currentRef);
    } finally {
      const stillParsed = parseMethodReference(currentRef);
      if (stillParsed) {
        loadBtn.disabled = false;
        openBtn.disabled = false;
      }
    }
  });

  openBtn.addEventListener('click', () => {
    const parsed = parseMethodReference(currentRef);
    if (!parsed) return;
    openClassBrowser({
      dictionary: parsed.dictionary || null,
      className: parsed.className,
      method: parsed.selector,
      meta: parsed.meta,
    });
  });

  if (!results.length) {
    listEl.innerHTML = '<div class="cb-empty">(no matches)</div>';
    previewEl.value = '';
    return;
  }

  results.forEach(ref => {
    const row = document.createElement('div');
    row.className = 'qv-item';
    const parsed = parseMethodReference(ref);
    row.textContent = parsed?.label || String(ref || '');
    if (parsed?.dictionary) row.title = `${row.textContent} (${parsed.dictionary})`;
    row.addEventListener('click', () => selectRef(ref, row));
    row.addEventListener('dblclick', () => {
      const parsed = parseMethodReference(ref);
      if (parsed) {
        openClassBrowser({
          dictionary: parsed.dictionary || null,
          className: parsed.className,
          method: parsed.selector,
          meta: parsed.meta,
        });
      }
    });
    listEl.appendChild(row);
  });
  selectRef(results[0], listEl.querySelector('.qv-item'));
}

function openHierarchyWindow(title, classes, options = {}) {
  const canLoadClass = typeof options.onLoadClass === 'function';
  const {body} = createWindow({title, width: 640, height: 480, taskbarLabel:'Hierarchy'});

  const openBtn = body.querySelector('#qv-open-class');
  let currentEntry = null;

  async function selectClass(entry, row) {
    const parsed = parseHierarchyEntry(entry);
    currentEntry = parsed.className ? parsed : null;
    listEl.querySelectorAll('.qv-item').forEach(el => el.classList.remove('active'));
    row?.classList.add('active');
    titleEl.textContent = currentEntry?.className || 'Select a class';
    if (loadBtn) loadBtn.disabled = !currentEntry;
    openBtn.disabled = !currentEntry;
    if (!currentEntry) {
      previewEl.value = '';
      return;
    }
    previewEl.value = 'Loading…';
    try {
      const params = {class: currentEntry.className};
      if (currentEntry.dictionary) params.dictionary = currentEntry.dictionary;
      const d = await apiWithParams('/class-browser/source', params);
      if (!d.success) throw new Error(d.exception);
      previewEl.value = d.source || '';
    } catch (e) {
      previewEl.value = 'Error: ' + e.message;
    }
  }

  loadBtn?.addEventListener('click', async () => {
    if (!currentEntry) return;
    loadBtn.disabled = true;
    openBtn.disabled = true;
    try {
      await options.onLoadClass(currentEntry);
    } finally {
      if (currentEntry) {
        loadBtn.disabled = false;
        openBtn.disabled = false;
      }
    }
  });

  openBtn.addEventListener('click', () => {
    if (!currentEntry) return;
    openClassBrowser({
      dictionary: currentEntry.dictionary || null,
      className: currentEntry.className,
      meta: !!options.meta,
    });
  });

  if (!classes.length) {
    listEl.innerHTML = '<div class="cb-empty">(no classes)</div>';
    previewEl.value = '';
    return;
  }

  classes.forEach(entry => {
    const parsed = parseHierarchyEntry(entry);
    const row = document.createElement('div');
    row.className = 'qv-item';
    row.textContent = parsed.className;
    if (parsed.dictionary) row.title = `${parsed.className} (${parsed.dictionary})`;
    row.addEventListener('click', () => selectClass(entry, row));
    row.addEventListener('dblclick', () => openClassBrowser({
      dictionary: parsed.dictionary || null,
      className: parsed.className,
      meta: !!options.meta,
    }));
    listEl.appendChild(row);
  });
  const defaultIndex = Math.max(0, classes.length - 1);
  selectClass(classes[defaultIndex], listEl.querySelectorAll('.qv-item')[defaultIndex]);
}

function openVersionsWindow(title, versions, options = {}) {

  const previewEl = body.querySelector('.qv-preview');
  const loadBtn = body.querySelector('#qv-load-version');

  function selectVersion(version, row) {
    currentVersion = version || null;
    listEl.querySelectorAll('.qv-item').forEach(el => el.classList.remove('active'));

    titleEl.textContent = version?.label || 'Select a version';

  els.meta.checked = currentMeta;

  const listStateByContainer = new Map(Object.values(listStates).map(state => [state.container, state]));

  function clampPaneWidths(widths) {
    const next = Array.isArray(widths) ? widths.slice(0, 4) : [];
    while (next.length < 4) next.push(defaultPaneWidths[next.length]);
    return next.map((width, index) => {
      const numeric = Number(width);
      return Number.isFinite(numeric) ? Math.max(paneMinWidths[index], Math.round(numeric)) : defaultPaneWidths[index];
    });
  }

  function loadStoredPaneWidths() {
    try {
      const raw = localStorage.getItem(paneWidthStorageKey);
      if (!raw) return [...defaultPaneWidths];
      return clampPaneWidths(JSON.parse(raw));
    } catch (_) {
      return [...defaultPaneWidths];
    }
  }

  function applyPaneWidths() {
    paneWidths = clampPaneWidths(paneWidths);
    paneWidths.forEach((width, index) => {
      els.lists.style.setProperty(`--cb-col-${index + 1}`, `${width}px`);
    });
  }

  function persistPaneWidths() {
    try {
      localStorage.setItem(paneWidthStorageKey, JSON.stringify(paneWidths));
    } catch (_) {
      // ignore storage failures
    }
  }

  function initPaneSplitters() {
    body.querySelectorAll('.cb-splitter').forEach((splitter, index) => {
      splitter.addEventListener('pointerdown', event => {
        event.preventDefault();
        const startX = event.clientX;
        const leftIndex = index;
        const rightIndex = index + 1;
        const startLeft = paneWidths[leftIndex];
        const startRight = paneWidths[rightIndex];
        const total = startLeft + startRight;
        splitter.classList.add('is-active');
        document.body.style.userSelect = 'none';

        const onMove = moveEvent => {
          const delta = moveEvent.clientX - startX;
          const minLeft = paneMinWidths[leftIndex];
          const minRight = paneMinWidths[rightIndex];
          const nextLeft = Math.min(total - minRight, Math.max(minLeft, startLeft + delta));
          paneWidths[leftIndex] = Math.round(nextLeft);
          paneWidths[rightIndex] = Math.round(total - nextLeft);
          applyPaneWidths();
        };
        const onUp = () => {
          window.removeEventListener('pointermove', onMove);
          window.removeEventListener('pointerup', onUp);
          window.removeEventListener('pointercancel', onUp);
          document.body.style.userSelect = '';
          splitter.classList.remove('is-active');
          persistPaneWidths();
        };

        window.addEventListener('pointermove', onMove);
        window.addEventListener('pointerup', onUp);
        window.addEventListener('pointercancel', onUp);
      });
    });
  }

  function normalizeFilterText(value) {
    return String(value || '').trim().toLowerCase();
  }

  function ensureFilterShowsValue(filterInput, value) {
    if (!filterInput || !value) return;
    const filterText = normalizeFilterText(filterInput.value);
    if (filterText && !String(value).toLowerCase().includes(filterText)) {
      filterInput.value = '';
    }
  }

  function initListFilters() {
    Object.entries(listStates).forEach(([key, state]) => {
      state.container.dataset.listKey = key;
      state.filterInput.dataset.listKey = key;
      state.container.addEventListener('focus', () => { activePaneKey = key; });
      state.container.addEventListener('mousedown', () => { activePaneKey = key; });
      state.container.addEventListener('click', () => {
        activePaneKey = key;
        state.container.focus({preventScroll: true});
      });
      state.filterInput?.addEventListener('focus', () => { activePaneKey = key; });
      state.filterInput?.addEventListener('input', () => {
        renderList(state.container, state.items, state.active, state.onSelect);
      });
      state.filterInput?.addEventListener('keydown', event => {
        if (event.key !== 'Escape') return;
        if (!state.filterInput.value) return;
        event.preventDefault();
        state.filterInput.value = '';
        renderList(state.container, state.items, state.active, state.onSelect);
      });
    });
  }

  function visibleItemsForState(state) {
    const filterText = state ? normalizeFilterText(state.filterInput?.value) : '';
    const items = Array.isArray(state?.items) ? state.items.slice() : [];
    return filterText
      ? items.filter(item => String(item).toLowerCase().includes(filterText))
      : items;
  }

  function focusPaneList(key) {
    const state = listStates[key];
    if (!state) return false;
    activePaneKey = key;
    state.container.focus({preventScroll: true});
    return true;
  }

  function movePaneFocus(fromKey, delta) {
    const currentIndex = Math.max(0, paneOrder.indexOf(fromKey));
    const nextIndex = Math.max(0, Math.min(paneOrder.length - 1, currentIndex + delta));
    return focusPaneList(paneOrder[nextIndex]);
  }

  function activatePaneItem(key, item) {
    const state = listStates[key];
    if (!state?.onSelect || !item) return false;
    activePaneKey = key;
    state.onSelect(item);
    state.container.focus({preventScroll: true});
    return true;
  }

  function activateCurrentPaneItem(key) {
    const state = listStates[key];
    const visibleItems = visibleItemsForState(state);
    if (!visibleItems.length) return false;
    const activeItem = visibleItems.includes(state.active) ? state.active : visibleItems[0];
    return activatePaneItem(key, activeItem);
  }

  function selectRelativePaneItem(key, delta) {
    const state = listStates[key];
    const visibleItems = visibleItemsForState(state);
    if (!visibleItems.length) return false;
    let currentIndex = visibleItems.indexOf(state?.active);
    if (currentIndex < 0) currentIndex = delta >= 0 ? -1 : visibleItems.length;
    const nextIndex = Math.max(0, Math.min(visibleItems.length - 1, currentIndex + delta));
    return activatePaneItem(key, visibleItems[nextIndex]);
  }

  function selectBoundaryPaneItem(key, boundary) {
    const state = listStates[key];
    const visibleItems = visibleItemsForState(state);
    if (!visibleItems.length) return false;
    return activatePaneItem(key, boundary === 'last' ? visibleItems[visibleItems.length - 1] : visibleItems[0]);
  }

  function handleClassBrowserKeydown(event) {
    if (!win.classList.contains('focused')) return;
    if (document.getElementById('modal-overlay')?.classList.contains('visible')) return;
    if (!win.contains(event.target)) return;

    const key = event.key || '';
    const lowerKey = key.toLowerCase();
    const target = event.target;
    const isFilter = target instanceof HTMLInputElement && target.classList.contains('cb-filter');
    const isList = target instanceof HTMLElement && target.classList.contains('cb-list');
    const isSource = target === els.source;
    const isSelect = target instanceof HTMLSelectElement;
    const isButton = target instanceof HTMLButtonElement;
    const targetPaneKey = (isFilter || isList) ? String(target.dataset.listKey || activePaneKey || '') : activePaneKey;

    if ((event.metaKey || event.ctrlKey) && !event.altKey && lowerKey === 's') {
      event.preventDefault();
      if (els.compile.disabled) {
        setBrowserStatus(els.compile.title || 'Compile unavailable', 'error');
        return;
      }
      compileSource();
      return;
    }
    if ((event.metaKey || event.ctrlKey) && !event.altKey && key === 'Enter' && isSource) {
      event.preventDefault();
      if (els.compile.disabled) {
        setBrowserStatus(els.compile.title || 'Compile unavailable', 'error');
        return;
      }
      compileSource();
      return;
    }

    if (isSource || isSelect || isButton) return;
    if (!(isFilter || isList)) return;

    if (key === 'ArrowUp') {
      event.preventDefault();
      selectRelativePaneItem(targetPaneKey, -1);
      return;
    }
    if (key === 'ArrowDown') {
      event.preventDefault();
      selectRelativePaneItem(targetPaneKey, 1);
      return;
    }
    if (key === 'Home') {
      event.preventDefault();
      selectBoundaryPaneItem(targetPaneKey, 'first');
      return;
    }
    if (key === 'End') {
      event.preventDefault();
      selectBoundaryPaneItem(targetPaneKey, 'last');
      return;
    }
    if (isList && key === 'ArrowLeft') {
      event.preventDefault();
      movePaneFocus(targetPaneKey, -1);
      return;
    }
    if (isList && key === 'ArrowRight') {
      event.preventDefault();
      movePaneFocus(targetPaneKey, 1);
      return;
    }
    if (key === 'Enter') {
      event.preventDefault();
      activateCurrentPaneItem(targetPaneKey);
    }
  }

  function syncSourceMode() {
    const editable = currentSourceMode !== 'classDefinition';
    els.source.readOnly = !editable;

  function clearBrowserCache() {
    browserCache.clear();
  }

  async function fetchBrowserCached(name, keyParts, loader) {
    const cacheKey = `${name}:${JSON.stringify(keyParts || {})}`;
    const existing = browserCache.get(cacheKey);
    if (existing) {
      if (Object.prototype.hasOwnProperty.call(existing, 'value')) return existing.value;
      return existing.promise;
    }
    const promise = Promise.resolve()
      .then(loader)
      .then(value => {
        browserCache.set(cacheKey, {value});
        return value;
      })
      .catch(error => {
        if (browserCache.get(cacheKey)?.promise === promise) browserCache.delete(cacheKey);
        throw error;
      });
    browserCache.set(cacheKey, {promise});
    return promise;
  }

  function renderList(container, items, active, onSelect) {
    const state = listStateByContainer.get(container) || null;
    const allItems = Array.isArray(items) ? items.slice() : [];
    if (state) {
      state.items = allItems;
      state.active = active;
      state.onSelect = onSelect;
    }
    const filterText = state ? normalizeFilterText(state.filterInput.value) : '';
    const visibleItems = filterText
      ? allItems.filter(item => String(item).toLowerCase().includes(filterText))
      : allItems;
    container.innerHTML = '';
    if (!allItems.length) {
      container.innerHTML = '<div class="cb-empty">(empty)</div>';
      return;
    }
    if (!visibleItems.length) {
      container.innerHTML = '<div class="cb-empty">(no matches)</div>';
      return;
    }
    let activeRow = null;
    visibleItems.forEach(item => {
      const row = document.createElement('div');
      row.className = 'cb-item' + (item === active ? ' active' : '');
      row.textContent = item;
      row.title = item;
      row.addEventListener('click', () => onSelect(item));
      container.appendChild(row);
      if (item === active) activeRow = row;
    });
    if (activeRow) {
      requestAnimationFrame(() => activeRow.scrollIntoView({block: 'nearest'}));
    }
  }

  function showLoading(container) {
    container.innerHTML = '<div class="cb-empty"><span class="spinner"></span></div>';
  }

  function setActiveRow(container, value) {
    const state = listStateByContainer.get(container) || null;
    if (state) state.active = value;
    let activeRow = null;
    container.querySelectorAll('.cb-item').forEach(row => {
      const isActive = !!value && row.textContent === value;
      row.classList.toggle('active', isActive);
      if (isActive) activeRow = row;
    });
    if (activeRow) {
      requestAnimationFrame(() => activeRow.scrollIntoView({block: 'nearest'}));
    }
  }

  function clearSource() {
    currentSourceMode = 'classDefinition';
    syncSourceMode();
    els.source.value = '';
    setSourceNote('');
  }

  async function loadClassSource(selector='') {
    if (!currentClass) {
      clearSource();
      syncBrowserActions();
      return;
    }
    currentSourceMode = selector ? 'method' : 'classDefinition';
    syncSourceMode();
    const label = selector
      ? (currentMeta ? `${currentClass} class >> ${selector}` : `${currentClass} >> ${selector}`)
      : (currentMeta ? `${currentClass} class` : currentClass);
    setSourceNote(label);
    els.source.value = 'Loading…';
    try {
      const d = await fetchBrowserCached('source', {
        dictionary: currentDict || '',
        class: currentClass,
        selector,
        meta: currentMeta ? 1 : 0,
      }, () => {
        const params = {
          class: currentClass,
          selector,
          meta: currentMeta ? 1 : 0,
        };
        if (currentDict) params.dictionary = currentDict;
        return apiWithParams('/class-browser/source', params);
      });
      if (!d.success) throw new Error(d.exception);
      els.source.value = d.source || '';
      setBrowserStatus(label, 'ok');
    } catch (e) {
      els.source.value = 'Error: ' + e.message;
      setBrowserStatus(e.message, 'error');
      setStatus(false, e.message);
    }
    syncBrowserActions();
  }

  async function loadMethods() {
    if (!currentClass) {
      els.methods.innerHTML = '<div class="cb-empty">(select a class)</div>';
      clearSource();
      syncBrowserActions();
      return;
    }
    showLoading(els.methods);
    try {
      const d = await fetchBrowserCached('methods', {
        dictionary: currentDict || '',
        class: currentClass,
        protocol: currentProtocol,
        meta: currentMeta ? 1 : 0,
      }, () => {
        const params = {
          class: currentClass,
          protocol: currentProtocol,
          meta: currentMeta ? 1 : 0,
        };
        if (currentDict) params.dictionary = currentDict;
        return apiWithParams('/class-browser/methods', params);
      });
      if (!d.success) throw new Error(d.exception);
      const methods = d.methods || [];
      if (!methods.includes(currentMethod)) currentMethod = null;
      renderList(els.methods, methods, currentMethod, async method => {
        currentMethod = method;
        renderList(els.methods, methods, currentMethod, async item => {
          currentMethod = item;
          await loadClassSource(currentMethod);
        });
        await loadClassSource(currentMethod);
      });
      if (currentMethod) {
        await loadClassSource(currentMethod);
      } else {
        await loadClassSource('');
      }
    } catch (e) {
      els.methods.innerHTML = `<div class="cb-empty" style="color:#f38ba8">${escHtml(e.message)}</div>`;
      setBrowserStatus(e.message, 'error');
      setStatus(false, e.message);
    }
    syncBrowserActions();
  }

  async function loadProtocols() {
    if (!currentClass) {
      els.protocols.innerHTML = '<div class="cb-empty">(select a class)</div>';
      els.methods.innerHTML = '<div class="cb-empty">(select a class)</div>';
      clearSource();
      syncBrowserActions();
      return;

    showLoading(els.protocols);
    try {
      const d = await fetchBrowserCached('categories', {
        dictionary: currentDict || '',
        class: currentClass,
        meta: currentMeta ? 1 : 0,
      }, () => {
        const params = {
          class: currentClass,
          meta: currentMeta ? 1 : 0,
        };
        if (currentDict) params.dictionary = currentDict;
        return apiWithParams('/class-browser/categories', params);
      });
      if (!d.success) throw new Error(d.exception);
      const protocols = d.categories || ['-- all --'];
      if (!protocols.includes(currentProtocol)) currentProtocol = '-- all --';
      renderList(els.protocols, protocols, currentProtocol, async protocol => {
        currentProtocol = protocol;
        currentMethod = null;
        renderList(els.protocols, protocols, currentProtocol, async item => {
          currentProtocol = item;
          currentMethod = null;
          await loadMethods();
        });
        await loadMethods();
      });
      await loadMethods();
    } catch (e) {
      els.protocols.innerHTML = `<div class="cb-empty" style="color:#f38ba8">${escHtml(e.message)}</div>`;
      setBrowserStatus(e.message, 'error');
      setStatus(false, e.message);

    syncBrowserActions();

  async function loadClasses() {
    if (!currentDict) {
      els.classes.innerHTML = '<div class="cb-empty">(select a dictionary)</div>';
      els.protocols.innerHTML = '<div class="cb-empty">(select a class)</div>';
      els.methods.innerHTML = '<div class="cb-empty">(select a class)</div>';
      clearSource();
      syncBrowserActions();
      return;

    showLoading(els.classes);
    try {
      const d = await fetchBrowserCached('classes', {
        dictionary: currentDict,
      }, () => apiWithParams('/class-browser/classes', {dictionary: currentDict}));
      if (!d.success) throw new Error(d.exception);
      const classes = d.classes || [];
      if (!classes.includes(currentClass)) currentClass = classes[0] || null;
      renderList(els.classes, classes, currentClass, async className => {
        currentClass = className;
        currentProtocol = '-- all --';
        currentMethod = null;
        renderList(els.classes, classes, currentClass, async item => {
          currentClass = item;
          currentProtocol = '-- all --';
          currentMethod = null;
          await loadProtocols();

      els.classes.innerHTML = `<div class="cb-empty" style="color:#f38ba8">${escHtml(e.message)}</div>`;

  async function loadDictionaries() {
    showLoading(els.dicts);

      const d = await fetchBrowserCached('dictionaries', {}, () => api('/class-browser/dictionaries'));
      if (!d.success) throw new Error(d.exception);
      const dictionaries = d.dictionaries || [];
      if (!dictionaries.includes(currentDict)) currentDict = currentDict || dictionaries[0] || null;
      if (!dictionaries.includes(currentDict)) currentDict = dictionaries[0] || null;
      renderList(els.dicts, dictionaries, currentDict, async dictName => {
        currentDict = dictName;
        currentClass = null;
        currentProtocol = '-- all --';
        currentMethod = null;
        renderList(els.dicts, dictionaries, currentDict, async item => {
          currentDict = item;
          currentClass = null;
          currentProtocol = '-- all --';
          currentMethod = null;
          await loadClasses();
        });
        await loadClasses();
      });
      await loadClasses();
    } catch (e) {
      els.dicts.innerHTML = `<div class="cb-empty" style="color:#f38ba8">${escHtml(e.message)}</div>`;
      setBrowserStatus(e.message, 'error');

  async function chooseClassMatch(className, matches) {
    const options = (matches || []).map(match => ({
      value: match.dictionary,
      label: `${match.dictionary} :: ${className}`,
    }));
    const selected = await requestSelectModal(
      'Select Class Dictionary',
      `Class "${className}" was found in multiple dictionaries`,

  async function locateAndSelectClass(className, methodName = null, meta = currentMeta, dictionary = null) {
    const nextMeta = !!meta;
    let nextDict = dictionary || '';
    if (!nextDict) {
      const d = await fetchBrowserCached('class-location', {class: className}, () => apiWithParams('/class-browser/class-location', {class: className}));
      if (!d.success) throw new Error(d.exception);
      const matches = Array.isArray(d.matches) ? d.matches : (d.dictionary ? [{className, dictionary: d.dictionary}] : []);
      if (!matches.length) throw new Error(`Class not found: ${className}`);
      if (matches.length === 1) {
        nextDict = matches[0].dictionary;
      } else {
        const chosen = await chooseClassMatch(className, matches);
        if (!chosen) return false;
        nextDict = chosen.dictionary;
      }
    }
    currentMeta = nextMeta;
    els.meta.checked = currentMeta;
    currentDict = nextDict;
    currentClass = className;
    currentProtocol = '-- all --';
    currentMethod = methodName;
    ensureFilterShowsValue(els.dictFilter, currentDict);
    ensureFilterShowsValue(els.classFilter, currentClass);
    ensureFilterShowsValue(els.methodFilter, currentMethod);
    await loadDictionaries();
    return true;
  }

  function downloadTextFile(filename, text) {
    const blob = new Blob([text], {type: 'text/plain;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = String(filename || 'export.st').replace(/[\\/:*?"<>|]+/g, '-');
    document.body.appendChild(link);
    link.click();
    link.remove();
    setTimeout(() => URL.revokeObjectURL(url), 0);
  }

      `Remove "${category}" and move its methods to "as yet unclassified"?`,
      {okLabel: 'Move Methods'}
    );
    if (!confirmed) return;
    setBrowserStatus('Removing category…');
    try {
      const d = await apiPost('/class-browser/remove-category', {
        className,
        dictionary: currentDict || '',
        category,
        meta: currentMeta,
      });
      if (!d.success) throw new Error(d.exception || 'Category removal failed');
      clearBrowserCache();
      currentProtocol = d.category || 'as yet unclassified';
      currentMethod = selectedMethod;
      ensureFilterShowsValue(els.protocolFilter, currentProtocol);
      ensureFilterShowsValue(els.methodFilter, currentMethod);
      await loadProtocols();
      setBrowserStatus(d.result || `Moved methods from ${category}`, 'ok');
    } catch (e) {
      setBrowserStatus(e.message, 'error');
      setStatus(false, e.message);
    }
  }

  function startNewMethod() {
    if (!currentClass) {
      setBrowserStatus('Select a class first', 'error');
      return;
    }
    currentMethod = null;
    currentSourceMode = 'newMethod';
    syncSourceMode();
    setActiveRow(els.methods, null);
    els.source.value = '';
    setSourceNote(currentMeta ? `${currentClass} class >> (new method)` : `${currentClass} >> (new method)`);
    const targetProtocol = currentProtocol === '-- all --' ? 'as yet unclassified' : currentProtocol;
    setBrowserStatus(`Enter a new method for ${targetProtocol}`, 'ok');
    els.source.focus();
  }

  async function createAccessors() {
    if (!currentClass) {
      setBrowserStatus('Select a class first', 'error');
      return;
    }
    const variableName = await requestTextModal('Create Accessors', 'Variable name', '', 'name');
    if (!variableName) return;
    setBrowserStatus('Creating accessors…');
    try {
      const d = await apiPost('/class-browser/create-accessors', {
        className: currentClass,
        dictionary: currentDict || '',
        variableName,
      });
      if (!d.success) throw new Error(d.exception || 'Accessor generation failed');
      const getterSelector = String(d.getterSelector || variableName).trim();
      const accessorCategory = String(d.category || 'accessing').trim() || 'accessing';
      clearBrowserCache();
      currentMeta = false;
      els.meta.checked = false;
      currentProtocol = accessorCategory;
      currentMethod = getterSelector || null;
      ensureFilterShowsValue(els.protocolFilter, currentProtocol);
      ensureFilterShowsValue(els.methodFilter, currentMethod);
      await loadProtocols();
      setBrowserStatus(d.result || 'Accessors created', 'ok');
    } catch (e) {
      setBrowserStatus(e.message, 'error');
      setStatus(false, e.message);
    }
  }

  async function commitSession() {
    setBrowserStatus('Committing…');
    try {
      const d = await apiTransaction('/transaction/commit');
      if (!d.success) throw new Error(d.exception);
      clearBrowserCache();
      setBrowserStatus('Transaction committed', 'ok');
      setStatus(true, 'committed');
    } catch (e) {
      setBrowserStatus(e.message, 'error');
      setStatus(false, e.message);
    }
  }

  async function compileSource() {
    if (!currentClass) {
      setBrowserStatus('Select a class first', 'error');
      return;
    }
    setBrowserStatus('Compiling…');
    try {
      const d = await apiPost('/class-browser/compile', {
        className: currentClass,
        dictionary: currentDict || '',
        category: currentProtocol === '-- all --' ? 'as yet unclassified' : currentProtocol,
        selector: currentMethod || '',
        source: els.source.value,
        meta: els.meta.checked,
        sourceKind: currentSourceMode === 'classDefinition' ? 'classDefinition' : 'method',
      });
      if (!d.success) throw new Error(d.exception || 'Compilation failed');
      const compiledSelector = String(d.selector || currentMethod || '').trim();
      const compiledCategory = String(d.category || currentProtocol || '').trim();
      clearBrowserCache();
      if (compiledCategory) currentProtocol = compiledCategory;
      if (compiledSelector) currentMethod = compiledSelector;
      currentSourceMode = 'method';
      ensureFilterShowsValue(els.protocolFilter, currentProtocol);
      ensureFilterShowsValue(els.methodFilter, currentMethod);
      const compiledLabel = compiledSelector
        ? `${currentClass}${currentMeta ? ' class' : ''} >> ${compiledSelector}`
        : `${currentClass}${currentMeta ? ' class' : ''}`;
      const renameNote = d.previousSelector && compiledSelector && d.previousSelector !== compiledSelector
        ? ` (${d.previousSelector} → ${compiledSelector})`
        : '';
      const compileStatus = `${d.result || 'Compiled'}${renameNote}`;
      await loadProtocols();
      setBrowserStatus(compileStatus, 'ok');
      if (compiledSelector) setSourceNote(compiledLabel);
    } catch (e) {
      setBrowserStatus(e.message, 'error');
      setStatus(false, e.message);
    }
  }

  body.querySelector(`#${id}-find`).addEventListener('click', async () => {
    const className = await requestTextModal('Find Class', 'Class name', currentClass || '', 'Object');
    if (!className) return;
    try {
      const loaded = await locateAndSelectClass(className);
      if (!loaded) {
        setBrowserStatus('Class selection cancelled');
        return;
      }
      setBrowserStatus(`Selected ${className}`, 'ok');
    } catch (e) {
      setBrowserStatus(e.message, 'error');
      setStatus(false, e.message);
    }
  });
  body.querySelector(`#${id}-find-dictionary`).addEventListener('click', () => findDictionary());
  body.querySelector(`#${id}-add-dictionary`).addEventListener('click', () => addDictionary());
  body.querySelector(`#${id}-rename-dictionary`).addEventListener('click', () => renameDictionary());
  body.querySelector(`#${id}-remove-dictionary`).addEventListener('click', () => removeDictionary());
  body.querySelector(`#${id}-add-class`).addEventListener('click', () => addClass());
  body.querySelector(`#${id}-rename-class`).addEventListener('click', () => renameClass());
  body.querySelector(`#${id}-add-category`).addEventListener('click', () => addCategory());
  body.querySelector(`#${id}-rename-category`).addEventListener('click', () => renameCategory());
  body.querySelector(`#${id}-add-inst-var`).addEventListener('click', () => addClassVariable(
    '/class-browser/add-instance-variable',
    'Add Instance Variable',
    `Instance variable name for ${currentClass}`,
    'slotName'
  ));
  body.querySelector(`#${id}-add-class-var`).addEventListener('click', () => addClassVariable(
    '/class-browser/add-class-variable',
    'Add Class Variable',
    `Class variable name for ${currentClass}`,
    'SharedState'
  ));
  body.querySelector(`#${id}-add-class-inst-var`).addEventListener('click', () => addClassVariable(
    '/class-browser/add-class-instance-variable',
    'Add Class Instance Variable',
    `Class instance variable name for ${currentClass}`,
    'cachedState'
  ));
  body.querySelector(`#${id}-move-class`).addEventListener('click', () => moveClass());
  body.querySelector(`#${id}-remove-class`).addEventListener('click', () => removeClass());
  body.querySelector(`#${id}-refresh`).addEventListener('click', () => refreshBrowser());
  body.querySelector(`#${id}-browse-class`).addEventListener('click', () => {
    currentMethod = null;
    currentSourceMode = 'classDefinition';
    setActiveRow(els.methods, null);
    loadClassSource('');
  });
  body.querySelector(`#${id}-new-method`).addEventListener('click', () => startNewMethod());
  body.querySelector(`#${id}-move-method`).addEventListener('click', () => moveMethod());
  body.querySelector(`#${id}-remove-method`).addEventListener('click', () => removeMethod());
  body.querySelector(`#${id}-remove-category`).addEventListener('click', () => removeCategory());
  body.querySelector(`#${id}-hierarchy`).addEventListener('click', () => showHierarchy());
  body.querySelector(`#${id}-versions`).addEventListener('click', () => showVersions());
  body.querySelector(`#${id}-references`).addEventListener('click', () => runReferenceQuery());
  body.querySelector(`#${id}-method-text`).addEventListener('click', () => runMethodTextQuery());
  body.querySelector(`#${id}-inspect-dictionary`).addEventListener('click', () => inspectTarget('dictionary'));
  body.querySelector(`#${id}-inspect-class`).addEventListener('click', () => inspectTarget('class'));
  body.querySelector(`#${id}-inspect-method`).addEventListener('click', () => inspectTarget('method'));
  body.querySelector(`#${id}-inspect-instances`).addEventListener('click', () => inspectTarget('instances'));
  body.querySelector(`#${id}-senders`).addEventListener('click', () => runSelectorQuery('senders', 'Senders of selector:'));
  body.querySelector(`#${id}-implementors`).addEventListener('click', () => runSelectorQuery('implementors', 'Implementors of selector:'));
  body.querySelector(`#${id}-file-out`).addEventListener('click', () => fileOut());
  body.querySelector(`#${id}-create-accessors`).addEventListener('click', () => createAccessors());
  body.querySelector(`#${id}-commit`).addEventListener('click', () => commitSession());
  body.querySelector(`#${id}-compile`).addEventListener('click', () => compileSource());
  win.addEventListener('keydown', handleClassBrowserKeydown);
  els.meta.addEventListener('change', async () => {
    currentMeta = els.meta.checked;
    currentProtocol = '-- all --';
    currentMethod = null;
    ensureFilterShowsValue(els.classFilter, currentClass);
    await loadProtocols();
  });

  (async () => {
    try {
      paneWidths = loadStoredPaneWidths();
      applyPaneWidths();
      initPaneSplitters();
      initListFilters();
      syncSourceMode();
      if (currentClass && !currentDict) {
        const loaded = await locateAndSelectClass(currentClass, currentMethod, currentMeta);
        if (!loaded) {
          currentClass = null;
          currentMethod = null;
          currentProtocol = '-- all --';
          await loadDictionaries();
          setBrowserStatus('Ready');
          return;
        }
      } else {
        await loadDictionaries();
      }
      setBrowserStatus(currentClass ? `Loaded ${currentClass}` : 'Ready');
    } catch (e) {
      setBrowserStatus(e.message, 'error');
      setStatus(false, e.message);
    }
  })();

  return win;
}

// ── shared helpers ────────────────────────────────────────────────────────────
function makeTable(headers, rows) {
  const tbl = document.createElement('table'); tbl.className='dbtable';
  const thead=document.createElement('thead');
  thead.innerHTML='<tr>'+headers.map(h=>`<th>${escHtml(h)}</th>`).join('')+'</tr>';
  tbl.appendChild(thead);
  const tbody=document.createElement('tbody');
  rows.forEach(r=>{
    const tr=document.createElement('tr');
    r.forEach((c,i)=>{
      const td=document.createElement('td');td.className=i===0?'col-key':'col-val';td.textContent=c;tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
  return tbl;
}

// ── modal ─────────────────────────────────────────────────────────────────────
function populateModalFields(fieldsEl, fields, options = {}) {
  fieldsEl.innerHTML = '';
  if (options.message) {
    const message = document.createElement('div');
    message.className = 'modal-message';
    message.textContent = options.message;
    fieldsEl.appendChild(message);
  }
  for (const field of fields) {
    const label = document.createElement('label');
    label.textContent = field.label;
    label.style.cssText = 'display:block;margin-bottom:2px';
    fieldsEl.appendChild(label);
    let el;
    if (field.type === 'textarea') {
      el = document.createElement('textarea');
    } else if (field.type === 'select') {
      el = document.createElement('select');
      (field.options || []).forEach(option => {
        const opt = document.createElement('option');
        if (option && typeof option === 'object') {
          opt.value = option.value;
          opt.textContent = option.label ?? option.value;
        } else {
          opt.value = String(option);
          opt.textContent = String(option);
        }
        el.appendChild(opt);
      });
    } else {
      el = document.createElement('input');
      el.type = field.type || 'text';
    }
    el.placeholder = field.placeholder || '';
    el.id = field.id;
    el.style.marginBottom = '6px';
    el.value = field.value || '';
    fieldsEl.appendChild(el);
  }
}

function requestModal(title, fields, options = {}) {
  const overlay = document.getElementById('modal-overlay');
  const titleEl = document.getElementById('modal-title');
  const fieldsEl = document.getElementById('modal-fields');
  const cancelBtn = document.getElementById('modal-cancel');
  const okBtn = document.getElementById('modal-ok');

  titleEl.textContent = title;
  okBtn.textContent = options.okLabel || 'OK';
  cancelBtn.textContent = options.cancelLabel || 'Cancel';
  populateModalFields(fieldsEl, fields, options);

  overlay.classList.add('visible');
  const firstField = fields.length ? document.getElementById(fields[0].id) : null;
  if (firstField) {
    firstField.focus();
    firstField.select?.();
  } else {
    okBtn.focus();
  }

  return new Promise(resolve => {
    let settled = false;
    const cleanup = result => {
      if (settled) return;
      settled = true;
      overlay.classList.remove('visible');
      document.removeEventListener('keydown', onKey, true);
      cancelBtn.onclick = null;
      okBtn.onclick = null;
      resolve(result);
    };
    const collectValues = () => {
      const vals = {};
      for (const field of fields) vals[field.id] = document.getElementById(field.id)?.value ?? '';
      return vals;
    };
    const submit = () => cleanup(collectValues());
    const onKey = e => {
      if (!overlay.classList.contains('visible')) return;
      if (e.key === 'Escape') {
        e.preventDefault();
        cleanup(null);
        return;
      }
      if (e.key === 'Enter') {
        const active = document.activeElement;
        const isTextarea = active && active.tagName === 'TEXTAREA';
        if ((isTextarea && (e.ctrlKey || e.metaKey)) || !isTextarea) {
          e.preventDefault();
          submit();
        }
      }
    };
    document.addEventListener('keydown', onKey, true);
    cancelBtn.onclick = () => cleanup(null);
    okBtn.onclick = submit;
  });
}

function openModal(title, fields, onOk, options = {}) {
  const overlay = document.getElementById('modal-overlay');
  const titleEl = document.getElementById('modal-title');
  const fieldsEl = document.getElementById('modal-fields');
  const cancelBtn = document.getElementById('modal-cancel');
  const okBtn = document.getElementById('modal-ok');

  titleEl.textContent = title;
  okBtn.textContent = options.okLabel || 'OK';
  cancelBtn.textContent = options.cancelLabel || 'Cancel';
  populateModalFields(fieldsEl, fields, options);

  overlay.classList.add('visible');
  const firstField = fields.length ? document.getElementById(fields[0].id) : null;
  if (firstField) {
    firstField.focus();
    firstField.select?.();
  } else {
    okBtn.focus();
  }

  const cleanup = () => {
    overlay.classList.remove('visible');
    document.removeEventListener('keydown', onKey, true);
    cancelBtn.onclick = null;
    okBtn.onclick = null;
  };
  const collectValues = () => {
    const vals = {};
    for (const field of fields) vals[field.id] = document.getElementById(field.id)?.value ?? '';
    return vals;
  };
  const submit = async () => {
    try {
      await onOk(collectValues());
      cleanup();
    } catch (e) {
      setStatus(false, 'Error: ' + e.message);
    }
  };
  const onKey = e => {
    if (!overlay.classList.contains('visible')) return;
    if (e.key === 'Escape') {
      e.preventDefault();
      cleanup();
      return;
    }
    if (e.key === 'Enter') {
      const active = document.activeElement;
      const isTextarea = active && active.tagName === 'TEXTAREA';
      if ((isTextarea && (e.ctrlKey || e.metaKey)) || !isTextarea) {
        e.preventDefault();
        submit();
      }
    }
  };

  document.addEventListener('keydown', onKey, true);
  cancelBtn.onclick = cleanup;
  okBtn.onclick = submit;
}

async function requestTextModal(title, label, value = '', placeholder = '', options = {}) {
  const vals = await requestModal(title, [{
    label,
    id: 'modal-value',
    type: 'input',
    placeholder,
    value,
  }], options);
  return vals ? String(vals['modal-value'] || '').trim() : '';
}

async function requestSelectModal(title, label, optionsList, value = '', options = {}) {
  const vals = await requestModal(title, [{
    label,
    id: 'modal-value',
    type: 'select',
    options: optionsList,
    value,
  }], options);
  return vals ? String(vals['modal-value'] || '').trim() : '';
}

async function requestConfirmModal(title, message, options = {}) {
  return !!(await requestModal(title, [], {
    okLabel: 'OK',
    cancelLabel: 'Cancel',
    ...options,
    message,
  }));
}

// ── startup ───────────────────────────────────────────────────────────────────
async function startup() {
  await init();
  const vw = window.innerWidth;
  const vh = Math.max(420, window.innerHeight - 42);

  const hashOop = startupIds.persistentRootId || roots['UserGlobals'] || roots['Globals'];
  const hashLabel = 'Persistent Root';
  const hashW = Math.min(vw - 32, Math.max(900, Math.floor(vw * 0.72)));
  const hashH = Math.min(300, Math.max(220, Math.floor(vh * 0.34)));
  const hashX = Math.max(16, vw - hashW - 16);
  const hashY = 10;

  const systemW = Math.min(vw - 32, Math.max(980, Math.floor(vw * 0.9)));
  const systemH = Math.min(340, Math.max(280, Math.floor(vh * 0.46)));
  const systemX = 20;
  const systemY = Math.min(Math.max(180, hashY + hashH + 34), Math.max(20, vh - systemH - 20));

  if (hashOop) {
    openObjectBrowser(hashOop, hashLabel, hashX, hashY, hashW, hashH, {initialTab: 'instvars', compact: true});
  } else {
    openObjectBrowser(undefined, undefined, 10, 10, 520, 480);
  }

  if (startupIds.systemId || roots['System']) {
    openObjectBrowser(startupIds.systemId || roots['System'], 'System', systemX, systemY, systemW, systemH, {initialTab: 'control', compact: true});
  }

  cascadeX = 80; cascadeY = 80;
  startThreadPoller();
}
startup();
