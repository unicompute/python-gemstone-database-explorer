          <button class="btn-tx" id="${id}-continue" style="background:#4a90d9">Continue</button>
          <span id="${id}-tx-res" class="txbar-result hidden"></span>
        </div>
      </div>
    </div>
  `;

  // populate roots sidebar
  const rootsUl = body.querySelector(`#${id}-roots`);
  if (rootsUl) {
    for (const [label, oop] of Object.entries(roots)) {
      const li = document.createElement('li');
      li.textContent = label;
      li.dataset.oop = oop;
      li.addEventListener('click', () => { history = [{label, oop}]; loadObj(oop, label); });
      rootsUl.appendChild(li);
    }
  }

  // inspector tab switching
  function normalizeCodeTarget(target, fallbackOop = null, fallbackLabel = '') {
    if (!target || typeof target !== 'object') return null;
    const className = String(target.className || '').trim();
    const meta = !!target.meta;
    const label = String(target.label || (className ? `${className}${meta ? ' class' : ''}` : fallbackLabel || '')).trim();
    return {
      oop: Number.isFinite(target.oop) ? target.oop : fallbackOop,
      label,
      className,
      dictionary: String(target.dictionary || '').trim(),
      meta,
    };
  }

  function getCodeTarget(obj) {
    if (!obj?.oop) return null;
    const explicitTarget = normalizeCodeTarget(
      obj.classBrowserTarget,
      obj.superclassObject?.oop ? obj.oop : (obj.classObject?.oop ?? obj.oop),
      obj.superclassObject?.oop ? (obj.inspection || 'class') : (obj.classObject?.inspection || obj.inspection || 'object'),
    );
    if (explicitTarget?.oop) return explicitTarget;
    if (obj.superclassObject?.oop) {
      return {oop: obj.oop, label: obj.inspection || 'class'};
    }
    if (obj.classObject?.oop) {
      return {oop: obj.classObject.oop, label: obj.classObject.inspection || 'class'};
    }
    return {oop: obj.oop, label: obj.inspection || 'object'};
  }

  function parseClassBrowserTarget(ref) {
    let className = String(ref || '').trim();
    if (!className) return null;
    let meta = false;
    if (className.endsWith(' class')) {
      meta = true;
      className = className.slice(0, -6).trim();
    }
    return className ? {className, meta} : null;
  }

  function currentCodeBrowserTarget(selector = mbCurrentSelector) {
    const target = getCodeTarget(currentObjData);
    const parsed = target?.className ? target : parseClassBrowserTarget(target?.label || mbClassName || '');
    if (!parsed) return null;
    return selector ? {...parsed, method: selector} : parsed;
  }

  function updateMethodBrowserActions() {
    const openBtn = body.querySelector(`#${id}-mb-open-browser`);
    if (!openBtn) return;
    const target = currentCodeBrowserTarget();
    openBtn.disabled = !target;
    openBtn.title = target
      ? (target.method ? `Open ${target.className}${target.meta ? ' class' : ''} >> ${target.method}` : `Open ${target.className}${target.meta ? ' class' : ''}`)
      : 'Open the current method in Class Browser';
  }

  async function fetchMethodBrowserCached(name, keyParts, loader) {
    const cacheKey = `${name}:${JSON.stringify(keyParts || {})}`;
    const existing = methodBrowserCache.get(cacheKey);
    if (existing) {
      if (Object.prototype.hasOwnProperty.call(existing, 'value')) return existing.value;
      return existing.promise;
    }
    const promise = Promise.resolve()
      .then(loader)
      .then(value => {
        methodBrowserCache.set(cacheKey, {value});
        return value;
      })
      .catch(error => {
        if (methodBrowserCache.get(cacheKey)?.promise === promise) methodBrowserCache.delete(cacheKey);
        throw error;
      });
    methodBrowserCache.set(cacheKey, {promise});
    return promise;
  }

  function findSelectorCategory(data, selector) {
    if (!selector) return null;
    let fallback = null;
    Object.entries(data || {}).forEach(([category, selectors]) => {
      if (!Array.isArray(selectors) || !selectors.includes(selector)) return;
      if (category !== '(all Smalltalk)') fallback = category;
      else fallback = fallback || category;
    });
    return fallback;
  }

  function openCurrentCodeInClassBrowser(selector = mbCurrentSelector) {
    const target = currentCodeBrowserTarget(selector);
    if (!target) return false;
    openClassBrowser({...target, sourceWindowId: id});
    return true;
  }

  function getAvailableInspectorTabs(obj) {
    if (Array.isArray(obj?.availableTabs) && obj.availableTabs.length) return obj.availableTabs;
    return ['instvars'];
  }

  function getCustomTab(tabId) {
    return (currentObjData?.customTabs || []).find(tab => tab.id === tabId) || null;
  }

  function getInspectorTabCaption(tabId) {
    const custom = getCustomTab(tabId);
    return custom?.caption || BUILTIN_ITAB_CAPTIONS[tabId] || tabId;
  }

  function renderInspectorTabs(obj) {
    const itabs = body.querySelector(`#${id}-itabs`);
    const available = getAvailableInspectorTabs(obj);
    itabs.innerHTML = '';
    available.forEach(tabId => {
      const tab = document.createElement('div');
      tab.className = 'inspector-tab' + (tabId === currentItab ? ' active' : '') + (tabId === 'control' ? ' dim' : '');
      tab.dataset.itab = tabId;
      tab.textContent = getInspectorTabCaption(tabId);
      itabs.appendChild(tab);
    });
    return available;
  }

  function applyItabVisibility(obj) {
    const mb = body.querySelector(`#${id}-mb`);
    const available = renderInspectorTabs(obj);
    if (!available.includes(currentItab)) {
      currentItab = (obj?.defaultTab && available.includes(obj.defaultTab)) ? obj.defaultTab : (available[0] || 'instvars');
      renderInspectorTabs(obj);
    }
    if (mb) mb.classList.toggle('hidden', currentItab !== 'code');
    const itabs = body.querySelector(`#${id}-itabs`);
    itabs.style.display = available.length > 1 ? 'flex' : 'none';
    updateMethodBrowserActions();
  }

  function activateItab(itabName) {
    const targetTab = body.querySelector(`#${id}-itabs [data-itab="${itabName}"]`);
    if (!targetTab) return false;
    body.querySelectorAll('.inspector-tab').forEach(t => t.classList.remove('active'));
    targetTab.classList.add('active');
    currentItab = itabName;
    if (currentItab === 'code') {
      body.querySelector(`#${id}-mb`).classList.remove('hidden');
      const codeTarget = getCodeTarget(currentObjData);
      if (codeTarget?.oop && mbClassOop !== codeTarget.oop) {
        openMB(codeTarget.oop, codeTarget.label);
      }
    } else {
      body.querySelector(`#${id}-mb`).classList.add('hidden');
    }
    updateMethodBrowserActions();
    syncObjectBrowserWindowState();
    showItab();
    return true;
  }

  body.querySelector(`#${id}-itabs`).addEventListener('click', e => {
    const tab = e.target.closest('.inspector-tab');
    if (!tab) return;
    activateItab(tab.dataset.itab);
  });

  body.querySelector(`#${id}-mb-open-browser`)?.addEventListener('click', () => {
    openCurrentCodeInClassBrowser();
  });

  // method browser close
  body.querySelector(`#${id}-mb-close`).addEventListener('click', () => {
    body.querySelector(`#${id}-mb`).classList.add('hidden');
    body.querySelectorAll('.inspector-tab').forEach(t => { if (t.dataset.itab==='instvars') { t.classList.add('active'); } else t.classList.remove('active'); });
    currentItab = 'instvars';
    showItab();
  });

  // eval
  const evalCode = body.querySelector(`#${id}-eval-code`);
  const evalRes  = body.querySelector(`#${id}-eval-res`);
  body.querySelector(`#${id}-eval-btn`)?.addEventListener('click', doEval);
  evalCode?.addEventListener('keydown', e => { if (e.ctrlKey && e.key === 'Enter') doEval(); });

  // tx buttons
  async function txAction(route, label) {
    const resEl = body.querySelector(`#${id}-tx-res`);
    if (resEl) {
      resEl.classList.remove('hidden','error');
      resEl.textContent = label + '…';
    }
    try {
      const d = await objectApiTransaction(route);
      if (resEl) {
        resEl.textContent = d.success ? (label + ' ok') : 'Error: ' + (d.exception||'');
        if (!d.success) resEl.classList.add('error');
      }
      if (d.success) clearInspectorTabCache(currentOop);
      setStatus(d.success, d.success ? label : d.exception||'error');
    } catch(e) {
      if (resEl) {
        resEl.classList.add('error');
        resEl.textContent = e.message;
      }
      setStatus(false, e.message);
    }
  }
  body.querySelector(`#${id}-abort`)?.addEventListener('click', async () => {
    await txAction('/transaction/abort','aborted');
    if (currentOop) reloadCurrentObject();
  });
  body.querySelector(`#${id}-commit`)?.addEventListener('click', () => txAction('/transaction/commit','committed'));
  body.querySelector(`#${id}-continue`)?.addEventListener('click', () => txAction('/transaction/continue','continued'));

  function normalizeObjectQuery(query) {
    const normalized = {};
    Object.entries(query || {}).forEach(([key, value]) => {
      if (value === undefined || value === null || value === '') return;
      normalized[key] = value;
    });
    return normalized;
  }

  function buildObjectIndexUrl(oop) {
    const qs = new URLSearchParams({depth: '2'});
    Object.entries(currentObjectQuery).forEach(([key, value]) => qs.set(key, String(value)));
    return `/object/index/${oop}?${qs.toString()}`;
  }

  function inspectorCacheFor(oop) {
    let cache = inspectorTabCache.get(oop);
    if (!cache) {
      cache = new Map();
      inspectorTabCache.set(oop, cache);
    }
    return cache;
  }

  function clearInspectorTabCache(oop = currentOop) {
    if (oop === null || oop === undefined) return;
    inspectorTabCache.delete(oop);
  }

  async function fetchInspectorTabData(oop, tabName, keyParts, loader) {
    const cache = inspectorCacheFor(oop);
    const cacheKey = `${tabName}:${JSON.stringify(keyParts || {})}`;
    const existing = cache.get(cacheKey);
    if (existing) {
      if (Object.prototype.hasOwnProperty.call(existing, 'value')) return existing.value;
      return existing.promise;
    }
    const promise = Promise.resolve()
      .then(loader)
      .then(value => {
        cache.set(cacheKey, {value});
        return value;
      })
      .catch(error => {
        if (cache.get(cacheKey)?.promise === promise) cache.delete(cacheKey);
        throw error;
      });
    cache.set(cacheKey, {promise});
    return promise;
  }

  function nextInspectorRenderToken() {
    inspectorRenderToken += 1;
    return inspectorRenderToken;
  }

  function isActiveInspectorRender(token, tabName, oop) {
    return token === inspectorRenderToken && tabName === currentItab && oop === currentOop;
  }

  function reloadCurrentObject({query=currentObjectQuery, preserveCurrentTab=true, invalidateCache=true} = {}) {
    if (!currentOop) return Promise.resolve();
    if (invalidateCache) clearInspectorTabCache(currentOop);
    const label = history[history.length-1]?.label || currentObjData?.inspection || 'object';
    return loadObj(currentOop, label, {query, preserveCurrentTab, keepInstPage: true});
  }

  async function loadObj(oop, label, options = {}) {
    const {query = null, preserveCurrentTab = false, keepInstPage = false} = options;
    currentOop = oop;
    currentObjData = null;
    currentObjectQuery = query === null ? {} : normalizeObjectQuery(query);
    mbClassName = '';
    mbCurrentCategory = null;
    mbCurrentSelector = null;
    if (!keepInstPage) {
      constantPage = 0;
      instPage = 0;
      modulePage = 0;
    }
    syncObjectBrowserWindowState();
    syncObjectWindowArrows(id);
    renderBc();
    body.querySelectorAll(`#${id}-roots li`).forEach(li => li.classList.toggle('active', parseInt(li.dataset.oop) === oop));
    const ibody = body.querySelector(`#${id}-ibody`);
    ibody.innerHTML = '<span class="spinner"></span>';
    body.querySelector(`#${id}-itabs`).style.display = 'none';
    if (evalRes) evalRes.textContent = '';
    updateTitlebar(null);
    try {
      const d = await objectApi(buildObjectIndexUrl(oop));
      if (!d.success) throw new Error(d.exception);
      currentObjData = d.result;
      syncObjectBrowserWindowState();
      updateTitlebar(currentObjData);
      syncObjectWindowArrows(id);
      applyItabVisibility(currentObjData);
      const requestedTab = preferredInitialTab || (preserveCurrentTab ? currentItab : currentObjData.defaultTab) || currentItab;
      if (requestedTab && activateItab(requestedTab)) {
        preferredInitialTab = null;
      } else {
        showItab();
      }
    } catch(e) {
      ibody.innerHTML = `<p style="color:#f38ba8;padding:10px">Error: ${escHtml(e.message)}</p>`;
      syncObjectBrowserWindowState();
    }
  }

  function renderBc() {
    const bc = body.querySelector(`#${id}-bc`);
    if (!bc) return;
    bc.innerHTML = '';
    history.forEach((item, i) => {
      if (i > 0) { const s = document.createElement('span'); s.className = 'sep'; s.textContent = ' › '; bc.appendChild(s); }
      const sp = document.createElement('span');
      sp.className = 'crumb' + (i === history.length-1 ? ' cur' : '');
      sp.textContent = item.label || `#${item.oop}`;
      if (i < history.length-1) sp.addEventListener('click', () => { history = history.slice(0, i+1); loadObj(item.oop, item.label); });
      bc.appendChild(sp);
    });
  }

  async function showItab() {
    const ibody = body.querySelector(`#${id}-ibody`);
    if (!currentObjData) return;
    const tabName = currentItab;
    const oop = currentOop;
    const renderToken = nextInspectorRenderToken();
    ibody.className = 'inspector-body';
    ibody.style.overflow = 'auto';
    ibody.innerHTML = '';

    if (tabName === 'instvars') { ibody.appendChild(renderCard(currentObjData)); return; }

    const customTab = getCustomTab(tabName);
    if (customTab) {
      renderCustomTab(ibody, currentObjData, customTab);
      return;
    }

    if (tabName === 'constants') {
      renderConstants(ibody, renderToken, oop);
      return;
    }

    if (tabName === 'hierarchy') {
      ibody.innerHTML = '<span class="spinner"></span>';
      try {
        const d = await fetchInspectorTabData(oop, 'hierarchy', {}, () => objectApi(`/object/hierarchy/${oop}`));
        if (!isActiveInspectorRender(renderToken, tabName, oop)) return;
        ibody.innerHTML = '';
        if (!d.success) throw new Error(d.exception);
        const ul = document.createElement('ul'); ul.className = 'hierarchy-tree';
        d.hierarchy.forEach((entry, i) => {
          const clsRef = entry?.class || (typeof entry === 'string' ? {inspection: entry, oop: null} : entry) || {inspection: ''};
          const clsName = clsRef.inspection || entry?.name || '';
          const dictionary = entry?.dictionary || '';
          const li = document.createElement('li');
          if (i > 0) {
            for (let j = 0; j < i - 1; j++) { const sp = document.createElement('span'); sp.className = 'tree-indent'; li.appendChild(sp); }
            const conn = document.createElement('span'); conn.className = 'tree-connector'; li.appendChild(conn);
          }
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'tree-link';
          btn.textContent = clsName;
          btn.title = dictionary ? `Open ${clsName} from ${dictionary} in Class Browser` : `Open ${clsName} in Class Browser`;
          btn.addEventListener('click', () => openClassBrowser(dictionary ? {dictionary, className: clsName, sourceWindowId: id} : {className: clsName, sourceWindowId: id}));
          li.appendChild(btn);
          if (dictionary) {
            const meta = document.createElement('span');
            meta.className = 'tree-meta';
            meta.textContent = dictionary;
            li.appendChild(meta);
          }
          ul.appendChild(li);
        });
        ibody.appendChild(ul);
      } catch(e) { ibody.innerHTML = `<p style="color:#f38ba8;padding:8px">${escHtml(e.message)}</p>`; }
      return;
    }

    if (tabName === 'instances') {
      renderInstances(ibody, renderToken, oop);
      return;
    }

    if (tabName === 'modules') {
      renderModules(ibody, renderToken, oop);
      return;
    }

    if (tabName === 'stone-ver') {
      ibody.innerHTML = '<span class="spinner"></span>';
      try {
        const d = await fetchInspectorTabData(oop, 'stone-ver', {}, () => objectApi('/object/stone-version-report'));
        if (!isActiveInspectorRender(renderToken, tabName, oop)) return;
        ibody.innerHTML = '';
        if (!d.success) throw new Error(d.exception);
        ibody.appendChild(makeTable(['Property','Value'], d.report.map(r => [r.key, r.value])));
      } catch(e) { ibody.innerHTML = `<p style="color:#f38ba8;padding:8px">${escHtml(e.message)}</p>`; }
      return;
    }

    if (tabName === 'gem-ver') {
      ibody.innerHTML = '<span class="spinner"></span>';
      try {
        const d = await fetchInspectorTabData(oop, 'gem-ver', {}, () => objectApi('/object/gem-version-report'));
        if (!isActiveInspectorRender(renderToken, tabName, oop)) return;
        ibody.innerHTML = '';
        if (!d.success) throw new Error(d.exception);
        ibody.appendChild(makeTable(['Property','Value'], d.report.map(r => [r.key, r.value])));
      } catch(e) { ibody.innerHTML = `<p style="color:#f38ba8;padding:8px">${escHtml(e.message)}</p>`; }
      return;
    }

    if (tabName === 'control') {
      renderControlPanel(ibody);
      return;
    }

    if (tabName === 'code') {
      const wrap = document.createElement('div'); wrap.className = 'obj-card';
      const intro = document.createElement('p');
      intro.style.cssText = 'color:#6c7086;padding:10px 10px 0;font-size:11px;line-height:1.5';
      const target = currentCodeBrowserTarget();
      const codeLabel = target
        ? `${target.className}${target.meta ? ' class' : ''}${mbCurrentSelector ? ` >> ${mbCurrentSelector}` : ''}`
        : 'the side method browser';
      intro.textContent = `Browsing ${codeLabel} in the panel on the right.`;
      wrap.appendChild(intro);
      const actions = document.createElement('div');
      actions.style.cssText = 'padding:0 10px 10px;display:flex;gap:8px;align-items:center';
      const openBtn = document.createElement('button');
      openBtn.className = 'btn';
      openBtn.textContent = 'Open in Class Browser';
      openBtn.disabled = !target;
      openBtn.addEventListener('click', () => openCurrentCodeInClassBrowser());
      actions.appendChild(openBtn);
      const hint = document.createElement('span');
      hint.style.cssText = 'font-size:10px;color:#6c7086';
      hint.textContent = 'Double-click a selector to jump into the full browser.';
      actions.appendChild(hint);
      wrap.appendChild(actions);
      ibody.appendChild(wrap);
      return;
    }
  }

  async function renderInstances(ibody, renderToken, oop) {
    ibody.innerHTML = '<span class="spinner"></span>';
    const PAGE = 20;
    try {
      const offset = instPage * PAGE;
      const d = await fetchInspectorTabData(
        oop,
        'instances',
        {limit: PAGE, offset},
        () => objectApi(`/object/instances/${oop}?limit=${PAGE}&offset=${offset}`)
      );
      if (!isActiveInspectorRender(renderToken, 'instances', oop)) return;
      ibody.innerHTML = '';
      if (!d.success) { ibody.innerHTML = `<p style="color:#f38ba8;padding:8px">${escHtml(d.exception)}</p>`; return; }
      if (!d.instances.length) { ibody.innerHTML = '<p style="color:#6c7086;padding:8px">(no instances)</p>'; return; }

      const pageData = d.instances || [];
      const total = Number.isFinite(d.total) ? d.total : pageData.length;
      const start = (d.offset || 0) + 1;
      const stop = (d.offset || 0) + pageData.length;

      const wrap = document.createElement('div'); wrap.style.cssText = 'display:flex;flex-direction:column;height:100%';
      const tblWrap = document.createElement('div'); tblWrap.className = 'instances-tbl-wrap';
      const tbl = document.createElement('table'); tbl.className = 'dbtable';
      tbl.innerHTML = '<thead><tr><th>oop</th><th>Object</th><th>printString</th></tr></thead>';
      const tbody = document.createElement('tbody');
      pageData.forEach(inst => {
        const tr = document.createElement('tr');
        const tdOop = document.createElement('td'); tdOop.className = 'col-key'; tdOop.style.fontFamily = 'monospace'; tdOop.textContent = inst.oop;
        const tdObj = document.createElement('td'); tdObj.className = 'col-val';
        const chip = makeChip(inst.printString.slice(0,40), inst.oop, id);
        tdObj.appendChild(chip);
        const tdPs = document.createElement('td'); tdPs.className = 'col-val'; tdPs.style.color='#6c7086'; tdPs.textContent = inst.printString.slice(0,80);
        tr.append(tdOop, tdObj, tdPs); tbody.appendChild(tr);
      });
      tbl.appendChild(tbody); tblWrap.appendChild(tbl);
      wrap.appendChild(tblWrap);

      const pg = document.createElement('div'); pg.className = 'inst-pagination';
      const info = document.createElement('span');
      info.style.cssText = 'font-size:10px;color:#6c7086';
      info.textContent = `${start}-${stop} of ${total} instances`;
      pg.appendChild(info);

      const prevBtn = document.createElement('button');
      prevBtn.className = 'inst-page-btn';
      prevBtn.textContent = 'Previous';
      prevBtn.disabled = instPage === 0;
      prevBtn.addEventListener('click', () => {
        if (instPage === 0) return;
        instPage -= 1;
        renderInstances(ibody, nextInspectorRenderToken(), oop);
      });
      pg.appendChild(prevBtn);

      const pageBtn = document.createElement('button');
      pageBtn.className = 'inst-page-btn active';
      pageBtn.textContent = String(instPage + 1);
      pageBtn.disabled = true;
      pg.appendChild(pageBtn);

      const nextBtn = document.createElement('button');
      nextBtn.className = 'inst-page-btn';
      nextBtn.textContent = 'Next';
      nextBtn.disabled = !d.hasMore;
      nextBtn.addEventListener('click', () => {
        if (!d.hasMore) return;
        instPage += 1;
        renderInstances(ibody, nextInspectorRenderToken(), oop);
      });
      pg.appendChild(nextBtn);

      wrap.appendChild(pg);
      ibody.appendChild(wrap);
    } catch(e) {
      ibody.innerHTML = `<p style="color:#f38ba8;padding:8px">${escHtml(e.message)}</p>`;
    }
  }

  async function renderConstants(ibody, renderToken, oop) {
    ibody.innerHTML = '<span class="spinner"></span>';
    const PAGE = 20;
    try {
      const offset = constantPage * PAGE;
      const d = await fetchInspectorTabData(
        oop,
        'constants',
        {limit: PAGE, offset},
        () => objectApi(`/object/constants/${oop}?limit=${PAGE}&offset=${offset}`)
      );
      if (!isActiveInspectorRender(renderToken, 'constants', oop)) return;
      ibody.innerHTML = '';
      if (!d.success) throw new Error(d.exception);
      if (!d.constants.length) { ibody.innerHTML = '<p style="color:#6c7086;padding:8px">(no constants)</p>'; return; }

      const pageData = d.constants || [];
      const total = Number.isFinite(d.total) ? d.total : pageData.length;
      const start = (d.offset || 0) + 1;
      const stop = (d.offset || 0) + pageData.length;

      const wrap = document.createElement('div'); wrap.style.cssText = 'display:flex;flex-direction:column;height:100%';
      const tblWrap = document.createElement('div'); tblWrap.className = 'instances-tbl-wrap';
      const tbl = document.createElement('table'); tbl.className = 'dbtable';
      tbl.innerHTML = '<thead><tr><th>Name</th><th>Value</th></tr></thead>';
      const tbody = document.createElement('tbody');
      pageData.forEach(constant => {
        const tr = document.createElement('tr');
        const tdKey = document.createElement('td'); tdKey.className = 'col-key'; tdKey.textContent = constant.key || '';
        const valueRef = constant.valueObject || {inspection: constant.value || '', basetype: 'string', oop: null};
        tr.append(tdKey, makeValCell(valueRef, constant.key || valueRef.inspection || 'constant'));
        tbody.appendChild(tr);
      });
      tbl.appendChild(tbody); tblWrap.appendChild(tbl);
      wrap.appendChild(tblWrap);

      const pg = document.createElement('div'); pg.className = 'inst-pagination';
      const info = document.createElement('span');
      info.style.cssText = 'font-size:10px;color:#6c7086';
      info.textContent = `${start}-${stop} of ${total} constants`;
      pg.appendChild(info);

      const prevBtn = document.createElement('button');
      prevBtn.className = 'inst-page-btn';
      prevBtn.textContent = 'Previous';
      prevBtn.disabled = constantPage === 0;
      prevBtn.addEventListener('click', () => {
        if (constantPage === 0) return;
        constantPage -= 1;
        renderConstants(ibody, nextInspectorRenderToken(), oop);
      });
      pg.appendChild(prevBtn);

      const pageBtn = document.createElement('button');
      pageBtn.className = 'inst-page-btn active';
      pageBtn.textContent = String(constantPage + 1);
      pageBtn.disabled = true;
      pg.appendChild(pageBtn);

      const d = await fetchInspectorTabData(

  function renderControlPanel(ibody) {
    const wrap = document.createElement('div'); wrap.className = 'control-panel';
    const resDiv = document.createElement('div'); resDiv.className = 'cp-result';
    const row = document.createElement('div'); row.className = 'cp-row';
    const btnAbort   = document.createElement('button'); btnAbort.className   = 'btn-tx'; btnAbort.textContent   = 'Abort Transaction';
    const btnCommit  = document.createElement('button'); btnCommit.className  = 'btn-tx'; btnCommit.textContent  = 'Commit Transaction';
    const btnCont    = document.createElement('button'); btnCont.className    = 'btn-tx'; btnCont.style.background = '#4a90d9'; btnCont.textContent = 'Continue Transaction';
    const btnPersist = document.createElement('button'); btnPersist.className = 'btn-tx'; btnPersist.style.background = '#45475a'; btnPersist.textContent = 'Persistent Mode';

    function setPersistentButtonState(enabled) {
      btnPersist.classList.toggle('active', !!enabled);
      btnPersist.setAttribute('aria-pressed', enabled ? 'true' : 'false');
    }

    async function syncPersistentMode() {
      try {
        const d = await objectApi('/transaction/persistent-mode');
        if (d.success) setPersistentButtonState(!!d.persistent);
      } catch (_) {}
    }

    async function cpAction(url, method='GET', body_data, options = {}) {
      const {afterSuccess} = options;
      row.querySelectorAll('button').forEach(btn => { btn.disabled = true; });
      resDiv.className = 'cp-result visible loading'; resDiv.textContent = 'Working…';
      try {
        const opts = method === 'POST' ? {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body_data||{})} : undefined;
        const d = await objectApi(url, opts);
        resDiv.className = 'cp-result visible' + (d.success ? '' : ' error');
        resDiv.textContent = d.success ? (d.result || 'ok') : 'Error: ' + (d.exception||'');
        if (d.success) {
          clearInspectorTabCache(currentOop);
          if (typeof d.persistent === 'boolean') setPersistentButtonState(d.persistent);
          if (afterSuccess) await afterSuccess(d);
        }
        setStatus(d.success, d.success ? 'ok' : d.exception||'error');
        return d;
      } catch(e) {
        resDiv.className = 'cp-result visible error';
        resDiv.textContent = e.message;
        return null;
      } finally {
        row.querySelectorAll('button').forEach(btn => { btn.disabled = false; });
      }
    }

    btnAbort.addEventListener('click', () => cpAction('/transaction/abort', 'POST', {}, {
      async afterSuccess() {
        await syncPersistentMode();
      },
    }));
    btnCommit.addEventListener('click', () => cpAction('/transaction/commit', 'POST', {}, {
      async afterSuccess() {
        await syncPersistentMode();
      },
    }));
    btnCont.addEventListener('click', () => cpAction('/transaction/continue', 'POST', {}, {
      async afterSuccess() {
        refreshHaltedThreadsBar();
        await syncPersistentMode();
      },
    }));
    btnPersist.addEventListener('click', async () => {
      const active = btnPersist.classList.contains('active');
      await cpAction('/transaction/persistent-mode', 'POST', {enable: !active});
    });

    // check current persistent mode
    syncPersistentMode();

    row.append(btnAbort, btnCommit, btnCont, btnPersist);
    wrap.append(row, resDiv);
    ibody.appendChild(wrap);
  }

  function renderAssociationPairs(ibody, entries, totalSize, emptyText='(empty)', options={}) {
    const {showSummary = true} = options;
    ibody.innerHTML = '';
    const keys = Object.keys(entries);
    if (!keys.length) {
      ibody.innerHTML = `<p style="color:#6c7086;padding:8px">${escHtml(emptyText)}</p>`; return;
    }
    const wrap = document.createElement('div');
    for (const [, [keyV, valV]] of Object.entries(entries)) {
      const row = document.createElement('div'); row.className = 'assoc-row';

      // Key: symbol keys shown as plain text (":MaglevRecord"), object keys as chip
      const kIsLeaf = isLeafBasetype(keyV?.basetype);
      const kText = keyV?.inspection || (keyV?.oop != null ? `oop:${keyV.oop}` : 'nil');
      if (!kIsLeaf && keyV?.oop) {
        row.appendChild(assocChip(kText, keyV.oop));
      } else {
        const keyLabel = document.createElement('span'); keyLabel.className = 'assoc-key-label';
        keyLabel.textContent = kText; row.appendChild(keyLabel);
      }

      // Arrow
      const arr = document.createElement('span'); arr.className = 'assoc-arrow'; arr.textContent = ' => ';
      row.appendChild(arr);

      // Value chips
      appendValChips(row, valV);

      wrap.appendChild(row);
    }
    if (showSummary && totalSize > keys.length) {
      const more = document.createElement('div'); more.className='more-row';
      more.textContent = `${keys.length} of ${totalSize} entries`;
      wrap.appendChild(more);
    }
    ibody.appendChild(wrap);
  }

  function renderAssociations(ibody, obj) {
    renderAssociationPairs(ibody, obj.instVars || {}, obj.instVarsSize || 0);
  }

  function customTabRangeName(customTab) {
    return customTab?.rangeName || customTab?.id || 'custom';
  }

  function customTabPageSize(customTab) {
    const pageSize = parseInt(customTab?.pageSize, 10);
    return Number.isFinite(pageSize) && pageSize > 0 ? pageSize : 20;
  }

  function loadedEntryBounds(entries, totalSize) {
    const keys = Object.keys(entries || {}).map(n => parseInt(n, 10)).filter(Number.isFinite).sort((a, b) => a - b);
    if (!keys.length) return {from: totalSize ? 1 : 0, to: 0, count: 0};
    return {from: keys[0], to: keys[keys.length - 1], count: keys.length};
  }

  function customTabRangeQuery(customTab, from, to) {
    const rangeName = customTabRangeName(customTab);
    return normalizeObjectQuery({
      ...currentObjectQuery,
      [`range_${rangeName}_from`]: from,
      [`range_${rangeName}_to`]: to,
    });
  }

  function appendCustomTabPager(ibody, customTab, entries, totalSize) {
    const bounds = loadedEntryBounds(entries, totalSize);
    const pageSize = customTabPageSize(customTab);
    if (!totalSize || (bounds.count >= totalSize && totalSize <= pageSize)) return;

    const label = history[history.length-1]?.label || currentObjData?.inspection || 'object';
    const bar = document.createElement('div'); bar.className = 'inst-pagination';
    const info = document.createElement('span');
    info.style.cssText = 'font-size:10px;color:#6c7086';
    info.textContent = bounds.count >= totalSize ? `All ${totalSize} entries` : `${bounds.from}-${bounds.to} of ${totalSize}`;
    bar.appendChild(info);

    const prev = document.createElement('button');
    prev.className = 'inst-page-btn';
    prev.textContent = 'Prev';
    prev.disabled = bounds.from <= 1;
    prev.addEventListener('click', () => {
      if (prev.disabled) return;
      const nextFrom = Math.max(1, bounds.from - pageSize);
      const nextTo = Math.min(totalSize, nextFrom + pageSize - 1);
      loadObj(currentOop, label, {
        query: customTabRangeQuery(customTab, nextFrom, nextTo),
        preserveCurrentTab: true,
        keepInstPage: true,
      });
    });
    bar.appendChild(prev);

    const next = document.createElement('button');
    next.className = 'inst-page-btn';
    next.textContent = 'Next';
    next.disabled = !bounds.count || bounds.to >= totalSize;
    next.addEventListener('click', () => {
      if (next.disabled) return;
      const nextFrom = bounds.to + 1;
      const nextTo = Math.min(totalSize, nextFrom + pageSize - 1);
      loadObj(currentOop, label, {
        query: customTabRangeQuery(customTab, nextFrom, nextTo),
        preserveCurrentTab: true,
        keepInstPage: true,
      });
    });
    bar.appendChild(next);

    const loadAll = document.createElement('button');
    loadAll.className = 'inst-page-btn';
    loadAll.textContent = 'Load All';
    loadAll.disabled = bounds.count >= totalSize;
    loadAll.addEventListener('click', () => {
      if (loadAll.disabled) return;
      loadObj(currentOop, label, {
        query: customTabRangeQuery(customTab, 1, totalSize),
        preserveCurrentTab: true,
        keepInstPage: true,
      });
    });
    bar.appendChild(loadAll);

    ibody.appendChild(bar);
  }

  function renderCustomTab(ibody, obj, customTab) {
    if (customTab.kind === 'association-dict') {
      const entries = obj?.[customTab.field] || {};
      const totalSize = obj?.[customTab.sizeField] ?? Object.keys(entries).length;
      renderAssociationPairs(ibody, entries, totalSize, '(empty)', {showSummary: false});
      appendCustomTabPager(ibody, customTab, entries, totalSize);
      return;
    }
    ibody.innerHTML = `<p style="color:#f38ba8;padding:8px">Unsupported custom tab: ${escHtml(customTab.caption || customTab.id || 'custom')}</p>`;
  }

  function appendValChips(row, valV) {
    if (!valV || valV.basetype === 'nilclass') {
      const nil = document.createElement('span'); nil.style.cssText='color:#6c7086;font-family:monospace;font-size:11px'; nil.textContent='nil';
      row.appendChild(nil); return;
    }
    const vText = valV.inspection || (valV.oop != null ? `oop:${valV.oop}` : 'nil');
    const vIsLeaf = isLeafBasetype(valV.basetype);
    if (vIsLeaf || !valV.oop) {
      const sp = document.createElement('span'); sp.style.cssText='color:#a6e3a1;font-family:monospace;font-size:11px'; sp.textContent=vText;
      row.appendChild(sp); return;
    }
    if (valV.basetype === 'hash') {
      // Render as: {▼  ...  }▼  with each instVar as  □ ClassName▼ => value , ...
      row.appendChild(hashBraceChip('{', valV.oop));
      const elipsis = document.createElement('span'); elipsis.style.cssText='color:#6c7086;font-size:11px;margin:0 2px'; elipsis.textContent=' … ';
      row.appendChild(elipsis);
      row.appendChild(hashBraceChip('}', valV.oop));
    } else if (valV.basetype === 'array') {
      row.appendChild(hashBraceChip('[', valV.oop));
      const elipsis = document.createElement('span'); elipsis.style.cssText='color:#6c7086;font-size:11px;margin:0 2px'; elipsis.textContent=' … ';
      row.appendChild(elipsis);
      row.appendChild(hashBraceChip(']', valV.oop));
    } else {
      row.appendChild(assocChip(vText.slice(0,40), valV.oop));
    }
  }

      const aM = document.createElement('a'); aM.className='link-oop'; aM.style.color='#cba6f7'; aM.textContent='Browse methods ›';
      aM.addEventListener('click', () => { if (codeTarget?.oop) openMB(codeTarget.oop, codeTarget.label); });

  function makeValCell(valV, label) {
    const td = document.createElement('td'); td.className = 'col-val';
    if (!valV) { td.textContent = 'nil'; return td; }
    const isLeaf = isLeafBasetype(valV.basetype);
    const text = valV.inspection || (valV.oop != null ? `oop:${valV.oop}` : 'nil');
    if (!isLeaf && valV.oop != null) {
      const chip = makeChip(text, valV.oop, id);
      const nav = document.createElement('span'); nav.className='ws-nav'; nav.textContent=' ↗'; nav.style.fontSize='10px';
      nav.addEventListener('click', () => { history.push({label:label||text, oop:valV.oop}); loadObj(valV.oop, label||text); });
      td.append(chip, nav);
    } else { td.textContent = text; }
    return td;

  async function openMB(classOop, className) {
    const mb = body.querySelector(`#${id}-mb`);
    mb.classList.remove('hidden');
    body.querySelector(`#${id}-mb-class`).textContent = className + ' methods';
    const catsEl   = body.querySelector(`#${id}-mb-cats`);
    const selsEl   = body.querySelector(`#${id}-mb-sels`);
    const srcEl    = body.querySelector(`#${id}-mb-src`);
    const statusEl = body.querySelector(`#${id}-mb-status`);
    const preserveSelection = mbClassOop === classOop && mbClassName === className;
    const preferredSelector = preserveSelection ? mbCurrentSelector : null;
    const preferredCategory = preserveSelection ? mbCurrentCategory : null;
    catsEl.innerHTML = '<div class="mb-cat" style="color:#6c7086"><span class="spinner"></span></div>';
    selsEl.innerHTML = '';
    srcEl.value = '';
    mbClassOop = classOop;
    mbClassName = className;
    if (!preserveSelection) {
      mbCurrentCategory = null;
      mbCurrentSelector = null;
    }
    updateMethodBrowserActions();
    try {
      mbData = await fetchMethodBrowserCached('selectors', {classOop}, async () => {
        const d = await objectApi(`/code/selectors/${classOop}`);
        if (!d.success) throw new Error(d.exception);
        return d.result || {};
      });
      const cats = Object.keys(mbData).sort();
      catsEl.innerHTML = '';
      if (!cats.length) {
        catsEl.innerHTML = '<div class="mb-cat" style="color:#6c7086">(no methods)</div>';
        statusEl.textContent = className + ' — 0 categories';
        return;
      }
      async function selectSelector(selectorName, selectorEl) {
        selsEl.querySelectorAll('.mb-sel').forEach(e => e.classList.remove('active'));
        selectorEl?.classList.add('active');
        srcEl.value = 'Loading…';
        statusEl.textContent = 'Loading…';
        mbCurrentSelector = selectorName;
        updateMethodBrowserActions();
        try {
          const source = await fetchMethodBrowserCached('source', {classOop, selector: selectorName}, async () => {
            const sd = await objectApi(`/code/code/${classOop}?selector=${encodeURIComponent(selectorName)}`);
            if (!sd.success) throw new Error(sd.exception);
            return sd.result || '';
          });
          if (mbClassOop !== classOop || mbCurrentSelector !== selectorName) return;
          srcEl.value = source;
          statusEl.textContent = `${className} >> ${selectorName}`;
        }
        catch(err) {
          if (mbClassOop !== classOop || mbCurrentSelector !== selectorName) return;
          srcEl.value = 'Error: ' + err.message;
          statusEl.textContent = 'Error';
        }
      }
      cats.forEach(cat => {
        const el = document.createElement('div'); el.className = 'mb-cat'; el.textContent = cat || '(uncategorized)';
        el.addEventListener('click', () => {
          catsEl.querySelectorAll('.mb-cat').forEach(e => e.classList.remove('active'));
          el.classList.add('active');
          mbCurrentCategory = cat;
          const sels = (mbData[cat]||[]).slice().sort();
          selsEl.innerHTML = '';
          sels.forEach(sel => {
            const s = document.createElement('div'); s.className='mb-sel'; s.textContent=sel;
            s.addEventListener('click', () => selectSelector(sel, s));
            s.addEventListener('dblclick', () => openCurrentCodeInClassBrowser(sel));
            selsEl.appendChild(s);
          });
          const selectorToSelect = sels.includes(mbCurrentSelector) ? mbCurrentSelector : sels[0];
          if (selectorToSelect) {
            const selectorEl = Array.from(selsEl.querySelectorAll('.mb-sel')).find(node => node.textContent === selectorToSelect);
            selectorEl?.click();
          } else {
            mbCurrentSelector = null;
            srcEl.value = '';
            statusEl.textContent = `${className} — ${cat}`;
            updateMethodBrowserActions();
          }
        });
        catsEl.appendChild(el);
      });
      const initialCategory = (preferredSelector && findSelectorCategory(mbData, preferredSelector))
        || (preferredCategory && cats.includes(preferredCategory) ? preferredCategory : null)
        || cats[0];
      const initialCategoryEl = Array.from(catsEl.querySelectorAll('.mb-cat')).find(node => node.textContent === initialCategory);
      initialCategoryEl?.click();
      statusEl.textContent = className + ' — ' + cats.length + ' categories';
    } catch(e) {
      catsEl.innerHTML = `<div class="mb-cat" style="color:#f38ba8">${escHtml(e.message)}</div>`;
      statusEl.textContent = 'Error loading';
    }
  }

  async function doEval() {
    if (!evalCode || !evalRes) return;
    if (!currentOop) return;
    const evalOop = currentOop;
    const code = evalCode.value.trim(); if (!code) return;
    evalRes.textContent = ''; evalRes.className = 'eval-result';
    const sp = document.createElement('span'); sp.className='spinner'; evalRes.appendChild(sp);
    try {
      const d = await objectApiEvaluate(evalOop, {code, language: 'smalltalk', depth: 2});
      evalRes.innerHTML = '';
      if (!d.success) { evalRes.className='eval-result error'; evalRes.textContent='Error: '+d.exception; return; }
      const [isExc, rv] = d.result;
      if (isExc) {
        evalRes.className='eval-result error';
        evalRes.textContent='⚑ '+(rv.inspection||'Exception');
        maybeOpenEvalDebugger(rv, code, id);
      }
      else {
        evalRes.textContent = rv.inspection || 'nil';
        const isLeaf = isLeafBasetype(rv.basetype);
        if (!isLeaf && rv.oop) {
          const chip = makeChip(rv.inspection||'result', rv.oop, id);
          evalRes.appendChild(document.createTextNode(' ')); evalRes.appendChild(chip);
          const nav = document.createElement('a'); nav.className='link-oop'; nav.style.marginLeft='8px'; nav.textContent='Navigate →';
          nav.addEventListener('click', () => { const l=rv.inspection||'result'; history.push({label:l,oop:rv.oop}); loadObj(rv.oop,l); });
          evalRes.appendChild(nav);
        }
      }
    } catch(e) { evalRes.innerHTML=''; evalRes.className='eval-result error'; evalRes.textContent='Error: '+e.message; }
    finally { clearInspectorTabCache(evalOop); }
  }

  if (initialOop) {
    history = [{label: initialLabel||'object', oop: initialOop}];
    loadObj(initialOop, initialLabel||'object', {
      query: options.query || null,
      preserveCurrentTab: !!options.initialTab,
    });
  }
  return win;
}

// WORKSPACE WINDOW
// ═══════════════════════════════════════════════════════════════════════════════
function openWorkspace(options = {}) {
  const {win, body, id} = createWindow({
    title:'Workspace',
    width: options.width || 520,
    height: options.height || 440,
    x: options.x,
    y: options.y,
    taskbarLabel:'Workspace'
  });
  const sessionChannel = `workspace:${id}`;
  const workspaceApiEvaluate = (oop, payload = {}) => apiEvaluate(oop, payload, {sessionChannel});
  const workspaceApiTransaction = url => apiTransaction(url, {sessionChannel});
  function syncWorkspaceWindowState() {
    upsertWindowState(id, {kind: 'workspace', draft: wsc?.value || '', sessionChannel});
  }
  // The outer div must be display:flex;flex-direction:column so ws-history can flex:1
  // and ws-input-row / txbar stay at the bottom.
  body.style.cssText = 'display:flex;flex-direction:column;overflow:hidden;min-height:0';
  body.innerHTML = `
    <div class="ws-history" id="${id}-wsh" style="flex:1;min-height:0;overflow-y:auto;padding:6px 10px;font-family:monospace;font-size:12px"></div>
    <div class="ws-input-row" style="flex-shrink:0">
      <textarea class="ws-code-area" id="${id}-wsc" placeholder="Smalltalk expression… (Ctrl+Enter)"></textarea>
      <div class="ws-controls">
        <button class="btn" id="${id}-doit">Do it</button>
        <button class="btn-ghost" id="${id}-clr">Clear</button>
        <span class="ws-hint">Ctrl+Enter</span>
      </div>
    </div>
    <div class="txbar" style="flex-shrink:0">
      <span>Transaction:</span>
      <button class="btn-tx" id="${id}-abort">Abort</button>
      <button class="btn-tx" id="${id}-commit">Commit</button>
      <button class="btn-tx" id="${id}-continue" style="background:#4a90d9">Continue</button>
    </div>
  `;
  const wsh = body.querySelector(`#${id}-wsh`);
  const wsc = body.querySelector(`#${id}-wsc`);
  wsc.value = options.draft || '';
  syncWorkspaceWindowState();
  body.querySelector(`#${id}-doit`).addEventListener('click', wsDoIt);
  body.querySelector(`#${id}-clr`).addEventListener('click', () => { wsh.innerHTML = ''; syncWorkspaceWindowState(); });
  wsc.addEventListener('keydown', e => { if (e.ctrlKey && e.key==='Enter') wsDoIt(); });
  wsc.addEventListener('input', syncWorkspaceWindowState);
  body.querySelector(`#${id}-abort`).addEventListener('click', async () => {
    try { const d=await workspaceApiTransaction('/transaction/abort'); setStatus(d.success, d.success?'aborted':d.exception); } catch(e){setStatus(false,e.message);}
  });
  body.querySelector(`#${id}-commit`).addEventListener('click', async () => {
    try { const d=await workspaceApiTransaction('/transaction/commit'); setStatus(d.success, d.success?'committed':d.exception); } catch(e){setStatus(false,e.message);}
  });
  body.querySelector(`#${id}-continue`).addEventListener('click', async () => {
    try { const d=await workspaceApiTransaction('/transaction/continue'); setStatus(d.success, d.success?'continued':d.exception); } catch(e){setStatus(false,e.message);}
  });

  async function wsDoIt() {
    const code = wsc.value.trim(); if (!code) return;
    const entry = document.createElement('div'); entry.className='ws-entry';
    const codeEl = document.createElement('div'); codeEl.className='ws-code'; codeEl.textContent=code;
    const resEl  = document.createElement('div'); resEl.className='ws-result';
    const textSpan = document.createElement('span'); textSpan.className='ws-result-text'; textSpan.textContent='…';
    resEl.appendChild(textSpan);
    entry.append(codeEl, resEl); wsh.appendChild(entry); wsh.scrollTop=wsh.scrollHeight;
    const globOop = roots['Globals'] || roots['UserGlobals'];
    if (!globOop) { resEl.className='ws-result error'; textSpan.textContent='Not connected'; return; }
    try {
      const d = await workspaceApiEvaluate(globOop, {code, language: 'smalltalk', depth: 1});
      if (!d.success) { resEl.className='ws-result error'; textSpan.textContent='Error: '+d.exception; return; }
      const [isExc, rv] = d.result;
      if (isExc) {
        resEl.className='ws-result error';
        textSpan.textContent='⚑ '+(rv.inspection||'Exception');
        maybeOpenEvalDebugger(rv, code, id);
      }
      else {
        textSpan.textContent = '=> ' + (rv.inspection||'nil');
        const isLeaf = isLeafBasetype(rv.basetype);
        if (!isLeaf && rv.oop) {
          const chip = makeChip(rv.inspection||'result', rv.oop, id);
          resEl.appendChild(chip);
          const nav = document.createElement('span'); nav.className='ws-nav'; nav.textContent='inspect →';
          nav.addEventListener('click', () => openLinkedObjectWindow({oop: rv.oop, text: rv.inspection||'result', sourceWinId: id}));
          resEl.appendChild(nav);
        }
      }
    } catch(e) { resEl.className='ws-result error'; textSpan.textContent='Error: '+e.message; }
    wsh.scrollTop=wsh.scrollHeight;
    syncWorkspaceWindowState();
  }
  return win;
}

// WEB BROWSER WINDOW
// ═══════════════════════════════════════════════════════════════════════════════
function openWebBrowser(initialUrl, options = {}) {
  const {win, body, id} = createWindow({
    title:'Web Browser',
    width: options.width || 700,
    height: options.height || 520,
    x: options.x,
    y: options.y,
    taskbarLabel:'Web Browser'
  });
  const defaultUrl = initialUrl || options.url || 'https://pandas.pydata.org';
  body.style.cssText = 'display:flex;flex-direction:column;overflow:hidden;min-height:0';
  body.innerHTML = `
    <div class="wb-urlbar" style="flex-shrink:0">
      <label>URL</label>
      <input class="wb-url-input" id="${id}-url" type="text" value="${escHtml(defaultUrl)}">
      <button class="btn-ghost" id="${id}-go">Go</button>
      <button class="btn-ghost" id="${id}-reload">↺</button>
    </div>
    <div class="wb-iframe-wrap" style="flex:1;min-height:0;overflow:hidden">
      <iframe id="${id}-iframe" src="${escHtml(defaultUrl)}" style="width:100%;height:100%;border:none;background:#fff"></iframe>
    </div>
  `;
  const urlInput = body.querySelector(`#${id}-url`);
  const iframe   = body.querySelector(`#${id}-iframe`);
  function syncWebBrowserWindowState() {
    upsertWindowState(id, {kind: 'web-browser', url: urlInput?.value || iframe?.src || defaultUrl});
  }
  function navigate() {
    iframe.src = urlInput.value;
    syncWebBrowserWindowState();
  }
  body.querySelector(`#${id}-go`).addEventListener('click', navigate);
  body.querySelector(`#${id}-reload`).addEventListener('click', () => { iframe.src = iframe.src; syncWebBrowserWindowState(); });
  urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') navigate(); });
  urlInput.addEventListener('input', syncWebBrowserWindowState);
  iframe.addEventListener('load', syncWebBrowserWindowState);
  syncWebBrowserWindowState();
  return win;
}

// ABOUT WINDOW
// ═══════════════════════════════════════════════════════════════════════════════
function openAboutWindow(options = {}) {
  const {win, body, id} = createWindow({
    title:'About',
    width: options.width || 420,
    height: options.height || 320,
    x: options.x,
    y: options.y,
    taskbarLabel:'About'
  });
  body.style.cssText = 'display:flex;flex-direction:column;gap:10px;padding:14px;overflow:auto;min-height:0';
  body.innerHTML = `
    <div class="about-title">GemStone Database Explorer</div>
    <div class="about-subtitle">
      Windowed GemStone browser/debugger with object inspectors, Class Browser, Symbol List Browser,
      debugger windows, persisted layouts, and isolated session-channel families.
    </div>
    <div class="about-grid" id="${id}-grid"></div>
    <div class="about-actions">
      <button class="btn-ghost" id="${id}-window-links">Window Links</button>
      <button class="btn-ghost" id="${id}-window-groups">Window Groups</button>
      <button class="btn-ghost" id="${id}-status-log">Status Log</button>
      <button class="btn-ghost" id="${id}-status-errors">Errors Only</button>
      <button class="btn-ghost" id="${id}-copy-bundle">Copy Bundle</button>
      <button class="btn-ghost" id="${id}-bundle">Download Bundle</button>
      <button class="btn-ghost" id="${id}-refresh">Refresh</button>
      <button class="btn-ghost" id="${id}-copy">Copy JSON</button>
      <button class="btn-ghost" id="${id}-download">Download JSON</button>
    </div>
  `;
  const grid = body.querySelector(`#${id}-grid`);
  const windowLinksBtn = body.querySelector(`#${id}-window-links`);
  const windowGroupsBtn = body.querySelector(`#${id}-window-groups`);
  const statusLogBtn = body.querySelector(`#${id}-status-log`);
  const statusErrorsBtn = body.querySelector(`#${id}-status-errors`);
  const copyBundleBtn = body.querySelector(`#${id}-copy-bundle`);
  const bundleBtn = body.querySelector(`#${id}-bundle`);
  const refreshBtn = body.querySelector(`#${id}-refresh`);
  const copyBtn = body.querySelector(`#${id}-copy`);
  const downloadBtn = body.querySelector(`#${id}-download`);
  let latestDiagnostics = null;
  let latestServerData = runtimeVersionInfo || {};
  let latestDiagnosticsError = '';

  function syncAboutWindowState() {
    upsertWindowState(id, {kind: 'about'});
  }

  function buildBrowserDiagnostics() {
    return {
      userAgent: navigator.userAgent,
      url: window.location.href,
      viewport: {
        width: window.innerWidth,
        height: window.innerHeight,
      },
      language: navigator.language || '',
    };
  }

  function buildDiagnosticsSnapshot(serverData = {}, errorText = '') {
    const browser = buildBrowserDiagnostics();
    return {
      generatedAt: new Date().toISOString(),
      server: serverData || {},
      browser,
      statusHistory: getStatusHistory(),
      error: errorText || '',
    };
  }

  function buildSupportBundle(serverData = {}, errorText = '') {
    const taskbarVersionLabel = document.getElementById('taskbar-version')?.textContent || '';
    return {
      generatedAt: new Date().toISOString(),
      diagnostics: latestDiagnostics || buildDiagnosticsSnapshot(serverData, errorText),
      currentStatus: {
        ok: !document.getElementById('status-dot').classList.contains('error'),
        text: document.getElementById('status-txt').textContent || '',
      },
      taskbarVersion: taskbarVersionLabel,
      statusSummary: getStatusHistorySummary(),
      windowLayout: buildWindowLayoutSnapshot(),
      openWindows: collectOpenWindowSummaries(),
      windowLinks: collectWindowLinkSummaries(),
      windowGroups: collectWindowGroupSummaries(),
    };
  }

  function renderAboutInfo(data = {}, errorText = '') {
    latestServerData = data || {};
    latestDiagnosticsError = errorText || '';
    latestDiagnostics = buildDiagnosticsSnapshot(data, errorText);
    const browser = latestDiagnostics.browser || {};
    const broker = data.sessionBroker || {};
    const statusSummary = getStatusHistorySummary();
    const windowGroups = collectWindowGroupSummaries();
    const largestGroupSize = windowGroups.reduce((max, each) => Math.max(max, Number(each.size || 0)), 0);
    const latestErrorLabel = statusSummary.latestError
      ? [
          statusSummary.latestError.message,
          statusSummary.latestError.sourceTitle || statusSummary.latestError.sourceKind || '',
        ].filter(Boolean).join(' · ')
      : '—';
    const channelNames = Array.isArray(broker.channels) ? broker.channels.map(each => each.name).join(', ') : '';
    const rows = [
      ['Explorer', data.app || runtimeVersionInfo?.app || ''],
      ['Stone', data.stone || runtimeVersionInfo?.stone || ''],
      ['Gem', data.gem || runtimeVersionInfo?.gem || ''],
      ['Health', data.status || (errorText ? 'error' : 'unknown')],
      ['Python', data.runtime?.python || ''],
      ['Platform', data.runtime?.platform || ''],
      ['Broker Sessions', String(broker.managedSessionCount ?? 0)],
      ['Channels', channelNames || '—'],
      ['Auto Begin Default', broker.defaultAutoBegin === null || broker.defaultAutoBegin === undefined ? 'unset' : String(!!broker.defaultAutoBegin)],
      ['Browser', browserSummary(browser)],
      ['Open Windows', String(collectOpenWindowSummaries().length)],
      ['Window Links', String(collectWindowLinkSummaries().length)],
      ['Window Groups', String(windowGroups.length)],
      ['Largest Group', `${largestGroupSize} window${largestGroupSize === 1 ? '' : 's'}`],
      ['Status Entries', String(getStatusHistory().length)],
      ['Status OK', String(statusSummary.ok)],
      ['Status Errors', String(statusSummary.error)],
      ['Closed Sources', String(statusSummary.closedSources)],
      ['Latest Error', latestErrorLabel],
      ['Layout', 'Persisted per browser via localStorage'],
      ['Sessions', 'Window-scoped channel families over the shared GemStone broker'],
      ['Refreshed', new Date().toLocaleString()],
    ];
    if (errorText) rows.push(['Error', errorText]);
    grid.innerHTML = rows.map(([key, value]) => `
      <div class="about-key">${escHtml(key)}</div>
      <div class="about-value">${escHtml(value || '—')}</div>
    `).join('');
  }

  function browserSummary(browser) {
    const viewport = browser?.viewport;
    const size = viewport ? `${viewport.width}×${viewport.height}` : '';
    const language = browser?.language || '';
    return [language, size].filter(Boolean).join(' · ');
  }

  async function copyDiagnostics() {
    try {
      await copyTextToClipboard(JSON.stringify(latestDiagnostics || buildDiagnosticsSnapshot(runtimeVersionInfo || {}, ''), null, 2));
      setStatus(true, 'copied diagnostics');
    } catch (e) {
      setStatus(false, e.message);
    }
  }

  function downloadDiagnostics() {
    const data = latestDiagnostics || buildDiagnosticsSnapshot(runtimeVersionInfo || {}, '');
    const stamp = new Date().toISOString().replace(/[:]/g, '-');
    downloadDataFile(`diagnostics-${stamp}.json`, JSON.stringify(data, null, 2), 'application/json;charset=utf-8');
    setStatus(true, 'downloaded diagnostics');
  }

  function downloadSupportBundle() {
    const data = buildSupportBundle(runtimeVersionInfo || {}, '');
    const stamp = new Date().toISOString().replace(/[:]/g, '-');
    downloadDataFile(`support-bundle-${stamp}.json`, JSON.stringify(data, null, 2), 'application/json;charset=utf-8');
    setStatus(true, 'downloaded support bundle');
  }

  async function copySupportBundle() {
    try {
      await copyTextToClipboard(JSON.stringify(buildSupportBundle(runtimeVersionInfo || {}, ''), null, 2));
      setStatus(true, 'copied support bundle');
    } catch (e) {
      setStatus(false, e.message);
    }
  }

  function openAboutStatusLog(nextOptions = {}) {
    const nextWin = openStatusLogWindow({
      x: win.offsetLeft + 24,
      y: win.offsetTop + 24,
      filterText: nextOptions.filterText || '',
      level: nextOptions.level || 'all',
      sourceWindowId: id,
    });
    if (nextWin) revealWindow(nextWin);
  }

  function openAboutWindowGroups() {
    const nextWin = openWindowGroupsWindow({
      x: win.offsetLeft + 32,
      y: win.offsetTop + 32,
      sourceWindowId: id,
    });
    if (nextWin) revealWindow(nextWin);
  }

  function openAboutWindowLinks() {
    const nextWin = openWindowLinksWindow({
      x: win.offsetLeft + 28,
      y: win.offsetTop + 28,
      viewMode: 'related',
      sourceWindowId: id,
    });
    if (nextWin) revealWindow(nextWin);
  }

  async function refreshAboutInfo() {
    windowLinksBtn.disabled = true;
    windowGroupsBtn.disabled = true;
    copyBundleBtn.disabled = true;
    bundleBtn.disabled = true;
    statusLogBtn.disabled = true;
    statusErrorsBtn.disabled = true;
    refreshBtn.disabled = true;
    copyBtn.disabled = true;
    downloadBtn.disabled = true;
    renderAboutInfo(runtimeVersionInfo || {}, '');
    try {
      const data = await api('/diagnostics');
      if (data?.success) {
        runtimeVersionInfo = {...(runtimeVersionInfo || {}), ...data};
        renderTaskbarVersion(runtimeVersionInfo);
        renderAboutInfo(data, '');
      }
    } catch (e) {
      renderAboutInfo(runtimeVersionInfo || {}, e.message);
      setStatus(false, e.message);
    } finally {
      windowLinksBtn.disabled = false;
      windowGroupsBtn.disabled = false;
      copyBundleBtn.disabled = false;
      bundleBtn.disabled = false;
      statusLogBtn.disabled = false;
      statusErrorsBtn.disabled = false;
      refreshBtn.disabled = false;
      copyBtn.disabled = false;
      downloadBtn.disabled = false;
      syncAboutWindowState();
    }
  }

  windowLinksBtn.addEventListener('click', openAboutWindowLinks);
  windowGroupsBtn.addEventListener('click', openAboutWindowGroups);
  statusLogBtn.addEventListener('click', () => openAboutStatusLog({level: 'all'}));
  statusErrorsBtn.addEventListener('click', () => openAboutStatusLog({level: 'error'}));
  copyBundleBtn.addEventListener('click', copySupportBundle);
  bundleBtn.addEventListener('click', downloadSupportBundle);
  refreshBtn.addEventListener('click', refreshAboutInfo);
  copyBtn.addEventListener('click', copyDiagnostics);
  downloadBtn.addEventListener('click', downloadDiagnostics);
  liveWindowRenderers.set(id, () => renderAboutInfo(latestServerData, latestDiagnosticsError));
  syncAboutWindowState();
  renderAboutInfo(runtimeVersionInfo || {}, '');
  refreshAboutInfo();
  return win;
}

// ═══════════════════════════════════════════════════════════════════════════════
// WINDOW LINKS WINDOW
// ═══════════════════════════════════════════════════════════════════════════════
function openWindowLinksWindow(options = {}) {
  const {win, body, id} = createWindow({
    title:'Window Links',
    width: options.width || 620,
    height: options.height || 360,
    x: options.x,
    y: options.y,
    taskbarLabel:'Window Links'
  });
  body.style.cssText = 'display:flex;flex-direction:column;padding:12px;overflow:hidden;min-height:0';
  body.innerHTML = `
    <div class="status-log-toolbar">
      <div class="status-log-controls">
        <input class="status-log-filter" id="${id}-filter" type="text" placeholder="Filter links">
        <div class="status-log-scope" id="${id}-scope">
          <button class="btn-ghost" data-link-type="all">All</button>
          <button class="btn-ghost" data-link-type="source">Source</button>
          <button class="btn-ghost" data-link-type="arrow">Arrow</button>
        </div>
        <div class="status-log-scope" id="${id}-view-mode">
          <button class="btn-ghost" data-view-mode="all">All Windows</button>
          <button class="btn-ghost" data-view-mode="related">Related Only</button>
        </div>
      </div>
      <div class="status-log-controls">
        <button class="btn-ghost" id="${id}-raise-selected">Raise Selected Group</button>
        <button class="btn-ghost" id="${id}-close-selected">Close Selected Group</button>
        <button class="btn-ghost" id="${id}-copy">Copy JSON</button>
        <button class="btn-ghost" id="${id}-download">Download JSON</button>
        <button class="btn-ghost" id="${id}-refresh">Refresh</button>
      </div>
    </div>
    <div class="status-log-meta" id="${id}-meta"></div>
    <div class="window-links-list" id="${id}-list"></div>
  `;
  const filterInput = body.querySelector(`#${id}-filter`);
  const scope = body.querySelector(`#${id}-scope`);
  const viewScope = body.querySelector(`#${id}-view-mode`);
  const meta = body.querySelector(`#${id}-meta`);
  const list = body.querySelector(`#${id}-list`);
  const raiseSelectedBtn = body.querySelector(`#${id}-raise-selected`);
  const closeSelectedBtn = body.querySelector(`#${id}-close-selected`);
  const copyBtn = body.querySelector(`#${id}-copy`);
  const downloadBtn = body.querySelector(`#${id}-download`);
  const refreshBtn = body.querySelector(`#${id}-refresh`);
  let sourceWindowId = options.sourceWindowId || null;
  let filterText = String(options.filterText || '');
  let linkType = ['all', 'source', 'arrow'].includes(options.linkType) ? options.linkType : 'all';
  let viewMode = options.viewMode === 'related' ? 'related' : 'all';
  let selectedIndex = Number.isFinite(Number(options.selectedIndex)) ? Math.max(0, Number(options.selectedIndex)) : 0;

  function syncWindowLinksState() {
    const existingSourceWindowId = windowState.get(id)?.sourceWindowId || null;
    if (!sourceWindowId && existingSourceWindowId) sourceWindowId = existingSourceWindowId;
    upsertWindowState(id, {
      kind: 'window-links',
      filterText,
      linkType,
      viewMode,
      selectedIndex,
      sourceWindowId: sourceWindowId || null,
    });
  }

  function currentLinks() {
    const links = collectWindowLinkSummaries();
    if (viewMode !== 'related') return links;
    const relatedIds = new Set(getRelatedWindowIds(sourceWindowId));
    if (sourceWindowId) relatedIds.add(sourceWindowId);
    if (!relatedIds.size) return [];
    return links.filter(link => relatedIds.has(link.fromId) || relatedIds.has(link.toId));
  }

  function filteredLinks() {
    const text = filterText.trim().toLowerCase();
    return currentLinks().filter(link => {
      if (linkType !== 'all' && link.type !== linkType) return false;
      if (!text) return true;
      const haystacks = [
        link.type || '',
        link.fromTitle || '',
        link.fromKind || '',
        link.toTitle || '',
        link.toKind || '',
      ];
      return haystacks.some(value => String(value).toLowerCase().includes(text));
    });
  }

  function isFilteredWindowLinksView() {
    return !!filterText.trim() || linkType !== 'all' || viewMode !== 'all';
  }

  function windowLinksForExport() {
    return isFilteredWindowLinksView() ? filteredLinks() : collectWindowLinkSummaries();
  }

  function buildWindowLinksExport() {
    const allLinks = collectWindowLinkSummaries();
    const sourceTitle = windowState.get(sourceWindowId || '')?.title || '';
    return {
      exportScope: isFilteredWindowLinksView() ? 'current-view' : 'full',
      linkType,
      viewMode,
      filterText,
      sourceWindowId: sourceWindowId || null,
      sourceTitle,
      totalLinks: allLinks.length,
      links: windowLinksForExport(),
    };
  }

  function syncScopeButtons() {
    scope.querySelectorAll('[data-link-type]').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.linkType === linkType);
    });
  }

  function syncViewModeButtons() {
    viewScope.querySelectorAll('[data-view-mode]').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.viewMode === viewMode);
      if (btn.dataset.viewMode === 'related') {
        btn.disabled = !sourceWindowId;
      }
    });
  }

  function currentSelectedLink(links = filteredLinks()) {
    if (!Array.isArray(links) || !links.length) return null;
    selectedIndex = sanitizeSelectionIndex(selectedIndex, links);
    return links[selectedIndex] || null;
  }

  function selectedLinkMemberIds(link) {
    if (!link) return [];
    const related = new Set();
    [link.fromId, link.toId].forEach(linkedId => {
      getRelatedWindowIds(linkedId).forEach(each => {
        if (each && each !== id) related.add(each);
      });
    });
    return Array.from(related);
  }

  function selectWindowLink(index, links = filteredLinks()) {
    const nextIndex = sanitizeSelectionIndex(index, links);
    if (selectedIndex === nextIndex && list.querySelector('.window-link-entry.active')) return;
    selectedIndex = nextIndex;
    syncWindowLinksState();
    renderWindowLinks();
  }

  function renderWindowLinks() {
    const allLinks = collectWindowLinkSummaries();
    const scopedLinks = currentLinks();
    const links = filteredLinks();
    const selectedLink = currentSelectedLink(links);
    const selectedMembers = selectedLinkMemberIds(selectedLink);
    const sourceTitle = windowState.get(sourceWindowId || '')?.title || sourceWindowId || 'source window';
    const scopeLabel = viewMode === 'related' ? `related to ${sourceTitle}` : 'across all windows';
    const exportLabel = isFilteredWindowLinksView() ? 'export targets current view' : 'export targets full set';
    meta.textContent = `${links.length} of ${scopedLinks.length} link${scopedLinks.length === 1 ? '' : 's'} shown · ${linkType === 'all' ? 'all link types' : `${linkType} links only`} · ${scopeLabel} · ${exportLabel}`;
    filterInput.value = filterText;
    syncScopeButtons();
    syncViewModeButtons();
    raiseSelectedBtn.disabled = !selectedLink || !selectedMembers.length;
    closeSelectedBtn.disabled = !selectedLink || !selectedMembers.length;
    copyBtn.textContent = isFilteredWindowLinksView() ? 'Copy Visible JSON' : 'Copy JSON';
    downloadBtn.textContent = isFilteredWindowLinksView() ? 'Download Visible JSON' : 'Download JSON';
    if (!scopedLinks.length) {
      list.innerHTML = `<div class="status-log-empty">${viewMode === 'related' ? 'No window links are currently related to the source window.' : (allLinks.length ? 'No window links match the current view.' : 'No window links are currently open.')}</div>`;
      return;
    }
    if (!links.length) {
      list.innerHTML = `<div class="status-log-empty">No window links match the current filter.</div>`;
      return;
    }
    list.innerHTML = links.map((link, index) => {
      const fromWin = document.getElementById(link.fromId);
      const toWin = document.getElementById(link.toId);
      const fromHtml = fromWin
        ? `<button type="button" class="window-link-endpoint window-link-button" data-link-endpoint="from" data-link-index="${index}"><span>${escHtml(link.fromTitle || link.fromId)}</span><span class="window-link-kind">${escHtml(link.fromKind || 'window')}</span></button>`
        : `<span class="window-link-endpoint missing"><span>${escHtml(link.fromTitle || link.fromId)}</span><span class="window-link-kind">${escHtml(link.fromKind || 'window')}</span></span>`;
      const toHtml = toWin
        ? `<button type="button" class="window-link-endpoint window-link-button" data-link-endpoint="to" data-link-index="${index}"><span>${escHtml(link.toTitle || link.toId)}</span><span class="window-link-kind">${escHtml(link.toKind || 'window')}</span></button>`
        : `<span class="window-link-endpoint missing"><span>${escHtml(link.toTitle || link.toId)}</span><span class="window-link-kind">${escHtml(link.toKind || 'window')}</span></span>`;
      return `
        <div class="window-link-entry ${selectedIndex === index ? 'active' : ''}" data-link-row-index="${index}" tabindex="0">
          <div class="window-link-route">
            ${fromHtml}
            <span class="window-link-type">${escHtml(link.type || 'link')}</span>
            ${toHtml}
          </div>
          <div class="window-link-subtitle">
            <span>${escHtml(link.fromTitle || link.fromId || 'Window')}</span>
            <span>→</span>
            <span>${escHtml(link.toTitle || link.toId || 'Window')}</span>
          </div>
        </div>
      `;
    }).join('');
    list.querySelectorAll('[data-link-row-index]').forEach(row => {
      row.addEventListener('click', () => selectWindowLink(Number(row.dataset.linkRowIndex), links));
    });
    list.querySelectorAll('[data-link-index]').forEach(button => {
      button.addEventListener('click', event => {
        event.stopPropagation();
        selectWindowLink(Number(button.dataset.linkIndex), links);
        const link = links[Number(button.dataset.linkIndex)];
        const targetId = button.dataset.linkEndpoint === 'from' ? link?.fromId : link?.toId;
        const targetWin = targetId ? document.getElementById(targetId) : null;
        if (!targetWin) {
          renderWindowLinks();
          return;
        }
        revealWindow(targetWin);
      });
    });
  }

  async function copyWindowLinks() {
    try {
      await copyTextToClipboard(JSON.stringify(buildWindowLinksExport(), null, 2));
      setStatus(true, isFilteredWindowLinksView() ? 'copied visible window links' : 'copied window links');
    } catch (e) {
      setStatus(false, e.message);
    }
  }

  function downloadWindowLinks() {
    const stamp = new Date().toISOString().replace(/[:]/g, '-');
    downloadDataFile(`window-links-${stamp}.json`, JSON.stringify(buildWindowLinksExport(), null, 2), 'application/json;charset=utf-8');
    setStatus(true, isFilteredWindowLinksView() ? 'downloaded visible window links' : 'downloaded window links');
  }

  filterInput.addEventListener('input', () => {
    filterText = filterInput.value;
    syncWindowLinksState();
    renderWindowLinks();
  });
  scope.querySelectorAll('[data-link-type]').forEach(btn => {
    btn.addEventListener('click', () => {
      const nextType = ['source', 'arrow'].includes(btn.dataset.linkType) ? btn.dataset.linkType : 'all';
      if (linkType === nextType) return;
      linkType = nextType;
      syncWindowLinksState();
      renderWindowLinks();
    });
  });
  viewScope.querySelectorAll('[data-view-mode]').forEach(btn => {
    btn.addEventListener('click', () => {
      const nextMode = btn.dataset.viewMode === 'related' ? 'related' : 'all';
      if (viewMode === nextMode) return;
      viewMode = nextMode;
      syncWindowLinksState();
      renderWindowLinks();
    });
  });
  raiseSelectedBtn.addEventListener('click', () => {
    const link = currentSelectedLink();
    const memberIds = selectedLinkMemberIds(link);
    if (!link || !memberIds.length) return;
    const seedId = memberIds.includes(link.toId) ? link.toId : (memberIds.includes(link.fromId) ? link.fromId : memberIds[0]);
    if (raiseWindowGroupByIds(memberIds, seedId)) {
      setStatus(true, 'raised selected window link group');
    }
  });
  closeSelectedBtn.addEventListener('click', () => {
    const link = currentSelectedLink();
    const memberIds = selectedLinkMemberIds(link);
    if (!link || !memberIds.length) return;
    if (closeWindowGroupByIds(memberIds, {excludeIds: [id]})) {
      setStatus(true, 'closed selected window link group');
      renderWindowLinks();
    }
  });
  copyBtn.addEventListener('click', copyWindowLinks);
  downloadBtn.addEventListener('click', downloadWindowLinks);
  refreshBtn.addEventListener('click', renderWindowLinks);
  liveWindowRenderers.set(id, renderWindowLinks);
  syncWindowLinksState();
  renderWindowLinks();
  notifyLiveWindowUpdated();
  return win;
}
