// WEB BROWSER WINDOW
// ═══════════════════════════════════════════════════════════════════════════════
function openWebBrowser(initialUrl) {
  const {win, body, id} = createWindow({title:'Web Browser', width:700, height:520, taskbarLabel:'Web Browser'});
  upsertWindowState(id, {kind: 'web-browser'});
  const defaultUrl = initialUrl || 'https://pandas.pydata.org';
  body.style.cssText = 'display:flex;flex-direction:column;overflow:hidden;min-height:0';
  body.innerHTML = `
    <div class="wb-urlbar" style="flex-shrink:0">
      <label>URL</label>
      <input class="wb-url-input" id="${id}-url" type="text" value="${escHtml(defaultUrl)}">
      <button class="btn-ghost" id="${id}-go">Go</button>
      <button class="btn-ghost" id="${id}-reload">↺</button>
    </div>
    <div class="wb-iframe-wrap" style="flex:1;min-height:0;overflow:hidden">
      <iframe id="${id}-iframe" src="${escHtml(defaultUrl)}" style="width:100%;height:100%;border:none;background:#fff"></iframe>
    </div>
  `;
  const urlInput = body.querySelector(`#${id}-url`);
  const iframe   = body.querySelector(`#${id}-iframe`);
  function navigate() { iframe.src = urlInput.value; }
  body.querySelector(`#${id}-go`).addEventListener('click', navigate);
  body.querySelector(`#${id}-reload`).addEventListener('click', () => { iframe.src = iframe.src; });
  urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') navigate(); });
  return win;
}

// ═══════════════════════════════════════════════════════════════════════════════
// DEBUGGER WINDOW
// ═══════════════════════════════════════════════════════════════════════════════
function openDebugger(threadOop, threadName) {
  const {win, body, id} = createWindow({
    title: 'Debugger — ' + (threadName||'').slice(0,40),
    width: 660, height: 600, taskbarLabel: 'Debugger'
  });
  upsertWindowState(id, {kind: 'debugger', threadOop});

  let currentFrameIdx = 0;
  let frames = [];

  body.innerHTML = `
    <div class="tab-strip">
      <div class="tab-item active" data-dtab="stack">Stack Trace</div>
      <div class="tab-item" data-dtab="tls">Thread Local Storage</div>
    </div>
    <div id="${id}-stack" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
      <div class="dbg-frames-pane" id="${id}-frames">
        <span class="spinner" style="margin:8px"></span>
      </div>
      <div class="dbg-action-bar">
        <button class="btn-dbg" id="${id}-proceed">Proceed</button>
        <button class="btn-dbg" id="${id}-stepinto">Step into</button>
        <button class="btn-dbg" id="${id}-stepover">Step over</button>
        <button class="btn-dbg" id="${id}-trim">Trim stack</button>
      </div>
      <div class="dbg-source-pane" id="${id}-srcp">
        <textarea id="${id}-src" readonly placeholder="Select a frame…"></textarea>
        <div class="dbg-self-bar">
          <span class="dbg-self-label">self:</span>
          <span class="dbg-self-val" id="${id}-selfval"></span>
        </div>
        <div class="dbg-var-row">
          <select id="${id}-vars"><option value="">— variables —</option></select>
          <span class="dbg-var-val" id="${id}-varval"></span>
        </div>
      </div>
    </div>
    <div id="${id}-tls" style="display:none;flex:1;overflow-y:auto;padding:6px">
      <span class="spinner" id="${id}-tls-spin"></span>
      <ul class="dbg-tls-list" id="${id}-tls-list"></ul>
    </div>
  `;

  body.querySelector('.tab-strip').addEventListener('click', e => {
    const tab = e.target.closest('.tab-item'); if (!tab) return;
    body.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active')); tab.classList.add('active');
    const name = tab.dataset.dtab;
    body.querySelector(`#${id}-stack`).style.display = name==='stack' ? 'flex' : 'none';
    body.querySelector(`#${id}-tls`).style.display   = name==='tls'   ? 'block' : 'none';
    if (name==='tls') loadTLS();
  });

  body.querySelector(`#${id}-proceed`).addEventListener('click', async () => {
    try { await apiPost(`/debug/proceed/${threadOop}`, {}); setStatus(true,'resumed'); closeWindow(win, id); } catch(e){setStatus(false,e.message);}
  });
  body.querySelector(`#${id}-stepinto`).addEventListener('click', async () => {
    try { await apiPost(`/debug/step-into/${threadOop}`, {}); loadFrames(); } catch(e){setStatus(false,e.message);}
  });
  body.querySelector(`#${id}-stepover`).addEventListener('click', async () => {
    try { await apiPost(`/debug/step-over/${threadOop}`, {index:currentFrameIdx}); loadFrames(); } catch(e){setStatus(false,e.message);}
  });
  body.querySelector(`#${id}-trim`).addEventListener('click', async () => {
    try { await apiPost(`/debug/trim/${threadOop}`, {index:currentFrameIdx}); loadFrames(); } catch(e){setStatus(false,e.message);}
  });

  body.querySelector(`#${id}-vars`).addEventListener('change', e => {
    const sel = e.target; if (!sel.value) return;
    const opt = sel.options[sel.selectedIndex];
    body.querySelector(`#${id}-varval`).textContent = opt.dataset.val || '';
  });

  async function loadFrames() {
    const framesEl = body.querySelector(`#${id}-frames`);
    framesEl.innerHTML = '<span class="spinner" style="margin:8px"></span>';
    try {
      const d = await api(`/debug/frames/${threadOop}`);
      if (!d.success) throw new Error(d.exception);
      frames = d.frames;
      framesEl.innerHTML = '';
      frames.forEach(f => {
        const el = document.createElement('div'); el.className='dbg-frame-item';
        // frame type icon: Smalltalk (gold) vs Ruby (red) detected from method name
        const isRuby = f.name.includes('(Ruby)') || f.name.startsWith('Ruby');
        const icon = document.createElement('span');
        icon.className = 'dbg-frame-icon' + (isRuby ? ' ruby' : '');
        icon.textContent = isRuby ? 'R' : 'S';
        el.appendChild(icon);
        el.appendChild(document.createTextNode(f.name));
        el.dataset.idx = f.index;
        el.addEventListener('click', () => selectFrame(f.index, el));
        framesEl.appendChild(el);
      });
      if (frames.length) selectFrame(0, framesEl.querySelector('.dbg-frame-item'));
    } catch(e) { framesEl.innerHTML = `<p style="color:#f38ba8;padding:8px">${escHtml(e.message)}</p>`; }
  }

  async function selectFrame(idx, el) {
    currentFrameIdx = idx;
    body.querySelectorAll('.dbg-frame-item').forEach(e=>e.classList.remove('active'));
    if (el) el.classList.add('active');
    const srcEl    = body.querySelector(`#${id}-src`);
    const varsEl   = body.querySelector(`#${id}-vars`);
    const varvalEl = body.querySelector(`#${id}-varval`);
    const selfEl   = body.querySelector(`#${id}-selfval`);
    srcEl.value = 'Loading…';
    varsEl.innerHTML = '<option value="">— variables —</option>';
    varvalEl.textContent = '';
    selfEl.textContent = '';
    try {
      const d = await api(`/debug/frame/${threadOop}?index=${idx}`);
      if (!d.success) throw new Error(d.exception);
      srcEl.value = d.source || '(no source)';
      selfEl.textContent = d.selfPrintString || '';
      if (d.variables && d.variables.length) {
        d.variables.forEach(v => {
          const opt = document.createElement('option');
          opt.value = v.name; opt.textContent = v.name + ' = ' + String(v.value).slice(0,40);
          opt.dataset.val = v.value;
          varsEl.appendChild(opt);
        });
      }
    } catch(e) { srcEl.value = 'Error: ' + e.message; }
  }

  async function loadTLS() {
    const spin = body.querySelector(`#${id}-tls-spin`);
    const lst  = body.querySelector(`#${id}-tls-list`);
    spin.style.display='inline-block'; lst.innerHTML = '';
    try {
      const d = await api(`/debug/thread-local/${threadOop}`);
      spin.style.display='none';
      if (!d.success) throw new Error(d.exception);
      if (!d.entries.length) { lst.innerHTML='<li style="color:#6c7086">(empty)</li>'; return; }
      d.entries.forEach(e => {
        const li = document.createElement('li');
        const keySpan = document.createElement('span'); keySpan.className = 'tls-key'; keySpan.textContent = e.key;
        const valSpan = document.createElement('span'); valSpan.className = 'tls-val'; valSpan.textContent = e.value;
        li.append(keySpan, valSpan);
        lst.appendChild(li);
      });
    } catch(e) { spin.style.display='none'; lst.innerHTML=`<li style="color:#f38ba8">${escHtml(e.message)}</li>`; }
  }

  loadFrames();
}

// SYMBOL LIST WINDOW
// ═══════════════════════════════════════════════════════════════════════════════
function openSymbolList(px, py, pw, ph) {
  const {win, body, id} = createWindow({title:'Symbol List Browser', width: pw||480, height: ph||460, taskbarLabel:'Symbol List', x: px, y: py});
  upsertWindowState(id, {kind: 'symbol-list'});

  let slUser=null, slDict=null, slKey=null, slKeyOop=null;

  body.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;padding:5px 8px;border-bottom:1px solid #313244;flex-shrink:0;background:#1e1e2e">
      <label style="font-size:11px;white-space:nowrap">Symbol List for</label>
      <select id="${id}-user" style="flex:1;background:#24273a;color:#cdd6f4;border:1px solid #45475a;border-radius:3px;padding:3px 6px;font-size:12px">
        <option>— loading —</option>
      </select>
    </div>
    <div class="sl-two-col" style="height:200px;border-bottom:1px solid #313244;flex-shrink:0">
      <div class="sl-col" style="width:200px;border-right:1px solid #313244">
        <div class="sl-col-header">
          <span class="sl-col-label">Dictionaries</span>
          <button class="sl-add-btn" id="${id}-add-dict">+</button>
        </div>
        <ul class="sl-list" id="${id}-dicts"></ul>
      </div>
      <div class="sl-col" style="flex:1">
        <div class="sl-col-header">
          <span class="sl-col-label">Entries</span>
          <button class="sl-add-btn" id="${id}-add-entry">+</button>
        </div>
        <ul class="sl-list" id="${id}-entries"></ul>
      </div>
    </div>
    <div class="sl-sel-row">
      <span class="sl-sel-label">Selection</span>
      <span class="sl-sel-val" id="${id}-selval"></span>
      <button class="btn-ghost hidden" id="${id}-inspect" style="margin-left:auto;font-size:10px">Inspect ›</button>
    </div>
    <div style="font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:#6c7086;padding:4px 8px 2px;background:#1e1e2e">Keys / Values</div>
    <div style="flex:1;overflow-y:auto">
      <table class="dbtable" style="width:100%">
        <thead><tr><th>Key</th><th>Value</th></tr></thead>
        <tbody id="${id}-kv"></tbody>
      </table>
    </div>
    <div class="sl-preview">
      <div style="font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:#6c7086;padding:4px 8px 2px;background:#1e1e2e">PrintString</div>
      <div class="sl-printstring" id="${id}-ps"></div>
    </div>
    <div class="txbar">
      <span>Transaction:</span>
      <button class="btn-tx" id="${id}-abort">Abort</button>
      <button class="btn-tx" id="${id}-commit">Commit</button>
    </div>
  `;

  body.querySelector(`#${id}-inspect`).addEventListener('click', () => {
    if (!slKeyOop) return;
    openLinkedObjectWindow({oop: slKeyOop, text: slKey||'object', sourceWinId: id});
  });
  body.querySelector(`#${id}-abort`).addEventListener('click', async () => {
    try { const d=await api('/transaction/abort'); setStatus(d.success,d.success?'aborted':d.exception); if (d.success&&slUser) loadDicts(slUser); } catch(e){setStatus(false,e.message);}
  });
  body.querySelector(`#${id}-commit`).addEventListener('click', async () => {
    try { const d=await api('/transaction/commit'); setStatus(d.success,d.success?'committed':d.exception); } catch(e){setStatus(false,e.message);}
  });
  body.querySelector(`#${id}-add-dict`).addEventListener('click', () => {
    if (!slUser){setStatus(false,'Select a user first');return;}
    openModal('Add Dictionary',[{label:'Name',id:'m-dn',type:'input',placeholder:'MyDictionary'}], async f => {
      const name=f['m-dn'].trim(); if(!name)return;
      const r=await apiPost('/symbol-list/add-dictionary',{user:slUser,name}); if(!r.success)throw new Error(r.exception);
      await loadDicts(slUser);
    });
  });
  body.querySelector(`#${id}-add-entry`).addEventListener('click', () => {
    if (!slUser||!slDict){setStatus(false,'Select a dictionary first');return;}
    openModal('Add Entry',[
      {label:'Key',id:'m-ek',type:'input',placeholder:'myKey'},
      {label:'Value (Smalltalk)',id:'m-ev',type:'textarea',placeholder:'nil'},
    ], async f => {
      const key=f['m-ek'].trim(); const val=f['m-ev'].trim()||'nil'; if(!key)return;
      const r=await apiPost('/symbol-list/add-entry',{user:slUser,dictionary:slDict,key,value:val}); if(!r.success)throw new Error(r.exception);
      await loadEntries(slUser,slDict);
    });
  });
  body.querySelector(`#${id}-user`).addEventListener('change', async () => {
    slUser=body.querySelector(`#${id}-user`).value; slDict=slKey=slKeyOop=null;
    body.querySelector(`#${id}-dicts`).innerHTML=''; body.querySelector(`#${id}-entries`).innerHTML=''; clearKV();
    if (slUser) await loadDicts(slUser);
  });

  async function loadUsers() {
    const sel=body.querySelector(`#${id}-user`);
    sel.innerHTML='<option>— loading —</option>';
    try {
      const d=await api('/symbol-list/users'); if(!d.success)throw new Error(d.exception);
      sel.innerHTML='';
      for(const u of d.users){const o=document.createElement('option');o.value=o.textContent=u;sel.appendChild(o);}
      if(d.users.length){const pref='DataCurator'; slUser=d.users.includes(pref)?pref:d.users[0]; sel.value=slUser; await loadDicts(slUser);}
    } catch(e){sel.innerHTML=`<option>${escHtml(e.message)}</option>`;}
  }

  async function loadDicts(user) {
    const ul=body.querySelector(`#${id}-dicts`);
    ul.innerHTML='<li style="color:#6c7086;cursor:default"><span class="spinner"></span></li>';
    try {
      const d=await api(`/symbol-list/dictionaries/${encodeURIComponent(user)}`); if(!d.success)throw new Error(d.exception);
      ul.innerHTML=''; let first=null;
      for(const name of d.dictionaries){const li=makeDictItem(name);ul.appendChild(li);if(!first)first={li,name};}
      if(first)selectDict(first.name,first.li);
    } catch(e){ul.innerHTML=`<li style="color:#f38ba8;cursor:default">${escHtml(e.message)}</li>`;}
  }

  function makeDictItem(name) {
    const li=document.createElement('li');
    const sp=document.createElement('span');sp.className='sl-name';sp.textContent=name;
    const del=document.createElement('button');del.className='sl-del';del.textContent='✕';
    del.addEventListener('click',async e=>{
      e.stopPropagation(); if(!confirm(`Remove "${name}"?`))return;
      try{const r=await apiPost('/symbol-list/remove-dictionary',{user:slUser,name});if(!r.success)throw new Error(r.exception);li.remove();if(slDict===name){slDict=null;body.querySelector(`#${id}-entries`).innerHTML='';clearKV();}}
      catch(err){setStatus(false,'Error: '+err.message);}
    });
    li.append(sp,del);
    li.addEventListener('click',()=>selectDict(name,li));
    return li;
  }

  async function selectDict(name,liEl) {
    slDict=name;slKey=slKeyOop=null;clearKV();
    body.querySelector(`#${id}-dicts`).querySelectorAll('li').forEach(l=>l.classList.remove('active'));
    liEl.classList.add('active');
    await loadEntries(slUser,name);
  }

  async function loadEntries(user,dict) {
    const ul=body.querySelector(`#${id}-entries`);
    ul.innerHTML='<li style="color:#6c7086;cursor:default"><span class="spinner"></span></li>';
    try {
      const d=await api(`/symbol-list/entries/${encodeURIComponent(user)}/${encodeURIComponent(dict)}`); if(!d.success)throw new Error(d.exception);
      ul.innerHTML='';
      const sorted=d.entries.slice().sort((a,b)=>a.localeCompare(b,undefined,{sensitivity:'base'}));
      for(const key of sorted)ul.appendChild(makeEntryItem(key));
    } catch(e){ul.innerHTML=`<li style="color:#f38ba8;cursor:default">${escHtml(e.message)}</li>`;}
  }

  function makeEntryItem(key) {
    const li=document.createElement('li');
    const sp=document.createElement('span');sp.className='sl-name';sp.textContent=key;
    const del=document.createElement('button');del.className='sl-del';del.textContent='✕';
    del.addEventListener('click',async e=>{
      e.stopPropagation();if(!confirm(`Remove "${key}"?`))return;
      try{const r=await apiPost('/symbol-list/remove-entry',{user:slUser,dictionary:slDict,key});if(!r.success)throw new Error(r.exception);li.remove();if(slKey===key){slKey=slKeyOop=null;clearKV();}}
      catch(err){setStatus(false,'Error: '+err.message);}
    });
    li.append(sp,del);
    li.addEventListener('click',()=>selectEntry(key,li));
    return li;
  }

  async function selectEntry(key,liEl) {
    slKey=key;slKeyOop=null;
    body.querySelector(`#${id}-entries`).querySelectorAll('li').forEach(l=>l.classList.remove('active'));
    liEl.classList.add('active');
    body.querySelector(`#${id}-selval`).textContent=key;
    body.querySelector(`#${id}-inspect`).classList.add('hidden');
    clearKV();
    const kv=body.querySelector(`#${id}-kv`);
    kv.innerHTML='<tr><td colspan="2" style="color:#6c7086"><span class="spinner"></span> Loading…</td></tr>';
    try {
      const d=await api(`/symbol-list/preview/${encodeURIComponent(slUser)}/${encodeURIComponent(slDict)}/${encodeURIComponent(key)}`);
      if(!d.success)throw new Error(d.exception);
      slKeyOop=d.oop||null;
      if(slKeyOop)body.querySelector(`#${id}-inspect`).classList.remove('hidden');
      body.querySelector(`#${id}-ps`).textContent=d.inspection||'nil';
      kv.innerHTML='';
      const pairs=Object.values(d.instVars||{});
      if(!pairs.length){kv.innerHTML='<tr><td colspan="2" style="color:#6c7086;font-style:italic">(no entries)</td></tr>';return;}
      for(const [nv,vv] of pairs){
        const tr=document.createElement('tr');
        const tk=document.createElement('td');tk.className='col-key';tk.textContent=nv.inspection||'';
        const tv=document.createElement('td');tv.className='col-val';
        const isLeaf = isLeafBasetype(vv.basetype);
        if(!isLeaf&&vv.oop){
          const chip = makeChip(vv.inspection||`oop:${vv.oop}`, vv.oop, id);
          tv.appendChild(chip);
        } else{tv.textContent=vv.inspection||'nil';}
        tr.append(tk,tv);kv.appendChild(tr);
      }
      if(d.instVarsSize>pairs.length){const tr=document.createElement('tr');tr.innerHTML=`<td colspan="2" style="color:#6c7086;font-size:10px">${pairs.length} of ${d.instVarsSize}</td>`;kv.appendChild(tr);}
    } catch(e){kv.innerHTML=`<tr><td colspan="2" style="color:#f38ba8">${escHtml(e.message)}</td></tr>`;}
  }

  function clearKV() {
    body.querySelector(`#${id}-selval`).textContent='';
    body.querySelector(`#${id}-inspect`).classList.add('hidden');
    body.querySelector(`#${id}-kv`).innerHTML='';
    body.querySelector(`#${id}-ps`).textContent='';
  }

  setTimeout(loadUsers, 1500);
  return win;
}

function parseMethodReference(ref) {
  const split = String(ref || '').indexOf('>>');
  if (split < 0) return null;
  let className = String(ref).slice(0, split).trim();
  const selector = String(ref).slice(split + 2).trim();
  const meta = className.endsWith(' class');
  if (meta) className = className.slice(0, -6).trim();
  return className && selector ? {className, selector, meta} : null;
}

function openTextWindow(title, text, taskbarLabel='Report', px, py, pw=560, ph=380) {
  const {body} = createWindow({title, width: pw, height: ph, x: px, y: py, taskbarLabel});
  body.innerHTML = `<textarea class="qv-preview" readonly></textarea>`;
  body.querySelector('textarea').value = text || '';
}

function openMethodQueryWindow(title, results) {
  const {body} = createWindow({title, width: 760, height: 520, taskbarLabel:'Method Query'});
  body.innerHTML = `
    <div class="qv-wrap">
      <div class="qv-list"></div>
      <div class="qv-main">
        <div class="qv-toolbar">
          <span class="qv-title">Select a result</span>
          <button class="btn-ghost" id="qv-open" disabled>Open In Browser</button>
        </div>
        <textarea class="qv-preview" readonly></textarea>
      </div>
    </div>
  `;

  const listEl = body.querySelector('.qv-list');
  const titleEl = body.querySelector('.qv-title');
  const previewEl = body.querySelector('.qv-preview');
  const openBtn = body.querySelector('#qv-open');
  let currentRef = null;

  async function selectRef(ref, row) {
    currentRef = ref;
    listEl.querySelectorAll('.qv-item').forEach(el => el.classList.remove('active'));
    row?.classList.add('active');
    const parsed = parseMethodReference(ref);
    if (!parsed) {
      titleEl.textContent = ref;
      previewEl.value = ref;
      openBtn.disabled = true;
      return;
    }
    openBtn.disabled = false;
    titleEl.textContent = parsed.meta ? `${parsed.className} class >> ${parsed.selector}` : `${parsed.className} >> ${parsed.selector}`;
    previewEl.value = 'Loading…';
    try {
      const d = await apiWithParams('/class-browser/source', {
        class: parsed.className,
        selector: parsed.selector,
        meta: parsed.meta ? 1 : 0,
      });
      if (!d.success) throw new Error(d.exception);
      previewEl.value = d.source || '';
    } catch (e) {
      previewEl.value = 'Error: ' + e.message;
    }
  }

  openBtn.addEventListener('click', () => {
    const parsed = parseMethodReference(currentRef);
    if (!parsed) return;
    openClassBrowser({className: parsed.className, method: parsed.selector, meta: parsed.meta});
  });

  if (!results.length) {
    listEl.innerHTML = '<div class="cb-empty">(no matches)</div>';
    previewEl.value = '';
    return;
  }

  results.forEach(ref => {
    const row = document.createElement('div');
    row.className = 'qv-item';
    row.textContent = ref;
    row.addEventListener('click', () => selectRef(ref, row));
    row.addEventListener('dblclick', () => {
      const parsed = parseMethodReference(ref);
      if (parsed) openClassBrowser({className: parsed.className, method: parsed.selector, meta: parsed.meta});
    });
    listEl.appendChild(row);
  });
  selectRef(results[0], listEl.querySelector('.qv-item'));
}

function openVersionsWindow(title, versions) {
  const {body} = createWindow({title, width: 760, height: 520, taskbarLabel:'Versions'});
  body.innerHTML = `
    <div class="qv-wrap">
      <div class="qv-list"></div>
      <div class="qv-main">
        <div class="qv-toolbar">
          <span class="qv-title">Select a version</span>
        </div>
        <textarea class="qv-preview" readonly></textarea>
      </div>
    </div>
  `;

  const listEl = body.querySelector('.qv-list');
  const titleEl = body.querySelector('.qv-title');
  const previewEl = body.querySelector('.qv-preview');

  function selectVersion(version, row) {
    listEl.querySelectorAll('.qv-item').forEach(el => el.classList.remove('active'));
    row?.classList.add('active');
    titleEl.textContent = version.label;
    previewEl.value = version.source || '';
  }

  if (!versions.length) {
    listEl.innerHTML = '<div class="cb-empty">(no versions)</div>';
    return;
  }

  versions.forEach(version => {
    const row = document.createElement('div');
    row.className = 'qv-item';
    row.textContent = version.label;
    row.addEventListener('click', () => selectVersion(version, row));
    listEl.appendChild(row);
  });
  selectVersion(versions[0], listEl.querySelector('.qv-item'));
}

// CLASS BROWSER WINDOW
// ═══════════════════════════════════════════════════════════════════════════════
function openClassBrowser(options = {}) {
  const {win, body, id} = createWindow({
    title:'Class Browser',
    width: options.width || 960,
    height: options.height || 660,
    x: options.x,
    y: options.y,
    taskbarLabel:'Class Browser'
  });
  upsertWindowState(id, {kind: 'class-browser'});

  let currentDict = options.dictionary || null;
  let currentClass = options.className || null;
  let currentProtocol = options.protocol || '-- all --';
  let currentMethod = options.method || null;
  let currentMeta = !!options.meta;

  body.innerHTML = `
    <div class="cb-wrap">
      <div class="cb-toolbar">
        <button class="btn-ghost" id="${id}-find">Find Class</button>
        <button class="btn-ghost" id="${id}-refresh">Refresh</button>
        <button class="btn-ghost" id="${id}-browse-class">Browse Class</button>
        <button class="btn-ghost" id="${id}-hierarchy">Hierarchy</button>
        <button class="btn-ghost" id="${id}-versions">Versions</button>
        <button class="btn-ghost" id="${id}-references">References</button>
        <button class="btn-ghost" id="${id}-senders">Senders</button>
        <button class="btn-ghost" id="${id}-implementors">Implementors</button>
        <button class="btn" id="${id}-compile">Compile</button>
        <label class="cb-meta"><input type="checkbox" id="${id}-meta"> Class side</label>
      </div>
      <div class="cb-lists">
        <div class="cb-pane">
          <div class="cb-pane-label">Dictionaries</div>
          <div class="cb-list" id="${id}-dicts"></div>
        </div>
        <div class="cb-pane">
          <div class="cb-pane-label">Classes</div>
          <div class="cb-list" id="${id}-classes"></div>
        </div>
        <div class="cb-pane">
          <div class="cb-pane-label">Categories</div>
          <div class="cb-list" id="${id}-protocols"></div>
        </div>
        <div class="cb-pane">
          <div class="cb-pane-label">Methods</div>
          <div class="cb-list" id="${id}-methods"></div>
        </div>
      </div>
      <div class="cb-source-wrap">
        <div class="cb-source-hdr">
          <span>Source</span>
          <span class="cb-source-note" id="${id}-source-note"></span>
        </div>
        <textarea class="cb-source" id="${id}-source" spellcheck="false"></textarea>
        <div class="cb-status" id="${id}-status">Loading…</div>
      </div>
    </div>
  `;

  const els = {
    dicts: body.querySelector(`#${id}-dicts`),
    classes: body.querySelector(`#${id}-classes`),
    protocols: body.querySelector(`#${id}-protocols`),
    methods: body.querySelector(`#${id}-methods`),
    source: body.querySelector(`#${id}-source`),
    sourceNote: body.querySelector(`#${id}-source-note`),
    status: body.querySelector(`#${id}-status`),
    meta: body.querySelector(`#${id}-meta`),
  };
  els.meta.checked = currentMeta;

  function setBrowserStatus(message, tone='') {
    els.status.textContent = message || '';
    els.status.className = 'cb-status' + (tone ? ` ${tone}` : '');
  }

  function setSourceNote(text) {
    els.sourceNote.textContent = text || '';
  }

  function renderList(container, items, active, onSelect) {
    container.innerHTML = '';
    if (!items.length) {
      container.innerHTML = '<div class="cb-empty">(empty)</div>';
      return;
    }
    items.forEach(item => {
      const row = document.createElement('div');
      row.className = 'cb-item' + (item === active ? ' active' : '');
      row.textContent = item;
      row.title = item;
      row.addEventListener('click', () => onSelect(item));
      container.appendChild(row);
    });
  }

  function showLoading(container) {
    container.innerHTML = '<div class="cb-empty"><span class="spinner"></span></div>';
  }

  function clearSource() {
    els.source.value = '';
    setSourceNote('');
  }

  async function loadClassSource(selector='') {
    if (!currentClass) {
      clearSource();
      return;
    }
    const label = selector
      ? (currentMeta ? `${currentClass} class >> ${selector}` : `${currentClass} >> ${selector}`)
      : (currentMeta ? `${currentClass} class` : currentClass);
    setSourceNote(label);
    els.source.value = 'Loading…';
    try {
      const d = await apiWithParams('/class-browser/source', {
        class: currentClass,
        selector,
        meta: currentMeta ? 1 : 0,
      });
      if (!d.success) throw new Error(d.exception);
      els.source.value = d.source || '';
      setBrowserStatus(label, 'ok');
    } catch (e) {
      els.source.value = 'Error: ' + e.message;
      setBrowserStatus(e.message, 'error');
      setStatus(false, e.message);
    }
  }

  async function loadMethods() {
    if (!currentClass) {
      els.methods.innerHTML = '<div class="cb-empty">(select a class)</div>';
      clearSource();
      return;
    }
    showLoading(els.methods);
    try {
      const d = await apiWithParams('/class-browser/methods', {
        class: currentClass,
        protocol: currentProtocol,
        meta: currentMeta ? 1 : 0,
      });
      if (!d.success) throw new Error(d.exception);
      const methods = d.methods || [];
      if (!methods.includes(currentMethod)) currentMethod = null;
      renderList(els.methods, methods, currentMethod, async method => {
        currentMethod = method;
        renderList(els.methods, methods, currentMethod, async item => {
          currentMethod = item;
          await loadClassSource(currentMethod);
        });
        await loadClassSource(currentMethod);
      });
      if (currentMethod) {
        await loadClassSource(currentMethod);
      } else {
        await loadClassSource('');
      }
    } catch (e) {
      els.methods.innerHTML = `<div class="cb-empty" style="color:#f38ba8">${escHtml(e.message)}</div>`;
      setBrowserStatus(e.message, 'error');
      setStatus(false, e.message);
    }
  }

  async function loadProtocols() {
    if (!currentClass) {
      els.protocols.innerHTML = '<div class="cb-empty">(select a class)</div>';
      els.methods.innerHTML = '<div class="cb-empty">(select a class)</div>';
      clearSource();
      return;
    }
    showLoading(els.protocols);
    try {
      const d = await apiWithParams('/class-browser/categories', {
        class: currentClass,
        meta: currentMeta ? 1 : 0,
      });
      if (!d.success) throw new Error(d.exception);
      const protocols = d.categories || ['-- all --'];
      if (!protocols.includes(currentProtocol)) currentProtocol = '-- all --';
      renderList(els.protocols, protocols, currentProtocol, async protocol => {
        currentProtocol = protocol;
        currentMethod = null;
        renderList(els.protocols, protocols, currentProtocol, async item => {
          currentProtocol = item;
          currentMethod = null;
          await loadMethods();
        });
        await loadMethods();
      });
      await loadMethods();
    } catch (e) {
      els.protocols.innerHTML = `<div class="cb-empty" style="color:#f38ba8">${escHtml(e.message)}</div>`;
      setBrowserStatus(e.message, 'error');
      setStatus(false, e.message);
    }
  }

  async function loadClasses() {
    if (!currentDict) {
      els.classes.innerHTML = '<div class="cb-empty">(select a dictionary)</div>';
      els.protocols.innerHTML = '<div class="cb-empty">(select a class)</div>';
      els.methods.innerHTML = '<div class="cb-empty">(select a class)</div>';
      clearSource();
      return;
    }
    showLoading(els.classes);
    try {
      const d = await apiWithParams('/class-browser/classes', {dictionary: currentDict});
      if (!d.success) throw new Error(d.exception);
      const classes = d.classes || [];
      if (!classes.includes(currentClass)) currentClass = classes[0] || null;
      renderList(els.classes, classes, currentClass, async className => {
        currentClass = className;
        currentProtocol = '-- all --';
        currentMethod = null;
        renderList(els.classes, classes, currentClass, async item => {
          currentClass = item;
          currentProtocol = '-- all --';
          currentMethod = null;
          await loadProtocols();
        });
        await loadProtocols();
      });
      await loadProtocols();
    } catch (e) {
      els.classes.innerHTML = `<div class="cb-empty" style="color:#f38ba8">${escHtml(e.message)}</div>`;
      setBrowserStatus(e.message, 'error');
      setStatus(false, e.message);
    }
  }

  async function loadDictionaries() {
    showLoading(els.dicts);
    try {
      const d = await api('/class-browser/dictionaries');
      if (!d.success) throw new Error(d.exception);
      const dictionaries = d.dictionaries || [];
      if (!dictionaries.includes(currentDict)) currentDict = currentDict || dictionaries[0] || null;
      if (!dictionaries.includes(currentDict)) currentDict = dictionaries[0] || null;
      renderList(els.dicts, dictionaries, currentDict, async dictName => {
        currentDict = dictName;
        currentClass = null;
        currentProtocol = '-- all --';
        currentMethod = null;
        renderList(els.dicts, dictionaries, currentDict, async item => {
          currentDict = item;
          currentClass = null;
          currentProtocol = '-- all --';
          currentMethod = null;
          await loadClasses();
        });
        await loadClasses();
      });
      await loadClasses();
    } catch (e) {
      els.dicts.innerHTML = `<div class="cb-empty" style="color:#f38ba8">${escHtml(e.message)}</div>`;
      setBrowserStatus(e.message, 'error');
      setStatus(false, e.message);
    }
  }

  async function locateAndSelectClass(className, methodName = null, meta = currentMeta) {
    currentMeta = !!meta;
    els.meta.checked = currentMeta;
    const d = await apiWithParams('/class-browser/class-location', {class: className});
    if (!d.success) throw new Error(d.exception);
    if (!d.dictionary) throw new Error(`Class not found: ${className}`);
    currentDict = d.dictionary;
    currentClass = className;
    currentProtocol = '-- all --';
    currentMethod = methodName;
    await loadDictionaries();
  }

  async function refreshBrowser() {
    const saved = {
      dict: currentDict,
      className: currentClass,
      protocol: currentProtocol,
      method: currentMethod,
      meta: currentMeta,
    };
    currentDict = saved.dict;
    currentClass = saved.className;
    currentProtocol = saved.protocol;
    currentMethod = saved.method;
    currentMeta = saved.meta;
    els.meta.checked = currentMeta;
    await loadDictionaries();
  }

  async function runSelectorQuery(mode, promptTitle, forcePrompt=false) {
    let selector = !forcePrompt && currentMethod ? currentMethod : '';
    if (!selector) selector = prompt(promptTitle, currentMethod || '');
    selector = String(selector || '').trim();
    if (!selector) return;
    setBrowserStatus('Searching…');
    try {
      const d = await apiWithParams('/class-browser/query', {
        selector,
        mode,
        rootClassName: currentClass || '',
        hierarchyScope: 'full',
      });
      if (!d.success) throw new Error(d.exception);
      if (!d.results.length) {
        setBrowserStatus('No matches found');
        return;
      }
      openMethodQueryWindow(`${promptTitle} (${d.results.length})`, d.results);
      setBrowserStatus(`${d.results.length} matches`, 'ok');
    } catch (e) {
      setBrowserStatus(e.message, 'error');
      setStatus(false, e.message);
    }
  }

  async function runReferenceQuery() {
    const token = prompt('References to class or variable name:', currentClass || '');
    const selector = String(token || '').trim();
    if (!selector) return;
    setBrowserStatus('Searching…');
    try {
      const d = await apiWithParams('/class-browser/query', {
        selector,
        mode: 'references',
        rootClassName: currentClass || '',
      });
      if (!d.success) throw new Error(d.exception);
      if (!d.results.length) {
        setBrowserStatus('No matches found');
        return;
      }
      openMethodQueryWindow(`References to ${selector} (${d.results.length})`, d.results);
      setBrowserStatus(`${d.results.length} matches`, 'ok');
    } catch (e) {
      setBrowserStatus(e.message, 'error');
      setStatus(false, e.message);
    }
  }

  async function showHierarchy() {
    if (!currentClass) {
      setBrowserStatus('Select a class first', 'error');
      return;
    }
    try {
      const d = await apiWithParams('/class-browser/hierarchy', {class: currentClass});
      if (!d.success) throw new Error(d.exception);
      openTextWindow(`${currentClass} Hierarchy`, (d.hierarchy || []).join('\n'), 'Hierarchy', undefined, undefined, 420, 320);
      setBrowserStatus('Hierarchy loaded', 'ok');
    } catch (e) {
      setBrowserStatus(e.message, 'error');
      setStatus(false, e.message);
    }
  }

  async function showVersions() {
    if (!currentClass || !currentMethod) {
      setBrowserStatus('Select a method first', 'error');
      return;
    }
    try {
      const d = await apiWithParams('/class-browser/versions', {
        class: currentClass,
        selector: currentMethod,
        meta: currentMeta ? 1 : 0,
      });
      if (!d.success) throw new Error(d.exception);
      if (!d.versions.length) {
        setBrowserStatus('No versions available');
        return;
      }
      openVersionsWindow(`${currentClass} >> ${currentMethod} Versions`, d.versions);
      setBrowserStatus(`${d.versions.length} versions`, 'ok');
    } catch (e) {
      setBrowserStatus(e.message, 'error');
      setStatus(false, e.message);
    }
  }

  async function compileSource() {
    if (!currentClass) {
      setBrowserStatus('Select a class first', 'error');
      return;
    }
    setBrowserStatus('Compiling…');
    try {
      const d = await apiPost('/class-browser/compile', {
        className: currentClass,
        category: currentProtocol === '-- all --' ? 'as yet unclassified' : currentProtocol,
        source: els.source.value,
        meta: els.meta.checked,
      });
      if (!d.success) throw new Error(d.exception || 'Compilation failed');
      setBrowserStatus(d.result || 'Compiled', 'ok');
      await loadProtocols();
    } catch (e) {
      setBrowserStatus(e.message, 'error');
      setStatus(false, e.message);
    }
  }

  body.querySelector(`#${id}-find`).addEventListener('click', async () => {
    const name = prompt('Class name:', currentClass || '');
    const className = String(name || '').trim();
    if (!className) return;
    try {
      await locateAndSelectClass(className);
      setBrowserStatus(`Selected ${className}`, 'ok');
    } catch (e) {
      setBrowserStatus(e.message, 'error');
      setStatus(false, e.message);
    }
  });
  body.querySelector(`#${id}-refresh`).addEventListener('click', () => refreshBrowser());
  body.querySelector(`#${id}-browse-class`).addEventListener('click', () => loadClassSource(''));
  body.querySelector(`#${id}-hierarchy`).addEventListener('click', () => showHierarchy());
  body.querySelector(`#${id}-versions`).addEventListener('click', () => showVersions());
  body.querySelector(`#${id}-references`).addEventListener('click', () => runReferenceQuery());
  body.querySelector(`#${id}-senders`).addEventListener('click', () => runSelectorQuery('senders', 'Senders of selector:'));
  body.querySelector(`#${id}-implementors`).addEventListener('click', () => runSelectorQuery('implementors', 'Implementors of selector:'));
  body.querySelector(`#${id}-compile`).addEventListener('click', () => compileSource());
  els.meta.addEventListener('change', async () => {
    currentMeta = els.meta.checked;
    currentProtocol = '-- all --';
    currentMethod = null;
    await loadProtocols();
  });

  (async () => {
    try {
      if (currentClass && !currentDict) {
        await locateAndSelectClass(currentClass, currentMethod, currentMeta);
      } else {
        await loadDictionaries();
      }
      setBrowserStatus(currentClass ? `Loaded ${currentClass}` : 'Ready');
    } catch (e) {
      setBrowserStatus(e.message, 'error');
      setStatus(false, e.message);
    }
  })();

  return win;
}

// ── shared helpers ────────────────────────────────────────────────────────────
function makeTable(headers, rows) {
  const tbl = document.createElement('table'); tbl.className='dbtable';
  const thead=document.createElement('thead');
  thead.innerHTML='<tr>'+headers.map(h=>`<th>${escHtml(h)}</th>`).join('')+'</tr>';
  tbl.appendChild(thead);
  const tbody=document.createElement('tbody');
  rows.forEach(r=>{
    const tr=document.createElement('tr');
    r.forEach((c,i)=>{
      const td=document.createElement('td');td.className=i===0?'col-key':'col-val';td.textContent=c;tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
  return tbl;
}

// ── modal ─────────────────────────────────────────────────────────────────────
function openModal(title, fields, onOk) {
  document.getElementById('modal-title').textContent=title;
  const fd=document.getElementById('modal-fields'); fd.innerHTML='';
  for(const f of fields){
    const lbl=document.createElement('label');lbl.textContent=f.label;lbl.style.cssText='display:block;margin-bottom:2px';fd.appendChild(lbl);
    const el=f.type==='textarea'?document.createElement('textarea'):document.createElement('input');
    if(f.type!=='textarea')el.type='text';
    el.placeholder=f.placeholder||'';el.id=f.id;el.style.marginBottom='6px';el.value=f.value||'';fd.appendChild(el);
  }
  document.getElementById('modal-overlay').classList.add('visible');
  if(fields.length)document.getElementById(fields[0].id)?.focus();
  const cleanup=()=>document.getElementById('modal-overlay').classList.remove('visible');
  document.getElementById('modal-cancel').onclick=cleanup;
  document.getElementById('modal-ok').onclick=async()=>{
    const vals={};for(const f of fields)vals[f.id]=document.getElementById(f.id).value;
    try{await onOk(vals);cleanup();}catch(e){setStatus(false,'Error: '+e.message);}
  };
}

// ── startup ───────────────────────────────────────────────────────────────────
async function startup() {
  await init();
  const vw = window.innerWidth;
  const vh = Math.max(420, window.innerHeight - 42);

  const hashOop = startupIds.persistentRootId || roots['UserGlobals'] || roots['Globals'];
  const hashLabel = 'Persistent Root';
  const hashW = Math.min(vw - 32, Math.max(900, Math.floor(vw * 0.72)));
  const hashH = Math.min(300, Math.max(220, Math.floor(vh * 0.34)));
  const hashX = Math.max(16, vw - hashW - 16);
  const hashY = 10;

  const systemW = Math.min(vw - 32, Math.max(980, Math.floor(vw * 0.9)));
  const systemH = Math.min(340, Math.max(280, Math.floor(vh * 0.46)));
  const systemX = 20;
  const systemY = Math.min(Math.max(180, hashY + hashH + 34), Math.max(20, vh - systemH - 20));

  if (hashOop) {
    openObjectBrowser(hashOop, hashLabel, hashX, hashY, hashW, hashH, {initialTab: 'instvars', compact: true});
  } else {
    openObjectBrowser(undefined, undefined, 10, 10, 520, 480);
  }

  if (startupIds.systemId || roots['System']) {
    openObjectBrowser(startupIds.systemId || roots['System'], 'System', systemX, systemY, systemW, systemH, {initialTab: 'control', compact: true});
  }

  cascadeX = 80; cascadeY = 80;
  setTimeout(startThreadPoller, 5000);
}
startup();
</script>
