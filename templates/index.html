// WINDOW GROUPS WINDOW
// ═══════════════════════════════════════════════════════════════════════════════
function openWindowGroupsWindow(options = {}) {
  const {win, body, id} = createWindow({
    title:'Window Groups',
    width: options.width || 560,
    height: options.height || 360,
    x: options.x,
    y: options.y,
    taskbarLabel:'Window Groups'
  });
  body.style.cssText = 'display:flex;flex-direction:column;padding:12px;overflow:hidden;min-height:0';
  body.innerHTML = `
    <div class="status-log-toolbar">
      <div class="status-log-controls">
        <input class="status-log-filter" id="${id}-filter" type="text" placeholder="Filter groups">
        <div class="status-log-scope" id="${id}-scope">
          <button class="btn-ghost" data-view-mode="all">All Windows</button>
          <button class="btn-ghost" data-view-mode="linked">Linked Only</button>
        </div>
        <button class="btn-ghost" id="${id}-raise-largest">Raise Largest Group</button>
        <button class="btn-ghost" id="${id}-close-largest">Close Largest Group</button>
      </div>
      <div class="status-log-controls">
        <button class="btn-ghost" id="${id}-copy">Copy JSON</button>
        <button class="btn-ghost" id="${id}-download">Download JSON</button>
        <button class="btn-ghost" id="${id}-refresh">Refresh</button>
      </div>
    </div>
    <div class="status-log-meta" id="${id}-meta"></div>
    <div class="window-groups-list" id="${id}-list"></div>
  `;
  const filterInput = body.querySelector(`#${id}-filter`);
  const scope = body.querySelector(`#${id}-scope`);
  const meta = body.querySelector(`#${id}-meta`);
  const list = body.querySelector(`#${id}-list`);
  const raiseLargestBtn = body.querySelector(`#${id}-raise-largest`);
  const closeLargestBtn = body.querySelector(`#${id}-close-largest`);
  const copyBtn = body.querySelector(`#${id}-copy`);
  const downloadBtn = body.querySelector(`#${id}-download`);
  const refreshBtn = body.querySelector(`#${id}-refresh`);
  let sourceWindowId = options.sourceWindowId || null;
  let filterText = String(options.filterText || '');
  let viewMode = options.viewMode === 'linked' ? 'linked' : 'all';

  function syncWindowGroupsState() {
    const existingSourceWindowId = windowState.get(id)?.sourceWindowId || null;
    if (!sourceWindowId && existingSourceWindowId) sourceWindowId = existingSourceWindowId;
    upsertWindowState(id, {
      kind: 'window-groups',
      filterText,
      viewMode,
      sourceWindowId: sourceWindowId || null,
    });
  }

  function currentGroups() {
    const groups = collectWindowGroupSummaries();
    if (viewMode === 'linked') {
      return groups.filter(group => Number(group.size || 0) > 1);
    }
    return groups;
  }

  function filteredGroups() {
    const text = filterText.trim().toLowerCase();
    const groups = currentGroups();
    if (!text) return groups;
    return groups.filter(group => {
      const haystacks = [
        group.primaryTitle || '',
        ...(Array.isArray(group.titles) ? group.titles : []),
        ...(Array.isArray(group.kinds) ? group.kinds : []),
      ];
      return haystacks.some(value => String(value).toLowerCase().includes(text));
    });
  }

  function isFilteredWindowGroupsView() {
    return !!filterText.trim() || viewMode !== 'all';
  }

  function windowGroupsForExport() {
    return isFilteredWindowGroupsView() ? filteredGroups() : collectWindowGroupSummaries();
  }

  function buildWindowGroupsExport() {
    const allGroups = collectWindowGroupSummaries();
    const groups = windowGroupsForExport();
    return {
      exportScope: isFilteredWindowGroupsView() ? 'current-view' : 'full',
      viewMode,
      filterText,
      totalGroups: allGroups.length,
      totalWindows: collectOpenWindowSummaries().length,
      groups,
    };
  }

  function syncViewModeButtons() {
    scope.querySelectorAll('[data-view-mode]').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.viewMode === viewMode);
    });
  }

  function renderWindowGroups() {
    const groups = currentGroups();
    const visibleGroups = filteredGroups();
    const totalWindows = collectOpenWindowSummaries().length;
    const visibleWindows = visibleGroups.reduce((sum, each) => sum + Number(each.size || 0), 0);
    const largestGroupSize = groups.reduce((max, each) => Math.max(max, Number(each.size || 0)), 0);
    filterInput.value = filterText;
    syncViewModeButtons();
    const scopeLabel = viewMode === 'linked' ? 'linked groups only' : 'including singletons';
    const exportLabel = isFilteredWindowGroupsView() ? 'export targets current view' : 'export targets full set';
    meta.textContent = `${visibleGroups.length} of ${groups.length} group${groups.length === 1 ? '' : 's'} shown · ${visibleWindows} of ${totalWindows} window${totalWindows === 1 ? '' : 's'} visible · ${scopeLabel} · ${exportLabel} · largest group ${largestGroupSize} window${largestGroupSize === 1 ? '' : 's'}`;
    raiseLargestBtn.disabled = !visibleGroups.length;
    closeLargestBtn.disabled = !visibleGroups.length;
    copyBtn.textContent = isFilteredWindowGroupsView() ? 'Copy Visible JSON' : 'Copy JSON';
    downloadBtn.textContent = isFilteredWindowGroupsView() ? 'Download Visible JSON' : 'Download JSON';
    if (!groups.length) {
      list.innerHTML = `<div class="window-group-empty">${viewMode === 'linked' ? 'No linked window groups are currently open.' : 'No grouped windows are currently open.'}</div>`;
      return;
    }
    if (!visibleGroups.length) {
      list.innerHTML = `<div class="window-group-empty">No window groups match the current filter.</div>`;
      return;
    }
    list.innerHTML = visibleGroups.map((group, index) => {
      const subtitle = [
        `${group.size} windows`,
        group.focused ? 'focused' : '',
        group.minimisedCount ? `${group.minimisedCount} minimised` : '',
        (group.kinds || []).join(', '),
      ].filter(Boolean).join(' · ');
      const leadTitle = group.primaryTitle || group.titles?.[0] || `Group ${index + 1}`;
      return `
        <div class="window-group-card ${group.focused ? 'focused-group' : ''}">
          <div class="window-group-header">
            <div>
              <div class="window-group-title">${escHtml(leadTitle)}</div>
              <div class="window-group-subtitle">${escHtml(subtitle || 'window group')}</div>
            </div>
            <div class="status-log-controls">
              <button class="btn-ghost" data-group-seed-id="${escHtml(group.primaryId || group.members?.[0]?.id || '')}">Raise Group</button>
              <button class="btn-ghost" data-close-group-seed-id="${escHtml(group.primaryId || group.members?.[0]?.id || '')}">Close Group</button>
            </div>
          </div>
          <div class="window-group-members">
            ${(group.members || []).map(member => `
              <button type="button" class="window-group-member" data-window-id="${escHtml(member.id)}">
                <span>${escHtml(member.title || member.id)}</span>
                <span class="window-group-member-kind">${escHtml(member.kind || 'window')}</span>
              </button>
            `).join('')}
          </div>
        </div>
      `;
    }).join('');

    list.querySelectorAll('[data-window-id]').forEach(button => {
      button.addEventListener('click', () => {
        const targetId = String(button.dataset.windowId || '');
        const targetWin = targetId ? document.getElementById(targetId) : null;
        if (!targetWin) {
          renderWindowGroups();
          return;
        }
        revealWindow(targetWin);
      });
    });
    list.querySelectorAll('[data-group-seed-id]').forEach(button => {
      button.addEventListener('click', () => {
        const seedId = String(button.dataset.groupSeedId || '').trim() || null;
        raiseWindowGroupByIds(getRelatedWindowIds(seedId), seedId);
      });
    });
    list.querySelectorAll('[data-close-group-seed-id]').forEach(button => {
      button.addEventListener('click', () => {
        const seedId = String(button.dataset.closeGroupSeedId || '').trim() || null;
        if (!seedId) return;
        closeWindowGroupByIds(getRelatedWindowIds(seedId), {excludeIds: [id]});
        renderWindowGroups();
      });
    });
  }

  filterInput.addEventListener('input', () => {
    filterText = filterInput.value;
    syncWindowGroupsState();
    renderWindowGroups();
  });
  scope.querySelectorAll('[data-view-mode]').forEach(btn => {
    btn.addEventListener('click', () => {
      const nextMode = btn.dataset.viewMode === 'linked' ? 'linked' : 'all';
      if (viewMode === nextMode) return;
      viewMode = nextMode;
      syncWindowGroupsState();
      renderWindowGroups();
    });
  });
  async function copyWindowGroups() {
    try {
      await copyTextToClipboard(JSON.stringify(buildWindowGroupsExport(), null, 2));
      setStatus(true, isFilteredWindowGroupsView() ? 'copied visible window groups' : 'copied window groups');
    } catch (e) {
      setStatus(false, e.message);
    }
  }
  function downloadWindowGroups() {
    const stamp = new Date().toISOString().replace(/[:]/g, '-');
    downloadDataFile(`window-groups-${stamp}.json`, JSON.stringify(buildWindowGroupsExport(), null, 2), 'application/json;charset=utf-8');
    setStatus(true, isFilteredWindowGroupsView() ? 'downloaded visible window groups' : 'downloaded window groups');
  }
  raiseLargestBtn.addEventListener('click', () => {
    const largest = filteredGroups()[0];
    if (!largest) return;
    const seedId = largest.primaryId || largest.members?.[0]?.id || null;
    raiseWindowGroupByIds(getRelatedWindowIds(seedId), seedId);
  });
  closeLargestBtn.addEventListener('click', () => {
    const largest = filteredGroups()[0];
    if (!largest) return;
    const seedId = largest.primaryId || largest.members?.[0]?.id || null;
    closeWindowGroupByIds(getRelatedWindowIds(seedId), {excludeIds: [id]});
    renderWindowGroups();
  });
  copyBtn.addEventListener('click', copyWindowGroups);
  downloadBtn.addEventListener('click', downloadWindowGroups);
  refreshBtn.addEventListener('click', renderWindowGroups);
  liveWindowRenderers.set(id, renderWindowGroups);
  syncWindowGroupsState();
  renderWindowGroups();
  notifyLiveWindowUpdated();
  return win;
}

// STATUS LOG WINDOW
// ═══════════════════════════════════════════════════════════════════════════════
function openStatusLogWindow(options = {}) {
  const {win, body, id} = createWindow({
    title:'Status Log',
    width: options.width || 560,
    height: options.height || 340,
    x: options.x,
    y: options.y,
    taskbarLabel:'Status Log'
  });
  body.style.cssText = 'display:flex;flex-direction:column;padding:12px;overflow:hidden;min-height:0';
  body.innerHTML = `
    <div class="status-log-toolbar">
      <div class="status-log-controls">
        <input class="status-log-filter" id="${id}-filter" type="text" placeholder="Filter status messages">
        <div class="status-log-scope" id="${id}-scope">
          <button class="btn-ghost" data-level="all">All</button>
          <button class="btn-ghost" data-level="ok">OK</button>
          <button class="btn-ghost" data-level="error">Errors</button>
        </div>
      </div>
      <div class="status-log-controls">
        <button class="btn-ghost" id="${id}-clear">Clear</button>
        <button class="btn-ghost" id="${id}-copy">Copy JSON</button>
        <button class="btn-ghost" id="${id}-download">Download JSON</button>
      </div>
    </div>
    <div class="status-log-meta" id="${id}-meta"></div>
    <div class="status-log-list" id="${id}-list"></div>
  `;
  const filterInput = body.querySelector(`#${id}-filter`);
  const scope = body.querySelector(`#${id}-scope`);
  const meta = body.querySelector(`#${id}-meta`);
  const list = body.querySelector(`#${id}-list`);
  const clearBtn = body.querySelector(`#${id}-clear`);
  const copyBtn = body.querySelector(`#${id}-copy`);
  const downloadBtn = body.querySelector(`#${id}-download`);
  let filterText = String(options.filterText || '');
  let level = ['all', 'ok', 'error'].includes(options.level) ? options.level : 'all';
  let sourceWindowId = options.sourceWindowId || null;

  function syncStatusLogWindowState() {
    const existingSourceWindowId = windowState.get(id)?.sourceWindowId || null;
    if (!sourceWindowId && existingSourceWindowId) sourceWindowId = existingSourceWindowId;
    upsertWindowState(id, {
      kind: 'status-log',
      filterText,
      level,
      sourceWindowId: sourceWindowId || null,
    });
  }

  function formatStatusTimestamp(value) {
    const date = new Date(value);
    if (Number.isNaN(date.getTime())) return String(value || '');
    return date.toLocaleString();
  }

  function filteredStatusEntries() {
    const text = filterText.trim().toLowerCase();
    return getStatusHistory().filter(entry => {
      if (level === 'ok' && !entry.ok) return false;
      if (level === 'error' && entry.ok) return false;
      if (!text) return true;
      const haystacks = [
        entry.message || '',
        entry.sourceTitle || '',
        entry.sourceKind || '',
      ];
      return haystacks.some(value => String(value).toLowerCase().includes(text));
    });
  }

  function isFilteredStatusView() {
    return !!filterText.trim() || level !== 'all';
  }

  function statusEntriesForExport() {
    return isFilteredStatusView() ? filteredStatusEntries() : getStatusHistory();
  }

  function syncScopeButtons() {
    scope.querySelectorAll('[data-level]').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.level === level);
    });
  }

  function renderStatusLog() {
    const filtered = filteredStatusEntries();
    const total = getStatusHistory().length;
    const entries = filtered.slice().reverse();
    const exportLabel = isFilteredStatusView() ? 'export targets current view' : 'export targets full history';
    meta.textContent = `${filtered.length} of ${total} entr${total === 1 ? 'y' : 'ies'} shown · ${exportLabel}`;
    filterInput.value = filterText;
    syncScopeButtons();
    copyBtn.textContent = isFilteredStatusView() ? 'Copy Visible JSON' : 'Copy JSON';
    downloadBtn.textContent = isFilteredStatusView() ? 'Download Visible JSON' : 'Download JSON';
    if (!entries.length) {
      list.innerHTML = `<div class="status-log-empty">${total ? 'No status entries match the current filter.' : 'No status entries yet.'}</div>`;
      return;
    }
    list.innerHTML = entries.map((entry, index) => {
      const sourceLabel = entry.sourceTitle || entry.sourceKind || 'Window';
      const sourceWindow = resolveStatusEntrySourceWindow(entry);
      const sourceHtml = (entry.sourceTitle || entry.sourceKind) ? `
            <div class="status-log-source">
              <span>Source</span>
              ${sourceWindow
                ? `<button type="button" class="status-log-source-badge status-log-source-button" data-source-entry-index="${index}">${escHtml(sourceLabel)}</button>`
                : `<span class="status-log-source-badge missing">${escHtml(sourceLabel)}</span><span class="status-log-source-note">Closed</span>`}
            </div>
          ` : '';
      return `
      <div class="status-log-entry ${entry.ok ? 'ok' : 'error'}">
        <div class="status-log-time">${escHtml(formatStatusTimestamp(entry.timestamp))}</div>
        <div class="status-log-message">
          ${sourceHtml}
          ${escHtml(entry.message)}${entry.count > 1 ? `<span class="status-log-count">×${entry.count}</span>` : ''}
        </div>
      </div>
    `;
    }).join('');
    list.querySelectorAll('[data-source-entry-index]').forEach(button => {
      button.addEventListener('click', e => {
        e.stopPropagation();
        const entryIndex = Number(button.dataset.sourceEntryIndex);
        const entry = entries[entryIndex];
        const sourceWindow = resolveStatusEntrySourceWindow(entry);
        if (!sourceWindow) {
          renderStatusLog();
          return;
        }
        revealWindow(sourceWindow);
      });
    });
  }

  async function copyStatusHistory() {
    try {
      await copyTextToClipboard(JSON.stringify(statusEntriesForExport(), null, 2));
      setStatus(true, isFilteredStatusView() ? 'copied visible status history' : 'copied status history');
    } catch (e) {
      setStatus(false, e.message);
    }
  }

  function downloadStatusHistory() {
    const stamp = new Date().toISOString().replace(/[:]/g, '-');
    downloadDataFile(`status-history-${stamp}.json`, JSON.stringify(statusEntriesForExport(), null, 2), 'application/json;charset=utf-8');
    setStatus(true, isFilteredStatusView() ? 'downloaded visible status history' : 'downloaded status history');
  }

  filterInput.addEventListener('input', () => {
    filterText = filterInput.value;
    syncStatusLogWindowState();
    renderStatusLog();
  });
  scope.querySelectorAll('[data-level]').forEach(btn => {
    btn.addEventListener('click', () => {
      level = btn.dataset.level || 'all';
      syncStatusLogWindowState();
      renderStatusLog();
    });
  });
  clearBtn.addEventListener('click', () => {
    clearStatusHistory();
    syncStatusLogWindowState();
    renderStatusLog();
  });
  copyBtn.addEventListener('click', copyStatusHistory);
  downloadBtn.addEventListener('click', downloadStatusHistory);
  liveWindowRenderers.set(id, renderStatusLog);
  syncStatusLogWindowState();
  renderStatusLog();
  return win;
}

// DEBUGGER WINDOW
// ═══════════════════════════════════════════════════════════════════════════════
function openDebugger(threadOrOop, threadName, options = {}) {
  const thread = (threadOrOop && typeof threadOrOop === 'object')
    ? threadOrOop
    : { oop: threadOrOop, printString: threadName || '', exceptionText: '', sourcePreview: '' };
  const threadOop = thread.oop;
  const threadLabel = thread.sourcePreview || thread.exceptionText || thread.printString || '';
  const {win, body, id} = createWindow({
    title: 'Debugger — ' + threadLabel.slice(0,40),
    width: options.width || 660,
    height: options.height || 600,
    x: options.x,
    y: options.y,
    taskbarLabel: 'Debugger'
  });
  const sessionChannel = `debugger:${id}`;
  const debuggerApi = (url, opts = {}) => api(url, {...opts, sessionChannel});
  const debuggerApiPost = (url, body = {}) => apiPost(url, body, {sessionChannel});
  let currentTab = options.currentTab === 'tls' ? 'tls' : 'stack';
  let currentFrameIdx = Number.isFinite(Number(options.frameIndex)) ? Math.max(0, Number(options.frameIndex)) : 0;
  let sourceWindowId = options.sourceWindowId || null;

  function syncDebuggerWindowState() {
    const existingSourceWindowId = windowState.get(id)?.sourceWindowId || null;
    if (!sourceWindowId && existingSourceWindowId) sourceWindowId = existingSourceWindowId;
    upsertWindowState(id, {
      kind: 'debugger',
      sessionChannel,
      threadOop,
      threadLabel,
      currentTab,
      frameIndex: currentFrameIdx,
      sourceWindowId: sourceWindowId || null,
    });
  }

  let frames = [];
  let currentFrameVars = [];

  body.innerHTML = `
    <div class="tab-strip">
      <div class="tab-item active" data-dtab="stack">Stack Trace</div>
      <div class="tab-item" data-dtab="tls">Thread Local Storage</div>
    </div>
    <div id="${id}-stack" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
      <div class="dbg-summary" id="${id}-summary">
        <div class="dbg-summary-source hidden" id="${id}-summary-source"></div>
        <div class="dbg-summary-error hidden" id="${id}-summary-error"></div>
      </div>
      <div class="dbg-frames-pane" id="${id}-frames">
        <span class="spinner" style="margin:8px"></span>
      </div>
      <div class="dbg-action-bar">
        <button class="btn-dbg" id="${id}-proceed">Proceed</button>
        <button class="btn-dbg" id="${id}-stepinto">Step into</button>
        <button class="btn-dbg" id="${id}-stepover">Step over</button>
        <button class="btn-dbg" id="${id}-trim">Trim stack</button>
      </div>
      <div class="dbg-source-pane" id="${id}-srcp">
        <div class="dbg-source-meta hidden" id="${id}-srcmeta"></div>
        <pre class="dbg-source-code" id="${id}-src" tabindex="-1"></pre>
        <div class="dbg-self-bar">
          <span class="dbg-self-label">self:</span>
          <span class="dbg-self-val" id="${id}-selfval"></span>
        </div>
        <div class="dbg-var-row">
          <select id="${id}-vars"><option value="">— variables —</option></select>
          <span class="dbg-var-val" id="${id}-varval"></span>
        </div>
      </div>
    </div>
    <div id="${id}-tls" style="display:none;flex:1;overflow-y:auto;padding:6px">
      <span class="spinner" id="${id}-tls-spin"></span>
      <ul class="dbg-tls-list" id="${id}-tls-list"></ul>
    </div>
  `;

  const summarySourceEl = body.querySelector(`#${id}-summary-source`);
  const summaryErrorEl = body.querySelector(`#${id}-summary-error`);
  const summaryEl = body.querySelector(`#${id}-summary`);
  if (thread.sourcePreview) {
    summarySourceEl.textContent = thread.sourcePreview;
    summarySourceEl.classList.remove('hidden');
  }
  if (thread.exceptionText) {
    summaryErrorEl.textContent = '⚑ ' + thread.exceptionText;
    summaryErrorEl.classList.remove('hidden');
  }
  if (!thread.sourcePreview && !thread.exceptionText) {
    summaryEl.classList.add('hidden');
  }

  function showDebuggerTab(name) {
    currentTab = name === 'tls' ? 'tls' : 'stack';
    body.querySelectorAll('.tab-item').forEach(t => t.classList.toggle('active', t.dataset.dtab === currentTab));
    body.querySelector(`#${id}-stack`).style.display = currentTab === 'stack' ? 'flex' : 'none';
    body.querySelector(`#${id}-tls`).style.display = currentTab === 'tls' ? 'block' : 'none';
    if (currentTab === 'tls') loadTLS();
    syncDebuggerWindowState();
  }

  body.querySelector('.tab-strip').addEventListener('click', e => {
    const tab = e.target.closest('.tab-item'); if (!tab) return;
    showDebuggerTab(tab.dataset.dtab);
  });

  body.querySelector(`#${id}-proceed`).addEventListener('click', async () => {
    try {
      await debuggerApiPost(`/debug/proceed/${threadOop}`, {});
      refreshHaltedThreadsBar();
      setStatus(true,'resumed');
      closeWindow(win, id);
    } catch(e){setStatus(false,e.message);}
  });
  body.querySelector(`#${id}-stepinto`).addEventListener('click', async () => {
    try {
      currentFrameIdx = 0;
      syncDebuggerWindowState();
      await debuggerApiPost(`/debug/step-into/${threadOop}`, {});
      loadFrames();
    } catch(e){setStatus(false,e.message);}
  });
  body.querySelector(`#${id}-stepover`).addEventListener('click', async () => {
    try { await debuggerApiPost(`/debug/step-over/${threadOop}`, {index:currentFrameIdx}); loadFrames(); } catch(e){setStatus(false,e.message);}
  });
  body.querySelector(`#${id}-trim`).addEventListener('click', async () => {
    try { await debuggerApiPost(`/debug/trim/${threadOop}`, {index:currentFrameIdx}); loadFrames(); } catch(e){setStatus(false,e.message);}
  });

  function renderDebuggerValue(container, ref, fallbackText='') {
    container.innerHTML = '';
    const text = ref?.inspection || fallbackText || '';
    if (ref?.oop != null && !isLeafBasetype(ref.basetype)) {
      const chip = makeChip(shortLabel(text, 48) || `oop:${ref.oop}`, ref.oop, id);
      chip.title = text || `oop:${ref.oop}`;
      container.appendChild(chip);
      return;
    }
    container.textContent = text;
    container.title = text;
  }

  body.querySelector(`#${id}-vars`).addEventListener('change', e => {
    const sel = e.target;
    const varvalEl = body.querySelector(`#${id}-varval`);
    if (!sel.value) {
      renderDebuggerValue(varvalEl, null, '');
      return;
    }
    const selectedVar = currentFrameVars.find(v => v.name === sel.value);
    renderDebuggerValue(varvalEl, selectedVar?.valueObject, selectedVar?.value || '');
  });

  async function loadFrames() {
    const framesEl = body.querySelector(`#${id}-frames`);
    framesEl.innerHTML = '<span class="spinner" style="margin:8px"></span>';
    try {
      const d = await debuggerApi(`/debug/frames/${threadOop}`);
      if (!d.success) throw new Error(d.exception);
      frames = d.frames;
      framesEl.innerHTML = '';
      frames.forEach(f => {
        const el = document.createElement('div'); el.className='dbg-frame-item';
        el.tabIndex = 0;
        // frame type icon: Smalltalk (gold) vs Ruby (red) detected from method name
        const isRuby = f.name.includes('(Ruby)') || f.name.startsWith('Ruby');
        const icon = document.createElement('span');
        icon.className = 'dbg-frame-icon' + (isRuby ? ' ruby' : '');
        icon.textContent = isRuby ? 'R' : 'S';
        el.appendChild(icon);
        el.appendChild(document.createTextNode(f.name));
        el.dataset.idx = f.index;
        el.addEventListener('click', () => selectFrame(f.index, el, true));
        el.addEventListener('keydown', event => {
          if (!frames.length) return;
          const currentPos = frames.findIndex(frame => frame.index === f.index);
          if (event.key === 'ArrowDown') {
            event.preventDefault();
            const nextPos = Math.min(frames.length - 1, currentPos + 1);
            const nextEl = framesEl.querySelector(`.dbg-frame-item[data-idx="${frames[nextPos]?.index}"]`);
            if (nextEl) selectFrame(frames[nextPos].index, nextEl, true);
            return;
          }
          if (event.key === 'ArrowUp') {
            event.preventDefault();
            const prevPos = Math.max(0, currentPos - 1);
            const prevEl = framesEl.querySelector(`.dbg-frame-item[data-idx="${frames[prevPos]?.index}"]`);
            if (prevEl) selectFrame(frames[prevPos].index, prevEl, true);
            return;
          }
          if (event.key === 'Home') {
            event.preventDefault();
            const firstEl = framesEl.querySelector(`.dbg-frame-item[data-idx="${frames[0]?.index}"]`);
            if (firstEl) selectFrame(frames[0].index, firstEl, true);
            return;
          }
          if (event.key === 'End') {
            event.preventDefault();
            const lastFrame = frames[frames.length - 1];
            const lastEl = framesEl.querySelector(`.dbg-frame-item[data-idx="${lastFrame?.index}"]`);
            if (lastEl && lastFrame) selectFrame(lastFrame.index, lastEl, true);
          }
        });
        framesEl.appendChild(el);
      });
      if (frames.length) {
        const targetFrame = frames.find(frame => frame.index === currentFrameIdx)
          || frames[Math.max(0, Math.min(frames.length - 1, currentFrameIdx))]
          || frames[0];
        const targetEl = framesEl.querySelector(`.dbg-frame-item[data-idx="${targetFrame.index}"]`);
        if (targetEl) selectFrame(targetFrame.index, targetEl, true);
      }
    } catch(e) { framesEl.innerHTML = `<p style="color:#f38ba8;padding:8px">${escHtml(e.message)}</p>`; }
  }

  function fallbackSourceText(frameData, idx) {
    return frameData.source || (idx === 0 ? (thread.sourcePreview || '') : '') || frameData.methodName || '(no source)';
  }

  function computeDebuggerLineNumber(sourceText, sourceOffset) {
    const offset = Number(sourceOffset || 0);
    if (!(offset > 0) || !sourceText) return 0;
    let line = 1;
    for (let i = 0; i < Math.min(offset - 1, sourceText.length); i += 1) {
      const ch = sourceText[i];
      if (ch === '\n') {
        line += 1;
      } else if (ch === '\r') {
        line += 1;
        if (sourceText[i + 1] === '\n') i += 1;
      }
    }
    return line;
  }

  function renderDebuggerSource(frameData, idx) {
    const srcEl = body.querySelector(`#${id}-src`);
    const srcMetaEl = body.querySelector(`#${id}-srcmeta`);
    const sourceText = fallbackSourceText(frameData, idx);
    const activeLine = Number(frameData.lineNumber || 0) || computeDebuggerLineNumber(sourceText, frameData.sourceOffset);
    const stepPoint = Number(frameData.stepPoint || 0);
    const sourceOffset = Number(frameData.sourceOffset || 0);
    const ipOffset = Number(frameData.ipOffset || 0);
    const metaBits = [];
    if (stepPoint > 0) metaBits.push(`Step ${stepPoint}`);
    if (activeLine > 0) metaBits.push(`Line ${activeLine}`);
    if (ipOffset > 0) metaBits.push(`PC ${ipOffset}`);
    if (sourceOffset > 0) metaBits.push(`Offset ${sourceOffset}`);
    srcMetaEl.textContent = metaBits.join(' • ');
    srcMetaEl.classList.toggle('hidden', !metaBits.length);

    const normalized = String(sourceText || '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');
    const lines = normalized ? normalized.split('\n') : ['(no source)'];
    srcEl.innerHTML = lines.map((line, lineIndex) => {
      const lineNumber = lineIndex + 1;
      const active = activeLine > 0 && lineNumber === activeLine ? ' active' : '';
      const text = line.length ? escHtml(line) : '&nbsp;';
      return `<span class="dbg-source-line${active}" data-line="${lineNumber}"><span class="dbg-source-lno">${lineNumber}</span><span class="dbg-source-text">${text}</span></span>`;
    }).join('');

    const activeLineEl = activeLine > 0 ? srcEl.querySelector(`.dbg-source-line[data-line="${activeLine}"]`) : null;
    if (activeLineEl) {
      activeLineEl.scrollIntoView({block: 'nearest'});
    } else {
      srcEl.scrollTop = 0;
    }
  }

  async function selectFrame(idx, el, focusEl=false) {
    currentFrameIdx = idx;
    syncDebuggerWindowState();
    body.querySelectorAll('.dbg-frame-item').forEach(e=>e.classList.remove('active'));
    if (el) {
      el.classList.add('active');
      el.scrollIntoView({ block: 'nearest' });
      if (focusEl) el.focus({ preventScroll: true });
    }
    const srcEl    = body.querySelector(`#${id}-src`);
    const srcMetaEl = body.querySelector(`#${id}-srcmeta`);
    const varsEl   = body.querySelector(`#${id}-vars`);
    const varvalEl = body.querySelector(`#${id}-varval`);
    const selfEl   = body.querySelector(`#${id}-selfval`);
    srcMetaEl.classList.add('hidden');
    srcMetaEl.textContent = '';
    srcEl.textContent = 'Loading…';
    varsEl.innerHTML = '<option value="">— variables —</option>';
    currentFrameVars = [];
    renderDebuggerValue(varvalEl, null, '');
    renderDebuggerValue(selfEl, null, '');
    try {
      const d = await debuggerApi(`/debug/frame/${threadOop}?index=${idx}`);
      if (!d.success) throw new Error(d.exception);
      renderDebuggerSource(d, idx);
      renderDebuggerValue(selfEl, d.selfObject, d.selfPrintString || '');
      currentFrameVars = Array.isArray(d.variables) ? d.variables : [];
      if (d.variables && d.variables.length) {
        d.variables.forEach(v => {
          const opt = document.createElement('option');
          opt.value = v.name; opt.textContent = v.name + ' = ' + String(v.value).slice(0,40);
          varsEl.appendChild(opt);
        });
      }
    } catch(e) {
      srcMetaEl.classList.add('hidden');
      srcEl.textContent = 'Error: ' + e.message;
    }
  }

  async function loadTLS() {
    const spin = body.querySelector(`#${id}-tls-spin`);
    const lst  = body.querySelector(`#${id}-tls-list`);
    spin.style.display='inline-block'; lst.innerHTML = '';
    try {
      const d = await debuggerApi(`/debug/thread-local/${threadOop}`);
      spin.style.display='none';
      if (!d.success) throw new Error(d.exception);
      if (!d.entries.length) { lst.innerHTML='<li style="color:#6c7086">(empty)</li>'; return; }
      d.entries.forEach(e => {
        const li = document.createElement('li');
        const keySpan = document.createElement('span'); keySpan.className = 'tls-key';
        const valSpan = document.createElement('span'); valSpan.className = 'tls-val';
        renderDebuggerValue(keySpan, e.keyObject, e.key || '');
        renderDebuggerValue(valSpan, e.valueObject, e.value || '');
        li.append(keySpan, valSpan);
        lst.appendChild(li);
      });
    } catch(e) { spin.style.display='none'; lst.innerHTML=`<li style="color:#f38ba8">${escHtml(e.message)}</li>`; }
  }

  syncDebuggerWindowState();
  showDebuggerTab(currentTab);
  loadFrames();
}

// ═══════════════════════════════════════════════════════════════════════════════
// SYMBOL LIST WINDOW
// ═══════════════════════════════════════════════════════════════════════════════
function openSymbolList(px, py, pw, ph) {
  const options = (px && typeof px === 'object' && !Array.isArray(px))
    ? px
    : {x: px, y: py, width: pw, height: ph};
  const {win, body, id} = createWindow({
    title:'Symbol List Browser',
    width: options.width || 480,
    height: options.height || 460,
    taskbarLabel:'Symbol List',
    x: options.x,
    y: options.y,
  });
  const sessionChannel = `symbol-list:${id}`;
  const symbolListApi = (url, opts = {}) => api(url, {...opts, sessionChannel});
  const symbolListApiPost = (url, body = {}) => apiPost(url, body, {sessionChannel});
  const symbolListApiTransaction = url => apiTransaction(url, {sessionChannel});

  let slUser=null, slDict=null, slKey=null, slKeyOop=null;

  function syncSymbolListWindowState() {
    upsertWindowState(id, {
      kind: 'symbol-list',
      sessionChannel,
      user: slUser || '',
      dictionary: slDict || '',
      key: slKey || '',
    });
  }

  syncSymbolListWindowState();

  body.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;padding:5px 8px;border-bottom:1px solid #313244;flex-shrink:0;background:#1e1e2e">
      <label style="font-size:11px;white-space:nowrap">Symbol List for</label>
      <select id="${id}-user" style="flex:1;background:#24273a;color:#cdd6f4;border:1px solid #45475a;border-radius:3px;padding:3px 6px;font-size:12px">
        <option>— loading —</option>
      </select>
    </div>
    <div class="sl-two-col" style="height:200px;border-bottom:1px solid #313244;flex-shrink:0">
      <div class="sl-col" style="width:200px;border-right:1px solid #313244">
        <div class="sl-col-header">
          <span class="sl-col-label">Dictionaries</span>
          <button class="sl-add-btn" id="${id}-add-dict">+</button>
        </div>
        <ul class="sl-list" id="${id}-dicts"></ul>
      </div>
      <div class="sl-col" style="flex:1">
        <div class="sl-col-header">
          <span class="sl-col-label">Entries</span>
          <button class="sl-add-btn" id="${id}-add-entry">+</button>
        </div>
        <ul class="sl-list" id="${id}-entries"></ul>
      </div>
    </div>
    <div class="sl-sel-row">
      <span class="sl-sel-label">Selection</span>
      <span class="sl-sel-val" id="${id}-selval"></span>
      <button class="btn-ghost hidden" id="${id}-inspect" style="margin-left:auto;font-size:10px">Inspect ›</button>
    </div>
    <div style="font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:#6c7086;padding:4px 8px 2px;background:#1e1e2e">Keys / Values</div>
    <div style="flex:1;overflow-y:auto">
      <table class="dbtable" style="width:100%">
        <thead><tr><th>Key</th><th>Value</th></tr></thead>
        <tbody id="${id}-kv"></tbody>
      </table>
    </div>
    <div class="sl-preview">
      <div style="font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:#6c7086;padding:4px 8px 2px;background:#1e1e2e">PrintString</div>
      <div class="sl-printstring" id="${id}-ps"></div>
    </div>
    <div class="txbar">
      <span>Transaction:</span>
      <button class="btn-tx" id="${id}-abort">Abort</button>
      <button class="btn-tx" id="${id}-commit">Commit</button>
    </div>
  `;

  body.querySelector(`#${id}-inspect`).addEventListener('click', () => {
    if (!slKeyOop) return;
    openLinkedObjectWindow({oop: slKeyOop, text: slKey||'object', sourceWinId: id});
  });
  body.querySelector(`#${id}-abort`).addEventListener('click', async () => {
    try { const d=await symbolListApiTransaction('/transaction/abort'); setStatus(d.success,d.success?'aborted':d.exception); if (d.success&&slUser) loadDicts(slUser); } catch(e){setStatus(false,e.message);}
  });
  body.querySelector(`#${id}-commit`).addEventListener('click', async () => {
    try { const d=await symbolListApiTransaction('/transaction/commit'); setStatus(d.success,d.success?'committed':d.exception); } catch(e){setStatus(false,e.message);}
  });
  body.querySelector(`#${id}-add-dict`).addEventListener('click', () => {
    if (!slUser){setStatus(false,'Select a user first');return;}
    openModal('Add Dictionary',[{label:'Name',id:'m-dn',type:'input',placeholder:'MyDictionary'}], async f => {
      const name=f['m-dn'].trim(); if(!name)return;
      const r=await symbolListApiPost('/symbol-list/add-dictionary',{user:slUser,name}); if(!r.success)throw new Error(r.exception);
      await loadDicts(slUser, name);
    });
  });
  body.querySelector(`#${id}-add-entry`).addEventListener('click', () => {
    if (!slUser||!slDict){setStatus(false,'Select a dictionary first');return;}
    openModal('Add Entry',[
      {label:'Key',id:'m-ek',type:'input',placeholder:'myKey'},
      {label:'Value (Smalltalk)',id:'m-ev',type:'textarea',placeholder:'nil'},
    ], async f => {
      const key=f['m-ek'].trim(); const val=f['m-ev'].trim()||'nil'; if(!key)return;
      const r=await symbolListApiPost('/symbol-list/add-entry',{user:slUser,dictionary:slDict,key,value:val}); if(!r.success)throw new Error(r.exception);
      await loadEntries(slUser,slDict,key);
    });
  });
  body.querySelector(`#${id}-user`).addEventListener('change', async () => {
    slUser=body.querySelector(`#${id}-user`).value; slDict=slKey=slKeyOop=null;
    body.querySelector(`#${id}-dicts`).innerHTML=''; body.querySelector(`#${id}-entries`).innerHTML=''; clearKV();
    syncSymbolListWindowState();
    if (slUser) await loadDicts(slUser);
  });

  async function loadUsers() {
    const sel=body.querySelector(`#${id}-user`);
    sel.innerHTML='<option>— loading —</option>';
    try {
      const d=await symbolListApi('/symbol-list/users'); if(!d.success)throw new Error(d.exception);
      sel.innerHTML='';
      for(const u of d.users){const o=document.createElement('option');o.value=o.textContent=u;sel.appendChild(o);}
      if(d.users.length){
        const pref='DataCurator';
        const preferredUser = options.user && d.users.includes(options.user) ? options.user : null;
        slUser = preferredUser || (d.users.includes(pref) ? pref : d.users[0]);
        sel.value=slUser;
        syncSymbolListWindowState();
        await loadDicts(slUser, options.dictionary || '', options.key || '');
      }
    } catch(e){sel.innerHTML=`<option>${escHtml(e.message)}</option>`;}
  }

  async function loadDicts(user, preferredDict='', preferredKey='') {
    const ul=body.querySelector(`#${id}-dicts`);
    ul.innerHTML='<li style="color:#6c7086;cursor:default"><span class="spinner"></span></li>';
    try {
      const d=await symbolListApi(`/symbol-list/dictionaries/${encodeURIComponent(user)}`); if(!d.success)throw new Error(d.exception);
      ul.innerHTML=''; let first=null;
      let preferred=null;
      for(const name of d.dictionaries){
        const li=makeDictItem(name);
        ul.appendChild(li);
        if(!first)first={li,name};
        if(preferredDict && name===preferredDict) preferred={li,name};
      }
      const selection = preferred || first;
      if(selection)selectDict(selection.name,selection.li,preferredKey);
    } catch(e){ul.innerHTML=`<li style="color:#f38ba8;cursor:default">${escHtml(e.message)}</li>`;}
  }

  function makeDictItem(name) {
    const li=document.createElement('li');
    const sp=document.createElement('span');sp.className='sl-name';sp.textContent=name;
    const del=document.createElement('button');del.className='sl-del';del.textContent='✕';
    del.addEventListener('click',async e=>{
      e.stopPropagation();
      const confirmed = await requestConfirmModal('Remove Dictionary', `Remove "${name}"?`, {okLabel:'Remove'});
      if(!confirmed)return;
      try{const r=await symbolListApiPost('/symbol-list/remove-dictionary',{user:slUser,name});if(!r.success)throw new Error(r.exception);li.remove();if(slDict===name){slDict=null;body.querySelector(`#${id}-entries`).innerHTML='';clearKV();syncSymbolListWindowState();}}
      catch(err){setStatus(false,'Error: '+err.message);}
    });
    li.append(sp,del);
    li.addEventListener('click',()=>selectDict(name,li));
    return li;
  }

  async function selectDict(name,liEl,preferredKey='') {
    slDict=name;slKey=slKeyOop=null;clearKV();
    body.querySelector(`#${id}-dicts`).querySelectorAll('li').forEach(l=>l.classList.remove('active'));
    liEl.classList.add('active');
    syncSymbolListWindowState();
    await loadEntries(slUser,name,preferredKey);
  }

  async function loadEntries(user,dict,preferredKey='') {
    const ul=body.querySelector(`#${id}-entries`);
    ul.innerHTML='<li style="color:#6c7086;cursor:default"><span class="spinner"></span></li>';
    try {
      const d=await symbolListApi(`/symbol-list/entries/${encodeURIComponent(user)}/${encodeURIComponent(dict)}`); if(!d.success)throw new Error(d.exception);
      ul.innerHTML='';
      const sorted=d.entries.slice().sort((a,b)=>a.localeCompare(b,undefined,{sensitivity:'base'}));
      let preferred=null;
      for(const key of sorted){
        const li=makeEntryItem(key);
        ul.appendChild(li);
        if(preferredKey && key===preferredKey) preferred={key, li};
      }
      if (preferred) await selectEntry(preferred.key, preferred.li);
    } catch(e){ul.innerHTML=`<li style="color:#f38ba8;cursor:default">${escHtml(e.message)}</li>`;}
  }

  function makeEntryItem(key) {
    const li=document.createElement('li');
    const sp=document.createElement('span');sp.className='sl-name';sp.textContent=key;
    const del=document.createElement('button');del.className='sl-del';del.textContent='✕';
    del.addEventListener('click',async e=>{
      e.stopPropagation();
      const confirmed = await requestConfirmModal('Remove Entry', `Remove "${key}"?`, {okLabel:'Remove'});
      if(!confirmed)return;
      try{const r=await symbolListApiPost('/symbol-list/remove-entry',{user:slUser,dictionary:slDict,key});if(!r.success)throw new Error(r.exception);li.remove();if(slKey===key){slKey=slKeyOop=null;clearKV();syncSymbolListWindowState();}}
      catch(err){setStatus(false,'Error: '+err.message);}
    });
    li.append(sp,del);
    li.addEventListener('click',()=>selectEntry(key,li));
    return li;
  }

  async function selectEntry(key,liEl) {
    slKey=key;slKeyOop=null;
    body.querySelector(`#${id}-entries`).querySelectorAll('li').forEach(l=>l.classList.remove('active'));
    liEl.classList.add('active');
    body.querySelector(`#${id}-selval`).textContent=key;
    body.querySelector(`#${id}-inspect`).classList.add('hidden');
    clearKV();
    syncSymbolListWindowState();
    const kv=body.querySelector(`#${id}-kv`);
    kv.innerHTML='<tr><td colspan="2" style="color:#6c7086"><span class="spinner"></span> Loading…</td></tr>';
    try {
      const d=await symbolListApi(`/symbol-list/preview/${encodeURIComponent(slUser)}/${encodeURIComponent(slDict)}/${encodeURIComponent(key)}`);
      if(!d.success)throw new Error(d.exception);
      slKeyOop=d.oop||null;
      syncSymbolListWindowState();
      if(slKeyOop)body.querySelector(`#${id}-inspect`).classList.remove('hidden');
      body.querySelector(`#${id}-ps`).textContent=d.inspection||'nil';
      kv.innerHTML='';
      const pairs=Object.values(d.instVars||{});
      if(!pairs.length){kv.innerHTML='<tr><td colspan="2" style="color:#6c7086;font-style:italic">(no entries)</td></tr>';return;}
      for(const [nv,vv] of pairs){
        const tr=document.createElement('tr');
        const tk=document.createElement('td');tk.className='col-key';tk.textContent=nv.inspection||'';
        const tv=document.createElement('td');tv.className='col-val';
        const isLeaf = isLeafBasetype(vv.basetype);
        if(!isLeaf&&vv.oop){
          const chip = makeChip(vv.inspection||`oop:${vv.oop}`, vv.oop, id);
          tv.appendChild(chip);
        } else{tv.textContent=vv.inspection||'nil';}
        tr.append(tk,tv);kv.appendChild(tr);
      }
      if(d.instVarsSize>pairs.length){const tr=document.createElement('tr');tr.innerHTML=`<td colspan="2" style="color:#6c7086;font-size:10px">${pairs.length} of ${d.instVarsSize}</td>`;kv.appendChild(tr);}
    } catch(e){kv.innerHTML=`<tr><td colspan="2" style="color:#f38ba8">${escHtml(e.message)}</td></tr>`;}
  }

  function clearKV() {
    body.querySelector(`#${id}-selval`).textContent='';
    body.querySelector(`#${id}-inspect`).classList.add('hidden');
    body.querySelector(`#${id}-kv`).innerHTML='';
    body.querySelector(`#${id}-ps`).textContent='';
  }

  loadUsers();
  return win;
}

function parseMethodReference(ref) {
  if (ref && typeof ref === 'object' && !Array.isArray(ref)) {
    let className = String(ref.className || '').trim();
    const selector = String(ref.selector || '').trim();
    const meta = !!ref.meta;
    if (!className || !selector) return null;
    return {
      className,
      selector,
      meta,
      dictionary: String(ref.dictionary || '').trim(),
      label: String(ref.label || `${meta ? `${className} class` : className}>>${selector}`).trim(),
    };
  }
  const split = String(ref || '').indexOf('>>');
  if (split < 0) return null;
  let className = String(ref).slice(0, split).trim();
  const selector = String(ref).slice(split + 2).trim();
  const meta = className.endsWith(' class');
  if (meta) className = className.slice(0, -6).trim();
  return className && selector ? {
    className,
    selector,
    meta,
    dictionary: '',
    label: String(ref).trim(),
  } : null;
}

function parseHierarchyEntry(entry) {
  if (entry && typeof entry === 'object' && !Array.isArray(entry)) {
    return {
      className: String(entry.className || '').trim(),
      dictionary: String(entry.dictionary || '').trim(),
    };
  }
  return {
    className: String(entry || '').trim(),
    dictionary: '',
  };
}

function buildUnifiedLineDiff(leftText, rightText, {leftLabel = 'Selected', rightLabel = 'Current'} = {}) {
  const leftLines = String(leftText || '').split('\n');
  const rightLines = String(rightText || '').split('\n');
  const leftSize = leftLines.length;
  const rightSize = rightLines.length;
  const lcs = Array.from({length: leftSize + 1}, () => Array(rightSize + 1).fill(0));

  for (let li = leftSize - 1; li >= 0; li -= 1) {
    for (let ri = rightSize - 1; ri >= 0; ri -= 1) {
      lcs[li][ri] = leftLines[li] === rightLines[ri]
        ? lcs[li + 1][ri + 1] + 1
        : Math.max(lcs[li + 1][ri], lcs[li][ri + 1]);
    }
  }

  const rows = [];
  let li = 0;
  let ri = 0;
  while (li < leftSize && ri < rightSize) {
    if (leftLines[li] === rightLines[ri]) {
      rows.push(`  ${leftLines[li]}`);
      li += 1;
      ri += 1;
      continue;
    }
    if (lcs[li + 1][ri] >= lcs[li][ri + 1]) {
      rows.push(`- ${leftLines[li]}`);
      li += 1;
      continue;
    }
    rows.push(`+ ${rightLines[ri]}`);
    ri += 1;
  }
  while (li < leftSize) {
    rows.push(`- ${leftLines[li]}`);
    li += 1;
  }
  while (ri < rightSize) {
    rows.push(`+ ${rightLines[ri]}`);
    ri += 1;
  }

  const changed = rows.some(row => row.startsWith('- ') || row.startsWith('+ '));
  return [
    `--- ${leftLabel}`,
    `+++ ${rightLabel}`,
    changed ? null : '(no differences)',
    ...rows,
  ].filter(line => line !== null).join('\n');
}

function setupQueryWindowList({listEl, filterInput, items, labelForItem, onSelectItem, onOpenItem, onActivateItem, defaultIndex = 0}) {
  let currentItem = items[defaultIndex] || items[0] || null;
  const activateItem = typeof onActivateItem === 'function' ? onActivateItem : onOpenItem;

  function visibleItems() {
    const filterText = String(filterInput?.value || '').trim().toLowerCase();
    if (!filterText) return items.slice();
    return items.filter(item => String(labelForItem(item) || '').toLowerCase().includes(filterText));
  }

  function updateSelection(focusList = false) {
    let activeRow = null;
    listEl.querySelectorAll('.qv-item').forEach(row => {
      const isActive = row.dataset.itemKey === String(items.indexOf(currentItem));
      row.classList.toggle('active', isActive);
      if (isActive) activeRow = row;
    });
    if (activeRow) {
      activeRow.scrollIntoView({block: 'nearest'});
      if (focusList) listEl.focus({preventScroll: true});
    } else if (focusList) {
      listEl.focus({preventScroll: true});
    }
    onSelectItem(currentItem, activeRow);
  }

  function render() {
    const visible = visibleItems();
    if (currentItem && !visible.includes(currentItem)) {
      currentItem = visible[0] || null;
    }
    listEl.innerHTML = '';
    if (!items.length) {
      listEl.innerHTML = '<div class="cb-empty">(empty)</div>';
      onSelectItem(null, null);
      return;
    }
    if (!visible.length) {
      listEl.innerHTML = '<div class="cb-empty">(no matches)</div>';
      onSelectItem(null, null);
      return;
    }
    visible.forEach(item => {
      const row = document.createElement('div');
      row.className = 'qv-item';
      row.dataset.itemKey = String(items.indexOf(item));
      row.textContent = labelForItem(item);
      row.title = row.textContent;
      row.addEventListener('click', () => {
        currentItem = item;
        updateSelection();
      });
      row.addEventListener('dblclick', () => {
        currentItem = item;
        updateSelection();
        onOpenItem?.(item);
      });
      listEl.appendChild(row);
    });
    updateSelection();
  }

  function selectRelative(delta) {
    const visible = visibleItems();
    if (!visible.length) return;
    let currentIndex = visible.indexOf(currentItem);
    if (currentIndex < 0) currentIndex = delta >= 0 ? -1 : visible.length;
    currentItem = visible[Math.max(0, Math.min(visible.length - 1, currentIndex + delta))];
    updateSelection(true);
  }

  function selectBoundary(boundary) {
    const visible = visibleItems();
    if (!visible.length) return;
    currentItem = boundary === 'last' ? visible[visible.length - 1] : visible[0];
    updateSelection(true);
  }

  filterInput?.addEventListener('input', render);
  filterInput?.addEventListener('keydown', event => {
    if (event.key === 'Escape' && filterInput.value) {
      event.preventDefault();
      filterInput.value = '';
      render();
      return;
    }
    if (event.key === 'ArrowDown') {
      event.preventDefault();
      selectRelative(1);
      return;
    }
    if (event.key === 'ArrowUp') {
      event.preventDefault();
      selectRelative(-1);
      return;
    }
    if (event.key === 'Home') {
      event.preventDefault();
      selectBoundary('first');
      return;
    }
    if (event.key === 'End') {
      event.preventDefault();
      selectBoundary('last');
      return;
    }
    if (event.key === 'Enter' && currentItem) {
      event.preventDefault();
      activateItem?.(currentItem);
    }
  });

  listEl.tabIndex = 0;
  listEl.addEventListener('keydown', event => {
    if (event.key === 'ArrowDown') {
      event.preventDefault();
      selectRelative(1);
      return;
    }
    if (event.key === 'ArrowUp') {
      event.preventDefault();
      selectRelative(-1);
      return;
    }
    if (event.key === 'Home') {
      event.preventDefault();
      selectBoundary('first');
      return;
    }
    if (event.key === 'End') {
      event.preventDefault();
      selectBoundary('last');
      return;
    }
    if (event.key === 'Enter' && currentItem) {
      event.preventDefault();
      activateItem?.(currentItem);
    }
  });

  render();
  return {
    getCurrentItem: () => currentItem,
    refresh: render,
  };
}

function openMethodQueryWindow(title, results, options = {}) {
  let sourceWindowId = options.sourceWindowId || null;
  function helperSessionChannel() {
    return options.sessionChannel || windowState.get(sourceWindowId || '')?.sessionChannel || '';
  }
  const queryApiWithParams = (url, params = {}) => apiWithParams(url, params, {sessionChannel: helperSessionChannel()});
  const queryApiPost = (url, body = {}) => apiPost(url, body, {sessionChannel: helperSessionChannel()});
  const canLoadResult = typeof options.onLoadResult === 'function' || !!sourceWindowId;
  const {body, id} = createWindow({
    title,
    width: options.width || 760,
    height: options.height || 520,
    x: options.x,
    y: options.y,
    taskbarLabel:'Method Query'
  });
  body.innerHTML = `
    <div class="qv-wrap">
      <div class="qv-side">
        <div class="qv-filter-wrap"><input class="qv-filter" placeholder="Filter results"></div>
        <div class="qv-list"></div>
      </div>
      <div class="qv-main">
        <div class="qv-toolbar">
          <span class="qv-title">Select a result</span>
          ${canLoadResult ? `<button class="btn-ghost" id="qv-load" disabled>${escHtml(options.loadLabel || 'Load Into Browser')}</button>` : ''}
          <button class="btn-ghost" id="qv-open" disabled>Open In Browser</button>
          <button class="btn-ghost" id="qv-inspect" disabled>Inspect Method</button>
        </div>
        <textarea class="qv-preview" readonly></textarea>
      </div>
    </div>
  `;

  const listEl = body.querySelector('.qv-list');
  const filterInput = body.querySelector('.qv-filter');
  const titleEl = body.querySelector('.qv-title');
  const previewEl = body.querySelector('.qv-preview');
  const loadBtn = body.querySelector('#qv-load');
  const openBtn = body.querySelector('#qv-open');
  const inspectBtn = body.querySelector('#qv-inspect');
  filterInput.value = options.filterText || '';
  let currentRef = null;

  function trackOpenedBrowser(nextBrowser) {
    if (!nextBrowser?.id) return nextBrowser;
    sourceWindowId = nextBrowser.id;
    syncMethodQueryWindowState();
    return nextBrowser;
  }

  function syncMethodQueryWindowState() {
    const existingSourceWindowId = windowState.get(id)?.sourceWindowId || null;
    if (existingSourceWindowId) sourceWindowId = existingSourceWindowId;
    upsertWindowState(id, {
      kind: 'method-query',
      title,
      results,
      filterText: filterInput?.value || '',
      selectedIndex: Math.max(0, results.indexOf(currentRef)),
      loadLabel: options.loadLabel || 'Load Into Browser',
      sourceWindowId: sourceWindowId || null,
      sessionChannel: helperSessionChannel(),
    });
  }

  async function selectRef(ref, row) {
    currentRef = ref;
    listEl.querySelectorAll('.qv-item').forEach(el => el.classList.remove('active'));
    row?.classList.add('active');
    if (!ref) {
      titleEl.textContent = 'Select a result';
      previewEl.value = '';
      if (loadBtn) loadBtn.disabled = true;
      openBtn.disabled = true;
      inspectBtn.disabled = true;
      syncMethodQueryWindowState();
      return;
    }
    const parsed = parseMethodReference(ref);
    if (!parsed) {
      titleEl.textContent = ref;
      previewEl.value = ref;
      if (loadBtn) loadBtn.disabled = true;
      openBtn.disabled = true;
      inspectBtn.disabled = true;
      syncMethodQueryWindowState();
      return;
    }
    if (loadBtn) loadBtn.disabled = false;
    openBtn.disabled = false;
    inspectBtn.disabled = false;
    titleEl.textContent = parsed.meta ? `${parsed.className} class >> ${parsed.selector}` : `${parsed.className} >> ${parsed.selector}`;
    previewEl.value = 'Loading…';
    try {
      const params = {
        class: parsed.className,
        selector: parsed.selector,
        meta: parsed.meta ? 1 : 0,
      };
      if (parsed.dictionary) params.dictionary = parsed.dictionary;
      const d = await queryApiWithParams('/class-browser/source', params);
      if (!d.success) throw new Error(d.exception);
      previewEl.value = d.source || '';
    } catch (e) {
      previewEl.value = 'Error: ' + e.message;
    } finally {
      syncMethodQueryWindowState();
    }
  }

  async function inspectCurrentRef(ref = currentRef) {
    const parsed = parseMethodReference(ref);
    if (!parsed) return;
    const d = await queryApiPost('/class-browser/inspect-target', {
      mode: 'method',
      dictionary: parsed.dictionary || '',
      className: parsed.className,
      selector: parsed.selector,
      meta: parsed.meta,
    });
    if (!d.success) throw new Error(d.exception || 'Inspection failed');
    openLinkedObjectWindow({
      oop: d.oop,
      text: d.label || parsed.label || ref,
      sourceWinId: id,
    });
  }

  loadBtn?.addEventListener('click', async () => {
    const parsed = parseMethodReference(currentRef);
    if (!parsed) return;
    loadBtn.disabled = true;
    openBtn.disabled = true;
    try {
      sourceWindowId = windowState.get(id)?.sourceWindowId || sourceWindowId;
      const target = await resolveClassBrowserRuntime(sourceWindowId, {
        dictionary: parsed.dictionary || null,
        className: parsed.className,
        method: parsed.selector,
        meta: parsed.meta,
      });
      sourceWindowId = target.sourceWindowId || sourceWindowId;
      syncMethodQueryWindowState();
      if (typeof target.runtime?.loadMethodReference !== 'function') {
        throw new Error('Source browser is no longer available');
      }
      await target.runtime.loadMethodReference(parsed, currentRef);
    } catch (e) {
      setStatus(false, e.message);
    } finally {
      const stillParsed = parseMethodReference(currentRef);
      if (stillParsed) {
        loadBtn.disabled = false;
        openBtn.disabled = false;
        inspectBtn.disabled = false;
      }
    }
  });

  openBtn.addEventListener('click', () => {
    const parsed = parseMethodReference(currentRef);
    if (!parsed) return;
    trackOpenedBrowser(openClassBrowser({
      dictionary: parsed.dictionary || null,
      className: parsed.className,
      method: parsed.selector,
      meta: parsed.meta,
      }));
  });

  inspectBtn.addEventListener('click', async () => {
    if (!currentRef) return;
    inspectBtn.disabled = true;
    try {
      await inspectCurrentRef(currentRef);
    } catch (e) {
      setStatus(false, e.message);
    } finally {
      if (parseMethodReference(currentRef)) {
        inspectBtn.disabled = false;
      }
    }
  });

  setupQueryWindowList({
    listEl,
    filterInput,
    items: results,
    labelForItem(item) {
      const parsed = parseMethodReference(item);
      return parsed?.label || String(item || '');
    },
    onSelectItem: selectRef,
    onOpenItem(item) {
      const parsed = parseMethodReference(item);
      if (!parsed) return;
      trackOpenedBrowser(openClassBrowser({
        dictionary: parsed.dictionary || null,
        className: parsed.className,
        method: parsed.selector,
        meta: parsed.meta,
        sourceWindowId: id,
      }));
    },
    onActivateItem(item) {
      if (loadBtn && !loadBtn.disabled) {
        loadBtn.click();
        return;
      }
      const parsed = parseMethodReference(item);
      if (!parsed) return;
      trackOpenedBrowser(openClassBrowser({
        dictionary: parsed.dictionary || null,
        className: parsed.className,
        method: parsed.selector,
        meta: parsed.meta,
        sourceWindowId: id,
      }));
    },
    defaultIndex: sanitizeSelectionIndex(options.selectedIndex, results),
  });
  filterInput.addEventListener('input', syncMethodQueryWindowState);
  syncMethodQueryWindowState();
}

  const listEl = body.querySelector('.qv-list');
  const filterInput = body.querySelector('.qv-filter');
  const titleEl = body.querySelector('.qv-title');
  const previewEl = body.querySelector('.qv-preview');
  const loadBtn = body.querySelector('#qv-load-version');
  const openBtn = body.querySelector('#qv-open-version');
  const compareBtn = body.querySelector('#qv-compare-version');
  const inspectBtn = body.querySelector('#qv-inspect-version');
  filterInput.value = options.filterText || '';
  let currentVersion = null;

  function trackOpenedBrowser(nextBrowser) {
    if (!nextBrowser?.id) return nextBrowser;
    sourceWindowId = nextBrowser.id;
    syncVersionsWindowState();
    return nextBrowser;
  }

  function syncVersionsWindowState() {
    const existingSourceWindowId = windowState.get(id)?.sourceWindowId || null;
    if (existingSourceWindowId) sourceWindowId = existingSourceWindowId;
    upsertWindowState(id, {
      kind: 'versions',
      title,
      versions,
      filterText: filterInput?.value || '',
      selectedIndex: Math.max(0, versions.indexOf(currentVersion)),
      loadLabel: options.loadLabel || 'Load Into Browser',
      versionContext: options.versionContext || null,
      sourceWindowId: sourceWindowId || null,
      sessionChannel: options.sessionChannel || windowState.get(sourceWindowId || '')?.sessionChannel || '',
    });
  }

  function selectVersion(version, row) {
    currentVersion = version || null;
    listEl.querySelectorAll('.qv-item').forEach(el => el.classList.remove('active'));
    row?.classList.add('active');
    titleEl.textContent = version?.label || 'Select a version';
    previewEl.value = version?.source || '';
    if (loadBtn) loadBtn.disabled = !currentVersion;
    if (openBtn) openBtn.disabled = !currentVersion;
    if (compareBtn) compareBtn.disabled = !currentVersion;
    if (inspectBtn) inspectBtn.disabled = !Number.isFinite(Number(currentVersion?.methodOop));
    syncVersionsWindowState();
  }

  async function openCurrentVersionInBrowser(version = currentVersion) {
    if (!version || !canOpenVersionBrowser) return;
    const nextBrowser = trackOpenedBrowser(openClassBrowser({
      dictionary: options.versionContext?.dictionary || null,
      className: options.versionContext?.className || null,
      method: options.versionContext?.method || null,
      meta: !!options.versionContext?.meta,
      sourceWindowId: id,
    }));
    const runtime = getClassBrowserRuntime(nextBrowser?.id || null);
    if (runtime) {
      await Promise.resolve(runtime.ready);
      runtime.loadVersion(version, options.versionContext || {});
    }
  }

  async function compareCurrentVersion(version = currentVersion) {
    if (!version || !canCompareVersion) return;
    sourceWindowId = windowState.get(id)?.sourceWindowId || sourceWindowId;
    const target = await resolveClassBrowserRuntime(sourceWindowId, {
      dictionary: options.versionContext?.dictionary || null,
      className: options.versionContext?.className || null,
      method: options.versionContext?.method || null,
      meta: !!options.versionContext?.meta,
      sourceWindowId: id,
    });
    sourceWindowId = target.sourceWindowId || sourceWindowId;
    syncVersionsWindowState();
    const snapshot = typeof target.runtime?.snapshot === 'function' ? target.runtime.snapshot() : null;
    if (!snapshot) throw new Error('Source browser is no longer available');
    const leftLabel = version.label || 'Selected version';
    const rightLabel = snapshot.sourceNote || 'Current browser';
    titleEl.textContent = `${leftLabel} vs current`;
    previewEl.value = buildUnifiedLineDiff(version.source || '', snapshot.source || '', {leftLabel, rightLabel});
  }

  loadBtn?.addEventListener('click', async () => {
    if (!currentVersion) return;
    try {
      sourceWindowId = windowState.get(id)?.sourceWindowId || sourceWindowId;
      const target = await resolveClassBrowserRuntime(sourceWindowId, {
        dictionary: options.versionContext?.dictionary || null,
        className: options.versionContext?.className || null,
        method: options.versionContext?.method || null,
        meta: !!options.versionContext?.meta,
      });
      sourceWindowId = target.sourceWindowId || sourceWindowId;
      syncVersionsWindowState();
      if (typeof target.runtime?.loadVersion !== 'function') {
        throw new Error('Source browser is no longer available');
      }
      target.runtime.loadVersion(currentVersion, options.versionContext || {});
    } catch (e) {
      setStatus(false, e.message);
    }
  });

  openBtn?.addEventListener('click', async () => {
    try {
      await openCurrentVersionInBrowser(currentVersion);
    } catch (e) {
      setStatus(false, e.message);
    }
  });

  compareBtn?.addEventListener('click', async () => {
    try {
      await compareCurrentVersion(currentVersion);
    } catch (e) {
      setStatus(false, e.message);
    }
  });

  inspectBtn?.addEventListener('click', () => {
    const versionOop = Number(currentVersion?.methodOop);
    if (!Number.isFinite(versionOop) || versionOop <= 0) return;
    openLinkedObjectWindow({
      oop: versionOop,
      text: currentVersion?.label || options.versionContext?.method || 'CompiledMethod',
      sourceWinId: id,
      arrowLabel: 'inspect',
    });
  });

  setupQueryWindowList({
    listEl,
    filterInput,
    items: versions,
    labelForItem(item) {
      return item?.label || '';
    },
    onSelectItem: selectVersion,
    async onOpenItem(item) {
      if (!item) return;
      await openCurrentVersionInBrowser(item);
    },
    onActivateItem(item) {
      if (loadBtn && !loadBtn.disabled) {
        loadBtn.click();
        return;
      }
      if (!item) return;
      openCurrentVersionInBrowser(item).catch(e => setStatus(false, e.message));
    },
    defaultIndex: sanitizeSelectionIndex(options.selectedIndex, versions),
  });
  filterInput.addEventListener('input', syncVersionsWindowState);
  syncVersionsWindowState();
}

  const els = {

  function clampPaneWidths(widths) {
    const next = Array.isArray(widths) ? widths.slice(0, 4) : [];
    while (next.length < 4) next.push(defaultPaneWidths[next.length]);
    return next.map((width, index) => {
      const numeric = Number(width);
      return Number.isFinite(numeric) ? Math.max(paneMinWidths[index], Math.round(numeric)) : defaultPaneWidths[index];
    });
  }

  function loadStoredPaneWidths() {
    try {
      const raw = localStorage.getItem(paneWidthStorageKey);
      if (!raw) return [...defaultPaneWidths];
      return clampPaneWidths(JSON.parse(raw));
    } catch (_) {
      return [...defaultPaneWidths];
    }
  }

  function applyPaneWidths() {
    paneWidths = clampPaneWidths(paneWidths);
    paneWidths.forEach((width, index) => {
      els.lists.style.setProperty(`--cb-col-${index + 1}`, `${width}px`);

  function persistPaneWidths() {
    try {
      localStorage.setItem(paneWidthStorageKey, JSON.stringify(paneWidths));
    } catch (_) {
      // ignore storage failures
    }
  }

  function initPaneSplitters() {
    body.querySelectorAll('.cb-splitter').forEach((splitter, index) => {
      splitter.addEventListener('pointerdown', event => {
        event.preventDefault();
        const startX = event.clientX;
        const leftIndex = index;
        const rightIndex = index + 1;
        const startLeft = paneWidths[leftIndex];
        const startRight = paneWidths[rightIndex];
        const total = startLeft + startRight;
        splitter.classList.add('is-active');
        document.body.style.userSelect = 'none';

        const onMove = moveEvent => {
          const delta = moveEvent.clientX - startX;
          const minLeft = paneMinWidths[leftIndex];
          const minRight = paneMinWidths[rightIndex];
          const nextLeft = Math.min(total - minRight, Math.max(minLeft, startLeft + delta));
          paneWidths[leftIndex] = Math.round(nextLeft);
          paneWidths[rightIndex] = Math.round(total - nextLeft);
          applyPaneWidths();
        };
        const onUp = () => {
          window.removeEventListener('pointermove', onMove);
          window.removeEventListener('pointerup', onUp);
          window.removeEventListener('pointercancel', onUp);
          document.body.style.userSelect = '';
          splitter.classList.remove('is-active');
          persistPaneWidths();
        };

        window.addEventListener('pointermove', onMove);
        window.addEventListener('pointerup', onUp);
        window.addEventListener('pointercancel', onUp);
      });
    });
  }

  function normalizeFilterText(value) {
    return String(value || '').trim().toLowerCase();
  }

  function ensureFilterShowsValue(filterInput, value) {
    if (!filterInput || !value) return;
    const filterText = normalizeFilterText(filterInput.value);
    if (filterText && !String(value).toLowerCase().includes(filterText)) {
      filterInput.value = '';
    }
  }

  function initListFilters() {
    Object.entries(listStates).forEach(([key, state]) => {
      state.container.dataset.listKey = key;
      state.filterInput.dataset.listKey = key;
      state.container.addEventListener('focus', () => { activePaneKey = key; });
      state.container.addEventListener('mousedown', () => { activePaneKey = key; });
      state.container.addEventListener('click', () => {
        activePaneKey = key;
        state.container.focus({preventScroll: true});
      });
      state.filterInput?.addEventListener('focus', () => { activePaneKey = key; });
      state.filterInput?.addEventListener('input', () => {
        renderList(state.container, state.items, state.active, state.onSelect);
      });
      state.filterInput?.addEventListener('keydown', event => {
        if (event.key !== 'Escape') return;
        if (!state.filterInput.value) return;
        event.preventDefault();
        state.filterInput.value = '';
        renderList(state.container, state.items, state.active, state.onSelect);
      });
    });
  }

  function visibleItemsForState(state) {
    const filterText = state ? normalizeFilterText(state.filterInput?.value) : '';
    const items = Array.isArray(state?.items) ? state.items.slice() : [];
    return filterText
      ? items.filter(item => String(item).toLowerCase().includes(filterText))
      : items;
  }

  function focusPaneList(key) {
    const state = listStates[key];
    if (!state) return false;
    activePaneKey = key;
    state.container.focus({preventScroll: true});
    return true;
  }

  function movePaneFocus(fromKey, delta) {
    const currentIndex = Math.max(0, paneOrder.indexOf(fromKey));
    const nextIndex = Math.max(0, Math.min(paneOrder.length - 1, currentIndex + delta));
    return focusPaneList(paneOrder[nextIndex]);
  }

  function activatePaneItem(key, item) {
    const state = listStates[key];
    if (!state?.onSelect || !item) return false;
    activePaneKey = key;
    state.onSelect(item);
    state.container.focus({preventScroll: true});
    return true;
  }

  function activateCurrentPaneItem(key) {
    const state = listStates[key];
    const visibleItems = visibleItemsForState(state);
    if (!visibleItems.length) return false;
    const activeItem = visibleItems.includes(state.active) ? state.active : visibleItems[0];
    return activatePaneItem(key, activeItem);
  }

  function selectRelativePaneItem(key, delta) {
    const state = listStates[key];
    const visibleItems = visibleItemsForState(state);
    if (!visibleItems.length) return false;
    let currentIndex = visibleItems.indexOf(state?.active);
    if (currentIndex < 0) currentIndex = delta >= 0 ? -1 : visibleItems.length;
    const nextIndex = Math.max(0, Math.min(visibleItems.length - 1, currentIndex + delta));
    return activatePaneItem(key, visibleItems[nextIndex]);
  }

  function selectBoundaryPaneItem(key, boundary) {
    const state = listStates[key];
    const visibleItems = visibleItemsForState(state);
    if (!visibleItems.length) return false;
    return activatePaneItem(key, boundary === 'last' ? visibleItems[visibleItems.length - 1] : visibleItems[0]);
  }

  function handleClassBrowserKeydown(event) {
    if (!win.classList.contains('focused')) return;
    if (document.getElementById('modal-overlay')?.classList.contains('visible')) return;
    if (!win.contains(event.target)) return;

    const key = event.key || '';
    const lowerKey = key.toLowerCase();
    const target = event.target;
    const isFilter = target instanceof HTMLInputElement && target.classList.contains('cb-filter');
    const isList = target instanceof HTMLElement && target.classList.contains('cb-list');
    const isSource = target === els.source;
    const isSelect = target instanceof HTMLSelectElement;
    const isButton = target instanceof HTMLButtonElement;
    const targetPaneKey = (isFilter || isList) ? String(target.dataset.listKey || activePaneKey || '') : activePaneKey;

    if ((event.metaKey || event.ctrlKey) && !event.altKey && lowerKey === 's') {
      event.preventDefault();
      if (els.compile.disabled) {
        setBrowserStatus(els.compile.title || 'Compile unavailable', 'error');
        return;
      }
      compileSource();
      return;
    }
    if ((event.metaKey || event.ctrlKey) && !event.altKey && key === 'Enter' && isSource) {
      event.preventDefault();
      if (els.compile.disabled) {
        setBrowserStatus(els.compile.title || 'Compile unavailable', 'error');
        return;
      }
      compileSource();
      return;
    }

    if (isSource || isSelect || isButton) return;
    if (!(isFilter || isList)) return;

    if (key === 'ArrowUp') {
      event.preventDefault();
      selectRelativePaneItem(targetPaneKey, -1);
      return;
    }
    if (key === 'ArrowDown') {
      event.preventDefault();
      selectRelativePaneItem(targetPaneKey, 1);
      return;
    }
    if (key === 'Home') {
      event.preventDefault();
      selectBoundaryPaneItem(targetPaneKey, 'first');
      return;
    }
    if (key === 'End') {
      event.preventDefault();
      selectBoundaryPaneItem(targetPaneKey, 'last');
      return;
    }
    if (isList && key === 'ArrowLeft') {
      event.preventDefault();
      movePaneFocus(targetPaneKey, -1);
      return;
    }
    if (isList && key === 'ArrowRight') {
      event.preventDefault();
      movePaneFocus(targetPaneKey, 1);
      return;
    }
    if (key === 'Enter') {
      event.preventDefault();
      activateCurrentPaneItem(targetPaneKey);
    }
  }

  async function fetchBrowserCached(name, keyParts, loader) {
    const cacheKey = `${name}:${JSON.stringify(keyParts || {})}`;
    const existing = browserCache.get(cacheKey);
    if (existing) {
      if (Object.prototype.hasOwnProperty.call(existing, 'value')) return existing.value;
      return existing.promise;
    }
    const promise = Promise.resolve()
      .then(loader)
      .then(value => {
        browserCache.set(cacheKey, {value});
        return value;
      })
      .catch(error => {
        if (browserCache.get(cacheKey)?.promise === promise) browserCache.delete(cacheKey);
        throw error;
      });
    browserCache.set(cacheKey, {promise});
    return promise;
  }

  function renderList(container, items, active, onSelect) {
    const state = listStateByContainer.get(container) || null;
    const allItems = Array.isArray(items) ? items.slice() : [];
    if (state) {
      state.items = allItems;
      state.active = active;
      state.onSelect = onSelect;
    }
    const filterText = state ? normalizeFilterText(state.filterInput.value) : '';
    const visibleItems = filterText
      ? allItems.filter(item => String(item).toLowerCase().includes(filterText))
      : allItems;
    container.innerHTML = '';
    if (!allItems.length) {
      container.innerHTML = '<div class="cb-empty">(empty)</div>';
      return;
    }
    if (!visibleItems.length) {
      container.innerHTML = '<div class="cb-empty">(no matches)</div>';
      return;
    }
    let activeRow = null;
    visibleItems.forEach(item => {
      const row = document.createElement('div');
      row.className = 'cb-item' + (item === active ? ' active' : '');
      row.textContent = item;
      row.title = item;
      row.addEventListener('click', () => onSelect(item));
      container.appendChild(row);
      if (item === active) activeRow = row;
    });
    if (activeRow) {
      requestAnimationFrame(() => activeRow.scrollIntoView({block: 'nearest'}));
    }
  }

  async function locateAndSelectClass(className, methodName = null, meta = currentMeta, dictionary = null) {
    const nextMeta = !!meta;
    let nextDict = dictionary || '';
    if (!nextDict) {
      const d = await fetchBrowserCached('class-location', {class: className}, () => browserApiWithParams('/class-browser/class-location', {class: className}));
      if (!d.success) throw new Error(d.exception);
      const matches = Array.isArray(d.matches) ? d.matches : (d.dictionary ? [{className, dictionary: d.dictionary}] : []);
      if (!matches.length) throw new Error(`Class not found: ${className}`);
      if (matches.length === 1) {
        nextDict = matches[0].dictionary;
      } else {
        const chosen = await chooseClassMatch(className, matches);
        if (!chosen) return false;
        nextDict = chosen.dictionary;
      }
    }
    currentMeta = nextMeta;
    els.meta.checked = currentMeta;
    currentDict = nextDict;
    currentClass = className;
    currentProtocol = '-- all --';
    currentMethod = methodName;
    ensureFilterShowsValue(els.dictFilter, currentDict);
    ensureFilterShowsValue(els.classFilter, currentClass);
    ensureFilterShowsValue(els.methodFilter, currentMethod);
    await loadDictionaries();
    return true;
  }

  function downloadTextFile(filename, text) {
    window.__lastDownloadedFile = {
      filename: String(filename || ''),
      text: String(text || ''),
    };
    const blob = new Blob([text], {type: 'text/plain;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = String(filename || 'export.st').replace(/[\\/:*?"<>|]+/g, '-');
    document.body.appendChild(link);
    link.click();
    link.remove();
    setTimeout(() => URL.revokeObjectURL(url), 0);
  }

  function parseDefinitionVariableNames(source, fieldName) {
    const match = String(source || '').match(new RegExp(`${fieldName}:\\s*'([^']*)'`));
    if (!match) return [];
    return String(match[1] || '').trim().split(/\s+/).filter(Boolean);
  }

  async function fetchClassVariableEntries() {

    if (!d.success) throw new Error(d.exception || 'Unable to load class definition');
    const source = d.source || '';
    return [
      ...parseDefinitionVariableNames(source, 'instanceVariableNames').map(name => ({
        key: `instance:${name}`,
        kind: 'instance',
        name,
        label: `Instance — ${name}`,
      })),
      ...parseDefinitionVariableNames(source, 'classVariableNames').map(name => ({
        key: `class:${name}`,
        kind: 'class',
        name,
        label: `Class — ${name}`,
      })),
      ...parseDefinitionVariableNames(source, 'classInstanceVariableNames').map(name => ({
        key: `classInstance:${name}`,
        kind: 'classInstance',
        name,
        label: `Class Instance — ${name}`,
      })),
