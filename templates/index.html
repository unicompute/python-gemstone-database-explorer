<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GemStone Database Explorer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      background: #1e1e2e;
      color: #cdd6f4;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── top bar ─────────────────────────────────────────────────────── */
    #topbar {
      background: #181825;
      border-bottom: 1px solid #313244;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    #topbar h1 { font-size: 14px; font-weight: 600; color: #cba6f7; }
    #topbar .sep { flex: 1; }
    #status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #a6e3a1; display: inline-block;
    }
    #status-dot.error { background: #f38ba8; }
    #status-txt { font-size: 11px; color: #a6adc8; }

    /* ── main layout ─────────────────────────────────────────────────── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── sidebar ─────────────────────────────────────────────────────── */
    #sidebar {
      width: 260px;
      min-width: 160px;
      max-width: 420px;
      background: #181825;
      border-right: 1px solid #313244;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      resize: horizontal;
    }
    #sidebar h2 {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #a6adc8;
      padding: 8px 12px 4px;
    }
    #roots-list { list-style: none; overflow-y: auto; flex: 1; }
    #roots-list li {
      padding: 5px 12px;
      cursor: pointer;
      border-left: 3px solid transparent;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #roots-list li:hover { background: #313244; }
    #roots-list li.active { border-left-color: #cba6f7; color: #cba6f7; }

    /* ── content area ────────────────────────────────────────────────── */
    #content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── object pane ─────────────────────────────────────────────────── */
    #object-pane {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
    }

    .obj-card {
      background: #181825;
      border: 1px solid #313244;
      border-radius: 6px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .obj-card-header {
      background: #24273a;
      padding: 6px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .obj-card-header .oop { color: #6c7086; font-size: 11px; margin-left: auto; }
    .obj-card-header .basetype {
      background: #313244;
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 10px;
      color: #a6adc8;
    }
    .obj-card-header .inspection {
      font-family: monospace;
      color: #89dceb;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 500px;
    }
    .obj-card-body { padding: 8px 12px; }

    table.inst-vars { border-collapse: collapse; width: 100%; }
    table.inst-vars th {
      text-align: left;
      font-size: 11px;
      color: #a6adc8;
      padding: 2px 8px 4px 0;
      border-bottom: 1px solid #313244;
    }
    table.inst-vars td {
      padding: 3px 8px 3px 0;
      vertical-align: top;
      border-bottom: 1px solid #1e1e2e;
    }
    table.inst-vars td:first-child { color: #f38ba8; font-family: monospace; min-width: 120px; }
    table.inst-vars td:last-child { font-family: monospace; color: #a6e3a1; }
    .link-oop { color: #89b4fa; text-decoration: none; cursor: pointer; }
    .link-oop:hover { text-decoration: underline; }

    /* ── eval panel ──────────────────────────────────────────────────── */
    #eval-panel {
      border-top: 1px solid #313244;
      background: #181825;
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex-shrink: 0;
    }
    #eval-panel label { font-size: 11px; color: #a6adc8; }
    #eval-code {
      font-family: monospace;
      font-size: 12px;
      background: #1e1e2e;
      color: #cdd6f4;
      border: 1px solid #313244;
      border-radius: 4px;
      padding: 6px 8px;
      resize: vertical;
      min-height: 60px;
    }
    #eval-controls { display: flex; align-items: center; gap: 8px; }
    #eval-controls select {
      background: #313244;
      color: #cdd6f4;
      border: 1px solid #45475a;
      border-radius: 4px;
      padding: 3px 6px;
    }
    button.btn {
      background: #cba6f7;
      color: #1e1e2e;
      border: none;
      border-radius: 4px;
      padding: 4px 12px;
      font-weight: 600;
      cursor: pointer;
      font-size: 12px;
    }
    button.btn:hover { background: #b4befe; }
    button.btn-ghost {
      background: transparent;
      border: 1px solid #45475a;
      color: #cdd6f4;
      border-radius: 4px;
      padding: 3px 10px;
      cursor: pointer;
      font-size: 12px;
    }
    button.btn-ghost:hover { background: #313244; }
    #eval-result {
      font-family: monospace;
      font-size: 11px;
      color: #a6e3a1;
      max-height: 80px;
      overflow-y: auto;
    }
    #eval-result.error { color: #f38ba8; }

    /* ── breadcrumb ──────────────────────────────────────────────────── */
    #breadcrumb {
      padding: 6px 16px;
      font-size: 11px;
      color: #6c7086;
      border-bottom: 1px solid #313244;
      display: flex;
      gap: 4px;
      align-items: center;
      flex-wrap: wrap;
    }
    #breadcrumb span { cursor: pointer; }
    #breadcrumb span:hover { color: #89b4fa; }
    #breadcrumb .sep { color: #45475a; }

    /* ── spinner ─────────────────────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #45475a;
      border-top-color: #cba6f7;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── transaction bar ─────────────────────────────────────────────── */
    #txbar {
      background: #181825;
      border-top: 1px solid #313244;
      padding: 4px 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }
    #txbar span { font-size: 11px; color: #a6adc8; }

    /* ── nav tabs ────────────────────────────────────────────────────── */
    #nav-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid #313244;
      background: #181825;
      flex-shrink: 0;
    }
    .nav-tab {
      padding: 6px 16px;
      font-size: 12px;
      font-weight: 500;
      color: #a6adc8;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    .nav-tab:hover { color: #cdd6f4; }
    .nav-tab.active { color: #cba6f7; border-bottom-color: #cba6f7; }

    /* ── symbol list browser ─────────────────────────────────────────── */
    #sl-user-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 12px;
      border-bottom: 1px solid #313244;
      flex-shrink: 0;
      background: #1e1e2e;
    }
    #sl-user-row label { font-size: 13px; color: #cdd6f4; white-space: nowrap; }
    #sl-user-select {
      flex: 1;
      background: #24273a;
      color: #cdd6f4;
      border: 1px solid #45475a;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 13px;
    }

    .sl-section-label {
      font-size: 13px;
      color: #cdd6f4;
      padding: 5px 12px 3px;
      flex-shrink: 0;
      background: #1e1e2e;
    }

    #sl-dict-entries-row {
      display: flex;
      height: 260px;
      flex-shrink: 0;
      border-bottom: 1px solid #313244;
    }
    #sl-dicts-col {
      display: flex;
      flex-direction: column;
      width: 200px;
      min-width: 120px;
      border-right: 1px solid #313244;
      overflow: hidden;
      flex-shrink: 0;
    }
    #sl-dicts-col-header {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 2px 6px;
      background: #181825;
      border-bottom: 1px solid #313244;
      flex-shrink: 0;
    }
    #sl-entries-col {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }
    #sl-entries-col-header {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 2px 6px;
      background: #181825;
      border-bottom: 1px solid #313244;
      flex-shrink: 0;
    }

    .sl-list {
      list-style: none;
      overflow-y: auto;
      flex: 1;
    }
    .sl-list li {
      padding: 4px 12px;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
    }
    .sl-list li:hover { background: #2a2a3e; }
    .sl-list li.active { background: #3a3a5a; color: #cdd6f4; }
    .sl-list li .sl-del-btn {
      background: none;
      border: none;
      color: #6c7086;
      cursor: pointer;
      font-size: 13px;
      padding: 0;
      flex-shrink: 0;
      display: none;
    }
    .sl-list li:hover .sl-del-btn { display: inline; }
    .sl-list li .sl-del-btn:hover { color: #f38ba8; }
    .sl-add-btn {
      background: none;
      border: none;
      color: #a6adc8;
      font-size: 15px;
      cursor: pointer;
      line-height: 1;
      padding: 0 3px;
    }
    .sl-add-btn:hover { color: #cba6f7; }

    #sl-selection-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 5px 12px;
      border-bottom: 1px solid #313244;
      flex-shrink: 0;
      background: #1e1e2e;
    }
    #sl-selection-row .sl-sel-label { font-size: 13px; color: #cdd6f4; }
    #sl-selection-val {
      font-size: 13px;
      color: #cdd6f4;
      background: #24273a;
      border-radius: 4px;
      padding: 3px 10px;
      min-width: 80px;
    }

    #sl-kv-section {
      flex-shrink: 0;
      max-height: 220px;
      display: flex;
      flex-direction: column;
      border-bottom: 1px solid #313244;
    }
    #sl-kv-table-wrap {
      overflow-y: auto;
      flex: 1;
    }
    table#sl-kv-table {
      border-collapse: collapse;
      width: 100%;
    }
    table#sl-kv-table th {
      text-align: left;
      font-size: 12px;
      color: #a6adc8;
      padding: 4px 12px;
      background: #181825;
      border-bottom: 1px solid #313244;
      position: sticky; top: 0;
    }
    table#sl-kv-table td {
      padding: 3px 12px;
      font-size: 13px;
      font-family: monospace;
      border-bottom: 1px solid #1e1e2e;
    }
    table#sl-kv-table td:first-child { color: #cdd6f4; }
    table#sl-kv-table td:last-child  { color: #cdd6f4; }

    #sl-printstring-section {
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      border-bottom: 1px solid #313244;
    }
    #sl-printstring-box {
      font-family: monospace;
      font-size: 13px;
      color: #cdd6f4;
      background: #24273a;
      margin: 0 12px 8px;
      padding: 8px 10px;
      border: 1px solid #313244;
      border-radius: 4px;
      min-height: 52px;
      word-break: break-all;
      white-space: pre-wrap;
    }

    /* ── modal dialog ────────────────────────────────────────────────── */
    #modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.visible { display: flex; }
    #modal-box {
      background: #24273a;
      border: 1px solid #45475a;
      border-radius: 8px;
      padding: 20px 24px;
      min-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #modal-box h2 { font-size: 13px; font-weight: 600; color: #cba6f7; }
    #modal-box label { font-size: 11px; color: #a6adc8; }
    #modal-box input, #modal-box textarea {
      font-family: monospace;
      font-size: 12px;
      background: #1e1e2e;
      color: #cdd6f4;
      border: 1px solid #45475a;
      border-radius: 4px;
      padding: 5px 8px;
      width: 100%;
    }
    #modal-box textarea { resize: vertical; min-height: 60px; }
    #modal-footer { display: flex; gap: 8px; justify-content: flex-end; }
  </style>
</head>
<body>

<div id="topbar">
  <h1>GemStone Database Explorer</h1>
  <div class="sep"></div>
  <span id="status-dot"></span>
  <span id="status-txt">connecting…</span>
</div>

<div id="main">
  <div id="sidebar" style="display:none">
    <h2>Roots</h2>
    <ul id="roots-list"></ul>
  </div>

  <div id="content">
    <div id="nav-tabs">
      <div class="nav-tab" data-tab="object">Object Browser</div>
      <div class="nav-tab active" data-tab="symlist">Symbol List</div>
    </div>

    <!-- Object Browser tab -->
    <div id="object-tab" style="display:none;flex-direction:column;flex:1;overflow:hidden">
      <div id="breadcrumb"></div>
      <div id="object-pane"><p style="color:#6c7086;padding:20px">Select a root object to begin.</p></div>
      <div id="eval-panel">
        <label>Evaluate in context of current object</label>
        <textarea id="eval-code" placeholder="nil printString"></textarea>
        <div id="eval-controls">
          <select id="eval-lang">
            <option value="smalltalk">Smalltalk</option>
          </select>
          <button class="btn" id="eval-btn">Evaluate</button>
          <span id="eval-result"></span>
        </div>
      </div>
      <div id="txbar">
        <span>Transaction:</span>
        <button class="btn-ghost" id="tx-commit-btn">Commit</button>
        <button class="btn-ghost" id="tx-abort-btn">Abort</button>
      </div>
    </div>

    <!-- Symbol List Browser tab -->
    <div id="symlist-tab" style="display:flex;flex-direction:column;flex:1;overflow-y:auto;overflow-x:hidden">

      <!-- "Symbol List for [dropdown]" -->
      <div id="sl-user-row">
        <label>Symbol List for</label>
        <select id="sl-user-select"><option value="">— loading —</option></select>
      </div>

      <!-- Dictionaries label -->
      <div class="sl-section-label">Dictionaries</div>

      <!-- Two-column: dict list | entries list -->
      <div id="sl-dict-entries-row">
        <div id="sl-dicts-col">
          <div id="sl-dicts-col-header">
            <button class="sl-add-btn" id="sl-add-dict-btn" title="Add dictionary">+</button>
          </div>
          <ul class="sl-list" id="sl-dicts"></ul>
        </div>
        <div id="sl-entries-col">
          <div id="sl-entries-col-header">
            <button class="sl-add-btn" id="sl-add-entry-btn" title="Add entry">+</button>
          </div>
          <ul class="sl-list" id="sl-entries"></ul>
        </div>
      </div>

      <!-- Selection row -->
      <div id="sl-selection-row">
        <span class="sl-sel-label">Selection</span>
        <span id="sl-selection-val"></span>
      </div>

      <!-- Keys / Values section -->
      <div class="sl-section-label">Keys / Values</div>
      <div id="sl-kv-section">
        <div id="sl-kv-table-wrap">
          <table id="sl-kv-table">
            <thead><tr><th>Key / Index</th><th>Value</th></tr></thead>
            <tbody id="sl-kv-tbody"></tbody>
          </table>
        </div>
      </div>

      <!-- PrintString section -->
      <div class="sl-section-label">PrintString</div>
      <div id="sl-printstring-section">
        <div id="sl-printstring-box"></div>
      </div>

      <!-- Transaction bar -->
      <div class="txbar" style="background:#181825;padding:4px 12px;display:flex;gap:8px;align-items:center;flex-shrink:0;border-top:1px solid #313244">
        <span style="font-size:11px;color:#a6adc8">Transaction:</span>
        <button class="btn-ghost" id="sl-commit-btn">Commit</button>
        <button class="btn-ghost" id="sl-abort-btn">Abort</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div id="modal-overlay">
  <div id="modal-box">
    <h2 id="modal-title">Add</h2>
    <div id="modal-fields"></div>
    <div id="modal-footer">
      <button class="btn-ghost" id="modal-cancel">Cancel</button>
      <button class="btn" id="modal-ok">OK</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ── state ────────────────────────────────────────────────────────────────────
let roots = {};           // { label: oop }
let currentOop = null;
let history = [];         // [{label, oop}]

// ── DOM helpers ───────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const statusDot = $('status-dot');
const statusTxt = $('status-txt');
const rootsList = $('roots-list');
const objectPane = $('object-pane');
const breadcrumb = $('breadcrumb');
const evalCode = $('eval-code');
const evalLang = $('eval-lang');
const evalBtn = $('eval-btn');
const evalResult = $('eval-result');

function setStatus(ok, msg) {
  statusDot.className = ok ? '' : 'error';
  statusTxt.textContent = msg;
}

// ── API calls ─────────────────────────────────────────────────────────────────
async function api(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

// ── init ──────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const data = await api('/ids');
    roots = {
      'UserGlobals (Persistent Root)': data.persistentRootId,
      'Globals': data.globalsId,
      'System': data.gemStoneSystemId,
    };
    setStatus(true, 'connected');
    renderRoots();
  } catch (e) {
    setStatus(false, 'connection failed: ' + e.message);
  }
}

function renderRoots() {
  rootsList.innerHTML = '';
  for (const [label, oop] of Object.entries(roots)) {
    const li = document.createElement('li');
    li.textContent = label;
    li.dataset.oop = oop;
    li.addEventListener('click', () => {
      history = [{label, oop}];
      loadObject(oop, label);
    });
    rootsList.appendChild(li);
  }
}

// ── object loading ────────────────────────────────────────────────────────────
async function loadObject(oop, label) {
  currentOop = oop;
  updateActiveRoot(oop);
  renderBreadcrumb();

  objectPane.innerHTML = '<span class="spinner"></span> Loading…';
  try {
    const data = await api(`/object/index/${oop}?depth=2`);
    if (!data.success) throw new Error(data.exception || 'unknown error');
    renderObject(data.result);
  } catch (e) {
    objectPane.innerHTML = `<p style="color:#f38ba8;padding:16px">Error: ${escHtml(e.message)}</p>`;
  }
}

function updateActiveRoot(oop) {
  for (const li of rootsList.querySelectorAll('li')) {
    li.classList.toggle('active', parseInt(li.dataset.oop) === oop);
  }
}

function renderBreadcrumb() {
  breadcrumb.innerHTML = '';
  history.forEach((item, i) => {
    if (i > 0) {
      const sep = document.createElement('span');
      sep.className = 'sep';
      sep.textContent = '›';
      breadcrumb.appendChild(sep);
    }
    const span = document.createElement('span');
    span.textContent = item.label || `#${item.oop}`;
    if (i < history.length - 1) {
      span.addEventListener('click', () => {
        history = history.slice(0, i + 1);
        loadObject(item.oop, item.label);
      });
    }
    breadcrumb.appendChild(span);
  });
}

// Build a navigable link or plain text cell for a value view
function makeValueCell(valView, labelForHistory) {
  const td = document.createElement('td');
  if (!valView) { td.textContent = 'nil'; return td; }

  const isLeaf = ['string','symbol','fixnum','float','boolean','nilclass'].includes(valView.basetype);
  const text = valView.inspection || (valView.oop != null ? `oop:${valView.oop}` : 'nil');

  if (!isLeaf && valView.oop != null) {
    const a = document.createElement('a');
    a.className = 'link-oop';
    a.textContent = text;
    a.addEventListener('click', () => {
      history.push({label: labelForHistory || text, oop: valView.oop});
      loadObject(valView.oop, labelForHistory || text);
    });
    td.appendChild(a);
  } else {
    td.textContent = text;
    td.style.color = '#a6e3a1';
  }
  return td;
}

function renderObject(obj) {
  const div = document.createElement('div');

  // ── header card ──────────────────────────────────────────────────────────
  const card = document.createElement('div');
  card.className = 'obj-card';

  const hdr = document.createElement('div');
  hdr.className = 'obj-card-header';

  const bt = document.createElement('span');
  bt.className = 'basetype';
  bt.textContent = obj.basetype || 'object';

  const ins = document.createElement('span');
  ins.className = 'inspection';
  ins.textContent = obj.inspection || '';

  const oopSpan = document.createElement('span');
  oopSpan.className = 'oop';
  oopSpan.textContent = `oop: ${obj.oop}`;

  hdr.appendChild(bt);
  hdr.appendChild(ins);
  hdr.appendChild(oopSpan);
  card.appendChild(hdr);

  // ── entries table ────────────────────────────────────────────────────────
  const entries = obj.instVars || {};
  const entryCount = Object.keys(entries).length;
  const isDictLike = ['hash'].includes(obj.basetype);
  const isArrayLike = ['array'].includes(obj.basetype);

  if (obj.loaded && entryCount > 0) {
    const body = document.createElement('div');
    body.className = 'obj-card-body';

    const tbl = document.createElement('table');
    tbl.className = 'inst-vars';

    // Choose column headers based on collection type
    if (isDictLike) {
      tbl.innerHTML = '<thead><tr><th>Key</th><th>Value</th></tr></thead>';
    } else if (isArrayLike) {
      tbl.innerHTML = '<thead><tr><th>#</th><th>Value</th></tr></thead>';
    } else {
      tbl.innerHTML = '<thead><tr><th>Variable</th><th>Value</th></tr></thead>';
    }

    const tbody = document.createElement('tbody');

    for (const [idx, pair] of Object.entries(entries)) {
      const [nameOrKeyView, valView] = pair;
      const tr = document.createElement('tr');

      // Key / name cell
      const tdKey = document.createElement('td');
      const keyText = nameOrKeyView.inspection || `@${idx}`;
      // Dict keys that are navigable objects get a link too
      if (isDictLike && nameOrKeyView.oop != null && !['string','symbol','fixnum','float','boolean','nilclass'].includes(nameOrKeyView.basetype)) {
        const a = document.createElement('a');
        a.className = 'link-oop';
        a.textContent = keyText;
        a.addEventListener('click', () => {
          history.push({label: keyText, oop: nameOrKeyView.oop});
          loadObject(nameOrKeyView.oop, keyText);
        });
        tdKey.appendChild(a);
      } else {
        tdKey.textContent = keyText;
      }

      // Value cell
      const tdVal = makeValueCell(valView, keyText);

      tr.appendChild(tdKey);
      tr.appendChild(tdVal);
      tbody.appendChild(tr);
    }

    tbl.appendChild(tbody);

    // Show count if there are more entries than displayed
    if (obj.instVarsSize > entryCount) {
      const more = document.createElement('div');
      more.style.cssText = 'padding:4px 0;font-size:11px;color:#6c7086';
      more.textContent = `Showing ${entryCount} of ${obj.instVarsSize} entries`;
      body.appendChild(tbl);
      body.appendChild(more);
    } else {
      body.appendChild(tbl);
    }

    card.appendChild(body);
  } else if (obj.loaded) {
    const body = document.createElement('div');
    body.className = 'obj-card-body';
    body.style.color = '#6c7086';
    body.textContent = '(no entries)';
    card.appendChild(body);
  }

  div.appendChild(card);

  // ── class link ───────────────────────────────────────────────────────────
  if (obj.classObject && obj.classObject.oop) {
    const classDiv = document.createElement('div');
    classDiv.style.cssText = 'margin-left:16px;margin-top:6px;font-size:11px';

    const classLbl = document.createElement('span');
    classLbl.style.color = '#a6adc8';
    classLbl.textContent = 'Class: ';
    classDiv.appendChild(classLbl);

    const a = document.createElement('a');
    a.className = 'link-oop';
    a.textContent = obj.classObject.inspection || `oop:${obj.classObject.oop}`;
    a.addEventListener('click', () => {
      const label = obj.classObject.inspection || 'class';
      history.push({label, oop: obj.classObject.oop});
      loadObject(obj.classObject.oop, label);
    });
    classDiv.appendChild(a);
    div.appendChild(classDiv);
  }

  objectPane.innerHTML = '';
  objectPane.appendChild(div);
}

// ── evaluation ────────────────────────────────────────────────────────────────
evalBtn.addEventListener('click', async () => {
  if (!currentOop) return;
  const code = evalCode.value.trim();
  if (!code) return;

  evalResult.textContent = '';
  evalResult.className = '';
  const spinner = document.createElement('span');
  spinner.className = 'spinner';
  evalResult.appendChild(spinner);

  try {
    const lang = evalLang.value;
    const url = `/object/evaluate/${currentOop}?code=${encodeURIComponent(code)}&language=${lang}&depth=2`;
    const data = await api(url);
    evalResult.innerHTML = '';
    if (!data.success) {
      evalResult.className = 'error';
      evalResult.textContent = 'Error: ' + (data.exception || 'unknown');
      return;
    }
    const [isExc, resView] = data.result;
    if (isExc) {
      evalResult.className = 'error';
      evalResult.textContent = 'Exception: ' + (resView.inspection || 'unknown');
    } else {
      evalResult.textContent = resView.inspection || 'nil';
      // navigate into result
      if (resView.oop) {
        history.push({label: resView.inspection || 'result', oop: resView.oop});
        loadObject(resView.oop, resView.inspection || 'result');
      }
    }
  } catch (e) {
    evalResult.innerHTML = '';
    evalResult.className = 'error';
    evalResult.textContent = 'Error: ' + e.message;
  }
});

// ── transaction ───────────────────────────────────────────────────────────────
$('tx-commit-btn').addEventListener('click', async () => {
  try {
    const d = await api('/transaction/commit');
    setStatus(d.success, d.success ? 'committed' : ('commit failed: ' + d.exception));
  } catch (e) {
    setStatus(false, 'commit failed: ' + e.message);
  }
});

$('tx-abort-btn').addEventListener('click', async () => {
  try {
    const d = await api('/transaction/abort');
    setStatus(d.success, d.success ? 'aborted' : ('abort failed: ' + d.exception));
    if (d.success && currentOop) loadObject(currentOop, history[history.length - 1]?.label);
  } catch (e) {
    setStatus(false, 'abort failed: ' + e.message);
  }
});

// ── utils ─────────────────────────────────────────────────────────────────────
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── start ─────────────────────────────────────────────────────────────────────
async function startup() {
  await init();
  await slLoadUsers();
}
startup();

// ── tab switching ─────────────────────────────────────────────────────────────
document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const name = tab.dataset.tab;
    $('object-tab').style.display = name === 'object' ? 'flex' : 'none';
    $('symlist-tab').style.display = name === 'symlist' ? 'flex' : 'none';
    $('sidebar').style.display = name === 'object' ? 'flex' : 'none';
  });
});

// ── symbol list state ─────────────────────────────────────────────────────────
let slUser = null;
let slDict = null;
let slKey  = null;

// ── symbol list API helpers ───────────────────────────────────────────────────
async function slApi(url, opts) {
  const r = await fetch(url, opts);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function slPost(url, body) {
  return slApi(url, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body),
  });
}

function slSetStatus(msg, isErr) {
  setStatus(!isErr, msg);
}

// ── load users into dropdown ──────────────────────────────────────────────────
async function slLoadUsers() {
  const sel = $('sl-user-select');
  sel.innerHTML = '<option value="">— loading —</option>';
  try {
    const d = await slApi('/symbol-list/users');
    if (!d.success) throw new Error(d.exception);
    sel.innerHTML = '';
    for (const u of d.users) {
      const opt = document.createElement('option');
      opt.value = u;
      opt.textContent = u;
      sel.appendChild(opt);
    }
    if (d.users.length > 0) {
      const preferred = 'DataCurator';
      slUser = d.users.includes(preferred) ? preferred : d.users[0];
      sel.value = slUser;
      await slLoadDicts(slUser);
    }
  } catch (e) {
    sel.innerHTML = `<option value="">${escHtml(e.message)}</option>`;
  }
}

$('sl-user-select').addEventListener('change', async () => {
  slUser = $('sl-user-select').value;
  slDict = null;
  slKey = null;
  $('sl-dicts').innerHTML = '';
  $('sl-entries').innerHTML = '';
  slClearKV();
  if (slUser) await slLoadDicts(slUser);
});

// ── load dicts ────────────────────────────────────────────────────────────────
async function slLoadDicts(user) {
  const ul = $('sl-dicts');
  ul.innerHTML = '<li style="color:#6c7086;cursor:default"><span class="spinner"></span></li>';
  try {
    const d = await slApi(`/symbol-list/dictionaries/${encodeURIComponent(user)}`);
    if (!d.success) throw new Error(d.exception);
    ul.innerHTML = '';
    let firstLi = null;
    for (const name of d.dictionaries) {
      const li = slDictItem(name);
      ul.appendChild(li);
      if (!firstLi) firstLi = {li, name};
    }
    // Auto-select first dictionary so entries column is populated immediately
    if (firstLi) slSelectDict(firstLi.name, firstLi.li);
  } catch (e) {
    ul.innerHTML = `<li style="color:#f38ba8;cursor:default">${escHtml(e.message)}</li>`;
  }
}

function slDictItem(name) {
  const li = document.createElement('li');
  const nameSpan = document.createElement('span');
  nameSpan.textContent = name;
  nameSpan.style.cssText = 'overflow:hidden;text-overflow:ellipsis;flex:1';
  li.appendChild(nameSpan);

  const delBtn = document.createElement('button');
  delBtn.className = 'sl-del-btn';
  delBtn.title = 'Remove dictionary';
  delBtn.textContent = '✕';
  delBtn.addEventListener('click', async e => {
    e.stopPropagation();
    if (!confirm(`Remove dictionary "${name}"?`)) return;
    try {
      const r = await slPost('/symbol-list/remove-dictionary', {user: slUser, name});
      if (!r.success) throw new Error(r.exception);
      li.remove();
      if (slDict === name) { slDict = null; $('sl-entries').innerHTML = ''; slClearKV(); }
    } catch (err) { slSetStatus('Error: ' + err.message, true); }
  });
  li.appendChild(delBtn);
  li.addEventListener('click', () => slSelectDict(name, li));
  return li;
}

// ── select dict ───────────────────────────────────────────────────────────────
async function slSelectDict(name, liEl) {
  slDict = name;
  slKey = null;
  slClearKV();
  document.querySelectorAll('#sl-dicts li').forEach(l => l.classList.remove('active'));
  liEl.classList.add('active');
  await slLoadEntries(slUser, name);
}

// ── load entries ──────────────────────────────────────────────────────────────
async function slLoadEntries(user, dict) {
  const ul = $('sl-entries');
  ul.innerHTML = '<li style="color:#6c7086;cursor:default"><span class="spinner"></span></li>';
  try {
    const d = await slApi(`/symbol-list/entries/${encodeURIComponent(user)}/${encodeURIComponent(dict)}`);
    if (!d.success) throw new Error(d.exception);
    ul.innerHTML = '';
    const sorted = d.entries.slice().sort((a, b) => a.localeCompare(b, undefined, {sensitivity: 'base'}));
    for (const key of sorted) ul.appendChild(slEntryItem(key));
  } catch (e) {
    ul.innerHTML = `<li style="color:#f38ba8;cursor:default">${escHtml(e.message)}</li>`;
  }
}

function slEntryItem(key) {
  const li = document.createElement('li');
  const nameSpan = document.createElement('span');
  nameSpan.textContent = key;
  nameSpan.style.cssText = 'overflow:hidden;text-overflow:ellipsis;flex:1';
  li.appendChild(nameSpan);

  const delBtn = document.createElement('button');
  delBtn.className = 'sl-del-btn';
  delBtn.title = 'Remove entry';
  delBtn.textContent = '✕';
  delBtn.addEventListener('click', async e => {
    e.stopPropagation();
    if (!confirm(`Remove entry "${key}"?`)) return;
    try {
      const r = await slPost('/symbol-list/remove-entry', {user: slUser, dictionary: slDict, key});
      if (!r.success) throw new Error(r.exception);
      li.remove();
      if (slKey === key) { slKey = null; slClearKV(); }
    } catch (err) { slSetStatus('Error: ' + err.message, true); }
  });
  li.appendChild(delBtn);
  li.addEventListener('click', () => slSelectEntry(key, li));
  return li;
}

// ── select entry → populate Keys/Values + PrintString ────────────────────────
async function slSelectEntry(key, liEl) {
  slKey = key;
  document.querySelectorAll('#sl-entries li').forEach(l => l.classList.remove('active'));
  liEl.classList.add('active');

  $('sl-selection-val').textContent = key;
  slClearKV();
  $('sl-kv-tbody').innerHTML = '<tr><td colspan="2" style="color:#6c7086"><span class="spinner"></span> Loading…</td></tr>';

  try {
    const d = await slApi(
      `/symbol-list/preview/${encodeURIComponent(slUser)}/${encodeURIComponent(slDict)}/${encodeURIComponent(key)}`
    );
    if (!d.success) throw new Error(d.exception);
    slRenderKV(d);
  } catch (e) {
    $('sl-kv-tbody').innerHTML = `<tr><td colspan="2" style="color:#f38ba8">${escHtml(e.message)}</td></tr>`;
    $('sl-printstring-box').textContent = '';
  }
}

function slRenderKV(view) {
  const tbody = $('sl-kv-tbody');
  tbody.innerHTML = '';

  // PrintString box
  $('sl-printstring-box').textContent = view.inspection || 'nil';

  const entries = view.instVars || {};
  const pairs = Object.values(entries);

  if (pairs.length === 0) {
    tbody.innerHTML = '<tr><td colspan="2" style="color:#6c7086;font-style:italic">(no entries)</td></tr>';
    return;
  }

  for (const [nameView, valView] of pairs) {
    const tr = document.createElement('tr');
    const tdKey = document.createElement('td');
    tdKey.textContent = nameView.inspection || '';

    const tdVal = document.createElement('td');
    const isLeaf = ['string','symbol','fixnum','float','boolean','nilclass'].includes(valView.basetype);
    if (!isLeaf && valView.oop) {
      const a = document.createElement('a');
      a.className = 'link-oop';
      a.textContent = valView.inspection || `oop:${valView.oop}`;
      a.addEventListener('click', () => {
        document.querySelector('.nav-tab[data-tab="object"]').click();
        const lbl = valView.inspection || nameView.inspection || 'object';
        history = [{label: lbl, oop: valView.oop}];
        loadObject(valView.oop, lbl);
      });
      tdVal.appendChild(a);
    } else {
      tdVal.textContent = valView.inspection || 'nil';
    }

    tr.appendChild(tdKey);
    tr.appendChild(tdVal);
    tbody.appendChild(tr);
  }

  if (view.instVarsSize > pairs.length) {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td colspan="2" style="color:#6c7086;font-style:italic;font-size:11px">${pairs.length} of ${view.instVarsSize} entries shown</td>`;
    tbody.appendChild(tr);
  }
}

function slClearKV() {
  $('sl-selection-val').textContent = '';
  $('sl-kv-tbody').innerHTML = '';
  $('sl-printstring-box').textContent = '';
}

// ── add dict modal ────────────────────────────────────────────────────────────
$('sl-add-dict-btn').addEventListener('click', () => {
  if (!slUser) { slSetStatus('Select a user first', true); return; }
  openModal('Add Dictionary', [
    {label: 'Dictionary name', id: 'modal-dict-name', type: 'input', placeholder: 'MyDictionary'},
  ], async fields => {
    const name = fields['modal-dict-name'].trim();
    if (!name) return;
    const r = await slPost('/symbol-list/add-dictionary', {user: slUser, name});
    if (!r.success) throw new Error(r.exception);
    await slLoadDicts(slUser);
  });
});

// ── add entry modal ───────────────────────────────────────────────────────────
$('sl-add-entry-btn').addEventListener('click', () => {
  if (!slUser || !slDict) { slSetStatus('Select a dictionary first', true); return; }
  openModal('Add Entry', [
    {label: 'Key (Symbol name)', id: 'modal-entry-key', type: 'input', placeholder: 'myKey'},
    {label: 'Value (Smalltalk expression)', id: 'modal-entry-val', type: 'textarea', placeholder: 'nil'},
  ], async fields => {
    const key = fields['modal-entry-key'].trim();
    const value = fields['modal-entry-val'].trim() || 'nil';
    if (!key) return;
    const r = await slPost('/symbol-list/add-entry', {user: slUser, dictionary: slDict, key, value});
    if (!r.success) throw new Error(r.exception);
    await slLoadEntries(slUser, slDict);
  });
});

// ── transaction buttons in symlist tab ────────────────────────────────────────
$('sl-commit-btn').addEventListener('click', async () => {
  try {
    const d = await slApi('/transaction/commit');
    setStatus(d.success, d.success ? 'committed' : ('commit failed: ' + d.exception));
  } catch (e) { setStatus(false, 'commit failed: ' + e.message); }
});

$('sl-abort-btn').addEventListener('click', async () => {
  try {
    const d = await slApi('/transaction/abort');
    setStatus(d.success, d.success ? 'aborted' : ('abort failed: ' + d.exception));
    if (d.success && slUser) await slLoadDicts(slUser);
  } catch (e) { setStatus(false, 'abort failed: ' + e.message); }
});

// ── modal helper ──────────────────────────────────────────────────────────────
function openModal(title, fields, onOk) {
  $('modal-title').textContent = title;
  const fieldsDiv = $('modal-fields');
  fieldsDiv.innerHTML = '';
  for (const f of fields) {
    const lbl = document.createElement('label');
    lbl.textContent = f.label;
    lbl.style.display = 'block';
    lbl.style.marginBottom = '2px';
    fieldsDiv.appendChild(lbl);
    let el;
    if (f.type === 'textarea') {
      el = document.createElement('textarea');
      el.placeholder = f.placeholder || '';
    } else {
      el = document.createElement('input');
      el.type = 'text';
      el.placeholder = f.placeholder || '';
    }
    el.id = f.id;
    el.style.marginBottom = '8px';
    fieldsDiv.appendChild(el);
  }
  $('modal-overlay').classList.add('visible');
  if (fields.length > 0) document.getElementById(fields[0].id).focus();

  const cleanup = () => $('modal-overlay').classList.remove('visible');
  $('modal-cancel').onclick = cleanup;
  $('modal-ok').onclick = async () => {
    const vals = {};
    for (const f of fields) vals[f.id] = document.getElementById(f.id).value;
    try {
      await onOk(vals);
      cleanup();
    } catch (e) {
      slSetStatus('Error: ' + e.message, true);
    }
  };
}
</script>
