<script>
'use strict';

// ── utilities ─────────────────────────────────────────────────────────────────
const desktop = document.getElementById('desktop');
const arrowCanvas = document.getElementById('arrow-canvas');
let zTop = 100;

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function api(url, opts) {
  const {sessionChannel = '', ...fetchOpts} = opts || {};
  const headers = new Headers(fetchOpts.headers || {});
  if (sessionChannel) headers.set('X-GS-Channel', String(sessionChannel));
  if (Array.from(headers.keys()).length) fetchOpts.headers = headers;
  const r = await fetch(url, fetchOpts);
  const text = await r.text();
  let data = null;
  try {
    data = text ? JSON.parse(text) : null;
  } catch (_) {
    data = null;
  }
  if (!r.ok) {
    const detail = data?.exception || data?.error || text || `HTTP ${r.status}`;
    throw new Error(detail);
  }
  return data;
}
async function apiPost(url, body, options = {}) {
  return api(url, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body),
    sessionChannel: options.sessionChannel || '',
  });
}
async function apiEvaluate(oop, {code, language='smalltalk', depth=2, ranges={}} = {}, options = {}) {
  return apiPost(`/object/evaluate/${oop}`, {code, language, depth, ranges}, options);
}
async function apiTransaction(url, options = {}) {
  return apiPost(url, {}, options);
}
function apiWithParams(url, params = {}, options = {}) {
  const qs = new URLSearchParams();
  Object.entries(params).forEach(([key, value]) => {
    if (value === undefined || value === null || value === '') return;
    qs.set(key, String(value));
  });
  const suffix = qs.toString();
  return api(suffix ? `${url}?${suffix}` : url, {sessionChannel: options.sessionChannel || ''});
}

function setStatus(ok, msg) {
  document.getElementById('status-dot').className = ok ? '' : 'error';
  document.getElementById('status-txt').textContent = msg;
  recordStatusEntry(ok, msg);
}

const LEAF_BASETYPES = new Set(['string', 'symbol', 'fixnum', 'float', 'boolean', 'nilclass']);
const windowState = new Map();
const windowLayoutStorageKey = 'python-gemstone-window-layout-v1';
const statusHistoryStorageKey = 'python-gemstone-status-history-v1';
const restorableWindowKinds = new Set(['object', 'class-browser', 'workspace', 'web-browser', 'symbol-list', 'debugger', 'method-query', 'hierarchy', 'versions', 'about', 'status-log', 'window-groups', 'window-links']);
let suppressWindowLayoutPersist = false;
let runtimeVersionInfo = null;
const liveWindowRenderers = new Map();
let statusHistory = readStatusHistory();

function isLeafBasetype(basetype) {
  return LEAF_BASETYPES.has(basetype);
}

function shortLabel(value, max = 32) {
  const text = String(value ?? '').replace(/\s+/g, ' ').trim();
  if (!text) return '';
  return text.length > max ? text.slice(0, max - 1) + '…' : text;
}

function currentStatusSource() {
  const focused = document.querySelector('.win.focused') || getFocusedOrTopWindow();
  if (!focused) {
    return {
      sourceWindowId: null,
      sourceTitle: 'Desktop',
      sourceKind: 'desktop',
    };
  }
  const state = windowState.get(focused.id) || {};
  return {
    sourceWindowId: focused.id,
    sourceTitle: focused.querySelector('.win-title')?.textContent?.trim() || state.kind || 'Window',
    sourceKind: state.kind || 'window',
  };
}

function sanitizeStatusHistoryEntry(entry) {
  if (!entry || typeof entry !== 'object') return null;
  const message = String(entry.message ?? '').trim();
  if (!message) return null;
  return {
    timestamp: String(entry.timestamp || new Date().toISOString()),
    ok: !!entry.ok,
    message,
    count: Math.max(1, Number(entry.count) || 1),
    sourceWindowId: entry.sourceWindowId ? String(entry.sourceWindowId) : null,
    sourceTitle: String(entry.sourceTitle || '').trim(),
    sourceKind: String(entry.sourceKind || '').trim(),
  };
}

function readStatusHistory() {
  try {
    const raw = localStorage.getItem(statusHistoryStorageKey);
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    if (!Array.isArray(parsed)) return [];
    return parsed.map(sanitizeStatusHistoryEntry).filter(Boolean).slice(-200);
  } catch (_) {
    return [];
  }
}

function persistStatusHistory() {
  try {
    localStorage.setItem(statusHistoryStorageKey, JSON.stringify(statusHistory.slice(-200)));
  } catch (_) {
    // ignore storage failures
  }
}

function notifyStatusHistoryUpdated() {
  liveWindowRenderers.forEach(render => {
    try {
      render();
    } catch (_) {
      // ignore stale render hooks
    }
  });
}

function notifyLiveWindowUpdated() {
  liveWindowRenderers.forEach(render => {
    try {
      render();
    } catch (_) {
      // ignore stale render hooks
    }
  });
}

function getStatusHistory() {
  return statusHistory.slice();
}

function getStatusHistorySummary(entries = null) {
  const list = Array.isArray(entries) ? entries : getStatusHistory();
  let ok = 0;
  let error = 0;
  let closedSources = 0;
  let latestError = null;
  list.forEach(entry => {
    if (entry?.ok) ok += 1;
    else {
      error += 1;
      latestError = entry;
    }
    if ((entry?.sourceTitle || entry?.sourceKind) && !resolveStatusEntrySourceWindow(entry)) {
      closedSources += 1;
    }
  });
  return {
    total: list.length,
    ok,
    error,
    closedSources,
    latestError,
  };
}

function clearStatusHistory() {
  statusHistory = [];
  persistStatusHistory();
  notifyStatusHistoryUpdated();
}

function recordStatusEntry(ok, msg) {
  const message = String(msg ?? '').trim();
  if (!message) return;
  const timestamp = new Date().toISOString();
  const source = currentStatusSource();
  const last = statusHistory[statusHistory.length - 1];
  if (
    last &&
    last.ok === !!ok &&
    last.message === message &&
    (last.sourceWindowId || '') === (source.sourceWindowId || '') &&
    (last.sourceTitle || '') === (source.sourceTitle || '') &&
    (last.sourceKind || '') === (source.sourceKind || '')
  ) {
    last.timestamp = timestamp;
    last.count = Math.max(1, Number(last.count) || 1) + 1;
  } else {
    statusHistory.push({
      timestamp,
      ok: !!ok,
      message,
      count: 1,
      sourceWindowId: source.sourceWindowId,
      sourceTitle: source.sourceTitle,
      sourceKind: source.sourceKind,
    });
  }
  if (statusHistory.length > 200) statusHistory = statusHistory.slice(-200);
  persistStatusHistory();
  notifyStatusHistoryUpdated();
}

function renderTaskbarVersion(info) {
  const parts = [];
  if (info?.app) parts.push('Explorer ' + info.app);
  if (info?.stone) parts.push('GemStone ' + info.stone);
  document.getElementById('taskbar-version').textContent = parts.join(' · ');
}

async function copyTextToClipboard(text) {
  const value = String(text ?? '');
  if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
    try {
      await navigator.clipboard.writeText(value);
      window.__lastCopiedText = value;
      return true;
    } catch (_) {
      // Fall back to execCommand below when clipboard API is present but unavailable.
    }
  }
  const area = document.createElement('textarea');
  area.value = value;
  area.setAttribute('readonly', 'readonly');
  area.style.cssText = 'position:fixed;left:-9999px;top:-9999px;opacity:0';
  document.body.appendChild(area);
  area.select();
  area.setSelectionRange(0, area.value.length);
  let copied = false;
  try {
    copied = document.execCommand('copy');
  } finally {
    area.remove();
  }
  if (!copied) throw new Error('Clipboard unavailable');
  window.__lastCopiedText = value;
  return true;
}

function downloadDataFile(filename, text, mimeType = 'text/plain;charset=utf-8') {
  window.__lastDownloadedFile = {
    filename: String(filename || ''),
    text: String(text || ''),
  };
  const blob = new Blob([text], {type: mimeType});
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = String(filename || 'export.txt').replace(/[\\/:*?"<>|]+/g, '-');
  document.body.appendChild(link);
  link.click();
  link.remove();
  setTimeout(() => URL.revokeObjectURL(url), 0);
}

async function loadRuntimeVersionInfo() {
  const data = await api('/version');
  if (data?.success) {
    runtimeVersionInfo = data;
    renderTaskbarVersion(data);
  }
  return data;
}

function sanitizeSelectionIndex(index, items) {
  const numeric = Number(index);
  if (!Number.isFinite(numeric)) return 0;
  return Math.max(0, Math.min((items?.length || 1) - 1, Math.round(numeric)));
}

function getClassBrowserRuntime(sourceWindowId) {
  if (!sourceWindowId) return null;
  const sourceState = windowState.get(sourceWindowId);
  if (!sourceState || sourceState.kind !== 'class-browser') return null;
  return sourceState.browserRuntime || null;
}

async function resolveClassBrowserRuntime(sourceWindowId, browserOptions = {}) {
  let runtime = getClassBrowserRuntime(sourceWindowId);
  if (runtime) {
    await Promise.resolve(runtime.ready);
    return {runtime, sourceWindowId, created: false};
  }
  const win = openClassBrowser(browserOptions);
  const nextSourceWindowId = win?.id || null;
  runtime = getClassBrowserRuntime(nextSourceWindowId);
  if (!runtime) throw new Error('Class Browser could not be opened');
  await Promise.resolve(runtime.ready);
  return {runtime, sourceWindowId: nextSourceWindowId, created: true};
}

function upsertWindowState(id, patch) {
  const current = windowState.get(id) || {};
  windowState.set(id, {...current, ...patch});
  persistWindowLayout();
  notifyLiveWindowUpdated();
}

function getManagedWindows() {
  return Array.from(document.querySelectorAll('.win'));
}

function getOrderedManagedWindows() {
  return getManagedWindows().sort((left, right) => {
    const leftZ = Number(left.style.zIndex || 0);
    const rightZ = Number(right.style.zIndex || 0);
    return leftZ - rightZ;
  });
}

function isRestorableWindowState(state) {
  return !!state && restorableWindowKinds.has(state.kind);
}

function parsePixelValue(value, fallback = 0) {
  const numeric = Number.parseInt(String(value || ''), 10);
  return Number.isFinite(numeric) ? numeric : fallback;
}

function serializeWindowLayoutEntry(id, state) {
  if (!isRestorableWindowState(state)) return null;
  const win = document.getElementById(id);
  if (!win) return null;
  const width = Math.max(320, Math.round(win.offsetWidth || parsePixelValue(win.style.width, 320)));
  const liveHeight = Math.max(180, Math.round(win.offsetHeight || parsePixelValue(win.style.height, 180)));
  const savedHeight = parsePixelValue(win.dataset.savedH, liveHeight);
  const base = {
    savedId: id,
    kind: state.kind,
    x: Math.round(win.offsetLeft || parsePixelValue(win.style.left, 0)),
    y: Math.round(win.offsetTop || parsePixelValue(win.style.top, 0)),
    width,
    height: win.dataset.minimised === '1' ? savedHeight : liveHeight,
    minimised: win.dataset.minimised === '1',
    zIndex: Number(win.style.zIndex || 0),
  };
  if (state.sourceWindowId) base.sourceWindowId = state.sourceWindowId;
  if (state.kind === 'object') {
    return {
      ...base,
      oop: state.objectOop || state.object?.oop || null,
      label: state.objectLabel || state.object?.inspection || '',
      currentTab: state.currentTab || 'instvars',
      compactMode: !!state.compactMode,
      query: state.objectQuery || {},
    };
  }
  if (state.kind === 'class-browser') {
    return {
      ...base,
      dictionary: state.dictionary || '',
      className: state.className || '',
      protocol: state.protocol || '-- all --',
      method: state.method || '',
      meta: !!state.meta,
    };
  }
  if (state.kind === 'workspace') {
    return {
      ...base,
      draft: state.draft || '',
    };
  }
  if (state.kind === 'web-browser') {
    return {
      ...base,
      url: state.url || '',
    };
  }
  if (state.kind === 'symbol-list') {
    return {
      ...base,
      user: state.user || '',
      dictionary: state.dictionary || '',
      key: state.key || '',
    };
  }
  if (state.kind === 'debugger') {
    return {
      ...base,
      threadOop: state.threadOop || 0,
      threadLabel: state.threadLabel || '',
      currentTab: state.currentTab || 'stack',
      frameIndex: Number.isFinite(Number(state.frameIndex)) ? Number(state.frameIndex) : 0,
    };
  }
  if (state.kind === 'method-query') {
    return {
      ...base,
      title: state.title || '',
      results: Array.isArray(state.results) ? state.results : [],
      filterText: state.filterText || '',
      selectedIndex: Number.isFinite(Number(state.selectedIndex)) ? Number(state.selectedIndex) : 0,
      loadLabel: state.loadLabel || 'Load Into Browser',
    };
  }
  if (state.kind === 'hierarchy') {
    return {
      ...base,
      title: state.title || '',
      classes: Array.isArray(state.classes) ? state.classes : [],
      filterText: state.filterText || '',
      selectedIndex: Number.isFinite(Number(state.selectedIndex)) ? Number(state.selectedIndex) : 0,
      meta: !!state.meta,
      loadLabel: state.loadLabel || 'Load Into Browser',
    };
  }
  if (state.kind === 'versions') {
    return {
      ...base,
      title: state.title || '',
      versions: Array.isArray(state.versions) ? state.versions : [],
      filterText: state.filterText || '',
      selectedIndex: Number.isFinite(Number(state.selectedIndex)) ? Number(state.selectedIndex) : 0,
      loadLabel: state.loadLabel || 'Load Into Browser',
      versionContext: state.versionContext || null,
    };
  }
  if (state.kind === 'about') {
    return base;
  }
  if (state.kind === 'status-log') {
    return {
      ...base,
      filterText: state.filterText || '',
      level: state.level || 'all',
    };
  }
  if (state.kind === 'window-groups') {
    return {
      ...base,
      filterText: state.filterText || '',
      viewMode: state.viewMode || 'all',
    };
  }
  if (state.kind === 'window-links') {
    return {
      ...base,
      filterText: state.filterText || '',
      linkType: state.linkType || 'all',
      viewMode: state.viewMode || 'all',
      selectedIndex: Number.isFinite(Number(state.selectedIndex)) ? Number(state.selectedIndex) : 0,
    };
  }
  return base;
}

function buildWindowLayoutSnapshot() {
  const windows = Array.from(windowState.entries())
    .map(([id, state]) => serializeWindowLayoutEntry(id, state))
    .filter(Boolean)
    .sort((left, right) => left.zIndex - right.zIndex);
  return {
    version: 1,
    windows,
  };
}

function persistWindowLayout() {
  if (suppressWindowLayoutPersist) return;
  try {
    localStorage.setItem(windowLayoutStorageKey, JSON.stringify(buildWindowLayoutSnapshot()));
  } catch (_) {
    // Ignore layout persistence failures in restricted/private browser modes.
  }
}

function readWindowLayout() {
  try {
    const raw = localStorage.getItem(windowLayoutStorageKey);
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed?.windows) ? parsed.windows : [];
  } catch (_) {
    return [];
  }
}

function collectOpenWindowSummaries() {
  return getOrderedManagedWindows().map(win => {
    const state = windowState.get(win.id) || {};
    return {
      id: win.id,
      title: win.querySelector('.win-title')?.textContent?.trim() || '',
      kind: state.kind || '',
      minimised: win.dataset.minimised === '1',
      focused: win.classList.contains('focused'),
      zIndex: Number(win.style.zIndex || 0),
      sourceWindowId: state.sourceWindowId || null,
      x: Math.round(win.offsetLeft || parsePixelValue(win.style.left, 0)),
      y: Math.round(win.offsetTop || parsePixelValue(win.style.top, 0)),
      width: Math.max(320, Math.round(win.offsetWidth || parsePixelValue(win.style.width, 320))),
      height: Math.max(180, Math.round(win.offsetHeight || parsePixelValue(win.style.height, 180))),
    };
  });
}

function collectWindowLinkSummaries() {
  const openWindows = collectOpenWindowSummaries();
  const byId = new Map(openWindows.map(each => [each.id, each]));
  const links = [];
  const seen = new Set();

  function addLink(type, fromId, toId) {
    if (!fromId || !toId || fromId === toId) return;
    const from = byId.get(fromId);
    const to = byId.get(toId);
    if (!from || !to) return;
    const key = type === 'arrow'
      ? `${type}:${[fromId, toId].sort().join(':')}`
      : `${type}:${fromId}:${toId}`;
    if (seen.has(key)) return;
    seen.add(key);
    links.push({
      type,
      fromId,
      fromTitle: from.title || '',
      fromKind: from.kind || '',
      toId,
      toTitle: to.title || '',
      toKind: to.kind || '',
    });
  }

  openWindows.forEach(each => {
    if (each.sourceWindowId) addLink('source', each.sourceWindowId, each.id);
  });
  arrows.forEach(arrow => addLink('arrow', arrow.srcWinId, arrow.dstWinId));

  return links.sort((left, right) => {
    const leftKey = `${left.type}:${left.fromTitle}:${left.toTitle}`;
    const rightKey = `${right.type}:${right.fromTitle}:${right.toTitle}`;
    return leftKey.localeCompare(rightKey);
  });
}

function collectWindowGroupSummaries() {
  const openWindows = collectOpenWindowSummaries();
  const byId = new Map(openWindows.map(each => [each.id, each]));
  const visited = new Set();
  const groups = [];

  openWindows.forEach(each => {
    if (!each?.id || visited.has(each.id)) return;
    const memberIds = getRelatedWindowIds(each.id).filter(id => byId.has(id));
    if (!memberIds.length) memberIds.push(each.id);
    memberIds.forEach(id => visited.add(id));
    const members = memberIds
      .map(id => byId.get(id))
      .filter(Boolean)
      .sort((left, right) => {
        const zDelta = Number(left.zIndex || 0) - Number(right.zIndex || 0);
        if (zDelta) return zDelta;
        return String(left.title || '').localeCompare(String(right.title || ''));
      });
    const memberIdSet = new Set(members.map(member => member.id));
    const primaryMember =
      members.find(member => !member.sourceWindowId || !memberIdSet.has(member.sourceWindowId)) ||
      members.find(member => member.focused) ||
      members[members.length - 1] ||
      members[0] ||
      null;
    const kinds = Array.from(new Set(members.map(member => member.kind).filter(Boolean)));
    groups.push({
      size: members.length,
      focused: members.some(member => member.focused),
      minimisedCount: members.filter(member => member.minimised).length,
      kinds,
      primaryId: primaryMember?.id || '',
      primaryTitle: primaryMember?.title || '',
      titles: members.map(member => member.title || member.id),
      members: members.map(member => ({
        id: member.id,
        title: member.title || '',
        kind: member.kind || '',
        minimised: !!member.minimised,
        focused: !!member.focused,
        sourceWindowId: member.sourceWindowId || null,
      })),
    });
  });

  return groups.sort((left, right) => {
    const sizeDelta = Number(right.size || 0) - Number(left.size || 0);
    if (sizeDelta) return sizeDelta;
    const focusDelta = Number(!!right.focused) - Number(!!left.focused);
    if (focusDelta) return focusDelta;
    return String(left.titles?.[0] || '').localeCompare(String(right.titles?.[0] || ''));
  });
}

function clearWindowLayout() {
  try {
    localStorage.removeItem(windowLayoutStorageKey);
  } catch (_) {
    // ignore storage failures
  }
}

function applyRestoredSourceLinks(restoredIdMap, pendingSourceLinks) {
  pendingSourceLinks.forEach(link => {
    const liveSourceWindowId = restoredIdMap.get(link.sourceWindowId) || link.sourceWindowId;
    if (!liveSourceWindowId || !document.getElementById(liveSourceWindowId)) return;
    const currentState = windowState.get(link.windowId);
    if (!currentState) return;
    windowState.set(link.windowId, {...currentState, sourceWindowId: liveSourceWindowId});
  });
  notifyLiveWindowUpdated();
}

function restoreWindowBounds(win, desc) {
  if (!win || !desc) return;
  win.style.left = `${Math.max(0, Math.round(desc.x || 0))}px`;
  win.style.top = `${Math.max(0, Math.round(desc.y || 0))}px`;
  win.style.width = `${Math.max(320, Math.round(desc.width || 320))}px`;
  win.style.height = `${Math.max(180, Math.round(desc.height || 180))}px`;
  if (Number.isFinite(Number(desc.zIndex))) {
    const zIndex = Math.max(1, Math.round(Number(desc.zIndex)));
    win.style.zIndex = zIndex;
    zTop = Math.max(zTop, zIndex);
  }
  if (desc.minimised && win.dataset.minimised !== '1') {
    toggleMinimise(win, win.id);
  }
}

function closeAllWindows() {
  getManagedWindows().forEach(win => closeWindow(win, win.id));
}

function getFocusedOrTopWindow() {
  return document.querySelector('.win.focused') || getOrderedManagedWindows().slice(-1)[0] || null;
}

function revealWindow(win) {
  if (!win) return false;
  if (win.dataset.minimised === '1') toggleMinimise(win, win.id);
  focusWin(win);
  return true;
}

function resolveStatusEntrySourceWindow(entry) {
  if (!entry || typeof entry !== 'object') return null;
  const sourceWindowId = entry.sourceWindowId ? String(entry.sourceWindowId) : '';
  if (sourceWindowId) {
    const sourceWin = document.getElementById(sourceWindowId);
    if (sourceWin) return sourceWin;
  }
  const sourceTitle = String(entry.sourceTitle || '').trim();
  const sourceKind = String(entry.sourceKind || '').trim();
  if (!sourceTitle && !sourceKind) return null;
  const candidates = getManagedWindows().filter(win => {
    const state = windowState.get(win.id) || {};
    if (sourceKind && state.kind !== sourceKind) return false;
    if (sourceTitle) {
      const title = win.querySelector('.win-title')?.textContent?.trim() || '';
      if (title !== sourceTitle) return false;
    }
    return true;
  });
  return candidates.length === 1 ? candidates[0] : null;
}

function getRelatedWindowIds(seedId) {
  if (!seedId) return [];
  const visited = new Set([seedId]);
  const queue = [seedId];
  while (queue.length) {
    const currentId = queue.shift();
    const currentState = windowState.get(currentId) || {};
    const connected = new Set();
    for (const arrow of arrows) {
      if (arrow.srcWinId === currentId) connected.add(arrow.dstWinId);
      if (arrow.dstWinId === currentId) connected.add(arrow.srcWinId);
    }
    if (currentState.sourceWindowId) connected.add(currentState.sourceWindowId);
    for (const [otherId, otherState] of windowState.entries()) {
      if (otherId !== currentId && otherState?.sourceWindowId === currentId) {
        connected.add(otherId);
      }
    }
    connected.forEach(otherId => {
      if (!otherId || visited.has(otherId)) return;
      visited.add(otherId);
      queue.push(otherId);
    });
  }
  return Array.from(visited);
}

function raiseWindowGroupByIds(memberIds, seedId = null) {
  const idSet = new Set((memberIds || []).map(id => String(id)).filter(Boolean));
  if (!idSet.size) return false;
  const ordered = getOrderedManagedWindows().filter(win => idSet.has(win.id));
  if (!ordered.length) return false;
  suppressWindowLayoutPersist = true;
  try {
    ordered.forEach(win => {
      if (win.dataset.minimised === '1') toggleMinimise(win, win.id);
    });
    ordered
      .filter(win => win.id !== seedId)
      .forEach(win => focusWin(win));
    const seed = ordered.find(win => win.id === seedId) || ordered[ordered.length - 1];
    if (seed) focusWin(seed);
  } finally {
    suppressWindowLayoutPersist = false;
    persistWindowLayout();
    redrawArrows();
    notifyLiveWindowUpdated();
  }
  return true;
}

function closeWindowGroupByIds(memberIds, options = {}) {
  const {excludeIds = []} = options;
  const excluded = new Set((excludeIds || []).map(id => String(id)).filter(Boolean));
  const ordered = getOrderedManagedWindows().filter(win => {
    return (memberIds || []).includes(win.id) && !excluded.has(win.id);
  });
  if (!ordered.length) return false;
  ordered.forEach(win => closeWindow(win, win.id));
  return true;
}

function cascadeWindows() {
  const windows = getOrderedManagedWindows();
  if (!windows.length) return;
  let nextX = 28;
  let nextY = 24;
  suppressWindowLayoutPersist = true;
  try {
    windows.forEach(win => {
      if (win.dataset.minimised === '1') toggleMinimise(win, win.id);
      win.style.left = `${nextX}px`;
      win.style.top = `${nextY}px`;
      focusWin(win);
      nextX += CASCADE_STEP;
      nextY += CASCADE_STEP;
      if (nextX > CASCADE_MAX_X || nextY > CASCADE_MAX_Y) {
        nextX = 28;
        nextY = 24;
      }
    });
    cascadeX = nextX;
    cascadeY = nextY;
  } finally {
    suppressWindowLayoutPersist = false;
    persistWindowLayout();
    redrawArrows();
  }
}

function tileWindows() {
  const windows = getOrderedManagedWindows();
  if (!windows.length) return;
  windows.forEach(win => {
    if (win.dataset.minimised === '1') toggleMinimise(win, win.id);
  });
  const count = windows.length;
  const cols = Math.max(1, Math.ceil(Math.sqrt(count)));
  const rows = Math.max(1, Math.ceil(count / cols));
  const inset = 10;
  const taskbarHeight = 42;
  const availableWidth = Math.max(320, window.innerWidth - inset * 2);
  const availableHeight = Math.max(220, window.innerHeight - taskbarHeight - inset * 2);
  const cellWidth = Math.max(320, Math.floor(availableWidth / cols));
  const cellHeight = Math.max(180, Math.floor(availableHeight / rows));
  suppressWindowLayoutPersist = true;
  try {
    windows.forEach((win, index) => {
      const col = index % cols;
      const row = Math.floor(index / cols);
      const left = inset + col * cellWidth;
      const top = inset + row * cellHeight;
      const width = Math.max(320, cellWidth - 8);
      const height = Math.max(180, cellHeight - 8);
      win.style.left = `${left}px`;
      win.style.top = `${top}px`;
      win.style.width = `${width}px`;
      win.style.height = `${height}px`;
      focusWin(win);
    });
  } finally {
    suppressWindowLayoutPersist = false;
    persistWindowLayout();
    redrawArrows();
  }
}

function raiseRelatedWindows() {
  const seed = getFocusedOrTopWindow();
  if (!seed) return;
  const relatedIds = new Set(getRelatedWindowIds(seed.id));
  if (!relatedIds.size) return;
  const ordered = getOrderedManagedWindows().filter(win => relatedIds.has(win.id));
  suppressWindowLayoutPersist = true;
  try {
    ordered
      .filter(win => win.id !== seed.id)
      .forEach(win => focusWin(win));
    focusWin(seed);
  } finally {
    suppressWindowLayoutPersist = false;
    persistWindowLayout();
  }
}

function minimiseAllWindows() {
  suppressWindowLayoutPersist = true;
  try {
    getManagedWindows().forEach(win => {
      if (win.dataset.minimised !== '1') toggleMinimise(win, win.id);
    });
  } finally {
    suppressWindowLayoutPersist = false;
    persistWindowLayout();
  }
}

function closeWindowGroup() {
  const seed = getFocusedOrTopWindow();
  if (!seed) return;
  const relatedIds = new Set(getRelatedWindowIds(seed.id));
  if (!relatedIds.size) return;
  getOrderedManagedWindows()
    .filter(win => relatedIds.has(win.id))
    .forEach(win => closeWindow(win, win.id));
}

function closeOtherWindows() {
  const focused = document.querySelector('.win.focused') || getOrderedManagedWindows().slice(-1)[0] || null;
  if (!focused) return;
  getManagedWindows().forEach(win => {
    if (win !== focused) closeWindow(win, win.id);
  });
  focusWin(focused);
}

async function restoreSavedLayout() {
  const layout = readWindowLayout();
  if (!layout.length) return false;
  const restoredIdMap = new Map();
  const pendingSourceLinks = [];
  suppressWindowLayoutPersist = true;
  try {
    const sortedLayout = layout
      .slice()
      .sort((left, right) => Number(left.zIndex || 0) - Number(right.zIndex || 0));
    for (const desc of sortedLayout) {
      let win = null;
      if (desc.kind === 'object' && desc.oop) {
        win = openObjectBrowser(
          desc.oop,
          desc.label || 'object',
          desc.x,
          desc.y,
          desc.width,
          desc.height,
          {
            initialTab: desc.currentTab || 'instvars',
            compact: !!desc.compactMode,
            query: desc.query || {},
          },
        );
      } else if (desc.kind === 'class-browser') {
        const resolvedSourceWindowId = restoredIdMap.get(desc.sourceWindowId) || desc.sourceWindowId || null;
        win = openClassBrowser({
          x: desc.x,
          y: desc.y,
          width: desc.width,
          height: desc.height,
          dictionary: desc.dictionary || null,
          className: desc.className || null,
          protocol: desc.protocol || '-- all --',
          method: desc.method || null,
          meta: !!desc.meta,
          sourceWindowId: resolvedSourceWindowId,
        });
      } else if (desc.kind === 'workspace') {
        win = openWorkspace({
          x: desc.x,
          y: desc.y,
          width: desc.width,
          height: desc.height,
          draft: desc.draft || '',
        });
      } else if (desc.kind === 'web-browser') {
        win = openWebBrowser(desc.url || '', {
          x: desc.x,
          y: desc.y,
          width: desc.width,
          height: desc.height,
        });
      } else if (desc.kind === 'about') {
        win = openAboutWindow({
          x: desc.x,
          y: desc.y,
          width: desc.width,
          height: desc.height,
        });
      } else if (desc.kind === 'status-log') {
        const resolvedSourceWindowId = restoredIdMap.get(desc.sourceWindowId) || desc.sourceWindowId || null;
        win = openStatusLogWindow({
          x: desc.x,
          y: desc.y,
          width: desc.width,
          height: desc.height,
          filterText: desc.filterText || '',
          level: desc.level || 'all',
          sourceWindowId: resolvedSourceWindowId,
        });
      } else if (desc.kind === 'window-groups') {
        const resolvedSourceWindowId = restoredIdMap.get(desc.sourceWindowId) || desc.sourceWindowId || null;
        win = openWindowGroupsWindow({
          x: desc.x,
          y: desc.y,
          width: desc.width,
          height: desc.height,
          filterText: desc.filterText || '',
          viewMode: desc.viewMode || 'all',
          sourceWindowId: resolvedSourceWindowId,
        });
      } else if (desc.kind === 'window-links') {
        const resolvedSourceWindowId = restoredIdMap.get(desc.sourceWindowId) || desc.sourceWindowId || null;
        win = openWindowLinksWindow({
          x: desc.x,
          y: desc.y,
          width: desc.width,
          height: desc.height,
          filterText: desc.filterText || '',
          linkType: desc.linkType || 'all',
          viewMode: desc.viewMode || 'all',
          selectedIndex: sanitizeSelectionIndex(desc.selectedIndex, collectWindowLinkSummaries()),
          sourceWindowId: resolvedSourceWindowId,
        });
      } else if (desc.kind === 'symbol-list') {
        win = openSymbolList({
          x: desc.x,
          y: desc.y,
          width: desc.width,
          height: desc.height,
          user: desc.user || '',
          dictionary: desc.dictionary || '',
          key: desc.key || '',
        });
      } else if (desc.kind === 'debugger' && desc.threadOop) {
        const resolvedSourceWindowId = restoredIdMap.get(desc.sourceWindowId) || desc.sourceWindowId || null;
        win = openDebugger({
          oop: desc.threadOop,
          printString: desc.threadLabel || 'Debugger',
        }, null, {
          x: desc.x,
          y: desc.y,
          width: desc.width,
          height: desc.height,
          currentTab: desc.currentTab || 'stack',
          frameIndex: Number.isFinite(Number(desc.frameIndex)) ? Number(desc.frameIndex) : 0,
          sourceWindowId: resolvedSourceWindowId,
        });
      } else if (desc.kind === 'method-query' && Array.isArray(desc.results)) {
        const resolvedSourceWindowId = restoredIdMap.get(desc.sourceWindowId) || desc.sourceWindowId || null;
        win = openMethodQueryWindow(desc.title || 'Method Query', desc.results, {
          x: desc.x,
          y: desc.y,
          width: desc.width,
          height: desc.height,
      filterText: desc.filterText || '',
      selectedIndex: sanitizeSelectionIndex(desc.selectedIndex, desc.results),
      sourceWindowId: resolvedSourceWindowId,
      sessionChannel: desc.sessionChannel || '',
      loadLabel: desc.loadLabel || 'Load Into Browser',
    });
      } else if (desc.kind === 'hierarchy' && Array.isArray(desc.classes)) {
        const resolvedSourceWindowId = restoredIdMap.get(desc.sourceWindowId) || desc.sourceWindowId || null;
        win = openHierarchyWindow(desc.title || 'Hierarchy', desc.classes, {
          x: desc.x,
          y: desc.y,
          width: desc.width,
          height: desc.height,
      filterText: desc.filterText || '',
      selectedIndex: sanitizeSelectionIndex(desc.selectedIndex, desc.classes),
      sourceWindowId: resolvedSourceWindowId,
      sessionChannel: desc.sessionChannel || '',
      loadLabel: desc.loadLabel || 'Load Into Browser',
      meta: !!desc.meta,
    });
      } else if (desc.kind === 'versions' && Array.isArray(desc.versions)) {
        const resolvedSourceWindowId = restoredIdMap.get(desc.sourceWindowId) || desc.sourceWindowId || null;
        win = openVersionsWindow(desc.title || 'Versions', desc.versions, {
          x: desc.x,
          y: desc.y,
          width: desc.width,
          height: desc.height,
      filterText: desc.filterText || '',
      selectedIndex: sanitizeSelectionIndex(desc.selectedIndex, desc.versions),
      sourceWindowId: resolvedSourceWindowId,
      sessionChannel: desc.sessionChannel || '',
      loadLabel: desc.loadLabel || 'Load Into Browser',
      versionContext: desc.versionContext || null,
    });
      }
      restoreWindowBounds(win, desc);
      if (win && desc.savedId) restoredIdMap.set(desc.savedId, win.id);
      if (win && desc.sourceWindowId) {
        pendingSourceLinks.push({windowId: win.id, sourceWindowId: desc.sourceWindowId});
      }
    }
    applyRestoredSourceLinks(restoredIdMap, pendingSourceLinks);
    const topWindow = getOrderedManagedWindows().slice(-1)[0];
    if (topWindow) focusWin(topWindow);
  } finally {
    suppressWindowLayoutPersist = false;
    persistWindowLayout();
    redrawArrows();
  }
  setTimeout(() => {
    applyRestoredSourceLinks(restoredIdMap, pendingSourceLinks);
    persistWindowLayout();
  }, 0);
  return getManagedWindows().length > 0;
}

function openDefaultStartupLayout() {
  const vw = window.innerWidth;
  const vh = Math.max(420, window.innerHeight - 42);

  const hashOop = startupIds.persistentRootId || roots['UserGlobals'] || roots['Globals'];
  const hashLabel = 'Persistent Root';
  const hashW = Math.min(vw - 32, Math.max(900, Math.floor(vw * 0.72)));
  const hashH = Math.min(300, Math.max(220, Math.floor(vh * 0.34)));
  const hashX = Math.max(16, vw - hashW - 16);
  const hashY = 10;

  const systemW = Math.min(vw - 32, Math.max(980, Math.floor(vw * 0.9)));
  const systemH = Math.min(340, Math.max(280, Math.floor(vh * 0.46)));
  const systemX = 20;
  const systemY = Math.min(Math.max(180, hashY + hashH + 34), Math.max(20, vh - systemH - 20));

  if (hashOop) {
    openObjectBrowser(hashOop, hashLabel, hashX, hashY, hashW, hashH, {initialTab: 'instvars', compact: true});
  } else {
    openObjectBrowser(undefined, undefined, 10, 10, 520, 480);
  }

  if (startupIds.systemId || roots['System']) {
    openObjectBrowser(startupIds.systemId || roots['System'], 'System', systemX, systemY, systemW, systemH, {initialTab: 'control', compact: true});
  }

  cascadeX = 80;
  cascadeY = 80;
}

function resetStartupLayout() {
  clearWindowLayout();
  suppressWindowLayoutPersist = true;
  try {
    closeAllWindows();
    openDefaultStartupLayout();
  } finally {
    suppressWindowLayoutPersist = false;
    persistWindowLayout();
  }
}

function shouldDrawManualArrow(sourceWinId) {
  if (!sourceWinId) return false;
  const source = windowState.get(sourceWinId);
  return !source || source.kind !== 'object';
}

function clampLinkedWindowPosition(x, y, width=520, height=480) {
  const maxX = Math.max(0, window.innerWidth - width - 10);
  const maxY = Math.max(0, window.innerHeight - height - 42);
  return {
    x: Math.max(0, Math.min(Math.round(x), maxX)),
    y: Math.max(0, Math.min(Math.round(y), maxY)),
  };
}

function positionLinkedWindowOutsideSource(sourceEl, width=520, height=480, seedX, seedY) {
  if (!sourceEl) {
    return (seedX !== undefined && seedY !== undefined)
      ? clampLinkedWindowPosition(seedX, seedY, width, height)
      : {};
  }

  const rect = sourceEl.getBoundingClientRect();
  const gap = 36;
  const fallbackX = seedX !== undefined ? seedX : rect.left + 28;
  const fallbackY = seedY !== undefined ? seedY : rect.top + 28;
  const candidates = [
    {x: rect.right + gap, y: fallbackY},
    {x: rect.left - width - gap, y: fallbackY},
    {x: fallbackX, y: rect.bottom + gap},
    {x: fallbackX, y: rect.top - height - gap},
  ];

  let best = null;
  let bestScore = -Infinity;
  for (const candidate of candidates) {
    const clamped = clampLinkedWindowPosition(candidate.x, candidate.y, width, height);
    const overflowPenalty = Math.abs(candidate.x - clamped.x) + Math.abs(candidate.y - clamped.y);
    const overlapsHorizontally = clamped.x < rect.right && clamped.x + width > rect.left;
    const overlapsVertically = clamped.y < rect.bottom && clamped.y + height > rect.top;
    const overlapPenalty = overlapsHorizontally && overlapsVertically ? 100000 : 0;
    const score = -(overflowPenalty + overlapPenalty);
    if (score > bestScore) {
      bestScore = score;
      best = clamped;
    }
  }
  return best || clampLinkedWindowPosition(fallbackX, fallbackY, width, height);
}

function resolveLinkedWindowPosition({sourceWinId, x, y, width=520, height=480}) {
  const sourceEl = sourceWinId ? document.getElementById(sourceWinId) : null;
  const manualArrow = shouldDrawManualArrow(sourceWinId);
  if (!sourceEl) {
    return (x !== undefined && y !== undefined)
      ? clampLinkedWindowPosition(x, y, width, height)
      : {};
  }

  if (x === undefined || y === undefined) {
    return manualArrow
      ? positionLinkedWindowOutsideSource(sourceEl, width, height, x, y)
      : {};
  }

  const sourceRect = sourceEl.getBoundingClientRect();
  const overlapX = Math.max(0, Math.min(x + width, sourceRect.right) - Math.max(x, sourceRect.left));
  const overlapY = Math.max(0, Math.min(y + height, sourceRect.bottom) - Math.max(y, sourceRect.top));
  const overlapArea = overlapX * overlapY;
  const minVisibleThreshold = width * height * 0.08;
  if (manualArrow && overlapArea > minVisibleThreshold) {
    return positionLinkedWindowOutsideSource(sourceEl, width, height, x, y);
  }

  return clampLinkedWindowPosition(x, y, width, height);
}

function openLinkedObjectWindow({oop, text, sourceWinId, arrowType='ref', arrowLabel='', x, y}) {
  if (!oop) return null;
  const pos = resolveLinkedWindowPosition({sourceWinId, x, y});
  const newWin = openObjectBrowser(oop, text, pos.x, pos.y);
  if (sourceWinId && newWin && shouldDrawManualArrow(sourceWinId)) {
    drawArrow(sourceWinId, newWin.id, arrowLabel, arrowType);
  }
  return newWin;
}

function attachObjectButtonBehavior(el, {oop, text, sourceWinId, arrowType='ref', arrowLabel=''} = {}) {
  if (!el || !oop) return el;
  el.dataset.objButton = '1';
  el.draggable = true;
  el.addEventListener('click', e => {
    e.stopPropagation();
    openLinkedObjectWindow({oop, text, sourceWinId, arrowType, arrowLabel});
  });
  el.addEventListener('dragstart', e => {
    el.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'copy';
    e.dataTransfer.setData('text/plain', JSON.stringify({
      oop,
      text,
      srcWinId: sourceWinId,
      arrowType,
      arrowLabel,
    }));
  });
  el.addEventListener('dragend', () => el.classList.remove('dragging'));
  return el;
}

// ── windowing system ──────────────────────────────────────────────────────────
let winCount = 0;

// Track cascade position independently from winCount so minimised/closed windows don't displace new ones
let cascadeX = 30, cascadeY = 30;
const CASCADE_STEP = 36, CASCADE_MAX_X = 400, CASCADE_MAX_Y = 300;

function createWindow({title, width=640, height=480, x, y, taskbarLabel}) {
  const id = 'win-' + (++winCount);
  const w = width, h = height;
  let lx, ly;
  if (x !== undefined && y !== undefined) {
    lx = x; ly = y;
  } else if (x !== undefined) {
    lx = x; ly = cascadeY;
  } else if (y !== undefined) {
    ly = y; lx = cascadeX;
  } else {
    lx = cascadeX; ly = cascadeY;
    cascadeX += CASCADE_STEP; cascadeY += CASCADE_STEP;
    if (cascadeX > CASCADE_MAX_X || cascadeY > CASCADE_MAX_Y) { cascadeX = 30; cascadeY = 30; }
  }
  // only clamp when position was auto-calculated (not explicitly provided)
  const explicitPos = (x !== undefined || y !== undefined);
  if (!explicitPos) {
    lx = Math.max(0, Math.min(lx, Math.max(0, window.innerWidth  - w - 10)));
    ly = Math.max(0, Math.min(ly, Math.max(0, window.innerHeight - h - 42)));
  }

  const win = document.createElement('div');
  win.className = 'win';
  win.id = id;
  win.style.cssText = `left:${lx}px;top:${ly}px;width:${w}px;height:${h}px;z-index:${++zTop}`;

  win.innerHTML = `
    <div class="win-titlebar" data-win="${id}" id="${id}-titlebar">
      <button class="win-btn win-btn-close" title="Close">✕</button>
      <button class="win-btn win-btn-min" title="Minimise">–</button>
      <span class="win-title" id="${id}-title-text">${escHtml(title)}</span>
    </div>
    <div class="win-body"></div>
    <div class="win-resize" data-win="${id}"></div>
  `;

  desktop.appendChild(win);
  makeDraggable(win);
  makeResizable(win);
  focusWin(win);

  win.querySelector('.win-btn-close').addEventListener('click', () => closeWindow(win, id));
  win.querySelector('.win-btn-min').addEventListener('click', () => toggleMinimise(win, id));

  // taskbar button
  const tbBtn = document.createElement('button');
  tbBtn.className = 'taskbar-btn';
  tbBtn.textContent = taskbarLabel || title.slice(0,20);
  tbBtn.id = 'tb-' + id;
  tbBtn.addEventListener('click', () => {
    if (win.dataset.minimised === '1') { toggleMinimise(win, id); }
    focusWin(win);
  });
  document.getElementById('halted-threads-bar').before(tbBtn);

  win.addEventListener('mousedown', event => {
    const target = event.target instanceof Element ? event.target : null;
    const isInteractive = !!target?.closest('button, input, textarea, select, option, a, [role="button"], [contenteditable="true"], [data-obj-button="1"]');
    focusWin(win, {deferLiveUpdate: isInteractive});
  });
  upsertWindowState(id, {kind: 'generic', title});
  persistWindowLayout();
  notifyStatusHistoryUpdated();
  notifyLiveWindowUpdated();

  return {win, body: win.querySelector('.win-body'), id};
}

function focusWin(win, options = {}) {
  const {deferLiveUpdate = false} = options;
  document.querySelectorAll('.win').forEach(w => w.classList.remove('focused'));
  win.classList.add('focused');
  win.style.zIndex = ++zTop;
  document.querySelectorAll('.taskbar-btn').forEach(b => b.classList.remove('active'));
  const tb = document.getElementById('tb-' + win.id);
  if (tb) tb.classList.add('active');
  persistWindowLayout();
  if (deferLiveUpdate) {
    setTimeout(() => notifyLiveWindowUpdated(), 0);
  } else {
    notifyLiveWindowUpdated();
  }
}

function closeWindow(win, id) {
  removeArrowsFor(id);
  liveWindowRenderers.delete(id);
  windowState.delete(id);
  win.remove();
  const tb = document.getElementById('tb-' + id);
  if (tb) tb.remove();
  persistWindowLayout();
  notifyStatusHistoryUpdated();
  notifyLiveWindowUpdated();
}

function toggleMinimise(win, id) {
  const body = win.querySelector('.win-body');
  const res  = win.querySelector('.win-resize');
  if (win.dataset.minimised === '1') {
    win.dataset.minimised = '0';
    body.style.display = '';
    if (res) res.style.display = '';
    win.style.height = win.dataset.savedH || '480px';
  } else {
    win.dataset.minimised = '1';
    win.dataset.savedH = win.style.height;
    body.style.display = 'none';
    if (res) res.style.display = 'none';
    win.style.height = '28px';
  }
  redrawArrows();
  persistWindowLayout();
  notifyLiveWindowUpdated();
}

function makeDraggable(win) {
  const bar = win.querySelector('.win-titlebar');
  let ox, oy, startX, startY;
  bar.addEventListener('mousedown', e => {
    if (e.target.tagName === 'BUTTON' || e.target.closest('[data-obj-button="1"]')) return;
    e.preventDefault();
    focusWin(win);
    startX = e.clientX; startY = e.clientY;
    ox = win.offsetLeft; oy = win.offsetTop;
    const move = e2 => {
      win.style.left = Math.max(0, ox + e2.clientX - startX) + 'px';
      win.style.top  = Math.max(0, oy + e2.clientY - startY) + 'px';
      redrawArrows();
    };
    const up = () => {
      document.removeEventListener('mousemove', move);
      document.removeEventListener('mouseup', up);
      persistWindowLayout();
    };
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
  });
}

function makeResizable(win) {
  const handle = win.querySelector('.win-resize');
  if (!handle) return;
  let startX, startY, startW, startH;
  handle.addEventListener('mousedown', e => {
    e.preventDefault(); e.stopPropagation();
    startX = e.clientX; startY = e.clientY;
    startW = win.offsetWidth; startH = win.offsetHeight;
    const move = e2 => {
      win.style.width  = Math.max(320, startW + e2.clientX - startX) + 'px';
      win.style.height = Math.max(180, startH + e2.clientY - startY) + 'px';
      redrawArrows();
    };
    const up = () => {
      document.removeEventListener('mousemove', move);
      document.removeEventListener('mouseup', up);
      persistWindowLayout();
    };
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
  });
}

// ── SVG arrows between windows ────────────────────────────────────────────────
const arrows = []; // {srcWinId, dstWinId, label, type, auto, g, path, txt}

function drawArrow(srcWinId, dstWinId, label='', type='ref', {auto=false} = {}) {
  const cleanLabel = shortLabel(label, 48);
  const existing = arrows.find(a =>
    a.srcWinId === srcWinId &&
    a.dstWinId === dstWinId &&
    a.type === type &&
    a.label === cleanLabel &&
    a.auto === auto
  );
  if (existing) return existing;
  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  const colors = {ref:'#6c7086', class:'#9b59bb', superclass:'#346789', error:'#c50b0b'};
  const color = colors[type] || '#6c7086';
  const markerMap = {ref:'arr-head', class:'arr-head', superclass:'arr-head-blue', error:'arr-head-red'};
  path.setAttribute('stroke', color);
  path.setAttribute('stroke-width', type === 'superclass' ? '2' : '1.5');
  path.setAttribute('fill', 'none');
  if (type !== 'superclass') path.setAttribute('stroke-dasharray', '6 3');
  path.setAttribute('marker-end', `url(#${markerMap[type]||'arr-head'})`);
  g.appendChild(path);
  if (cleanLabel) {
    const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('fill', color); txt.setAttribute('font-size','9');
    txt.setAttribute('font-family','monospace'); txt.textContent = cleanLabel;
    g.appendChild(txt);
  }
  arrowCanvas.appendChild(g);
  const entry = {srcWinId, dstWinId, label: cleanLabel, type, auto, g, path, txt: g.querySelector('text')};
  arrows.push(entry);
  _updateArrow(entry);
  return entry;
}

function _updateArrow(entry) {
  const sw = document.getElementById(entry.srcWinId);
  const dw = document.getElementById(entry.dstWinId);
  if (!sw || !dw) { entry.g.remove(); return; }
  const sr = sw.getBoundingClientRect();
  const dr = dw.getBoundingClientRect();
  const cr = arrowCanvas.getBoundingClientRect();
  const sx = sr.left - cr.left + sr.width / 2;
  const sy = sr.top  - cr.top  + sr.height;
  const dx = dr.left - cr.left + dr.width / 2;
  const dy = dr.top  - cr.top;
  const siblings = arrows.filter(a => a.srcWinId === entry.srcWinId && a.dstWinId === entry.dstWinId);
  const siblingIndex = siblings.indexOf(entry);
  const spread = (siblingIndex - (siblings.length - 1) / 2) * 24;
  const cx1 = sx + spread, cy1 = sy + 40;
  const cx2 = dx + spread, cy2 = dy - 40;
  entry.path.setAttribute('d', `M${sx},${sy} C${cx1},${cy1} ${cx2},${cy2} ${dx},${dy}`);
  if (entry.txt) {
    const mx = (sx + dx) / 2 + spread * 0.35;
    const my = (sy + dy) / 2 - 6 - Math.abs(spread) * 0.15;
    entry.txt.setAttribute('x', mx); entry.txt.setAttribute('y', my);
    entry.txt.setAttribute('text-anchor','middle');
  }
}

function redrawArrows() {
  for (const a of arrows) _updateArrow(a);
}

function removeArrowsWhere(predicate) {
  for (let i = arrows.length - 1; i >= 0; i--) {
    if (predicate(arrows[i])) {
      arrows[i].g.remove();
      arrows.splice(i, 1);
    }
  }
}

function removeArrowsFor(winId) {
  removeArrowsWhere(a => a.srcWinId === winId || a.dstWinId === winId);
}

function collectObjectLinks(obj, targetOop) {
  if (!obj || targetOop == null) return [];

  const links = [];
  const pushLink = (type, label='') => {
    const cleanLabel = shortLabel(label, 48);
    if (!links.some(link => link.type === type && link.label === cleanLabel)) {
      links.push({type, label: cleanLabel});
    }
  };

  if (obj.classObject?.oop === targetOop) pushLink('class');
  if (obj.superclassObject?.oop === targetOop) pushLink('superclass');

  for (const [idx, pair] of Object.entries(obj.instVars || {})) {
    if (!Array.isArray(pair) || pair.length < 2) continue;
    const [nameV, valV] = pair;
    const keyText = shortLabel(nameV?.inspection || idx, 24) || idx;

    if (obj.basetype === 'hash') {
      if (nameV?.oop === targetOop && !isLeafBasetype(nameV?.basetype)) {
        pushLink('ref', `key ${keyText}`);
      }
      if (valV?.oop === targetOop && !isLeafBasetype(valV?.basetype)) {
        pushLink('ref', keyText);
      }
      continue;
    }

    if (valV?.oop === targetOop && !isLeafBasetype(valV?.basetype)) {
      pushLink('ref', keyText);
    }
  }

  return links;
}

function syncObjectWindowArrows(winId) {
  removeArrowsWhere(a => a.auto && (a.srcWinId === winId || a.dstWinId === winId));

  const source = windowState.get(winId);
  if (!source || source.kind !== 'object' || !source.object?.oop) {
    redrawArrows();
    return;
  }

  for (const [otherId, other] of windowState.entries()) {
    if (otherId === winId || other.kind !== 'object' || !other.object?.oop) continue;

    for (const link of collectObjectLinks(source.object, other.object.oop)) {
      drawArrow(winId, otherId, link.label, link.type, {auto: true});
    }
    for (const link of collectObjectLinks(other.object, source.object.oop)) {
      drawArrow(otherId, winId, link.label, link.type, {auto: true});
    }
  }

  redrawArrows();
}

// ── inline object chip (ClassName▼ button) ────────────────────────────────────
function makeChip(text, oop, winId, evalContext) {
  const wrap = document.createElement('span');
  wrap.className = 'obj-chip';
  wrap.draggable = true;
  wrap.innerHTML = `<span class="obj-chip-text">${escHtml(text)}</span><span class="obj-chip-caret">▼</span>`;

  // dropdown panel
  const dd = document.createElement('div');
  dd.className = 'chip-dropdown';
  let ddLang = 'smalltalk';
  dd.innerHTML = `
    <div class="chip-dd-label">${escHtml(text)}</div>
    <textarea class="chip-dd-code" placeholder="self printString"></textarea>
    <div class="chip-dd-controls">
      <button class="chip-dd-lang active" data-lang="smalltalk">Smalltalk</button>
      <button class="chip-dd-lang" data-lang="ruby">Ruby</button>
      <button class="btn" style="padding:2px 8px;font-size:10px">Print it</button>
      <button class="btn-ghost" style="padding:2px 8px;font-size:10px">Inspect →</button>
    </div>
    <div class="chip-dd-result hidden"></div>
  `;
  wrap.appendChild(dd);

  // language toggle
  dd.querySelectorAll('.chip-dd-lang').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      ddLang = btn.dataset.lang;
      dd.querySelectorAll('.chip-dd-lang').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  // print it
  const btns = dd.querySelectorAll('button');
  btns[2].addEventListener('click', async e => {
    e.stopPropagation();
    const code = dd.querySelector('.chip-dd-code').value.trim();
    if (!code || !oop) return;
    const resEl = dd.querySelector('.chip-dd-result');
    resEl.classList.remove('hidden','error'); resEl.textContent = '…';
    try {
      const d = await apiEvaluate(oop, {code, language: ddLang, depth: 1});
      if (!d.success) { resEl.classList.add('error'); resEl.textContent = 'Error: '+d.exception; return; }
      const [isExc, rv] = d.result;
      if (isExc) {
        resEl.classList.add('error');
        resEl.textContent = '⚑ '+(rv.inspection||'Exception');
        maybeOpenEvalDebugger(rv, code, winId);
      }
      else resEl.textContent = rv.inspection || 'nil';
    } catch(e) { resEl.classList.add('error'); resEl.textContent = e.message; }
  });

  // inspect
  btns[3].addEventListener('click', e => {
    e.stopPropagation();
    dd.classList.remove('open');
    if (oop) {
      openLinkedObjectWindow({oop, text, sourceWinId: winId});
    }
  });

  // toggle dropdown
  wrap.querySelector('.obj-chip-caret').addEventListener('click', e => {
    e.stopPropagation();
    dd.classList.toggle('open');
  });

  // close dropdown when clicking outside
  document.addEventListener('click', e => {
    if (!wrap.contains(e.target)) dd.classList.remove('open');
  }, {capture: true});

  // drag to open inspector in new window
  wrap.addEventListener('dragstart', e => {
    wrap.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'copy';
    e.dataTransfer.setData('text/plain', JSON.stringify({
      oop,
      text,
      srcWinId: winId,
      arrowType: 'ref',
      arrowLabel: '',
    }));
  });
  wrap.addEventListener('dragend', () => wrap.classList.remove('dragging'));

  return wrap;
}

// drop on desktop opens inspector
desktop.addEventListener('dragover', e => e.preventDefault());
desktop.addEventListener('drop', e => {
  e.preventDefault();
  try {
    const data = JSON.parse(e.dataTransfer.getData('text/plain'));
    if (!data.oop) return;
    openLinkedObjectWindow({
      oop: data.oop,
      text: data.text,
      sourceWinId: data.srcWinId,
      arrowType: data.arrowType || 'ref',
      arrowLabel: data.arrowLabel || '',
      x: e.clientX - 200,
      y: e.clientY - 20,
    });
  } catch(_) {}
});

// ── halted thread poller ──────────────────────────────────────────────────────
let threadPollTimer = null;
async function refreshHaltedThreadsBar() {
  try {
    const d = await api('/debug/threads');
    const bar = document.getElementById('halted-threads-bar');
    bar.innerHTML = '';
    if (d.success && d.threads.length) {
      const lbl = document.createElement('span');
      lbl.style.cssText = 'font-size:10px;color:#f38ba8;margin-right:3px';
      lbl.textContent = 'Halted:';
      bar.appendChild(lbl);
      for (const t of d.threads) {
        const pillText = t.displayText || t.sourcePreview || t.exceptionText || t.printString || `oop:${t.oop}`;
        const pillTitle = [t.sourcePreview, t.exceptionText ? `⚑ ${t.exceptionText}` : '', t.printString]
          .filter(Boolean)
          .join('\n');
        const pill = document.createElement('span');
        pill.className = 'thread-pill';
        pill.textContent = pillText.slice(0, 30);
        pill.title = pillTitle || pillText;
        pill.addEventListener('click', () => openDebugger(t));
        bar.appendChild(pill);
      }
    }
  } catch (_) {}
}

function maybeOpenEvalDebugger(rv, code, sourceWindowId = null) {
  const threadOop = Number(rv?.debugThreadOop || 0);
  if (!(threadOop > 20)) return false;
  refreshHaltedThreadsBar();
  openDebugger({
    oop: threadOop,
    printString: rv?.inspection || 'Debugger',
    exceptionText: rv?.exceptionText || rv?.inspection || 'Exception',
    sourcePreview: rv?.sourcePreview || code || '',
  }, null, {sourceWindowId});
  return true;
}

function startThreadPoller() {
  clearInterval(threadPollTimer);
  refreshHaltedThreadsBar();
  threadPollTimer = setInterval(refreshHaltedThreadsBar, 3000);
}
