<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GemStone Database Explorer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      background: #11111b;
      color: #cdd6f4;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* ── desktop ──────────────────────────────────────────────────────── */
    #desktop {
      position: absolute;
      inset: 0;
      bottom: 32px;
      overflow: hidden;
    }

    /* SVG arrow canvas — covers full desktop, pointer-events off so clicks pass through */
    #arrow-canvas {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: visible;
      z-index: 0;
    }

    /* ── taskbar ──────────────────────────────────────────────────────── */
    #taskbar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 32px;
      background: #181825;
      border-top: 1px solid #313244;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0 8px;
      z-index: 9999;
      flex-shrink: 0;
    }
    #taskbar-title {
      font-size: 11px;
      font-weight: 700;
      color: #cba6f7;
      margin-right: 8px;
      white-space: nowrap;
    }
    #taskbar-version { font-size: 10px; color: #45475a; margin-right: 8px; }
    #taskbar-sep { flex: 1; }
    .taskbar-btn {
      padding: 2px 10px;
      font-size: 11px;
      background: #313244;
      border: 1px solid #45475a;
      color: #cdd6f4;
      border-radius: 3px;
      cursor: pointer;
      white-space: nowrap;
    }
    .taskbar-btn:hover { background: #45475a; }
    .taskbar-btn.active { background: #45475a; border-color: #cba6f7; color: #cba6f7; }
    #status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #a6e3a1; display: inline-block; flex-shrink: 0;
    }
    #status-dot.error { background: #f38ba8; }
    #status-txt { font-size: 10px; color: #a6adc8; white-space: nowrap; }
    #halted-threads-bar {
      display: flex; gap: 4px; align-items: center;
    }
    .thread-pill {
      padding: 1px 8px;
      font-size: 10px;
      background: #f38ba8;
      color: #1e1e2e;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
    }
    .thread-pill:hover { background: #eba0ac; }

    /* ── floating window ─────────────────────────────────────────────── */
    .win {
      position: absolute;
      background: #1e1e2e;
      border: 1px solid #45475a;
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 32px rgba(0,0,0,.6);
      min-width: 320px;
      min-height: 180px;
      overflow: hidden;
      z-index: 10;
    }
    .win.focused { border-color: #cba6f7; }
    .win-titlebar {
      background: #181825;
      padding: 0 8px;
      height: 28px;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: move;
      user-select: none;
      flex-shrink: 0;
    }
    .win-title {
      font-size: 11px;
      font-weight: 600;
      color: #a6adc8;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .win-btn {
      width: 16px; height: 16px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 9px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .win-btn-close { background: #f38ba8; color: #1e1e2e; }
    .win-btn-close:hover { background: #eba0ac; }
    .win-btn-min { background: #f9e2af; color: #1e1e2e; }
    .win-btn-min:hover { background: #f2cdcd; }
    .win-body {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    /* resize handle */
    .win-resize {
      position: absolute;
      right: 0; bottom: 0;
      width: 14px; height: 14px;
      cursor: se-resize;
      z-index: 10;
    }
    .win-resize::after {
      content: '';
      position: absolute;
      right: 3px; bottom: 3px;
      width: 6px; height: 6px;
      border-right: 2px solid #45475a;
      border-bottom: 2px solid #45475a;
    }

    /* ── tab strip ───────────────────────────────────────────────────── */
    .tab-strip {
      display: flex;
      border-bottom: 1px solid #313244;
      background: #181825;
      flex-shrink: 0;
      overflow-x: auto;
    }
    .tab-item {
      padding: 5px 12px;
      font-size: 11px;
      color: #a6adc8;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      white-space: nowrap;
      user-select: none;
    }
    .tab-item:hover { color: #cdd6f4; }
    .tab-item.active { color: #89dceb; border-bottom-color: #89dceb; }

    /* ── breadcrumb ──────────────────────────────────────────────────── */
    .breadcrumb {
      padding: 4px 10px;
      font-size: 10px;
      color: #6c7086;
      border-bottom: 1px solid #1e1e2e;
      background: #181825;
      display: flex;
      gap: 3px;
      align-items: center;
      flex-wrap: wrap;
      flex-shrink: 0;
      min-height: 22px;
    }
    .breadcrumb .crumb { cursor: pointer; color: #89b4fa; }
    .breadcrumb .crumb:hover { text-decoration: underline; }
    .breadcrumb .crumb.cur { color: #cdd6f4; cursor: default; }
    .breadcrumb .sep { color: #45475a; }

    /* ── sidebar ─────────────────────────────────────────────────────── */
    .win-sidebar {
      width: 180px;
      border-right: 1px solid #313244;
      background: #181825;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }
    .win-sidebar h2 {
      font-size: 9px; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: #6c7086;
      padding: 6px 10px 3px;
    }
    .sidebar-list { list-style: none; overflow-y: auto; flex: 1; }
    .sidebar-list li {
      padding: 4px 10px;
      cursor: pointer;
      border-left: 3px solid transparent;
      font-size: 11px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .sidebar-list li:hover { background: #313244; }
    .sidebar-list li.active { border-left-color: #cba6f7; color: #cba6f7; }

    /* ── object inspector ────────────────────────────────────────────── */
    .inspector-strip {
      display: flex;
      border-bottom: 1px solid #313244;
      background: #181825;
      flex-shrink: 0;
      overflow-x: auto;
    }
    .inspector-tab {
      padding: 4px 10px;
      font-size: 10px;
      color: #6c7086;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      white-space: nowrap;
    }
    .inspector-tab:hover { color: #a6adc8; }
    .inspector-tab.active { color: #89dceb; border-bottom-color: #89dceb; }

    .inspector-body {
      flex: 1;
      overflow-y: auto;
      padding: 6px 8px;
    }

    /* ── table ───────────────────────────────────────────────────────── */
    table.dbtable { border-collapse: collapse; width: 100%; }
    table.dbtable th {
      text-align: left; font-size: 9px; color: #6c7086;
      padding: 2px 6px; border-bottom: 1px solid #313244;
      background: #181825; text-transform: uppercase; letter-spacing: .04em;
    }
    table.dbtable td {
      padding: 2px 6px; vertical-align: top;
      border-bottom: 1px solid #1e1e2e; font-size: 11px;
    }
    table.dbtable td.col-key { color: #f5c2e7; font-family: monospace; min-width: 80px; max-width: 160px; }
    table.dbtable td.col-val { font-family: monospace; color: #a6e3a1; }
    table.dbtable tr:hover td { background: #181825; }
    .link-oop { color: #89b4fa; cursor: pointer; text-decoration: none; }
    .link-oop:hover { text-decoration: underline; }
    .more-row { font-size: 10px; color: #6c7086; padding: 3px 6px; }

    /* ── hierarchy tree ──────────────────────────────────────────────── */
    .hierarchy-tree { list-style: none; padding: 6px 0; }
    .hierarchy-tree li {
      display: flex; align-items: center; gap: 6px;
      padding: 2px 0; font-family: monospace; font-size: 11px;
    }
    .tree-indent { display: inline-block; width: 16px; flex-shrink: 0; }
    .tree-connector {
      display: inline-block; width: 14px; height: 14px;
      border-left: 2px solid #45475a; border-bottom: 2px solid #45475a;
      flex-shrink: 0; margin-left: 2px;
    }

    /* ── instances table ─────────────────────────────────────────────── */
    .instances-tbl-wrap { overflow: auto; flex: 1; }
    .instances-tbl-wrap table.dbtable td { white-space: nowrap; }
    .inst-pagination {
      display: flex; gap: 5px; align-items: center; padding: 4px 8px;
      border-top: 1px solid #313244; background: #181825; flex-shrink: 0;
    }
    .inst-page-btn {
      background: #313244; border: 1px solid #45475a; color: #cdd6f4;
      border-radius: 3px; padding: 1px 8px; font-size: 10px; cursor: pointer;
    }
    .inst-page-btn.active { background: #45475a; border-color: #cba6f7; color: #cba6f7; }

    /* ── eval panel ──────────────────────────────────────────────────── */
    .eval-panel {
      border-top: 1px solid #313244;
      background: #181825;
      padding: 5px 8px;
      display: flex; flex-direction: column; gap: 4px;
      flex-shrink: 0;
    }
    .eval-panel label { font-size: 9px; color: #6c7086; text-transform: uppercase; letter-spacing: .05em; }
    .eval-code {
      font-family: monospace; font-size: 11px;
      background: #1e1e2e; color: #cdd6f4;
      border: 1px solid #313244; border-radius: 3px;
      padding: 4px 6px; resize: vertical; min-height: 44px; outline: none;
    }
    .eval-controls { display: flex; align-items: center; gap: 6px; }
    .eval-result-wrap { font-family: monospace; font-size: 10px; }
    .eval-result { color: #a6e3a1; }
    .eval-result.error { color: #f38ba8; }

    /* ── buttons ─────────────────────────────────────────────────────── */
    button.btn {
      background: #cba6f7; color: #1e1e2e;
      border: none; border-radius: 3px;
      padding: 3px 10px; font-weight: 700; cursor: pointer; font-size: 11px;
    }
    button.btn:hover { background: #b4befe; }
    button.btn-ghost {
      background: transparent; border: 1px solid #45475a; color: #cdd6f4;
      border-radius: 3px; padding: 2px 8px; cursor: pointer; font-size: 11px;
    }
    button.btn-ghost:hover { background: #313244; }
    button.btn-tx {
      background: #e08020; color: #fff;
      border: none; border-radius: 3px;
      padding: 3px 12px; font-weight: 700; cursor: pointer; font-size: 11px;
    }
    button.btn-tx:hover { background: #c06010; }
    button.btn-tx.active { background: #a6e3a1; color: #1e1e2e; }
    button.btn-dbg {
      background: #1e6fba; color: #fff;
      border: none; border-radius: 3px;
      padding: 4px 14px; font-weight: 700; cursor: pointer; font-size: 12px;
      flex: 1;
    }
    button.btn-dbg:hover { background: #1559a0; }

    /* ── txbar ───────────────────────────────────────────────────────── */
    .txbar {
      background: #181825; border-top: 1px solid #313244;
      padding: 4px 8px; display: flex; gap: 5px; align-items: center; flex-shrink: 0;
      flex-wrap: wrap;
    }
    .txbar span { font-size: 10px; color: #6c7086; }
    .txbar-result {
      font-size: 10px; font-family: monospace; color: #a6e3a1;
      padding: 2px 6px; background: #1a3a1a; border-radius: 3px;
    }
    .txbar-result.error { color: #f38ba8; background: #3a1a1a; }

    /* ── workspace ───────────────────────────────────────────────────── */
    .ws-history {
      flex: 1; overflow-y: auto; padding: 6px 10px;
      font-family: monospace; font-size: 12px;
    }
    .ws-entry { margin-bottom: 6px; }
    .ws-code { color: #cdd6f4; white-space: pre-wrap; word-break: break-all; }
    .ws-result {
      background: #1a3a1a; color: #a6e3a1;
      padding: 3px 8px; border-radius: 3px;
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
      margin-top: 2px;
    }
    .ws-result.error { background: #3a1a1a; color: #f38ba8; }
    .ws-result-text { white-space: pre-wrap; word-break: break-all; flex: 1; }
    .ws-nav { font-size: 10px; color: #89b4fa; cursor: pointer; }
    .ws-nav:hover { text-decoration: underline; }
    .ws-input-row {
      border-top: 1px solid #313244; display: flex;
      flex-direction: column; flex-shrink: 0;
      background: #181825; padding: 5px 8px; gap: 4px;
    }
    .ws-code-area {
      font-family: monospace; font-size: 12px;
      background: #1e1e2e; color: #cdd6f4;
      border: 1px solid #313244; border-radius: 3px;
      padding: 4px 6px; resize: vertical; min-height: 52px; outline: none;
    }
    .ws-controls { display: flex; gap: 5px; align-items: center; }
    .ws-hint { font-size: 9px; color: #45475a; margin-left: auto; }

    /* ── inline object chip ──────────────────────────────────────────── */
    .obj-chip {
      display: inline-flex; align-items: center; gap: 0;
      background: #2d2d45; border: 1px solid #45475a;
      border-radius: 4px; font-family: monospace; font-size: 11px;
      cursor: pointer; user-select: none; vertical-align: middle;
      position: relative;
    }
    .obj-chip:hover { border-color: #89b4fa; }
    .obj-chip.dragging { opacity: .5; cursor: grabbing; }
    .obj-chip-text {
      padding: 1px 5px 1px 6px;
      color: #89dceb; max-width: 160px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .obj-chip-caret {
      padding: 1px 5px 1px 3px;
      color: #6c7086; border-left: 1px solid #313244;
      font-size: 9px;
    }
    .obj-chip:hover .obj-chip-caret { color: #a6adc8; }
    /* chip dropdown */
    .chip-dropdown {
      position: absolute; top: 100%; left: 0; z-index: 99999;
      background: #24273a; border: 1px solid #45475a; border-radius: 5px;
      min-width: 200px; padding: 6px;
      display: none; flex-direction: column; gap: 5px;
      box-shadow: 0 4px 20px rgba(0,0,0,.7);
    }
    .chip-dropdown.open { display: flex; }
    .chip-dd-label {
      font-size: 9px; color: #6c7086; text-transform: uppercase; letter-spacing: .05em;
    }
    .chip-dd-code {
      font-family: monospace; font-size: 11px;
      background: #1e1e2e; color: #cdd6f4;
      border: 1px solid #313244; border-radius: 3px;
      padding: 3px 5px; resize: vertical; min-height: 36px; outline: none; width: 100%;
    }
    .chip-dd-controls { display: flex; gap: 5px; align-items: center; }
    .chip-dd-lang { font-size: 10px; background: #313244; border: none; color: #a6adc8; border-radius: 3px; padding: 2px 6px; cursor: pointer; }
    .chip-dd-lang.active { background: #cba6f7; color: #1e1e2e; }
    .chip-dd-result {
      font-family: monospace; font-size: 10px; color: #a6e3a1;
      background: #1a3a1a; border-radius: 3px; padding: 2px 5px; word-break: break-all;
    }
    .chip-dd-result.error { color: #f38ba8; background: #3a1a1a; }

    /* ── method browser ──────────────────────────────────────────────── */
    .mb-header {
      padding: 4px 8px; font-size: 10px; font-weight: 700; color: #a6adc8;
      border-bottom: 1px solid #313244; background: #24273a;
      display: flex; align-items: center; gap: 5px; flex-shrink: 0;
    }
    .mb-header span { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .mb-close {
      background: none; border: none; color: #6c7086;
      cursor: pointer; font-size: 13px; padding: 0 2px;
    }
    .mb-close:hover { color: #f38ba8; }
    .mb-split { display: flex; flex: 1; overflow: hidden; }
    .mb-cats {
      width: 120px; border-right: 1px solid #313244;
      overflow-y: auto; flex-shrink: 0;
    }
    .mb-sels { flex: 1; overflow-y: auto; border-right: 1px solid #313244; }
    .mb-src { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    .mb-src textarea {
      flex: 1; background: #1e1e2e; color: #a6e3a1;
      border: none; font-family: monospace; font-size: 11px;
      padding: 5px 6px; resize: none; outline: none;
    }
    .mb-cat, .mb-sel {
      padding: 3px 7px; font-size: 10px; cursor: pointer;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .mb-cat:hover, .mb-sel:hover { background: #313244; }
    .mb-cat.active { background: #45475a; color: #cba6f7; }
    .mb-sel.active { background: #45475a; color: #89dceb; }
    .mb-statusbar {
      font-size: 9px; color: #6c7086; padding: 3px 7px;
      background: #181825; border-top: 1px solid #313244;
      font-family: monospace; overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; flex-shrink: 0;
    }

    /* ── debugger ────────────────────────────────────────────────────── */
    .dbg-split {
      display: flex; flex-direction: column; flex: 1; overflow: hidden;
    }
    .dbg-frames-pane {
      flex: 1; overflow-y: auto; border-bottom: 1px solid #313244;
      min-height: 80px;
    }
    .dbg-frame-item {
      padding: 3px 8px; font-size: 11px; font-family: monospace;
      cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      border-left: 3px solid transparent;
      display: flex; align-items: center; gap: 6px;
    }
    .dbg-frame-item:hover { background: #313244; }
    .dbg-frame-item.active {
      background: #1e4f9f; border-left-color: #89b4fa; color: #cdd6f4;
    }
    .dbg-frame-icon {
      width: 12px; height: 12px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 7px; flex-shrink: 0;
      background: #f9e2af; color: #1e1e2e;
    }
    .dbg-frame-icon.ruby { background: #f38ba8; }
    .dbg-action-bar {
      display: flex; flex-shrink: 0; border-bottom: 1px solid #313244;
    }
    .dbg-source-pane {
      flex: 1; overflow: hidden; display: flex; flex-direction: column;
    }
    .dbg-source-pane textarea {
      flex: 1; background: #181825; color: #cdd6f4;
      font-family: monospace; font-size: 11px;
      border: none; padding: 6px 8px; resize: none; outline: none;
    }
    .dbg-self-bar {
      display: flex; align-items: center; gap: 6px;
      padding: 3px 8px; border-top: 1px solid #313244;
      background: #181825; flex-shrink: 0; font-size: 10px;
    }
    .dbg-self-label { color: #6c7086; }
    .dbg-self-val { font-family: monospace; color: #cba6f7; flex: 1; overflow: hidden; text-overflow: ellipsis; }
    .dbg-var-row {
      display: flex; align-items: center; gap: 6px;
      padding: 3px 8px; border-top: 1px solid #313244;
      background: #181825; flex-shrink: 0;
    }
    .dbg-var-row select {
      background: #1e1e2e; color: #cdd6f4; border: 1px solid #45475a;
      border-radius: 3px; font-size: 11px; padding: 2px 5px; flex: 1;
    }
    .dbg-var-val { font-size: 11px; font-family: monospace; color: #a6e3a1; }
    .dbg-tls-list { list-style: none; padding: 4px 0; }
    .dbg-tls-list li {
      padding: 2px 8px; font-size: 11px; font-family: monospace;
      display: flex; align-items: center; gap: 8px;
    }
    .dbg-tls-list li .tls-key { color: #f5c2e7; min-width: 80px; }
    .dbg-tls-list li .tls-val { color: #a6e3a1; }

    /* ── symbol list browser ─────────────────────────────────────────── */
    .sl-two-col { display: flex; flex: 1; overflow: hidden; }
    .sl-col { display: flex; flex-direction: column; overflow: hidden; }
    .sl-col-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 2px 6px; background: #181825; border-bottom: 1px solid #313244; flex-shrink: 0;
    }
    .sl-col-label { font-size: 9px; text-transform: uppercase; letter-spacing: .06em; color: #6c7086; }
    .sl-add-btn {
      background: none; border: none; color: #a6adc8;
      font-size: 14px; cursor: pointer; padding: 0 2px;
    }
    .sl-add-btn:hover { color: #cba6f7; }
    .sl-list { list-style: none; overflow-y: auto; flex: 1; }
    .sl-list li {
      padding: 3px 8px; cursor: pointer; font-size: 11px;
      display: flex; align-items: center; gap: 3px;
      white-space: nowrap; overflow: hidden;
    }
    .sl-list li:hover { background: #2a2a3e; }
    .sl-list li.active { background: #313244; color: #cba6f7; }
    .sl-list li span.sl-name { flex: 1; overflow: hidden; text-overflow: ellipsis; }
    .sl-del { background: none; border: none; color: #6c7086; cursor: pointer; font-size: 12px; padding: 0; display: none; }
    .sl-list li:hover .sl-del { display: inline; }
    .sl-del:hover { color: #f38ba8; }
    .sl-sel-row {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 8px; border-bottom: 1px solid #313244;
      background: #1e1e2e; flex-shrink: 0;
    }
    .sl-sel-label { font-size: 10px; color: #6c7086; }
    .sl-sel-val { font-size: 12px; background: #24273a; border-radius: 3px; padding: 1px 8px; }
    .sl-preview { display: flex; flex-direction: column; border-top: 1px solid #313244; flex-shrink: 0; }
    .sl-printstring {
      font-family: monospace; font-size: 11px; color: #cdd6f4;
      background: #24273a; margin: 4px 8px;
      padding: 5px 8px; border: 1px solid #313244; border-radius: 3px;
      min-height: 34px; word-break: break-all; white-space: pre-wrap;
    }

    /* ── web browser window ──────────────────────────────────────────── */
    .wb-urlbar {
      display: flex; gap: 5px; align-items: center;
      padding: 4px 8px; border-bottom: 1px solid #313244;
      background: #181825; flex-shrink: 0;
    }
    .wb-urlbar label { font-size: 9px; color: #6c7086; text-transform: uppercase; letter-spacing: .05em; white-space: nowrap; }
    .wb-url-input {
      flex: 1; font-family: monospace; font-size: 11px;
      background: #1e1e2e; color: #89b4fa;
      border: 1px solid #313244; border-radius: 3px;
      padding: 2px 6px; outline: none;
    }
    .wb-url-input:focus { border-color: #89b4fa; }
    .wb-iframe-wrap { flex: 1; overflow: hidden; }
    .wb-iframe-wrap iframe {
      width: 100%; height: 100%; border: none; background: #fff;
    }

    /* ── control panel ───────────────────────────────────────────────── */
    .control-panel {
      padding: 10px; display: flex; flex-direction: column; gap: 8px;
    }
    .cp-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .cp-result {
      padding: 5px 8px; border-radius: 4px; font-size: 11px; font-family: monospace;
      background: #1a3a1a; color: #a6e3a1; display: none;
    }
    .cp-result.visible { display: block; }
    .cp-result.error { background: #3a1a1a; color: #f38ba8; }
    .cp-result.loading { background: #1a1a3a; color: #89b4fa; }

    /* ── spinner ─────────────────────────────────────────────────────── */
    .spinner {
      display: inline-block; width: 11px; height: 11px;
      border: 2px solid #45475a; border-top-color: #cba6f7;
      border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── inspector titlebar chips ───────────────────────────────────── */
    .insp-titlebar {
      background: #0a0a12;
      padding: 0 6px;
      height: 28px;
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: move;
      user-select: none;
      flex-shrink: 0;
    }
    .insp-titlebar-left  { display: flex; align-items: center; gap: 3px; flex: 1; overflow: hidden; min-width: 0; }
    .insp-titlebar-right { display: flex; align-items: center; gap: 3px; flex-shrink: 0; }
    .insp-sep { color: #45475a; font-size: 11px; }
    .insp-oop { color: #6c7086; font-size: 10px; font-family: monospace; white-space: nowrap; }
    /* Associations tab for hash objects */
    .assoc-row {
      display: flex; align-items: center; gap: 4px; flex-wrap: wrap;
      padding: 3px 8px; border-bottom: 1px solid #1e1e2e; font-family: monospace; font-size: 11px;
    }
    .assoc-row:hover { background: #1e1e2e; }
    .assoc-key-label { color: #f5c2e7; min-width: 60px; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 10px; }
    .assoc-arrow { color: #6c7086; font-size: 11px; }
    /* control panel tab — greyed style */
    .inspector-tab.dim { color: #45475a; }
    .inspector-tab.dim:hover { color: #6c7086; }
    .inspector-tab.dim.active { color: #89dceb; }

    /* ── obj-card ────────────────────────────────────────────────────── */
    .obj-card { background: #181825; border: 1px solid #313244; border-radius: 5px; margin-bottom: 8px; overflow: hidden; }
    .obj-card-hdr {
      background: #24273a; padding: 4px 8px;
      display: flex; align-items: center; gap: 6px; flex-shrink: 0;
    }
    .obj-card-hdr .basetype {
      background: #313244; border-radius: 3px; padding: 1px 4px;
      font-size: 9px; color: #a6adc8; flex-shrink: 0;
    }
    .obj-card-hdr .class-name {
      color: #cba6f7; font-size: 10px; cursor: pointer; flex-shrink: 0;
    }
    .obj-card-hdr .class-name:hover { text-decoration: underline; }
    .obj-card-hdr .inspection {
      font-family: monospace; font-size: 11px; color: #89dceb;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1;
    }
    .obj-card-hdr .oop { color: #6c7086; font-size: 9px; font-family: monospace; }
    .class-row {
      margin: 0 0 6px 4px; font-size: 10px;
      display: flex; gap: 5px; align-items: center;
    }
    .class-row span { color: #6c7086; }

    /* ── modal ───────────────────────────────────────────────────────── */
    #modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.6); z-index: 99999;
      align-items: center; justify-content: center;
    }
    #modal-overlay.visible { display: flex; }
    #modal-box {
      background: #24273a; border: 1px solid #45475a; border-radius: 7px;
      padding: 16px 20px; min-width: 320px;
      display: flex; flex-direction: column; gap: 8px;
    }
    #modal-box h2 { font-size: 12px; font-weight: 700; color: #cba6f7; }
    #modal-box label { font-size: 10px; color: #a6adc8; }
    #modal-box input, #modal-box textarea {
      font-family: monospace; font-size: 11px;
      background: #1e1e2e; color: #cdd6f4;
      border: 1px solid #45475a; border-radius: 3px;
      padding: 4px 6px; width: 100%;
    }
    #modal-box textarea { resize: vertical; min-height: 52px; }
    #modal-footer { display: flex; gap: 6px; justify-content: flex-end; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div id="desktop">
  <svg id="arrow-canvas" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arr-head" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#6c7086"/>
      </marker>
      <marker id="arr-head-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#346789"/>
      </marker>
      <marker id="arr-head-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#c50b0b"/>
      </marker>
    </defs>
  </svg>
</div>

<!-- Taskbar -->
<div id="taskbar">
  <span id="taskbar-title">GemStone DB Explorer</span>
  <span id="taskbar-version"></span>
  <button class="taskbar-btn" onclick="openObjectBrowser()">Object Browser</button>
  <button class="taskbar-btn" onclick="openWorkspace()">Workspace</button>
  <button class="taskbar-btn" onclick="openSymbolList()">Symbol List</button>
  <button class="taskbar-btn" onclick="openWebBrowser()">Web Browser</button>
  <div id="halted-threads-bar"></div>
  <div id="taskbar-sep"></div>
  <span id="status-dot"></span>
  <span id="status-txt">connecting…</span>
</div>

<!-- Modal -->
<div id="modal-overlay">
  <div id="modal-box">
    <h2 id="modal-title">Add</h2>
    <div id="modal-fields"></div>
    <div id="modal-footer">
      <button class="btn-ghost" id="modal-cancel">Cancel</button>
      <button class="btn" id="modal-ok">OK</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ── utilities ─────────────────────────────────────────────────────────────────
const desktop = document.getElementById('desktop');
const arrowCanvas = document.getElementById('arrow-canvas');
let zTop = 100;

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function api(url, opts) {
  const r = await fetch(url, opts);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}
async function apiPost(url, body) {
  return api(url, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
}

function setStatus(ok, msg) {
  document.getElementById('status-dot').className = ok ? '' : 'error';
  document.getElementById('status-txt').textContent = msg;
}

// ── windowing system ──────────────────────────────────────────────────────────
let winCount = 0;

// Track cascade position independently from winCount so minimised/closed windows don't displace new ones
let cascadeX = 30, cascadeY = 30;
const CASCADE_STEP = 36, CASCADE_MAX_X = 400, CASCADE_MAX_Y = 300;

function createWindow({title, width=640, height=480, x, y, taskbarLabel}) {
  const id = 'win-' + (++winCount);
  const w = width, h = height;
  let lx, ly;
  if (x !== undefined && y !== undefined) {
    lx = x; ly = y;
  } else if (x !== undefined) {
    lx = x; ly = cascadeY;
  } else if (y !== undefined) {
    ly = y; lx = cascadeX;
  } else {
    lx = cascadeX; ly = cascadeY;
    cascadeX += CASCADE_STEP; cascadeY += CASCADE_STEP;
    if (cascadeX > CASCADE_MAX_X || cascadeY > CASCADE_MAX_Y) { cascadeX = 30; cascadeY = 30; }
  }
  // clamp to viewport
  lx = Math.max(0, Math.min(lx, Math.max(0, window.innerWidth  - w - 10)));
  ly = Math.max(0, Math.min(ly, Math.max(0, window.innerHeight - h - 42)));

  const win = document.createElement('div');
  win.className = 'win';
  win.id = id;
  win.style.cssText = `left:${lx}px;top:${ly}px;width:${w}px;height:${h}px;z-index:${++zTop}`;

  win.innerHTML = `
    <div class="win-titlebar" data-win="${id}" id="${id}-titlebar">
      <button class="win-btn win-btn-close" title="Close">✕</button>
      <button class="win-btn win-btn-min" title="Minimise">–</button>
      <span class="win-title" id="${id}-title-text">${escHtml(title)}</span>
    </div>
    <div class="win-body"></div>
    <div class="win-resize" data-win="${id}"></div>
  `;

  desktop.appendChild(win);
  makeDraggable(win);
  makeResizable(win);
  focusWin(win);

  win.querySelector('.win-btn-close').addEventListener('click', () => closeWindow(win, id));
  win.querySelector('.win-btn-min').addEventListener('click', () => toggleMinimise(win, id));

  // taskbar button
  const tbBtn = document.createElement('button');
  tbBtn.className = 'taskbar-btn';
  tbBtn.textContent = taskbarLabel || title.slice(0,20);
  tbBtn.id = 'tb-' + id;
  tbBtn.addEventListener('click', () => {
    if (win.dataset.minimised === '1') { toggleMinimise(win, id); }
    focusWin(win);
  });
  document.getElementById('halted-threads-bar').before(tbBtn);

  win.addEventListener('mousedown', () => focusWin(win));

  return {win, body: win.querySelector('.win-body'), id};
}

function focusWin(win) {
  document.querySelectorAll('.win').forEach(w => w.classList.remove('focused'));
  win.classList.add('focused');
  win.style.zIndex = ++zTop;
  document.querySelectorAll('.taskbar-btn').forEach(b => b.classList.remove('active'));
  const tb = document.getElementById('tb-' + win.id);
  if (tb) tb.classList.add('active');
}

function closeWindow(win, id) {
  removeArrowsFor(id);
  win.remove();
  const tb = document.getElementById('tb-' + id);
  if (tb) tb.remove();
}

function toggleMinimise(win, id) {
  const body = win.querySelector('.win-body');
  const res  = win.querySelector('.win-resize');
  if (win.dataset.minimised === '1') {
    win.dataset.minimised = '0';
    body.style.display = '';
    if (res) res.style.display = '';
    win.style.height = win.dataset.savedH || '480px';
  } else {
    win.dataset.minimised = '1';
    win.dataset.savedH = win.style.height;
    body.style.display = 'none';
    if (res) res.style.display = 'none';
    win.style.height = '28px';
  }
}

function makeDraggable(win) {
  const bar = win.querySelector('.win-titlebar');
  let ox, oy, startX, startY;
  bar.addEventListener('mousedown', e => {
    if (e.target.tagName === 'BUTTON') return;
    e.preventDefault();
    focusWin(win);
    startX = e.clientX; startY = e.clientY;
    ox = win.offsetLeft; oy = win.offsetTop;
    const move = e2 => {
      win.style.left = Math.max(0, ox + e2.clientX - startX) + 'px';
      win.style.top  = Math.max(0, oy + e2.clientY - startY) + 'px';
      redrawArrows();
    };
    const up = () => { document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', up); };
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
  });
}

function makeResizable(win) {
  const handle = win.querySelector('.win-resize');
  if (!handle) return;
  let startX, startY, startW, startH;
  handle.addEventListener('mousedown', e => {
    e.preventDefault(); e.stopPropagation();
    startX = e.clientX; startY = e.clientY;
    startW = win.offsetWidth; startH = win.offsetHeight;
    const move = e2 => {
      win.style.width  = Math.max(320, startW + e2.clientX - startX) + 'px';
      win.style.height = Math.max(180, startH + e2.clientY - startY) + 'px';
      redrawArrows();
    };
    const up = () => { document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', up); };
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
  });
}

// ── SVG arrows between windows ────────────────────────────────────────────────
const arrows = []; // {id, srcWinId, dstWinId, label, type, el}

function drawArrow(srcWinId, dstWinId, label='', type='ref') {
  const existing = arrows.find(a => a.srcWinId === srcWinId && a.dstWinId === dstWinId);
  if (existing) return;
  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  const colors = {ref:'#6c7086', class:'#9b59bb', superclass:'#346789', error:'#c50b0b'};
  const color = colors[type] || '#6c7086';
  const markerMap = {ref:'arr-head', class:'arr-head', superclass:'arr-head-blue', error:'arr-head-red'};
  path.setAttribute('stroke', color);
  path.setAttribute('stroke-width', type === 'superclass' ? '2' : '1.5');
  path.setAttribute('fill', 'none');
  if (type !== 'superclass') path.setAttribute('stroke-dasharray', '6 3');
  path.setAttribute('marker-end', `url(#${markerMap[type]||'arr-head'})`);
  g.appendChild(path);
  if (label) {
    const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('fill', color); txt.setAttribute('font-size','9');
    txt.setAttribute('font-family','monospace'); txt.textContent = label;
    g.appendChild(txt);
  }
  arrowCanvas.appendChild(g);
  const entry = {srcWinId, dstWinId, label, type, g, path, txt: g.querySelector('text')};
  arrows.push(entry);
  _updateArrow(entry);
  return entry;
}

function _updateArrow(entry) {
  const sw = document.getElementById(entry.srcWinId);
  const dw = document.getElementById(entry.dstWinId);
  if (!sw || !dw) { entry.g.remove(); return; }
  const sr = sw.getBoundingClientRect();
  const dr = dw.getBoundingClientRect();
  const cr = arrowCanvas.getBoundingClientRect();
  const sx = sr.left - cr.left + sr.width / 2;
  const sy = sr.top  - cr.top  + sr.height;
  const dx = dr.left - cr.left + dr.width / 2;
  const dy = dr.top  - cr.top;
  const cx1 = sx, cy1 = sy + 40;
  const cx2 = dx, cy2 = dy - 40;
  entry.path.setAttribute('d', `M${sx},${sy} C${cx1},${cy1} ${cx2},${cy2} ${dx},${dy}`);
  if (entry.txt) {
    const mx = (sx + dx) / 2, my = (sy + dy) / 2 - 6;
    entry.txt.setAttribute('x', mx); entry.txt.setAttribute('y', my);
    entry.txt.setAttribute('text-anchor','middle');
  }
}

function redrawArrows() {
  for (const a of arrows) _updateArrow(a);
}

function removeArrowsFor(winId) {
  for (let i = arrows.length - 1; i >= 0; i--) {
    if (arrows[i].srcWinId === winId || arrows[i].dstWinId === winId) {
      arrows[i].g.remove();
      arrows.splice(i, 1);
    }
  }
}

// ── inline object chip (ClassName▼ button) ────────────────────────────────────
function makeChip(text, oop, winId, evalContext) {
  const wrap = document.createElement('span');
  wrap.className = 'obj-chip';
  wrap.draggable = true;
  wrap.innerHTML = `<span class="obj-chip-text">${escHtml(text)}</span><span class="obj-chip-caret">▼</span>`;

  // dropdown panel
  const dd = document.createElement('div');
  dd.className = 'chip-dropdown';
  let ddLang = 'smalltalk';
  dd.innerHTML = `
    <div class="chip-dd-label">${escHtml(text)}</div>
    <textarea class="chip-dd-code" placeholder="self printString"></textarea>
    <div class="chip-dd-controls">
      <button class="chip-dd-lang active" data-lang="smalltalk">Smalltalk</button>
      <button class="chip-dd-lang" data-lang="ruby">Ruby</button>
      <button class="btn" style="padding:2px 8px;font-size:10px">Print it</button>
      <button class="btn-ghost" style="padding:2px 8px;font-size:10px">Inspect →</button>
    </div>
    <div class="chip-dd-result hidden"></div>
  `;
  wrap.appendChild(dd);

  // language toggle
  dd.querySelectorAll('.chip-dd-lang').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      ddLang = btn.dataset.lang;
      dd.querySelectorAll('.chip-dd-lang').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  // print it
  const btns = dd.querySelectorAll('button');
  btns[2].addEventListener('click', async e => {
    e.stopPropagation();
    const code = dd.querySelector('.chip-dd-code').value.trim();
    if (!code || !oop) return;
    const resEl = dd.querySelector('.chip-dd-result');
    resEl.classList.remove('hidden','error'); resEl.textContent = '…';
    try {
      const d = await api(`/object/evaluate/${oop}?code=${encodeURIComponent(code)}&language=${ddLang}&depth=1`);
      if (!d.success) { resEl.classList.add('error'); resEl.textContent = 'Error: '+d.exception; return; }
      const [isExc, rv] = d.result;
      if (isExc) { resEl.classList.add('error'); resEl.textContent = '⚑ '+(rv.inspection||'Exception'); }
      else resEl.textContent = rv.inspection || 'nil';
    } catch(e) { resEl.classList.add('error'); resEl.textContent = e.message; }
  });

  // inspect
  btns[3].addEventListener('click', e => {
    e.stopPropagation();
    dd.classList.remove('open');
    if (oop) {
      const newWin = openObjectBrowser(oop, text);
      if (winId && newWin) drawArrow(winId, newWin.id, '', 'ref');
    }
  });

  // toggle dropdown
  wrap.querySelector('.obj-chip-caret').addEventListener('click', e => {
    e.stopPropagation();
    dd.classList.toggle('open');
  });

  // close dropdown when clicking outside
  document.addEventListener('click', e => {
    if (!wrap.contains(e.target)) dd.classList.remove('open');
  }, {capture: true});

  // drag to open inspector in new window
  wrap.addEventListener('dragstart', e => {
    wrap.classList.add('dragging');
    e.dataTransfer.setData('text/plain', JSON.stringify({oop, text, srcWinId: winId}));
  });
  wrap.addEventListener('dragend', () => wrap.classList.remove('dragging'));

  return wrap;
}

// drop on desktop opens inspector
desktop.addEventListener('dragover', e => e.preventDefault());
desktop.addEventListener('drop', e => {
  e.preventDefault();
  try {
    const data = JSON.parse(e.dataTransfer.getData('text/plain'));
    if (!data.oop) return;
    const newWin = openObjectBrowser(data.oop, data.text, e.clientX - 200, e.clientY - 20);
    if (data.srcWinId && newWin) drawArrow(data.srcWinId, newWin.id, '', 'ref');
  } catch(_) {}
});

// ── global state ──────────────────────────────────────────────────────────────
let roots = {};

// ── init ──────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const data = await api('/ids');
    roots = {
      'UserGlobals': data.persistentRootId,
      'Globals':     data.globalsId,
      'System':      data.gemStoneSystemId,
    };
    setStatus(true, 'connected');
  } catch (e) {
    setStatus(false, 'failed: ' + e.message);
    return;
  }
  try {
    const d = await api('/version');
    if (d.success) {
      document.getElementById('taskbar-version').textContent = 'GemStone ' + d.stone;
    }
  } catch (_) {}
}

// ── halted thread poller ──────────────────────────────────────────────────────
let threadPollTimer = null;
function startThreadPoller() {
  clearInterval(threadPollTimer);
  threadPollTimer = setInterval(async () => {
    try {
      const d = await api('/debug/threads');
      const bar = document.getElementById('halted-threads-bar');
      bar.innerHTML = '';
      if (d.success && d.threads.length) {
        const lbl = document.createElement('span');
        lbl.style.cssText = 'font-size:10px;color:#f38ba8;margin-right:3px';
        lbl.textContent = 'Halted:';
        bar.appendChild(lbl);
        for (const t of d.threads) {
          const pill = document.createElement('span');
          pill.className = 'thread-pill';
          pill.textContent = t.printString.slice(0, 30);
          pill.title = t.printString;
          pill.addEventListener('click', () => openDebugger(t.oop, t.printString));
          bar.appendChild(pill);
        }
      }
    } catch (_) {}
  }, 3000);
}

// ═══════════════════════════════════════════════════════════════════════════════
// OBJECT BROWSER WINDOW
// ═══════════════════════════════════════════════════════════════════════════════
function openObjectBrowser(initialOop, initialLabel, px, py) {
  const {win, body, id} = createWindow({
    title:'Object Browser', width:720, height:530,
    taskbarLabel:'Objects',
    x: px, y: py
  });

  let currentOop = null;
  let currentObjData = null;
  let history = [];
  let currentItab = 'instvars';
  let mbData = {}, mbClassOop = null;
  let instPage = 0;

  // Replace plain titlebar with MagLev-style chip titlebar
  const titlebar = win.querySelector(`#${id}-titlebar`);
  titlebar.className = 'insp-titlebar';
  titlebar.querySelector(`#${id}-title-text`).remove();
  const tbLeft  = document.createElement('div'); tbLeft.className  = 'insp-titlebar-left';  tbLeft.id  = id+'-tb-left';
  const tbRight = document.createElement('div'); tbRight.className = 'insp-titlebar-right'; tbRight.id = id+'-tb-right';
  tbLeft.innerHTML  = '<span style="color:#6c7086;font-size:10px;font-style:italic">Object Browser</span>';
  tbRight.innerHTML = '';
  titlebar.appendChild(tbLeft);
  titlebar.appendChild(tbRight);

  function updateTitlebar(obj) {
    const left  = win.querySelector(`#${id}-tb-left`);
    const right = win.querySelector(`#${id}-tb-right`);
    left.innerHTML = ''; right.innerHTML = '';
    if (!obj) { left.innerHTML = '<span style="color:#6c7086;font-size:10px;font-style:italic">Object Browser</span>'; return; }

    // Left: self▼ < superclass▼ <0xOOP>
    const selfChip = makeChip(obj.inspection || obj.classObject?.inspection || 'self', obj.oop, id);
    left.appendChild(selfChip);
    if (obj.classObject?.oop) {

  body.style.minHeight = '0';

  // populate roots sidebar
  const rootsUl = body.querySelector(`#${id}-roots`);
  for (const [label, oop] of Object.entries(roots)) {
    const li = document.createElement('li');
    li.textContent = label;
    li.dataset.oop = oop;
    li.addEventListener('click', () => { history = [{label, oop}]; loadObj(oop, label); });
    rootsUl.appendChild(li);
  }

  // inspector tab switching
  body.querySelector(`#${id}-itabs`).addEventListener('click', e => {
    const tab = e.target.closest('.inspector-tab');
    if (!tab) return;
    body.querySelectorAll('.inspector-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentItab = tab.dataset.itab;
    if (currentItab === 'code') {
      body.querySelector(`#${id}-mb`).classList.remove('hidden');
      if (currentObjData?.classObject?.oop && !mbClassOop) {
        openMB(currentObjData.classObject.oop, currentObjData.classObject.inspection||'class');
      }
    } else {
      body.querySelector(`#${id}-mb`).classList.add('hidden');
    }
    showItab();
  });

  // method browser close
  body.querySelector(`#${id}-mb-close`).addEventListener('click', () => {
    body.querySelector(`#${id}-mb`).classList.add('hidden');
    body.querySelectorAll('.inspector-tab').forEach(t => { if (t.dataset.itab==='instvars') { t.classList.add('active'); } else t.classList.remove('active'); });
    currentItab = 'instvars';
    showItab();
  });

  // eval
  const evalCode = body.querySelector(`#${id}-eval-code`);
  const evalRes  = body.querySelector(`#${id}-eval-res`);
  body.querySelector(`#${id}-eval-btn`).addEventListener('click', doEval);
  evalCode.addEventListener('keydown', e => { if (e.ctrlKey && e.key === 'Enter') doEval(); });

  // tx buttons
  async function txAction(route, label) {
    const resEl = body.querySelector(`#${id}-tx-res`);
    resEl.classList.remove('hidden','error'); resEl.textContent = label + '…';
    try {
      const d = await api(route);
      resEl.textContent = d.success ? (label + ' ok') : 'Error: ' + (d.exception||'');
      if (!d.success) resEl.classList.add('error');
      setStatus(d.success, d.success ? label : d.exception||'error');
    } catch(e) { resEl.classList.add('error'); resEl.textContent = e.message; setStatus(false, e.message); }
  }
  body.querySelector(`#${id}-abort`).addEventListener('click', async () => {
    await txAction('/transaction/abort','aborted');
    if (currentOop) loadObj(currentOop, history[history.length-1]?.label);
  });
  body.querySelector(`#${id}-commit`).addEventListener('click', () => txAction('/transaction/commit','committed'));
  body.querySelector(`#${id}-continue`).addEventListener('click', () => txAction('/transaction/continue','continued'));

  async function loadObj(oop, label) {
    currentOop = oop;
    currentObjData = null;
    instPage = 0;
    renderBc();
    body.querySelectorAll(`#${id}-roots li`).forEach(li => li.classList.toggle('active', parseInt(li.dataset.oop) === oop));
    const ibody = body.querySelector(`#${id}-ibody`);
    ibody.innerHTML = '<span class="spinner"></span>';
    body.querySelector(`#${id}-itabs`).style.display = 'none';
    evalRes.textContent = '';
    updateTitlebar(null);
    try {
      const d = await api(`/object/index/${oop}?depth=2`);
      if (!d.success) throw new Error(d.exception);
      currentObjData = d.result;
      updateTitlebar(currentObjData);
      // Show Associations tab for hash/dict objects
      const itabs = body.querySelector(`#${id}-itabs`);
      let assocTab = itabs.querySelector('[data-itab="assoc"]');
      if (currentObjData.basetype === 'hash') {
        if (!assocTab) {
          assocTab = document.createElement('div');
          assocTab.className = 'inspector-tab';
          assocTab.dataset.itab = 'assoc';
          assocTab.textContent = 'Associations';
          itabs.insertBefore(assocTab, itabs.firstChild);
        }
      } else {
        if (assocTab) assocTab.remove();
      }
      itabs.style.display = 'flex';
      showItab();
    } catch(e) {
      ibody.innerHTML = `<p style="color:#f38ba8;padding:10px">Error: ${escHtml(e.message)}</p>`;
    }
  }

  function renderBc() {
    const bc = body.querySelector(`#${id}-bc`);
    bc.innerHTML = '';
    history.forEach((item, i) => {
      if (i > 0) { const s = document.createElement('span'); s.className = 'sep'; s.textContent = ' › '; bc.appendChild(s); }
      const sp = document.createElement('span');
      sp.className = 'crumb' + (i === history.length-1 ? ' cur' : '');
      sp.textContent = item.label || `#${item.oop}`;
      if (i < history.length-1) sp.addEventListener('click', () => { history = history.slice(0, i+1); loadObj(item.oop, item.label); });
      bc.appendChild(sp);
    });
  }

  async function showItab() {
    const ibody = body.querySelector(`#${id}-ibody`);
    if (!currentObjData && currentItab !== 'stone-ver' && currentItab !== 'gem-ver' && currentItab !== 'control') return;
    ibody.innerHTML = '';

    if (currentItab === 'instvars') { ibody.appendChild(renderCard(currentObjData)); return; }

    if (currentItab === 'assoc') {
      renderAssociations(ibody, currentObjData);
      return;
    }

    if (currentItab === 'constants') {
      ibody.innerHTML = '<span class="spinner"></span>';
      try {
        const d = await api(`/object/constants/${currentOop}`);
        ibody.innerHTML = '';
        if (!d.success) throw new Error(d.exception);
        if (!d.constants.length) { ibody.innerHTML = '<p style="color:#6c7086;padding:8px">(no constants)</p>'; return; }
        ibody.appendChild(makeTable(['Name','Value'], d.constants.map(c => [c.key, c.value])));
      } catch(e) { ibody.innerHTML = `<p style="color:#f38ba8;padding:8px">${escHtml(e.message)}</p>`; }
      return;
    }

    if (currentItab === 'hierarchy') {
      ibody.innerHTML = '<span class="spinner"></span>';
      try {
        const d = await api(`/object/hierarchy/${currentOop}`);
        ibody.innerHTML = '';
        if (!d.success) throw new Error(d.exception);
        const ul = document.createElement('ul'); ul.className = 'hierarchy-tree';
        d.hierarchy.forEach((cls, i) => {
          const li = document.createElement('li');
          if (i > 0) {
            for (let j = 0; j < i - 1; j++) { const sp = document.createElement('span'); sp.className = 'tree-indent'; li.appendChild(sp); }
            const conn = document.createElement('span'); conn.className = 'tree-connector'; li.appendChild(conn);
          }
          li.appendChild(document.createTextNode(cls));
          ul.appendChild(li);
        });
        ibody.appendChild(ul);
      } catch(e) { ibody.innerHTML = `<p style="color:#f38ba8;padding:8px">${escHtml(e.message)}</p>`; }
      return;
    }

    if (currentItab === 'instances') {
      renderInstances(ibody);
      return;
    }

    if (currentItab === 'modules') {
      ibody.innerHTML = '<span class="spinner"></span>';
      try {
        const d = await api(`/object/included-modules/${currentOop}`);
        ibody.innerHTML = '';
        if (!d.success) throw new Error(d.exception);
        if (!d.modules.length) { ibody.innerHTML = '<p style="color:#6c7086;padding:8px">(no included modules)</p>'; return; }
        const ol = document.createElement('ol'); ol.style.cssText = 'padding-left:24px;font-family:monospace;font-size:11px;';
        d.modules.forEach(m => {
          const li = document.createElement('li'); li.style.padding = '3px 0';
          if (m.oop) {
            const chip = makeChip(m.name, m.oop, id);
            li.appendChild(chip);
          } else { li.textContent = m.name; }
          ol.appendChild(li);
        });
        ibody.appendChild(ol);
      } catch(e) { ibody.innerHTML = `<p style="color:#f38ba8;padding:8px">${escHtml(e.message)}</p>`; }
      return;
    }

    if (currentItab === 'stone-ver') {
      ibody.innerHTML = '<span class="spinner"></span>';
      try {
        const d = await api('/object/stone-version-report');
        ibody.innerHTML = '';
        if (!d.success) throw new Error(d.exception);
        ibody.appendChild(makeTable(['Property','Value'], d.report.map(r => [r.key, r.value])));
      } catch(e) { ibody.innerHTML = `<p style="color:#f38ba8;padding:8px">${escHtml(e.message)}</p>`; }
      return;
    }

    if (currentItab === 'gem-ver') {
      ibody.innerHTML = '<span class="spinner"></span>';
      try {
        const d = await api('/object/gem-version-report');
        ibody.innerHTML = '';
        if (!d.success) throw new Error(d.exception);
        ibody.appendChild(makeTable(['Property','Value'], d.report.map(r => [r.key, r.value])));
      } catch(e) { ibody.innerHTML = `<p style="color:#f38ba8;padding:8px">${escHtml(e.message)}</p>`; }
      return;
    }

    if (currentItab === 'control') {
      ibody.classList.remove('inspector-body');
      ibody.style.overflow = 'auto';
      renderControlPanel(ibody);
      return;
    }

    if (currentItab === 'code') {
      ibody.innerHTML = '<p style="color:#6c7086;padding:8px;font-size:11px">Select a category and method in the panel →</p>';
      return;
    }
  }

  function renderInstances(ibody) {
    ibody.innerHTML = '<span class="spinner"></span>';
    const PAGE = 20;
    api(`/object/instances/${currentOop}?limit=200`).then(d => {
      ibody.innerHTML = '';
      if (!d.success) { ibody.innerHTML = `<p style="color:#f38ba8;padding:8px">${escHtml(d.exception)}</p>`; return; }
      if (!d.instances.length) { ibody.innerHTML = '<p style="color:#6c7086;padding:8px">(no instances)</p>'; return; }

      const pageData = d.instances;
      const totalPages = Math.ceil(pageData.length / PAGE);

      function renderPage(p) {
        ibody.innerHTML = '';
        const chunk = pageData.slice(p * PAGE, (p + 1) * PAGE);
        const wrap = document.createElement('div'); wrap.style.cssText = 'display:flex;flex-direction:column;height:100%';
        const tblWrap = document.createElement('div'); tblWrap.className = 'instances-tbl-wrap';
        const tbl = document.createElement('table'); tbl.className = 'dbtable';
        tbl.innerHTML = '<thead><tr><th>oop</th><th>Object</th><th>printString</th></tr></thead>';
        const tbody = document.createElement('tbody');
        chunk.forEach(inst => {
          const tr = document.createElement('tr');
          const tdOop = document.createElement('td'); tdOop.className = 'col-key'; tdOop.style.fontFamily = 'monospace'; tdOop.textContent = inst.oop;
          const tdObj = document.createElement('td'); tdObj.className = 'col-val';
          const chip = makeChip(inst.printString.slice(0,40), inst.oop, id);
          tdObj.appendChild(chip);
          const tdPs = document.createElement('td'); tdPs.className = 'col-val'; tdPs.style.color='#6c7086'; tdPs.textContent = inst.printString.slice(0,80);
          tr.append(tdOop, tdObj, tdPs); tbody.appendChild(tr);
        });
        tbl.appendChild(tbody); tblWrap.appendChild(tbl);
        wrap.appendChild(tblWrap);
        if (totalPages > 1) {
          const pg = document.createElement('div'); pg.className = 'inst-pagination';
          pg.innerHTML = `<span style="font-size:10px;color:#6c7086">${pageData.length} instances</span>`;
          for (let i = 0; i < totalPages; i++) {
            const btn = document.createElement('button'); btn.className = 'inst-page-btn' + (i===p?' active':'');
            btn.textContent = i + 1;
            btn.addEventListener('click', () => { instPage = i; renderPage(i); });
            pg.appendChild(btn);
          }
          wrap.appendChild(pg);
        }
        ibody.appendChild(wrap);
      }
      renderPage(instPage);
    }).catch(e => { ibody.innerHTML = `<p style="color:#f38ba8;padding:8px">${escHtml(e.message)}</p>`; });
  }

  function renderControlPanel(ibody) {
    const wrap = document.createElement('div'); wrap.className = 'control-panel';
    const resDiv = document.createElement('div'); resDiv.className = 'cp-result';

    async function cpAction(url, method='GET', body_data) {
      resDiv.className = 'cp-result visible loading'; resDiv.textContent = 'Working…';
      try {
        const opts = method === 'POST' ? {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body_data||{})} : undefined;
        const d = await api(url, opts);
        resDiv.className = 'cp-result visible' + (d.success ? '' : ' error');
        resDiv.textContent = d.success ? (d.result || 'ok') : 'Error: ' + (d.exception||'');
        setStatus(d.success, d.success ? 'ok' : d.exception||'error');
      } catch(e) { resDiv.className = 'cp-result visible error'; resDiv.textContent = e.message; }
    }

    const row = document.createElement('div'); row.className = 'cp-row';
    const btnAbort   = document.createElement('button'); btnAbort.className   = 'btn-tx'; btnAbort.textContent   = 'Abort Transaction';
    const btnCommit  = document.createElement('button'); btnCommit.className  = 'btn-tx'; btnCommit.textContent  = 'Commit Transaction';
    const btnCont    = document.createElement('button'); btnCont.className    = 'btn-tx'; btnCont.style.background = '#4a90d9'; btnCont.textContent = 'Continue Transaction';
    const btnPersist = document.createElement('button'); btnPersist.className = 'btn-tx'; btnPersist.style.background = '#45475a'; btnPersist.textContent = 'Persistent Mode';

    btnAbort.addEventListener('click', () => cpAction('/transaction/abort'));
    btnCommit.addEventListener('click', () => cpAction('/transaction/commit'));
    btnCont.addEventListener('click', () => cpAction('/transaction/continue'));
    btnPersist.addEventListener('click', async () => {
      const active = btnPersist.classList.contains('active');
      await cpAction('/transaction/persistent-mode', 'POST', {enable: !active});
      btnPersist.classList.toggle('active', !active);
    });

    // check current persistent mode
    api('/transaction/persistent-mode').then(d => {
      if (d.success && d.persistent) btnPersist.classList.add('active');
    }).catch(()=>{});

    row.append(btnAbort, btnCommit, btnCont, btnPersist);
    wrap.append(row, resDiv);
    ibody.appendChild(wrap);
  }

  function renderAssociations(ibody, obj) {
    ibody.innerHTML = '';
    const entries = obj.instVars || {};
    const keys = Object.keys(entries);
    if (!keys.length) {
      ibody.innerHTML = '<p style="color:#6c7086;padding:8px">(empty)</p>'; return;
    }
    const wrap = document.createElement('div');
    for (const [, [keyV, valV]] of Object.entries(entries)) {
      const row = document.createElement('div'); row.className = 'assoc-row';

      // Key label (symbol key like :MaglevRecord)
      const keyLabel = document.createElement('span'); keyLabel.className = 'assoc-key-label';
      const kIsLeaf = ['string','symbol','fixnum','float','boolean','nilclass'].includes(keyV?.basetype);
      const kText = keyV?.inspection || (keyV?.oop != null ? `oop:${keyV.oop}` : 'nil');
      if (!kIsLeaf && keyV?.oop) {
        const kChip = makeChip(kText, keyV.oop, id);
        row.appendChild(kChip);
      } else {
        keyLabel.textContent = kText;
        row.appendChild(keyLabel);
      }

      // Arrow
      const arr = document.createElement('span'); arr.className = 'assoc-arrow'; arr.textContent = ' ⇒ ';
      row.appendChild(arr);

      // Value — render as chip(s) — if it's a hash/array show { ... } style
      if (!valV || valV.basetype === 'nilclass') {
        const nil = document.createElement('span'); nil.style.color='#6c7086'; nil.textContent='nil';
        row.appendChild(nil);
      } else {
        const vText = valV.inspection || (valV.oop != null ? `oop:${valV.oop}` : 'nil');
        const vIsLeaf = ['string','symbol','fixnum','float','boolean','nilclass'].includes(valV.basetype);
        if (!vIsLeaf && valV.oop) {
          // For hash/array types show { ... }▼ prefix chip then class chip
          if (valV.basetype === 'hash' || valV.basetype === 'array') {
            const open = document.createElement('span'); open.className='insp-sep'; open.textContent = valV.basetype==='hash' ? '{ ' : '[ ';
            row.appendChild(open);
            const ellipsis = document.createElement('span'); ellipsis.style.color='#6c7086'; ellipsis.textContent='…';
            row.appendChild(ellipsis);
            const close = document.createElement('span'); close.className='insp-sep'; close.textContent = valV.basetype==='hash' ? ' }' : ' ]';
            row.appendChild(close);
          }
          const vChip = makeChip(vText.slice(0,60), valV.oop, id);
          row.appendChild(vChip);
        } else {
          const vSpan = document.createElement('span'); vSpan.style.color='#a6e3a1'; vSpan.style.fontFamily='monospace'; vSpan.textContent=vText;
          row.appendChild(vSpan);
        }
      }

      wrap.appendChild(row);
    }
    if (obj.instVarsSize > keys.length) {
      const more = document.createElement('div'); more.className='more-row';
      more.textContent = `${keys.length} of ${obj.instVarsSize} entries`;
      wrap.appendChild(more);
    }
    ibody.appendChild(wrap);
  }

  function renderCard(obj) {
    const wrap = document.createElement('div');
    const card = document.createElement('div'); card.className = 'obj-card';
    const hdr  = document.createElement('div'); hdr.className = 'obj-card-hdr';

    const bt = document.createElement('span'); bt.className = 'basetype'; bt.textContent = obj.basetype || 'object';
    const cn = document.createElement('span'); cn.className = 'class-name';
    const cname = obj.classObject?.inspection || '';
    cn.textContent = cname;
    if (cname && obj.classObject?.oop) { cn.title='Browse methods'; cn.addEventListener('click', () => openMB(obj.classObject.oop, cname)); }
    const ins = document.createElement('span'); ins.className = 'inspection'; ins.textContent = obj.inspection || '';
    const oopSp = document.createElement('span'); oopSp.className = 'oop'; oopSp.textContent = `oop:${obj.oop}`;
    hdr.append(bt, cn, ins, oopSp);
    card.appendChild(hdr);

    const entries = obj.instVars || {};
    const keys = Object.keys(entries);
    const isDictLike = obj.basetype === 'hash', isArr = obj.basetype === 'array';
    if (obj.loaded && keys.length) {
      const tbl = document.createElement('table'); tbl.className = 'dbtable';
      tbl.innerHTML = `<thead><tr><th>${isDictLike?'Key':isArr?'#':'Variable'}</th><th>Value</th></tr></thead>`;
      const tbody = document.createElement('tbody');
      for (const [idx, [nameV, valV]] of Object.entries(entries)) {
        const tr = document.createElement('tr');
        const tdK = document.createElement('td'); tdK.className = 'col-key';
        const ktext = nameV.inspection || `@${idx}`;
        const kLeaf = ['string','symbol','fixnum','float','boolean','nilclass'].includes(nameV.basetype);
        if (isDictLike && nameV.oop != null && !kLeaf) {
          tdK.appendChild(makeChip(ktext, nameV.oop, id));
        } else { tdK.textContent = ktext; }
        const tdV = makeValCell(valV, ktext);
        tr.append(tdK, tdV); tbody.appendChild(tr);
      }
      tbl.appendChild(tbody); card.appendChild(tbl);
      if (obj.instVarsSize > keys.length) {
        const m = document.createElement('div'); m.className = 'more-row';
        m.textContent = `${keys.length} of ${obj.instVarsSize} entries`; card.appendChild(m);
      }
    }
    wrap.appendChild(card);

    if (obj.classObject?.oop) {
      const cr = document.createElement('div'); cr.className = 'class-row';
      const lbl = document.createElement('span'); lbl.textContent = 'Class:';
      const aC = document.createElement('a'); aC.className='link-oop'; aC.textContent = obj.classObject.inspection || `oop:${obj.classObject.oop}`;
      aC.addEventListener('click', () => { const l2=obj.classObject.inspection||'class'; history.push({label:l2,oop:obj.classObject.oop}); loadObj(obj.classObject.oop,l2); });
      const aM = document.createElement('a'); aM.className='link-oop'; aM.style.color='#cba6f7'; aM.textContent='Browse methods ›';
      aM.addEventListener('click', () => openMB(obj.classObject.oop, obj.classObject.inspection||'class'));
      cr.append(lbl, aC, aM); wrap.appendChild(cr);
    }
    return wrap;
  }

  function makeValCell(valV, label) {
    const td = document.createElement('td'); td.className = 'col-val';
    if (!valV) { td.textContent = 'nil'; return td; }
    const isLeaf = ['string','symbol','fixnum','float','boolean','nilclass'].includes(valV.basetype);
    const text = valV.inspection || (valV.oop != null ? `oop:${valV.oop}` : 'nil');
    if (!isLeaf && valV.oop != null) {
      const chip = makeChip(text, valV.oop, id);
      const nav = document.createElement('span'); nav.className='ws-nav'; nav.textContent=' ↗'; nav.style.fontSize='10px';
      nav.addEventListener('click', () => { history.push({label:label||text, oop:valV.oop}); loadObj(valV.oop, label||text); });
      td.append(chip, nav);
    } else { td.textContent = text; }
    return td;
  }

  async function openMB(classOop, className) {
    const mb = body.querySelector(`#${id}-mb`);
    mb.classList.remove('hidden');
    body.querySelector(`#${id}-mb-class`).textContent = className + ' methods';
    const catsEl   = body.querySelector(`#${id}-mb-cats`);
    const selsEl   = body.querySelector(`#${id}-mb-sels`);
    const srcEl    = body.querySelector(`#${id}-mb-src`);
    const statusEl = body.querySelector(`#${id}-mb-status`);
    catsEl.innerHTML = '<div class="mb-cat" style="color:#6c7086"><span class="spinner"></span></div>';
    selsEl.innerHTML = ''; srcEl.value = ''; mbClassOop = classOop;
    try {
      const d = await api(`/code/selectors/${classOop}`);
      if (!d.success) throw new Error(d.exception);
      mbData = d.result || {};
      const cats = Object.keys(mbData).sort();
      catsEl.innerHTML = '';
      cats.forEach(cat => {
        const el = document.createElement('div'); el.className = 'mb-cat'; el.textContent = cat || '(uncategorized)';
        el.addEventListener('click', () => {
          catsEl.querySelectorAll('.mb-cat').forEach(e => e.classList.remove('active'));
          el.classList.add('active');
          const sels = (mbData[cat]||[]).slice().sort();
          selsEl.innerHTML = '';
          sels.forEach(sel => {
            const s = document.createElement('div'); s.className='mb-sel'; s.textContent=sel;
            s.addEventListener('click', async () => {
              selsEl.querySelectorAll('.mb-sel').forEach(e => e.classList.remove('active'));
              s.classList.add('active'); srcEl.value = 'Loading…'; statusEl.textContent = 'Loading…';
              try {
                const sd = await api(`/code/code/${mbClassOop}?selector=${encodeURIComponent(sel)}`);
                srcEl.value = sd.success ? (sd.result||'') : 'Error: '+sd.exception;
                statusEl.textContent = `${className} >> ${sel}`;
              }
              catch(err) { srcEl.value = 'Error: '+err.message; statusEl.textContent = 'Error'; }
            });
            selsEl.appendChild(s);
          });
        });
        catsEl.appendChild(el);
      });
      if (cats.length) catsEl.querySelector('.mb-cat')?.click();
      statusEl.textContent = className + ' — ' + cats.length + ' categories';
    } catch(e) {
      catsEl.innerHTML = `<div class="mb-cat" style="color:#f38ba8">${escHtml(e.message)}</div>`;
      statusEl.textContent = 'Error loading';
    }
  }

  async function doEval() {
    if (!currentOop) return;
    const code = evalCode.value.trim(); if (!code) return;
    evalRes.textContent = ''; evalRes.className = 'eval-result';
    const sp = document.createElement('span'); sp.className='spinner'; evalRes.appendChild(sp);
    try {
      const d = await api(`/object/evaluate/${currentOop}?code=${encodeURIComponent(code)}&language=smalltalk&depth=2`);
      evalRes.innerHTML = '';
      if (!d.success) { evalRes.className='eval-result error'; evalRes.textContent='Error: '+d.exception; return; }
      const [isExc, rv] = d.result;
      if (isExc) { evalRes.className='eval-result error'; evalRes.textContent='⚑ '+(rv.inspection||'Exception'); }
      else {
        evalRes.textContent = rv.inspection || 'nil';
        const isLeaf = ['string','symbol','fixnum','float','boolean','nilclass'].includes(rv.basetype);
        if (!isLeaf && rv.oop) {
          const chip = makeChip(rv.inspection||'result', rv.oop, id);
          evalRes.appendChild(document.createTextNode(' ')); evalRes.appendChild(chip);
          const nav = document.createElement('a'); nav.className='link-oop'; nav.style.marginLeft='8px'; nav.textContent='Navigate →';
          nav.addEventListener('click', () => { const l=rv.inspection||'result'; history.push({label:l,oop:rv.oop}); loadObj(rv.oop,l); });
          evalRes.appendChild(nav);
        }
      }
    } catch(e) { evalRes.innerHTML=''; evalRes.className='eval-result error'; evalRes.textContent='Error: '+e.message; }
  }

  if (initialOop) { history = [{label: initialLabel||'object', oop: initialOop}]; loadObj(initialOop, initialLabel||'object'); }
  return win;
}

// ═══════════════════════════════════════════════════════════════════════════════
// WORKSPACE WINDOW
// ═══════════════════════════════════════════════════════════════════════════════
function openWorkspace() {
  const {win, body, id} = createWindow({title:'Workspace', width:520, height:440, taskbarLabel:'Workspace'});
  // The outer div must be display:flex;flex-direction:column so ws-history can flex:1
  // and ws-input-row / txbar stay at the bottom.
  body.style.cssText = 'display:flex;flex-direction:column;overflow:hidden;min-height:0';
  body.innerHTML = `
    <div class="ws-history" id="${id}-wsh" style="flex:1;min-height:0;overflow-y:auto;padding:6px 10px;font-family:monospace;font-size:12px"></div>
    <div class="ws-input-row" style="flex-shrink:0">
      <textarea class="ws-code-area" id="${id}-wsc" placeholder="Smalltalk expression… (Ctrl+Enter)"></textarea>
      <div class="ws-controls">
        <button class="btn" id="${id}-doit">Do it</button>
        <button class="btn-ghost" id="${id}-clr">Clear</button>
        <span class="ws-hint">Ctrl+Enter</span>
      </div>
    </div>
    <div class="txbar" style="flex-shrink:0">
      <span>Transaction:</span>
      <button class="btn-tx" id="${id}-abort">Abort</button>
      <button class="btn-tx" id="${id}-commit">Commit</button>
      <button class="btn-tx" id="${id}-continue" style="background:#4a90d9">Continue</button>
    </div>
  `;
  const wsh = body.querySelector(`#${id}-wsh`);
  const wsc = body.querySelector(`#${id}-wsc`);
  body.querySelector(`#${id}-doit`).addEventListener('click', wsDoIt);
  body.querySelector(`#${id}-clr`).addEventListener('click', () => { wsh.innerHTML = ''; });
  wsc.addEventListener('keydown', e => { if (e.ctrlKey && e.key==='Enter') wsDoIt(); });
  body.querySelector(`#${id}-abort`).addEventListener('click', async () => {
    try { const d=await api('/transaction/abort'); setStatus(d.success, d.success?'aborted':d.exception); } catch(e){setStatus(false,e.message);}
  });
  body.querySelector(`#${id}-commit`).addEventListener('click', async () => {
    try { const d=await api('/transaction/commit'); setStatus(d.success, d.success?'committed':d.exception); } catch(e){setStatus(false,e.message);}
  });
  body.querySelector(`#${id}-continue`).addEventListener('click', async () => {
    try { const d=await api('/transaction/continue'); setStatus(d.success, d.success?'continued':d.exception); } catch(e){setStatus(false,e.message);}
  });

  async function wsDoIt() {
    const code = wsc.value.trim(); if (!code) return;
    const entry = document.createElement('div'); entry.className='ws-entry';
    const codeEl = document.createElement('div'); codeEl.className='ws-code'; codeEl.textContent=code;
    const resEl  = document.createElement('div'); resEl.className='ws-result';
    const textSpan = document.createElement('span'); textSpan.className='ws-result-text'; textSpan.textContent='…';
    resEl.appendChild(textSpan);
    entry.append(codeEl, resEl); wsh.appendChild(entry); wsh.scrollTop=wsh.scrollHeight;
    const globOop = roots['Globals'] || roots['UserGlobals'];
    if (!globOop) { resEl.className='ws-result error'; textSpan.textContent='Not connected'; return; }
    try {
      const d = await api(`/object/evaluate/${globOop}?code=${encodeURIComponent(code)}&language=smalltalk&depth=1`);
      if (!d.success) { resEl.className='ws-result error'; textSpan.textContent='Error: '+d.exception; return; }
      const [isExc, rv] = d.result;
      if (isExc) { resEl.className='ws-result error'; textSpan.textContent='⚑ '+(rv.inspection||'Exception'); }
      else {
        textSpan.textContent = '=> ' + (rv.inspection||'nil');
        const isLeaf = ['string','symbol','fixnum','float','boolean','nilclass'].includes(rv.basetype);
        if (!isLeaf && rv.oop) {
          const chip = makeChip(rv.inspection||'result', rv.oop, id);
          resEl.appendChild(chip);
          const nav = document.createElement('span'); nav.className='ws-nav'; nav.textContent='inspect →';
          nav.addEventListener('click', () => openObjectBrowser(rv.oop, rv.inspection||'result'));
          resEl.appendChild(nav);
        }
      }
    } catch(e) { resEl.className='ws-result error'; textSpan.textContent='Error: '+e.message; }
    wsh.scrollTop=wsh.scrollHeight;
  }
  return win;
}

// WEB BROWSER WINDOW
// ═══════════════════════════════════════════════════════════════════════════════
function openWebBrowser(initialUrl) {
  const {win, body, id} = createWindow({title:'Web Browser', width:700, height:520, taskbarLabel:'Web Browser'});
  const defaultUrl = initialUrl || 'https://pandas.pydata.org';
  body.style.cssText = 'display:flex;flex-direction:column;overflow:hidden;min-height:0';
  body.innerHTML = `
    <div class="wb-urlbar" style="flex-shrink:0">
      <label>URL</label>
      <input class="wb-url-input" id="${id}-url" type="text" value="${escHtml(defaultUrl)}">
      <button class="btn-ghost" id="${id}-go">Go</button>
      <button class="btn-ghost" id="${id}-reload">↺</button>
    </div>
    <div class="wb-iframe-wrap" style="flex:1;min-height:0;overflow:hidden">
      <iframe id="${id}-iframe" src="${escHtml(defaultUrl)}" style="width:100%;height:100%;border:none;background:#fff"></iframe>
    </div>
  `;
  const urlInput = body.querySelector(`#${id}-url`);
  const iframe   = body.querySelector(`#${id}-iframe`);
  function navigate() { iframe.src = urlInput.value; }
  body.querySelector(`#${id}-go`).addEventListener('click', navigate);
  body.querySelector(`#${id}-reload`).addEventListener('click', () => { iframe.src = iframe.src; });
  urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') navigate(); });
  return win;
}
