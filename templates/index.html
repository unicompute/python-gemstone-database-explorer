<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GemStone Database Explorer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      background: #11111b;
      color: #cdd6f4;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* ── desktop ──────────────────────────────────────────────────────── */
    #desktop {
      position: absolute;
      inset: 0;
      bottom: 32px;
      overflow: hidden;
    }

    /* SVG arrow canvas — covers full desktop, pointer-events off so clicks pass through */
    #arrow-canvas {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: visible;
      z-index: 0;
    }

    /* ── taskbar ──────────────────────────────────────────────────────── */
    #taskbar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 32px;
      background: #181825;
      border-top: 1px solid #313244;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0 8px;
      z-index: 9999;
      flex-shrink: 0;
    }
    #taskbar-title {
      font-size: 11px;
      font-weight: 700;
      color: #cba6f7;
      margin-right: 8px;
      white-space: nowrap;
    }
    #taskbar-version { font-size: 10px; color: #45475a; margin-right: 8px; }
    #taskbar-sep { flex: 1; }
    .taskbar-btn {
      padding: 2px 10px;
      font-size: 11px;
      background: #313244;
      border: 1px solid #45475a;
      color: #cdd6f4;
      border-radius: 3px;
      cursor: pointer;
      white-space: nowrap;
    }
    .taskbar-btn:hover { background: #45475a; }
    .taskbar-btn.active { background: #45475a; border-color: #cba6f7; color: #cba6f7; }
    #status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #a6e3a1; display: inline-block; flex-shrink: 0;
    }
    #status-dot.error { background: #f38ba8; }
    #status-txt { font-size: 10px; color: #a6adc8; white-space: nowrap; }
    #halted-threads-bar {
      display: flex; gap: 4px; align-items: center;
    }
    .thread-pill {
      padding: 1px 8px;
      font-size: 10px;
      background: #f38ba8;
      color: #1e1e2e;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
    }
    .thread-pill:hover { background: #eba0ac; }

    /* ── floating window ─────────────────────────────────────────────── */
    .win {
      position: absolute;
      background: #1e1e2e;
      border: 1px solid #45475a;
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 32px rgba(0,0,0,.6);
      min-width: 320px;
      min-height: 180px;
      overflow: hidden;
      z-index: 10;
    }
    .win.focused { border-color: #cba6f7; }
    .win-titlebar {
      background: #181825;
      padding: 0 8px;
      height: 28px;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: move;
      user-select: none;
      flex-shrink: 0;
    }
    .win-title {
      font-size: 11px;
      font-weight: 600;
      color: #a6adc8;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .win-btn {
      width: 16px; height: 16px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 9px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .win-btn-close { background: #f38ba8; color: #1e1e2e; }
    .win-btn-close:hover { background: #eba0ac; }
    .win-btn-min { background: #f9e2af; color: #1e1e2e; }
    .win-btn-min:hover { background: #f2cdcd; }
    .win-body {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    /* resize handle */
    .win-resize {
      position: absolute;
      right: 0; bottom: 0;
      width: 14px; height: 14px;
      cursor: se-resize;
      z-index: 10;
    }
    .win-resize::after {
      content: '';
      position: absolute;
      right: 3px; bottom: 3px;
      width: 6px; height: 6px;
      border-right: 2px solid #45475a;
      border-bottom: 2px solid #45475a;
    }

    /* ── tab strip ───────────────────────────────────────────────────── */
    .tab-strip {
      display: flex;
      border-bottom: 1px solid #313244;
      background: #181825;
      flex-shrink: 0;
      overflow-x: auto;
    }
    .tab-item {
      padding: 5px 12px;
      font-size: 11px;
      color: #a6adc8;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      white-space: nowrap;
      user-select: none;
    }
    .tab-item:hover { color: #cdd6f4; }
    .tab-item.active { color: #89dceb; border-bottom-color: #89dceb; }

    /* ── breadcrumb ──────────────────────────────────────────────────── */
    .breadcrumb {
      padding: 4px 10px;
      font-size: 10px;
      color: #6c7086;
      border-bottom: 1px solid #1e1e2e;
      background: #181825;
      display: flex;
      gap: 3px;
      align-items: center;
      flex-wrap: wrap;
      flex-shrink: 0;
      min-height: 22px;
    }
    .breadcrumb .crumb { cursor: pointer; color: #89b4fa; }
    .breadcrumb .crumb:hover { text-decoration: underline; }
    .breadcrumb .crumb.cur { color: #cdd6f4; cursor: default; }
    .breadcrumb .sep { color: #45475a; }

    /* ── sidebar ─────────────────────────────────────────────────────── */
    .win-sidebar {
      width: 180px;
      border-right: 1px solid #313244;
      background: #181825;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }
    .win-sidebar h2 {
      font-size: 9px; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: #6c7086;
      padding: 6px 10px 3px;
    }
    .sidebar-list { list-style: none; overflow-y: auto; flex: 1; }
    .sidebar-list li {
      padding: 4px 10px;
      cursor: pointer;
      border-left: 3px solid transparent;
      font-size: 11px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .sidebar-list li:hover { background: #313244; }
    .sidebar-list li.active { border-left-color: #cba6f7; color: #cba6f7; }

    /* ── object inspector ────────────────────────────────────────────── */
    .inspector-strip {
      display: flex;
      border-bottom: 1px solid #313244;
      background: #181825;
      flex-shrink: 0;
      overflow-x: auto;
    }
    .inspector-tab {
      padding: 4px 10px;
      font-size: 10px;
      color: #6c7086;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      white-space: nowrap;
    }
    .inspector-tab:hover { color: #a6adc8; }
    .inspector-tab.active { color: #89dceb; border-bottom-color: #89dceb; }

    .inspector-body {
      flex: 1;
      overflow-y: auto;
      padding: 6px 8px;
    }

    /* ── table ───────────────────────────────────────────────────────── */
    table.dbtable { border-collapse: collapse; width: 100%; }
    table.dbtable th {
      text-align: left; font-size: 9px; color: #6c7086;
      padding: 2px 6px; border-bottom: 1px solid #313244;
      background: #181825; text-transform: uppercase; letter-spacing: .04em;
    }
    table.dbtable td {
      padding: 2px 6px; vertical-align: top;
      border-bottom: 1px solid #1e1e2e; font-size: 11px;
    }
    table.dbtable td.col-key { color: #f5c2e7; font-family: monospace; min-width: 80px; max-width: 160px; }
    table.dbtable td.col-val { font-family: monospace; color: #a6e3a1; }
    table.dbtable tr:hover td { background: #181825; }
    .link-oop { color: #89b4fa; cursor: pointer; text-decoration: none; }
    .link-oop:hover { text-decoration: underline; }
    .more-row { font-size: 10px; color: #6c7086; padding: 3px 6px; }

    /* ── hierarchy tree ──────────────────────────────────────────────── */
    .hierarchy-tree { list-style: none; padding: 6px 0; }
    .hierarchy-tree li {
      display: flex; align-items: center; gap: 6px;
      padding: 2px 0; font-family: monospace; font-size: 11px;
    }
    .tree-indent { display: inline-block; width: 16px; flex-shrink: 0; }
    .tree-connector {
      display: inline-block; width: 14px; height: 14px;
      border-left: 2px solid #45475a; border-bottom: 2px solid #45475a;
      flex-shrink: 0; margin-left: 2px;
    }
    .tree-link {
      background: none; border: none; padding: 0; margin: 0;
      color: #89b4fa; font: inherit; cursor: pointer;
      text-align: left;
    }
    .tree-link:hover { text-decoration: underline; }
    .tree-meta {
      color: #6c7086; font-size: 10px; margin-left: 6px;
      white-space: nowrap;
    }

    /* ── instances table ─────────────────────────────────────────────── */
    .instances-tbl-wrap { overflow: auto; flex: 1; }
    .instances-tbl-wrap table.dbtable td { white-space: nowrap; }
    .inst-pagination {
      display: flex; gap: 5px; align-items: center; padding: 4px 8px;
      border-top: 1px solid #313244; background: #181825; flex-shrink: 0;
    }
    .inst-page-btn {
      background: #313244; border: 1px solid #45475a; color: #cdd6f4;
      border-radius: 3px; padding: 1px 8px; font-size: 10px; cursor: pointer;
    }
    .inst-page-btn.active { background: #45475a; border-color: #cba6f7; color: #cba6f7; }

    /* ── eval panel ──────────────────────────────────────────────────── */
    .eval-panel {
      border-top: 1px solid #313244;
      background: #181825;
      padding: 5px 8px;
      display: flex; flex-direction: column; gap: 4px;
      flex-shrink: 0;
    }
    .eval-panel label { font-size: 9px; color: #6c7086; text-transform: uppercase; letter-spacing: .05em; }
    .eval-code {
      font-family: monospace; font-size: 11px;
      background: #1e1e2e; color: #cdd6f4;
      border: 1px solid #313244; border-radius: 3px;
      padding: 4px 6px; resize: vertical; min-height: 44px; outline: none;
    }
    .eval-controls { display: flex; align-items: center; gap: 6px; }
    .eval-result-wrap { font-family: monospace; font-size: 10px; }
    .eval-result { color: #a6e3a1; }
    .eval-result.error { color: #f38ba8; }

    /* ── buttons ─────────────────────────────────────────────────────── */
    button.btn {
      background: #cba6f7; color: #1e1e2e;
      border: none; border-radius: 3px;
      padding: 3px 10px; font-weight: 700; cursor: pointer; font-size: 11px;
    }
    button.btn:hover { background: #b4befe; }
    button.btn-ghost {
      background: transparent; border: 1px solid #45475a; color: #cdd6f4;
      border-radius: 3px; padding: 2px 8px; cursor: pointer; font-size: 11px;
    }
    button.btn-ghost:hover { background: #313244; }
    button.btn-tx {
      background: #e08020; color: #fff;
      border: none; border-radius: 3px;
      padding: 3px 12px; font-weight: 700; cursor: pointer; font-size: 11px;
    }
    button.btn-tx:hover { background: #c06010; }
    button.btn-tx.active { background: #a6e3a1; color: #1e1e2e; }
    button.btn-dbg {
      background: #1e6fba; color: #fff;
      border: none; border-radius: 3px;
      padding: 4px 14px; font-weight: 700; cursor: pointer; font-size: 12px;
      flex: 1;
    }
    button.btn-dbg:hover { background: #1559a0; }

    /* ── txbar ───────────────────────────────────────────────────────── */
    .txbar {
      background: #181825; border-top: 1px solid #313244;
      padding: 4px 8px; display: flex; gap: 5px; align-items: center; flex-shrink: 0;
      flex-wrap: wrap;
    }
    .txbar span { font-size: 10px; color: #6c7086; }
    .txbar-result {
      font-size: 10px; font-family: monospace; color: #a6e3a1;
      padding: 2px 6px; background: #1a3a1a; border-radius: 3px;
    }
    .txbar-result.error { color: #f38ba8; background: #3a1a1a; }

    /* ── workspace ───────────────────────────────────────────────────── */
    .ws-history {
      flex: 1; overflow-y: auto; padding: 6px 10px;
      font-family: monospace; font-size: 12px;
    }
    .ws-entry { margin-bottom: 6px; }
    .ws-code { color: #cdd6f4; white-space: pre-wrap; word-break: break-all; }
    .ws-result {
      background: #1a3a1a; color: #a6e3a1;
      padding: 3px 8px; border-radius: 3px;
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
      margin-top: 2px;
    }
    .ws-result.error { background: #3a1a1a; color: #f38ba8; }
    .ws-result-text { white-space: pre-wrap; word-break: break-all; flex: 1; }
    .ws-nav { font-size: 10px; color: #89b4fa; cursor: pointer; }
    .ws-nav:hover { text-decoration: underline; }
    .ws-input-row {
      border-top: 1px solid #313244; display: flex;
      flex-direction: column; flex-shrink: 0;
      background: #181825; padding: 5px 8px; gap: 4px;
    }
    .ws-code-area {
      font-family: monospace; font-size: 12px;
      background: #1e1e2e; color: #cdd6f4;
      border: 1px solid #313244; border-radius: 3px;
      padding: 4px 6px; resize: vertical; min-height: 52px; outline: none;
    }
    .ws-controls { display: flex; gap: 5px; align-items: center; }
    .ws-hint { font-size: 9px; color: #45475a; margin-left: auto; }

    /* ── inline object chip ──────────────────────────────────────────── */
    .obj-chip {
      display: inline-flex; align-items: center; gap: 0;
      background: #2d2d45; border: 1px solid #45475a;
      border-radius: 4px; font-family: monospace; font-size: 11px;
      cursor: pointer; user-select: none; vertical-align: middle;
      position: relative;
    }
    .obj-chip:hover { border-color: #89b4fa; }
    .obj-chip.dragging { opacity: .5; cursor: grabbing; }
    .obj-chip-text {
      padding: 1px 5px 1px 6px;
      color: #89dceb; max-width: 160px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .obj-chip-caret {
      padding: 1px 5px 1px 3px;
      color: #6c7086; border-left: 1px solid #313244;
      font-size: 9px;
    }
    .obj-chip:hover .obj-chip-caret { color: #a6adc8; }
    /* chip dropdown */
    .chip-dropdown {
      position: absolute; top: 100%; left: 0; z-index: 99999;
      background: #24273a; border: 1px solid #45475a; border-radius: 5px;
      min-width: 200px; padding: 6px;
      display: none; flex-direction: column; gap: 5px;
      box-shadow: 0 4px 20px rgba(0,0,0,.7);
    }
    .chip-dropdown.open { display: flex; }
    .chip-dd-label {
      font-size: 9px; color: #6c7086; text-transform: uppercase; letter-spacing: .05em;
    }
    .chip-dd-code {
      font-family: monospace; font-size: 11px;
      background: #1e1e2e; color: #cdd6f4;
      border: 1px solid #313244; border-radius: 3px;
      padding: 3px 5px; resize: vertical; min-height: 36px; outline: none; width: 100%;
    }
    .chip-dd-controls { display: flex; gap: 5px; align-items: center; }
    .chip-dd-lang { font-size: 10px; background: #313244; border: none; color: #a6adc8; border-radius: 3px; padding: 2px 6px; cursor: pointer; }
    .chip-dd-lang.active { background: #cba6f7; color: #1e1e2e; }
    .chip-dd-result {
      font-family: monospace; font-size: 10px; color: #a6e3a1;
      background: #1a3a1a; border-radius: 3px; padding: 2px 5px; word-break: break-all;
    }
    .chip-dd-result.error { color: #f38ba8; background: #3a1a1a; }

    /* ── method browser ──────────────────────────────────────────────── */
    .mb-header {
      padding: 4px 8px; font-size: 10px; font-weight: 700; color: #a6adc8;
      border-bottom: 1px solid #313244; background: #24273a;
      display: flex; align-items: center; gap: 5px; flex-shrink: 0;
    }
    .mb-header span { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .mb-action {
      background: #313244; border: 1px solid #45475a; color: #cdd6f4;
      cursor: pointer; font-size: 9px; padding: 1px 6px; border-radius: 3px;
      flex-shrink: 0;
    }
    .mb-action:hover:not(:disabled) { background: #45475a; }
    .mb-action:disabled { opacity: 0.5; cursor: default; }
    .mb-close {
      background: none; border: none; color: #6c7086;
      cursor: pointer; font-size: 13px; padding: 0 2px;
    }
    .mb-close:hover { color: #f38ba8; }
    .mb-split { display: flex; flex: 1; overflow: hidden; }
    .mb-cats {
      width: 120px; border-right: 1px solid #313244;
      overflow-y: auto; flex-shrink: 0;
    }
    .mb-sels { flex: 1; overflow-y: auto; border-right: 1px solid #313244; }
    .mb-src { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    .mb-src textarea {
      flex: 1; background: #1e1e2e; color: #a6e3a1;
      border: none; font-family: monospace; font-size: 11px;
      padding: 5px 6px; resize: none; outline: none;
    }
    .mb-cat, .mb-sel {
      padding: 3px 7px; font-size: 10px; cursor: pointer;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .mb-cat:hover, .mb-sel:hover { background: #313244; }
    .mb-cat.active { background: #45475a; color: #cba6f7; }
    .mb-sel.active { background: #45475a; color: #89dceb; }
    .mb-statusbar {
      font-size: 9px; color: #6c7086; padding: 3px 7px;
      background: #181825; border-top: 1px solid #313244;
      font-family: monospace; overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; flex-shrink: 0;
    }

    /* ── debugger ────────────────────────────────────────────────────── */
    .dbg-split {
      display: flex; flex-direction: column; flex: 1; overflow: hidden;
    }
    .dbg-frames-pane {
      flex: 1; overflow-y: auto; border-bottom: 1px solid #313244;
      min-height: 80px;
    }
    .dbg-frame-item {
      padding: 3px 8px; font-size: 11px; font-family: monospace;
      cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      border-left: 3px solid transparent;
      display: flex; align-items: center; gap: 6px;
    }
    .dbg-frame-item:hover { background: #313244; }
    .dbg-frame-item:focus-visible {
      outline: 1px solid #89b4fa;
      outline-offset: -1px;
    }
    .dbg-frame-item.active {
      background: #1e4f9f; border-left-color: #89b4fa; color: #cdd6f4;
    }
    .dbg-frame-icon {
      width: 12px; height: 12px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 7px; flex-shrink: 0;
      background: #f9e2af; color: #1e1e2e;
    }
    .dbg-frame-icon.ruby { background: #f38ba8; }
    .dbg-summary {
      display: flex; flex-direction: column; gap: 2px;
      padding: 6px 8px; border-bottom: 1px solid #313244;
      background: #181825; flex-shrink: 0;
    }
    .dbg-summary-source,
    .dbg-summary-error {
      font-family: monospace; font-size: 11px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .dbg-summary-source { color: #cdd6f4; }
    .dbg-summary-error { color: #f38ba8; }
    .dbg-action-bar {
      display: flex; flex-shrink: 0; border-bottom: 1px solid #313244;
    }
    .dbg-source-pane {
      flex: 1; overflow: hidden; display: flex; flex-direction: column;
    }
    .dbg-source-meta {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 8px; border-bottom: 1px solid #313244;
      background: #181825; color: #89b4fa; font-size: 10px;
      font-family: monospace; flex-shrink: 0;
    }
    .dbg-source-code {
      flex: 1; background: #181825; color: #cdd6f4;
      font-family: monospace; font-size: 11px; margin: 0;
      border: none; padding: 6px 8px; outline: none; overflow: auto;
      white-space: pre; line-height: 1.45;
    }
    .dbg-source-line {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 0 4px; border-left: 3px solid transparent;
    }
    .dbg-source-line.active {
      background: #313244;
      border-left-color: #89b4fa;
    }
    .dbg-source-lno {
      color: #6c7086; min-width: 26px; text-align: right; user-select: none;
      flex-shrink: 0;
    }
    .dbg-source-text {
      color: inherit; white-space: pre; min-width: 0;
    }
    .dbg-self-bar {
      display: flex; align-items: center; gap: 6px;
      padding: 3px 8px; border-top: 1px solid #313244;
      background: #181825; flex-shrink: 0; font-size: 10px;
    }
    .dbg-self-label { color: #6c7086; }
    .dbg-self-val {
      font-family: monospace; color: #cba6f7; flex: 1;
      overflow: hidden; text-overflow: ellipsis;
      display: flex; align-items: center; gap: 6px; min-width: 0;
    }
    .dbg-var-row {
      display: flex; align-items: center; gap: 6px;
      padding: 3px 8px; border-top: 1px solid #313244;
      background: #181825; flex-shrink: 0;
    }
    .dbg-var-row select {
      background: #1e1e2e; color: #cdd6f4; border: 1px solid #45475a;
      border-radius: 3px; font-size: 11px; padding: 2px 5px; flex: 1;
    }
    .dbg-var-val {
      font-size: 11px; font-family: monospace; color: #a6e3a1;
      display: flex; align-items: center; gap: 6px; min-width: 0; flex: 1;
    }
    .dbg-tls-list { list-style: none; padding: 4px 0; }
    .dbg-tls-list li {
      padding: 2px 8px; font-size: 11px; font-family: monospace;
      display: flex; align-items: center; gap: 8px;
    }

<script>
'use strict';

// ── utilities ─────────────────────────────────────────────────────────────────
const desktop = document.getElementById('desktop');
const arrowCanvas = document.getElementById('arrow-canvas');
let zTop = 100;

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function api(url, opts) {
  const r = await fetch(url, opts);
  const text = await r.text();
  let data = null;
  try {
    data = text ? JSON.parse(text) : null;
  } catch (_) {
    data = null;
  }
  if (!r.ok) {
    const detail = data?.exception || data?.error || text || `HTTP ${r.status}`;
    throw new Error(detail);
  }
  return data;
}
async function apiPost(url, body) {
  return api(url, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
}
async function apiEvaluate(oop, {code, language='smalltalk', depth=2, ranges={}} = {}) {
  return apiPost(`/object/evaluate/${oop}`, {code, language, depth, ranges});
}
async function apiTransaction(url) {
  return apiPost(url, {});
}
function apiWithParams(url, params = {}) {
  const qs = new URLSearchParams();
  Object.entries(params).forEach(([key, value]) => {
    if (value === undefined || value === null || value === '') return;
    qs.set(key, String(value));
  });
  const suffix = qs.toString();
  return api(suffix ? `${url}?${suffix}` : url);
}

function setStatus(ok, msg) {
  document.getElementById('status-dot').className = ok ? '' : 'error';
  document.getElementById('status-txt').textContent = msg;
}

const LEAF_BASETYPES = new Set(['string', 'symbol', 'fixnum', 'float', 'boolean', 'nilclass']);
const windowState = new Map();

function isLeafBasetype(basetype) {
  return LEAF_BASETYPES.has(basetype);
}

function shortLabel(value, max = 32) {
  const text = String(value ?? '').replace(/\s+/g, ' ').trim();
  if (!text) return '';
  return text.length > max ? text.slice(0, max - 1) + '…' : text;
}

function upsertWindowState(id, patch) {
  const current = windowState.get(id) || {};
  windowState.set(id, {...current, ...patch});
}

function shouldDrawManualArrow(sourceWinId) {
  if (!sourceWinId) return false;
  const source = windowState.get(sourceWinId);
  return !source || source.kind !== 'object';
}

function clampLinkedWindowPosition(x, y, width=520, height=480) {
  const maxX = Math.max(0, window.innerWidth - width - 10);
  const maxY = Math.max(0, window.innerHeight - height - 42);
  return {
    x: Math.max(0, Math.min(Math.round(x), maxX)),
    y: Math.max(0, Math.min(Math.round(y), maxY)),
  };
}

function positionLinkedWindowOutsideSource(sourceEl, width=520, height=480, seedX, seedY) {
  if (!sourceEl) {
    return (seedX !== undefined && seedY !== undefined)
      ? clampLinkedWindowPosition(seedX, seedY, width, height)
      : {};
  }

  const rect = sourceEl.getBoundingClientRect();
  const gap = 36;
  const fallbackX = seedX !== undefined ? seedX : rect.left + 28;
  const fallbackY = seedY !== undefined ? seedY : rect.top + 28;
  const candidates = [
    {x: rect.right + gap, y: fallbackY},
    {x: rect.left - width - gap, y: fallbackY},
    {x: fallbackX, y: rect.bottom + gap},
    {x: fallbackX, y: rect.top - height - gap},
  ];

  let best = null;
  let bestScore = -Infinity;
  for (const candidate of candidates) {
    const clamped = clampLinkedWindowPosition(candidate.x, candidate.y, width, height);
    const overflowPenalty = Math.abs(candidate.x - clamped.x) + Math.abs(candidate.y - clamped.y);
    const overlapsHorizontally = clamped.x < rect.right && clamped.x + width > rect.left;
    const overlapsVertically = clamped.y < rect.bottom && clamped.y + height > rect.top;
    const overlapPenalty = overlapsHorizontally && overlapsVertically ? 100000 : 0;
    const score = -(overflowPenalty + overlapPenalty);
    if (score > bestScore) {
      bestScore = score;
      best = clamped;
    }
  }
  return best || clampLinkedWindowPosition(fallbackX, fallbackY, width, height);
}

function resolveLinkedWindowPosition({sourceWinId, x, y, width=520, height=480}) {
  const sourceEl = sourceWinId ? document.getElementById(sourceWinId) : null;
  const manualArrow = shouldDrawManualArrow(sourceWinId);
  if (!sourceEl) {
    return (x !== undefined && y !== undefined)
      ? clampLinkedWindowPosition(x, y, width, height)
      : {};
  }

  if (x === undefined || y === undefined) {
    return manualArrow
      ? positionLinkedWindowOutsideSource(sourceEl, width, height, x, y)
      : {};
  }

  const sourceRect = sourceEl.getBoundingClientRect();
  const overlapX = Math.max(0, Math.min(x + width, sourceRect.right) - Math.max(x, sourceRect.left));
  const overlapY = Math.max(0, Math.min(y + height, sourceRect.bottom) - Math.max(y, sourceRect.top));
  const overlapArea = overlapX * overlapY;
  const minVisibleThreshold = width * height * 0.08;
  if (manualArrow && overlapArea > minVisibleThreshold) {
    return positionLinkedWindowOutsideSource(sourceEl, width, height, x, y);
  }

  return clampLinkedWindowPosition(x, y, width, height);
}

function openLinkedObjectWindow({oop, text, sourceWinId, arrowType='ref', arrowLabel='', x, y}) {
  if (!oop) return null;
  const pos = resolveLinkedWindowPosition({sourceWinId, x, y});
  const newWin = openObjectBrowser(oop, text, pos.x, pos.y);
  if (sourceWinId && newWin && shouldDrawManualArrow(sourceWinId)) {
    drawArrow(sourceWinId, newWin.id, arrowLabel, arrowType);
  }
  return newWin;
}

function attachObjectButtonBehavior(el, {oop, text, sourceWinId, arrowType='ref', arrowLabel=''} = {}) {
  if (!el || !oop) return el;
  el.dataset.objButton = '1';
  el.draggable = true;
  el.addEventListener('click', e => {
    e.stopPropagation();
    openLinkedObjectWindow({oop, text, sourceWinId, arrowType, arrowLabel});
  });
  el.addEventListener('dragstart', e => {
    el.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'copy';
    e.dataTransfer.setData('text/plain', JSON.stringify({
      oop,
      text,
      srcWinId: sourceWinId,
      arrowType,
      arrowLabel,
    }));
  });
  el.addEventListener('dragend', () => el.classList.remove('dragging'));
  return el;
}

// ── windowing system ──────────────────────────────────────────────────────────
let winCount = 0;

// Track cascade position independently from winCount so minimised/closed windows don't displace new ones
let cascadeX = 30, cascadeY = 30;
const CASCADE_STEP = 36, CASCADE_MAX_X = 400, CASCADE_MAX_Y = 300;

function createWindow({title, width=640, height=480, x, y, taskbarLabel}) {
  const id = 'win-' + (++winCount);
  const w = width, h = height;
  let lx, ly;
  if (x !== undefined && y !== undefined) {
    lx = x; ly = y;
  } else if (x !== undefined) {
    lx = x; ly = cascadeY;
  } else if (y !== undefined) {
    ly = y; lx = cascadeX;
  } else {
    lx = cascadeX; ly = cascadeY;
    cascadeX += CASCADE_STEP; cascadeY += CASCADE_STEP;
    if (cascadeX > CASCADE_MAX_X || cascadeY > CASCADE_MAX_Y) { cascadeX = 30; cascadeY = 30; }
  }
  // only clamp when position was auto-calculated (not explicitly provided)
  const explicitPos = (x !== undefined || y !== undefined);
  if (!explicitPos) {
    lx = Math.max(0, Math.min(lx, Math.max(0, window.innerWidth  - w - 10)));
    ly = Math.max(0, Math.min(ly, Math.max(0, window.innerHeight - h - 42)));
  }

  const win = document.createElement('div');
  win.className = 'win';
  win.id = id;
  win.style.cssText = `left:${lx}px;top:${ly}px;width:${w}px;height:${h}px;z-index:${++zTop}`;

  win.innerHTML = `
    <div class="win-titlebar" data-win="${id}" id="${id}-titlebar">
      <button class="win-btn win-btn-close" title="Close">✕</button>
      <button class="win-btn win-btn-min" title="Minimise">–</button>
      <span class="win-title" id="${id}-title-text">${escHtml(title)}</span>
    </div>
    <div class="win-body"></div>
    <div class="win-resize" data-win="${id}"></div>
  `;

  desktop.appendChild(win);
  makeDraggable(win);
  makeResizable(win);
  focusWin(win);

  win.querySelector('.win-btn-close').addEventListener('click', () => closeWindow(win, id));
  win.querySelector('.win-btn-min').addEventListener('click', () => toggleMinimise(win, id));

  // taskbar button
  const tbBtn = document.createElement('button');
  tbBtn.className = 'taskbar-btn';
  tbBtn.textContent = taskbarLabel || title.slice(0,20);
  tbBtn.id = 'tb-' + id;
  tbBtn.addEventListener('click', () => {
    if (win.dataset.minimised === '1') { toggleMinimise(win, id); }
    focusWin(win);
  });
  document.getElementById('halted-threads-bar').before(tbBtn);

  win.addEventListener('mousedown', () => focusWin(win));
  upsertWindowState(id, {kind: 'generic', title});

  return {win, body: win.querySelector('.win-body'), id};
}

function focusWin(win) {
  document.querySelectorAll('.win').forEach(w => w.classList.remove('focused'));
  win.classList.add('focused');
  win.style.zIndex = ++zTop;
  document.querySelectorAll('.taskbar-btn').forEach(b => b.classList.remove('active'));
  const tb = document.getElementById('tb-' + win.id);
  if (tb) tb.classList.add('active');
}

function closeWindow(win, id) {
  removeArrowsFor(id);
  windowState.delete(id);
  win.remove();
  const tb = document.getElementById('tb-' + id);
  if (tb) tb.remove();
}

function toggleMinimise(win, id) {
  const body = win.querySelector('.win-body');
  const res  = win.querySelector('.win-resize');
  if (win.dataset.minimised === '1') {
    win.dataset.minimised = '0';
    body.style.display = '';
    if (res) res.style.display = '';
    win.style.height = win.dataset.savedH || '480px';
  } else {
    win.dataset.minimised = '1';
    win.dataset.savedH = win.style.height;
    body.style.display = 'none';
    if (res) res.style.display = 'none';
    win.style.height = '28px';
  }
  redrawArrows();
}

function makeDraggable(win) {
  const bar = win.querySelector('.win-titlebar');
  let ox, oy, startX, startY;
  bar.addEventListener('mousedown', e => {
    if (e.target.tagName === 'BUTTON' || e.target.closest('[data-obj-button="1"]')) return;
    e.preventDefault();
    focusWin(win);
    startX = e.clientX; startY = e.clientY;
    ox = win.offsetLeft; oy = win.offsetTop;
    const move = e2 => {
      win.style.left = Math.max(0, ox + e2.clientX - startX) + 'px';
      win.style.top  = Math.max(0, oy + e2.clientY - startY) + 'px';
      redrawArrows();
    };
    const up = () => { document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', up); };
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
  });
}

function makeResizable(win) {
  const handle = win.querySelector('.win-resize');
  if (!handle) return;
  let startX, startY, startW, startH;
  handle.addEventListener('mousedown', e => {
    e.preventDefault(); e.stopPropagation();
    startX = e.clientX; startY = e.clientY;
    startW = win.offsetWidth; startH = win.offsetHeight;
    const move = e2 => {
      win.style.width  = Math.max(320, startW + e2.clientX - startX) + 'px';
      win.style.height = Math.max(180, startH + e2.clientY - startY) + 'px';
      redrawArrows();
    };
    const up = () => { document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', up); };
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
  });
}

// ── SVG arrows between windows ────────────────────────────────────────────────
const arrows = []; // {srcWinId, dstWinId, label, type, auto, g, path, txt}

function drawArrow(srcWinId, dstWinId, label='', type='ref', {auto=false} = {}) {
  const cleanLabel = shortLabel(label, 48);
  const existing = arrows.find(a =>
    a.srcWinId === srcWinId &&
    a.dstWinId === dstWinId &&
    a.type === type &&
    a.label === cleanLabel &&
    a.auto === auto
  );
  if (existing) return existing;
  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  const colors = {ref:'#6c7086', class:'#9b59bb', superclass:'#346789', error:'#c50b0b'};
  const color = colors[type] || '#6c7086';
  const markerMap = {ref:'arr-head', class:'arr-head', superclass:'arr-head-blue', error:'arr-head-red'};
  path.setAttribute('stroke', color);
  path.setAttribute('stroke-width', type === 'superclass' ? '2' : '1.5');
  path.setAttribute('fill', 'none');
  if (type !== 'superclass') path.setAttribute('stroke-dasharray', '6 3');
  path.setAttribute('marker-end', `url(#${markerMap[type]||'arr-head'})`);
  g.appendChild(path);
  if (cleanLabel) {
    const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('fill', color); txt.setAttribute('font-size','9');
    txt.setAttribute('font-family','monospace'); txt.textContent = cleanLabel;
    g.appendChild(txt);
  }
  arrowCanvas.appendChild(g);
  const entry = {srcWinId, dstWinId, label: cleanLabel, type, auto, g, path, txt: g.querySelector('text')};
  arrows.push(entry);
  _updateArrow(entry);
  return entry;
}

function _updateArrow(entry) {
  const sw = document.getElementById(entry.srcWinId);
  const dw = document.getElementById(entry.dstWinId);
  if (!sw || !dw) { entry.g.remove(); return; }
  const sr = sw.getBoundingClientRect();
  const dr = dw.getBoundingClientRect();
  const cr = arrowCanvas.getBoundingClientRect();
  const sx = sr.left - cr.left + sr.width / 2;
  const sy = sr.top  - cr.top  + sr.height;
  const dx = dr.left - cr.left + dr.width / 2;
  const dy = dr.top  - cr.top;
  const siblings = arrows.filter(a => a.srcWinId === entry.srcWinId && a.dstWinId === entry.dstWinId);
  const siblingIndex = siblings.indexOf(entry);
  const spread = (siblingIndex - (siblings.length - 1) / 2) * 24;
  const cx1 = sx + spread, cy1 = sy + 40;
  const cx2 = dx + spread, cy2 = dy - 40;
  entry.path.setAttribute('d', `M${sx},${sy} C${cx1},${cy1} ${cx2},${cy2} ${dx},${dy}`);
  if (entry.txt) {
    const mx = (sx + dx) / 2 + spread * 0.35;
    const my = (sy + dy) / 2 - 6 - Math.abs(spread) * 0.15;
    entry.txt.setAttribute('x', mx); entry.txt.setAttribute('y', my);
    entry.txt.setAttribute('text-anchor','middle');
  }
}

function redrawArrows() {
  for (const a of arrows) _updateArrow(a);
}

function removeArrowsWhere(predicate) {
  for (let i = arrows.length - 1; i >= 0; i--) {
    if (predicate(arrows[i])) {
      arrows[i].g.remove();
      arrows.splice(i, 1);
    }
  }
}

function removeArrowsFor(winId) {
  removeArrowsWhere(a => a.srcWinId === winId || a.dstWinId === winId);
}

function collectObjectLinks(obj, targetOop) {
  if (!obj || targetOop == null) return [];

  const links = [];
  const pushLink = (type, label='') => {
    const cleanLabel = shortLabel(label, 48);
    if (!links.some(link => link.type === type && link.label === cleanLabel)) {
      links.push({type, label: cleanLabel});
    }
  };

  if (obj.classObject?.oop === targetOop) pushLink('class');
  if (obj.superclassObject?.oop === targetOop) pushLink('superclass');

  for (const [idx, pair] of Object.entries(obj.instVars || {})) {
    if (!Array.isArray(pair) || pair.length < 2) continue;
    const [nameV, valV] = pair;
    const keyText = shortLabel(nameV?.inspection || idx, 24) || idx;

    if (obj.basetype === 'hash') {
      if (nameV?.oop === targetOop && !isLeafBasetype(nameV?.basetype)) {
        pushLink('ref', `key ${keyText}`);
      }
      if (valV?.oop === targetOop && !isLeafBasetype(valV?.basetype)) {
        pushLink('ref', keyText);
      }
      continue;
    }

    if (valV?.oop === targetOop && !isLeafBasetype(valV?.basetype)) {
      pushLink('ref', keyText);
    }
  }

  return links;
}

function syncObjectWindowArrows(winId) {
  removeArrowsWhere(a => a.auto && (a.srcWinId === winId || a.dstWinId === winId));

  const source = windowState.get(winId);
  if (!source || source.kind !== 'object' || !source.object?.oop) {
    redrawArrows();
    return;
  }

  for (const [otherId, other] of windowState.entries()) {
    if (otherId === winId || other.kind !== 'object' || !other.object?.oop) continue;

    for (const link of collectObjectLinks(source.object, other.object.oop)) {
      drawArrow(winId, otherId, link.label, link.type, {auto: true});
    }
    for (const link of collectObjectLinks(other.object, source.object.oop)) {
      drawArrow(otherId, winId, link.label, link.type, {auto: true});
    }
  }

  redrawArrows();
}

// ── inline object chip (ClassName▼ button) ────────────────────────────────────
function makeChip(text, oop, winId, evalContext) {
  const wrap = document.createElement('span');
  wrap.className = 'obj-chip';
  wrap.draggable = true;
  wrap.innerHTML = `<span class="obj-chip-text">${escHtml(text)}</span><span class="obj-chip-caret">▼</span>`;

  // dropdown panel
  const dd = document.createElement('div');
  dd.className = 'chip-dropdown';
  let ddLang = 'smalltalk';
  dd.innerHTML = `
    <div class="chip-dd-label">${escHtml(text)}</div>
    <textarea class="chip-dd-code" placeholder="self printString"></textarea>
    <div class="chip-dd-controls">
      <button class="chip-dd-lang active" data-lang="smalltalk">Smalltalk</button>
      <button class="chip-dd-lang" data-lang="ruby">Ruby</button>
      <button class="btn" style="padding:2px 8px;font-size:10px">Print it</button>
      <button class="btn-ghost" style="padding:2px 8px;font-size:10px">Inspect →</button>
    </div>
    <div class="chip-dd-result hidden"></div>
  `;
  wrap.appendChild(dd);

  // language toggle
  dd.querySelectorAll('.chip-dd-lang').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      ddLang = btn.dataset.lang;
      dd.querySelectorAll('.chip-dd-lang').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  // print it
  const btns = dd.querySelectorAll('button');
  btns[2].addEventListener('click', async e => {
    e.stopPropagation();
    const code = dd.querySelector('.chip-dd-code').value.trim();
    if (!code || !oop) return;
    const resEl = dd.querySelector('.chip-dd-result');
    resEl.classList.remove('hidden','error'); resEl.textContent = '…';
    try {
      const d = await apiEvaluate(oop, {code, language: ddLang, depth: 1});
      if (!d.success) { resEl.classList.add('error'); resEl.textContent = 'Error: '+d.exception; return; }
      const [isExc, rv] = d.result;
      if (isExc) {
        resEl.classList.add('error');
        resEl.textContent = '⚑ '+(rv.inspection||'Exception');
        maybeOpenEvalDebugger(rv, code);
      }
      else resEl.textContent = rv.inspection || 'nil';
    } catch(e) { resEl.classList.add('error'); resEl.textContent = e.message; }
  });

  // inspect
  btns[3].addEventListener('click', e => {
    e.stopPropagation();
    dd.classList.remove('open');
    if (oop) {
      openLinkedObjectWindow({oop, text, sourceWinId: winId});
    }
  });

  // toggle dropdown
  wrap.querySelector('.obj-chip-caret').addEventListener('click', e => {
    e.stopPropagation();
    dd.classList.toggle('open');
  });

  // close dropdown when clicking outside
  document.addEventListener('click', e => {
    if (!wrap.contains(e.target)) dd.classList.remove('open');
  }, {capture: true});

  // drag to open inspector in new window
  wrap.addEventListener('dragstart', e => {
    wrap.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'copy';
    e.dataTransfer.setData('text/plain', JSON.stringify({
      oop,
      text,
      srcWinId: winId,
      arrowType: 'ref',
      arrowLabel: '',
    }));
  });
  wrap.addEventListener('dragend', () => wrap.classList.remove('dragging'));

  return wrap;
}

// drop on desktop opens inspector
desktop.addEventListener('dragover', e => e.preventDefault());
desktop.addEventListener('drop', e => {
  e.preventDefault();
  try {
    const data = JSON.parse(e.dataTransfer.getData('text/plain'));
    if (!data.oop) return;
    openLinkedObjectWindow({
      oop: data.oop,
      text: data.text,
      sourceWinId: data.srcWinId,
      arrowType: data.arrowType || 'ref',
      arrowLabel: data.arrowLabel || '',
      x: e.clientX - 200,
      y: e.clientY - 20,
    });
  } catch(_) {}
});

// ── halted thread poller ──────────────────────────────────────────────────────
let threadPollTimer = null;
async function refreshHaltedThreadsBar() {
  try {
    const d = await api('/debug/threads');
    const bar = document.getElementById('halted-threads-bar');
    bar.innerHTML = '';
    if (d.success && d.threads.length) {
      const lbl = document.createElement('span');
      lbl.style.cssText = 'font-size:10px;color:#f38ba8;margin-right:3px';
      lbl.textContent = 'Halted:';
      bar.appendChild(lbl);
      for (const t of d.threads) {
        const pillText = t.displayText || t.sourcePreview || t.exceptionText || t.printString || `oop:${t.oop}`;
        const pillTitle = [t.sourcePreview, t.exceptionText ? `⚑ ${t.exceptionText}` : '', t.printString]
          .filter(Boolean)
          .join('\n');
        const pill = document.createElement('span');
        pill.className = 'thread-pill';
        pill.textContent = pillText.slice(0, 30);
        pill.title = pillTitle || pillText;
        pill.addEventListener('click', () => openDebugger(t));
        bar.appendChild(pill);
      }
    }
  } catch (_) {}
}

function maybeOpenEvalDebugger(rv, code) {
  const threadOop = Number(rv?.debugThreadOop || 0);
  if (!(threadOop > 20)) return false;
  refreshHaltedThreadsBar();
  openDebugger({
    oop: threadOop,
    printString: rv?.inspection || 'Debugger',
    exceptionText: rv?.exceptionText || rv?.inspection || 'Exception',
    sourcePreview: rv?.sourcePreview || code || '',
  });
  return true;
}

function startThreadPoller() {
  clearInterval(threadPollTimer);
  refreshHaltedThreadsBar();
  threadPollTimer = setInterval(refreshHaltedThreadsBar, 3000);
}

          <div id="${id}-mb" class="hidden" style="width:300px;border-left:1px solid #313244;display:flex;flex-direction:column;background:#181825;flex-shrink:0">
            <div class="mb-header">
              <span id="${id}-mb-class">Methods</span>
              <button class="mb-action" id="${id}-mb-open-browser">Class Browser</button>
              <button class="mb-close" id="${id}-mb-close">✕</button>
            </div>
            <div class="mb-split">
              <div class="mb-cats" id="${id}-mb-cats"></div>
              <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
                <div class="mb-sels" id="${id}-mb-sels"></div>
                <div class="mb-src">
                  <textarea id="${id}-mb-src" readonly placeholder="Select a method…"></textarea>
                  <div class="mb-statusbar" id="${id}-mb-status">No method selected</div>

              </div>
            </div>
          </div>

        <div class="eval-panel">
          <label>Evaluate</label>
          <textarea class="eval-code" id="${id}-eval-code" placeholder="self printString"></textarea>
          <div class="eval-controls">
            <button class="btn" id="${id}-eval-btn">Evaluate</button>
            <span class="eval-result-wrap"><span class="eval-result" id="${id}-eval-res"></span></span>
          </div>
        </div>
        <div class="txbar">
          <span>Transaction:</span>
          <button class="btn-tx" id="${id}-abort">Abort</button>
          <button class="btn-tx" id="${id}-commit">Commit</button>
          <button class="btn-tx" id="${id}-continue" style="background:#4a90d9">Continue</button>
          <span id="${id}-tx-res" class="txbar-result hidden"></span>
        </div>
      </div>
    </div>
  `;

  // populate roots sidebar
  const rootsUl = body.querySelector(`#${id}-roots`);
  if (rootsUl) {
    for (const [label, oop] of Object.entries(roots)) {
      const li = document.createElement('li');
      li.textContent = label;
      li.dataset.oop = oop;
      li.addEventListener('click', () => { history = [{label, oop}]; loadObj(oop, label); });
      rootsUl.appendChild(li);
    }
  }

  // inspector tab switching
  function normalizeCodeTarget(target, fallbackOop = null, fallbackLabel = '') {
    if (!target || typeof target !== 'object') return null;
    const className = String(target.className || '').trim();
    const meta = !!target.meta;
    const label = String(target.label || (className ? `${className}${meta ? ' class' : ''}` : fallbackLabel || '')).trim();
    return {
      oop: Number.isFinite(target.oop) ? target.oop : fallbackOop,
      label,
      className,
      dictionary: String(target.dictionary || '').trim(),
      meta,
    };
  }

  function getCodeTarget(obj) {
    if (!obj?.oop) return null;
    const explicitTarget = normalizeCodeTarget(
      obj.classBrowserTarget,
      obj.superclassObject?.oop ? obj.oop : (obj.classObject?.oop ?? obj.oop),
      obj.superclassObject?.oop ? (obj.inspection || 'class') : (obj.classObject?.inspection || obj.inspection || 'object'),
    );
    if (explicitTarget?.oop) return explicitTarget;
    if (obj.superclassObject?.oop) {
      return {oop: obj.oop, label: obj.inspection || 'class'};
    }
    if (obj.classObject?.oop) {
      return {oop: obj.classObject.oop, label: obj.classObject.inspection || 'class'};
    }
    return {oop: obj.oop, label: obj.inspection || 'object'};
  }

  function parseClassBrowserTarget(ref) {
    let className = String(ref || '').trim();
    if (!className) return null;
    let meta = false;
    if (className.endsWith(' class')) {
      meta = true;
      className = className.slice(0, -6).trim();
    }
    return className ? {className, meta} : null;
  }

  function currentCodeBrowserTarget(selector = mbCurrentSelector) {
    const target = getCodeTarget(currentObjData);
    const parsed = target?.className ? target : parseClassBrowserTarget(target?.label || mbClassName || '');
    if (!parsed) return null;
    return selector ? {...parsed, method: selector} : parsed;
  }

  function updateMethodBrowserActions() {
    const openBtn = body.querySelector(`#${id}-mb-open-browser`);
    if (!openBtn) return;
    const target = currentCodeBrowserTarget();
    openBtn.disabled = !target;
    openBtn.title = target
      ? (target.method ? `Open ${target.className}${target.meta ? ' class' : ''} >> ${target.method}` : `Open ${target.className}${target.meta ? ' class' : ''}`)
      : 'Open the current method in Class Browser';
  }

  async function fetchMethodBrowserCached(name, keyParts, loader) {
    const cacheKey = `${name}:${JSON.stringify(keyParts || {})}`;
    const existing = methodBrowserCache.get(cacheKey);
    if (existing) {
      if (Object.prototype.hasOwnProperty.call(existing, 'value')) return existing.value;
      return existing.promise;
    }
    const promise = Promise.resolve()
      .then(loader)
      .then(value => {
        methodBrowserCache.set(cacheKey, {value});
        return value;
      })
      .catch(error => {
        if (methodBrowserCache.get(cacheKey)?.promise === promise) methodBrowserCache.delete(cacheKey);
        throw error;
      });
    methodBrowserCache.set(cacheKey, {promise});
    return promise;
  }

  function findSelectorCategory(data, selector) {
    if (!selector) return null;
    let fallback = null;
    Object.entries(data || {}).forEach(([category, selectors]) => {
      if (!Array.isArray(selectors) || !selectors.includes(selector)) return;
      if (category !== '(all Smalltalk)') fallback = category;
      else fallback = fallback || category;
    });
    return fallback;
  }

  function openCurrentCodeInClassBrowser(selector = mbCurrentSelector) {
    const target = currentCodeBrowserTarget(selector);
    if (!target) return false;
    openClassBrowser(target);
    return true;
  }

  function getAvailableInspectorTabs(obj) {
    if (Array.isArray(obj?.availableTabs) && obj.availableTabs.length) return obj.availableTabs;
    return ['instvars'];
  }

  function getCustomTab(tabId) {
    return (currentObjData?.customTabs || []).find(tab => tab.id === tabId) || null;
  }

  function getInspectorTabCaption(tabId) {
    const custom = getCustomTab(tabId);
    return custom?.caption || BUILTIN_ITAB_CAPTIONS[tabId] || tabId;
  }

  function renderInspectorTabs(obj) {
    const itabs = body.querySelector(`#${id}-itabs`);
    const available = getAvailableInspectorTabs(obj);
    itabs.innerHTML = '';
    available.forEach(tabId => {
      const tab = document.createElement('div');
      tab.className = 'inspector-tab' + (tabId === currentItab ? ' active' : '') + (tabId === 'control' ? ' dim' : '');
      tab.dataset.itab = tabId;
      tab.textContent = getInspectorTabCaption(tabId);
      itabs.appendChild(tab);
    });
    return available;
  }

  function applyItabVisibility(obj) {
    const mb = body.querySelector(`#${id}-mb`);
    const available = renderInspectorTabs(obj);
    if (!available.includes(currentItab)) {
      currentItab = (obj?.defaultTab && available.includes(obj.defaultTab)) ? obj.defaultTab : (available[0] || 'instvars');
      renderInspectorTabs(obj);
    }
    if (mb) mb.classList.toggle('hidden', currentItab !== 'code');
    const itabs = body.querySelector(`#${id}-itabs`);
    itabs.style.display = available.length > 1 ? 'flex' : 'none';
    updateMethodBrowserActions();
  }

  function activateItab(itabName) {
    const targetTab = body.querySelector(`#${id}-itabs [data-itab="${itabName}"]`);
    if (!targetTab) return false;
    body.querySelectorAll('.inspector-tab').forEach(t => t.classList.remove('active'));
    targetTab.classList.add('active');
    currentItab = itabName;
    if (currentItab === 'code') {
      body.querySelector(`#${id}-mb`).classList.remove('hidden');
      const codeTarget = getCodeTarget(currentObjData);
      if (codeTarget?.oop && mbClassOop !== codeTarget.oop) {
        openMB(codeTarget.oop, codeTarget.label);
      }
    } else {
      body.querySelector(`#${id}-mb`).classList.add('hidden');
    }
    updateMethodBrowserActions();
    showItab();
    return true;
  }

  body.querySelector(`#${id}-itabs`).addEventListener('click', e => {
    const tab = e.target.closest('.inspector-tab');
    if (!tab) return;
    activateItab(tab.dataset.itab);
  });

  body.querySelector(`#${id}-mb-open-browser`)?.addEventListener('click', () => {
    openCurrentCodeInClassBrowser();
  });

  // method browser close
  body.querySelector(`#${id}-mb-close`).addEventListener('click', () => {
    body.querySelector(`#${id}-mb`).classList.add('hidden');
    body.querySelectorAll('.inspector-tab').forEach(t => { if (t.dataset.itab==='instvars') { t.classList.add('active'); } else t.classList.remove('active'); });
    currentItab = 'instvars';
    showItab();
  });

  // eval
  const evalCode = body.querySelector(`#${id}-eval-code`);
  const evalRes  = body.querySelector(`#${id}-eval-res`);
  body.querySelector(`#${id}-eval-btn`)?.addEventListener('click', doEval);
  evalCode?.addEventListener('keydown', e => { if (e.ctrlKey && e.key === 'Enter') doEval(); });

  // tx buttons
  async function txAction(route, label) {
    const resEl = body.querySelector(`#${id}-tx-res`);
    if (resEl) {
      resEl.classList.remove('hidden','error');
      resEl.textContent = label + '…';
    }
    try {
      const d = await apiTransaction(route);
      if (resEl) {
        resEl.textContent = d.success ? (label + ' ok') : 'Error: ' + (d.exception||'');
        if (!d.success) resEl.classList.add('error');
      }
      if (d.success) clearInspectorTabCache(currentOop);
      setStatus(d.success, d.success ? label : d.exception||'error');
    } catch(e) {
      if (resEl) {
        resEl.classList.add('error');
        resEl.textContent = e.message;
      }
      setStatus(false, e.message);
    }
  }
  body.querySelector(`#${id}-abort`)?.addEventListener('click', async () => {
    await txAction('/transaction/abort','aborted');
    if (currentOop) reloadCurrentObject();
  });
  body.querySelector(`#${id}-commit`)?.addEventListener('click', () => txAction('/transaction/commit','committed'));
  body.querySelector(`#${id}-continue`)?.addEventListener('click', () => txAction('/transaction/continue','continued'));

  function normalizeObjectQuery(query) {
    const normalized = {};
    Object.entries(query || {}).forEach(([key, value]) => {
      if (value === undefined || value === null || value === '') return;
      normalized[key] = value;
    });
    return normalized;
  }

  function buildObjectIndexUrl(oop) {
    const qs = new URLSearchParams({depth: '2'});
    Object.entries(currentObjectQuery).forEach(([key, value]) => qs.set(key, String(value)));
    return `/object/index/${oop}?${qs.toString()}`;
  }

  function inspectorCacheFor(oop) {
    let cache = inspectorTabCache.get(oop);
    if (!cache) {
      cache = new Map();
      inspectorTabCache.set(oop, cache);
    }
    return cache;
  }

  function clearInspectorTabCache(oop = currentOop) {
    if (oop === null || oop === undefined) return;
    inspectorTabCache.delete(oop);
  }

  async function fetchInspectorTabData(oop, tabName, keyParts, loader) {
    const cache = inspectorCacheFor(oop);
    const cacheKey = `${tabName}:${JSON.stringify(keyParts || {})}`;
    const existing = cache.get(cacheKey);
    if (existing) {
      if (Object.prototype.hasOwnProperty.call(existing, 'value')) return existing.value;
      return existing.promise;
    }
    const promise = Promise.resolve()
      .then(loader)
      .then(value => {
        cache.set(cacheKey, {value});
        return value;
      })
      .catch(error => {
        if (cache.get(cacheKey)?.promise === promise) cache.delete(cacheKey);
        throw error;
      });
    cache.set(cacheKey, {promise});
    return promise;
  }

  function nextInspectorRenderToken() {
    inspectorRenderToken += 1;
    return inspectorRenderToken;
  }

  function isActiveInspectorRender(token, tabName, oop) {
    return token === inspectorRenderToken && tabName === currentItab && oop === currentOop;
  }

  function reloadCurrentObject({query=currentObjectQuery, preserveCurrentTab=true, invalidateCache=true} = {}) {
    if (!currentOop) return Promise.resolve();
    if (invalidateCache) clearInspectorTabCache(currentOop);
    const label = history[history.length-1]?.label || currentObjData?.inspection || 'object';
    return loadObj(currentOop, label, {query, preserveCurrentTab, keepInstPage: true});
  }

  async function loadObj(oop, label, options = {}) {
    const {query = null, preserveCurrentTab = false, keepInstPage = false} = options;
    currentOop = oop;
    currentObjData = null;
    currentObjectQuery = query === null ? {} : normalizeObjectQuery(query);
    mbClassName = '';
    mbCurrentCategory = null;
    mbCurrentSelector = null;
    if (!keepInstPage) {
      constantPage = 0;
      instPage = 0;
      modulePage = 0;
    }
    upsertWindowState(id, {kind: 'object', object: null});
    syncObjectWindowArrows(id);
    renderBc();
    body.querySelectorAll(`#${id}-roots li`).forEach(li => li.classList.toggle('active', parseInt(li.dataset.oop) === oop));
    const ibody = body.querySelector(`#${id}-ibody`);
    ibody.innerHTML = '<span class="spinner"></span>';
    body.querySelector(`#${id}-itabs`).style.display = 'none';
    if (evalRes) evalRes.textContent = '';
    updateTitlebar(null);
    try {
      const d = await api(buildObjectIndexUrl(oop));
      if (!d.success) throw new Error(d.exception);
      currentObjData = d.result;
      upsertWindowState(id, {kind: 'object', object: currentObjData});
      updateTitlebar(currentObjData);
      syncObjectWindowArrows(id);
      applyItabVisibility(currentObjData);
      const requestedTab = preferredInitialTab || (preserveCurrentTab ? currentItab : currentObjData.defaultTab) || currentItab;
      if (requestedTab && activateItab(requestedTab)) {
        preferredInitialTab = null;
      } else {
        showItab();
      }
    } catch(e) {
      ibody.innerHTML = `<p style="color:#f38ba8;padding:10px">Error: ${escHtml(e.message)}</p>`;
    }
  }

  function renderBc() {
    const bc = body.querySelector(`#${id}-bc`);
    if (!bc) return;
    bc.innerHTML = '';
    history.forEach((item, i) => {
      if (i > 0) { const s = document.createElement('span'); s.className = 'sep'; s.textContent = ' › '; bc.appendChild(s); }
      const sp = document.createElement('span');
      sp.className = 'crumb' + (i === history.length-1 ? ' cur' : '');
      sp.textContent = item.label || `#${item.oop}`;
      if (i < history.length-1) sp.addEventListener('click', () => { history = history.slice(0, i+1); loadObj(item.oop, item.label); });
      bc.appendChild(sp);
    });
  }

  async function showItab() {
    const ibody = body.querySelector(`#${id}-ibody`);
    if (!currentObjData) return;
    const tabName = currentItab;
    const oop = currentOop;
    const renderToken = nextInspectorRenderToken();
    ibody.className = 'inspector-body';
    ibody.style.overflow = 'auto';
    ibody.innerHTML = '';

    if (tabName === 'instvars') { ibody.appendChild(renderCard(currentObjData)); return; }

    const customTab = getCustomTab(tabName);
    if (customTab) {
      renderCustomTab(ibody, currentObjData, customTab);
      return;
    }

    if (tabName === 'constants') {
      renderConstants(ibody, renderToken, oop);
      return;
    }

    if (tabName === 'hierarchy') {
      ibody.innerHTML = '<span class="spinner"></span>';
      try {
        const d = await fetchInspectorTabData(oop, 'hierarchy', {}, () => api(`/object/hierarchy/${oop}`));
        if (!isActiveInspectorRender(renderToken, tabName, oop)) return;
        ibody.innerHTML = '';
        if (!d.success) throw new Error(d.exception);
        const ul = document.createElement('ul'); ul.className = 'hierarchy-tree';
        d.hierarchy.forEach((entry, i) => {
          const clsRef = entry?.class || (typeof entry === 'string' ? {inspection: entry, oop: null} : entry) || {inspection: ''};
          const clsName = clsRef.inspection || entry?.name || '';
          const dictionary = entry?.dictionary || '';
          const li = document.createElement('li');
          if (i > 0) {
            for (let j = 0; j < i - 1; j++) { const sp = document.createElement('span'); sp.className = 'tree-indent'; li.appendChild(sp); }
            const conn = document.createElement('span'); conn.className = 'tree-connector'; li.appendChild(conn);
          }
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'tree-link';
          btn.textContent = clsName;
          btn.title = dictionary ? `Open ${clsName} from ${dictionary} in Class Browser` : `Open ${clsName} in Class Browser`;
          btn.addEventListener('click', () => openClassBrowser(dictionary ? {dictionary, className: clsName} : {className: clsName}));
          li.appendChild(btn);
          if (dictionary) {
            const meta = document.createElement('span');
            meta.className = 'tree-meta';
            meta.textContent = dictionary;
            li.appendChild(meta);
          }
          ul.appendChild(li);
        });
        ibody.appendChild(ul);
      } catch(e) { ibody.innerHTML = `<p style="color:#f38ba8;padding:8px">${escHtml(e.message)}</p>`; }
      return;
    }

    if (tabName === 'instances') {
      renderInstances(ibody, renderToken, oop);
      return;
    }

    if (tabName === 'modules') {
      renderModules(ibody, renderToken, oop);
      return;
    }

    if (tabName === 'stone-ver') {
      ibody.innerHTML = '<span class="spinner"></span>';
      try {
        const d = await fetchInspectorTabData(oop, 'stone-ver', {}, () => api('/object/stone-version-report'));
        if (!isActiveInspectorRender(renderToken, tabName, oop)) return;
        ibody.innerHTML = '';
        if (!d.success) throw new Error(d.exception);
        ibody.appendChild(makeTable(['Property','Value'], d.report.map(r => [r.key, r.value])));
      } catch(e) { ibody.innerHTML = `<p style="color:#f38ba8;padding:8px">${escHtml(e.message)}</p>`; }
      return;
    }

    if (tabName === 'gem-ver') {
      ibody.innerHTML = '<span class="spinner"></span>';
      try {
        const d = await fetchInspectorTabData(oop, 'gem-ver', {}, () => api('/object/gem-version-report'));
        if (!isActiveInspectorRender(renderToken, tabName, oop)) return;
        ibody.innerHTML = '';
        if (!d.success) throw new Error(d.exception);
        ibody.appendChild(makeTable(['Property','Value'], d.report.map(r => [r.key, r.value])));
      } catch(e) { ibody.innerHTML = `<p style="color:#f38ba8;padding:8px">${escHtml(e.message)}</p>`; }
      return;
    }

    if (tabName === 'control') {
      renderControlPanel(ibody);
      return;
    }

    if (tabName === 'code') {
      const wrap = document.createElement('div'); wrap.className = 'obj-card';
      const intro = document.createElement('p');
      intro.style.cssText = 'color:#6c7086;padding:10px 10px 0;font-size:11px;line-height:1.5';
      const target = currentCodeBrowserTarget();
      const codeLabel = target
        ? `${target.className}${target.meta ? ' class' : ''}${mbCurrentSelector ? ` >> ${mbCurrentSelector}` : ''}`
        : 'the side method browser';
      intro.textContent = `Browsing ${codeLabel} in the panel on the right.`;
      wrap.appendChild(intro);
      const actions = document.createElement('div');
      actions.style.cssText = 'padding:0 10px 10px;display:flex;gap:8px;align-items:center';
      const openBtn = document.createElement('button');
      openBtn.className = 'btn';
      openBtn.textContent = 'Open in Class Browser';
      openBtn.disabled = !target;
      openBtn.addEventListener('click', () => openCurrentCodeInClassBrowser());
      actions.appendChild(openBtn);
      const hint = document.createElement('span');
      hint.style.cssText = 'font-size:10px;color:#6c7086';
      hint.textContent = 'Double-click a selector to jump into the full browser.';
      actions.appendChild(hint);
      wrap.appendChild(actions);
      ibody.appendChild(wrap);
      return;
    }
  }

  async function renderInstances(ibody, renderToken, oop) {
    ibody.innerHTML = '<span class="spinner"></span>';
    const PAGE = 20;
    try {
      const offset = instPage * PAGE;
      const d = await fetchInspectorTabData(
        oop,
        'instances',
        {limit: PAGE, offset},
        () => api(`/object/instances/${oop}?limit=${PAGE}&offset=${offset}`)
      );
      if (!isActiveInspectorRender(renderToken, 'instances', oop)) return;
      ibody.innerHTML = '';
      if (!d.success) { ibody.innerHTML = `<p style="color:#f38ba8;padding:8px">${escHtml(d.exception)}</p>`; return; }
      if (!d.instances.length) { ibody.innerHTML = '<p style="color:#6c7086;padding:8px">(no instances)</p>'; return; }

      const pageData = d.instances || [];
      const total = Number.isFinite(d.total) ? d.total : pageData.length;
      const start = (d.offset || 0) + 1;
      const stop = (d.offset || 0) + pageData.length;

      const wrap = document.createElement('div'); wrap.style.cssText = 'display:flex;flex-direction:column;height:100%';
      const tblWrap = document.createElement('div'); tblWrap.className = 'instances-tbl-wrap';
      const tbl = document.createElement('table'); tbl.className = 'dbtable';
      tbl.innerHTML = '<thead><tr><th>oop</th><th>Object</th><th>printString</th></tr></thead>';
      const tbody = document.createElement('tbody');
      pageData.forEach(inst => {
        const tr = document.createElement('tr');
        const tdOop = document.createElement('td'); tdOop.className = 'col-key'; tdOop.style.fontFamily = 'monospace'; tdOop.textContent = inst.oop;
        const tdObj = document.createElement('td'); tdObj.className = 'col-val';
        const chip = makeChip(inst.printString.slice(0,40), inst.oop, id);
        tdObj.appendChild(chip);
        const tdPs = document.createElement('td'); tdPs.className = 'col-val'; tdPs.style.color='#6c7086'; tdPs.textContent = inst.printString.slice(0,80);
        tr.append(tdOop, tdObj, tdPs); tbody.appendChild(tr);
      });
      tbl.appendChild(tbody); tblWrap.appendChild(tbl);
      wrap.appendChild(tblWrap);

      const pg = document.createElement('div'); pg.className = 'inst-pagination';
      const info = document.createElement('span');
      info.style.cssText = 'font-size:10px;color:#6c7086';
      info.textContent = `${start}-${stop} of ${total} instances`;
      pg.appendChild(info);

      const prevBtn = document.createElement('button');
      prevBtn.className = 'inst-page-btn';
      prevBtn.textContent = 'Previous';
      prevBtn.disabled = instPage === 0;
      prevBtn.addEventListener('click', () => {
        if (instPage === 0) return;
        instPage -= 1;
        renderInstances(ibody, nextInspectorRenderToken(), oop);
      });
      pg.appendChild(prevBtn);

      const pageBtn = document.createElement('button');
      pageBtn.className = 'inst-page-btn active';
      pageBtn.textContent = String(instPage + 1);
      pageBtn.disabled = true;
      pg.appendChild(pageBtn);

      const nextBtn = document.createElement('button');
      nextBtn.className = 'inst-page-btn';
      nextBtn.textContent = 'Next';
      nextBtn.disabled = !d.hasMore;
      nextBtn.addEventListener('click', () => {
        if (!d.hasMore) return;
        instPage += 1;
        renderInstances(ibody, nextInspectorRenderToken(), oop);
      });
      pg.appendChild(nextBtn);

      wrap.appendChild(pg);
      ibody.appendChild(wrap);
    } catch(e) {
      ibody.innerHTML = `<p style="color:#f38ba8;padding:8px">${escHtml(e.message)}</p>`;
    }
  }

  async function renderConstants(ibody, renderToken, oop) {
    ibody.innerHTML = '<span class="spinner"></span>';
    const PAGE = 20;
    try {
      const offset = constantPage * PAGE;
      const d = await fetchInspectorTabData(
        oop,
        'constants',
        {limit: PAGE, offset},
        () => api(`/object/constants/${oop}?limit=${PAGE}&offset=${offset}`)
      );
      if (!isActiveInspectorRender(renderToken, 'constants', oop)) return;
      ibody.innerHTML = '';
      if (!d.success) throw new Error(d.exception);
      if (!d.constants.length) { ibody.innerHTML = '<p style="color:#6c7086;padding:8px">(no constants)</p>'; return; }

      const pageData = d.constants || [];
      const total = Number.isFinite(d.total) ? d.total : pageData.length;
      const start = (d.offset || 0) + 1;
      const stop = (d.offset || 0) + pageData.length;

      const wrap = document.createElement('div'); wrap.style.cssText = 'display:flex;flex-direction:column;height:100%';
      const tblWrap = document.createElement('div'); tblWrap.className = 'instances-tbl-wrap';

  function renderControlPanel(ibody) {
    const wrap = document.createElement('div'); wrap.className = 'control-panel';
    const resDiv = document.createElement('div'); resDiv.className = 'cp-result';
    const row = document.createElement('div'); row.className = 'cp-row';
    const btnAbort   = document.createElement('button'); btnAbort.className   = 'btn-tx'; btnAbort.textContent   = 'Abort Transaction';
    const btnCommit  = document.createElement('button'); btnCommit.className  = 'btn-tx'; btnCommit.textContent  = 'Commit Transaction';
    const btnCont    = document.createElement('button'); btnCont.className    = 'btn-tx'; btnCont.style.background = '#4a90d9'; btnCont.textContent = 'Continue Transaction';
    const btnPersist = document.createElement('button'); btnPersist.className = 'btn-tx'; btnPersist.style.background = '#45475a'; btnPersist.textContent = 'Persistent Mode';

    function setPersistentButtonState(enabled) {
      btnPersist.classList.toggle('active', !!enabled);
      btnPersist.setAttribute('aria-pressed', enabled ? 'true' : 'false');
    }

    async function syncPersistentMode() {
      try {
        const d = await api('/transaction/persistent-mode');
        if (d.success) setPersistentButtonState(!!d.persistent);
      } catch (_) {}
    }

    async function cpAction(url, method='GET', body_data, options = {}) {
      const {afterSuccess} = options;
      row.querySelectorAll('button').forEach(btn => { btn.disabled = true; });
      resDiv.className = 'cp-result visible loading'; resDiv.textContent = 'Working…';
      try {
        const opts = method === 'POST' ? {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body_data||{})} : undefined;
        const d = await api(url, opts);
        resDiv.className = 'cp-result visible' + (d.success ? '' : ' error');
        resDiv.textContent = d.success ? (d.result || 'ok') : 'Error: ' + (d.exception||'');
        if (d.success) {
          clearInspectorTabCache(currentOop);
          if (typeof d.persistent === 'boolean') setPersistentButtonState(d.persistent);
          if (afterSuccess) await afterSuccess(d);
        }
        setStatus(d.success, d.success ? 'ok' : d.exception||'error');
        return d;
      } catch(e) {
        resDiv.className = 'cp-result visible error';
        resDiv.textContent = e.message;
        return null;
      } finally {
        row.querySelectorAll('button').forEach(btn => { btn.disabled = false; });
      }
    }

    btnAbort.addEventListener('click', () => cpAction('/transaction/abort', 'POST', {}, {
      async afterSuccess() {
        await syncPersistentMode();
      },
    }));
    btnCommit.addEventListener('click', () => cpAction('/transaction/commit', 'POST', {}, {
      async afterSuccess() {
        await syncPersistentMode();
      },
    }));
    btnCont.addEventListener('click', () => cpAction('/transaction/continue', 'POST', {}, {
      async afterSuccess() {
        refreshHaltedThreadsBar();
        await syncPersistentMode();
      },
    }));
    btnPersist.addEventListener('click', async () => {
      const active = btnPersist.classList.contains('active');
      await cpAction('/transaction/persistent-mode', 'POST', {enable: !active});
    });

    // check current persistent mode
    syncPersistentMode();

    row.append(btnAbort, btnCommit, btnCont, btnPersist);
    wrap.append(row, resDiv);
    ibody.appendChild(wrap);
  }

  function assocChip(text, oop) {

    sp.innerHTML = '<span style="font-size:9px;color:#a6adc8">▤</span>' + escHtml(text.slice(0,30)) + '<span style="color:#6c7086;font-size:8px;margin-left:2px">▼</span>';
    attachObjectButtonBehavior(sp, {oop, text, sourceWinId: id});

  function hashBraceChip(label, oop) {
    // { ▼ or } ▼  chip for hash objects
    const sp = document.createElement('span');
    sp.style.cssText = 'display:inline-flex;align-items:center;background:#232336;border:1px solid #45475a;border-radius:3px;padding:0 3px;font-size:11px;font-family:monospace;cursor:pointer;color:#89dceb;vertical-align:middle;';

  function renderAssociationPairs(ibody, entries, totalSize, emptyText='(empty)', options={}) {
    const {showSummary = true} = options;
    ibody.innerHTML = '';
    const keys = Object.keys(entries);
    if (!keys.length) {
      ibody.innerHTML = `<p style="color:#6c7086;padding:8px">${escHtml(emptyText)}</p>`; return;
    }
    const wrap = document.createElement('div');
    for (const [, [keyV, valV]] of Object.entries(entries)) {
      const row = document.createElement('div'); row.className = 'assoc-row';

      // Key: symbol keys shown as plain text (":MaglevRecord"), object keys as chip
      const kIsLeaf = isLeafBasetype(keyV?.basetype);
      const kText = keyV?.inspection || (keyV?.oop != null ? `oop:${keyV.oop}` : 'nil');
      if (!kIsLeaf && keyV?.oop) {
        row.appendChild(assocChip(kText, keyV.oop));
      } else {
        const keyLabel = document.createElement('span'); keyLabel.className = 'assoc-key-label';
        keyLabel.textContent = kText; row.appendChild(keyLabel);
      }

      // Arrow
      const arr = document.createElement('span'); arr.className = 'assoc-arrow'; arr.textContent = ' => ';
      row.appendChild(arr);

      // Value chips
      appendValChips(row, valV);

      wrap.appendChild(row);
    }
    if (showSummary && totalSize > keys.length) {
      const more = document.createElement('div'); more.className='more-row';
      more.textContent = `${keys.length} of ${totalSize} entries`;
      wrap.appendChild(more);
    }
    ibody.appendChild(wrap);
  }

  function renderAssociations(ibody, obj) {
    renderAssociationPairs(ibody, obj.instVars || {}, obj.instVarsSize || 0);
  }

  function customTabRangeName(customTab) {
    return customTab?.rangeName || customTab?.id || 'custom';
  }

  function customTabPageSize(customTab) {
    const pageSize = parseInt(customTab?.pageSize, 10);
    return Number.isFinite(pageSize) && pageSize > 0 ? pageSize : 20;
  }

  function loadedEntryBounds(entries, totalSize) {
    const keys = Object.keys(entries || {}).map(n => parseInt(n, 10)).filter(Number.isFinite).sort((a, b) => a - b);
    if (!keys.length) return {from: totalSize ? 1 : 0, to: 0, count: 0};
    return {from: keys[0], to: keys[keys.length - 1], count: keys.length};
  }

  function customTabRangeQuery(customTab, from, to) {
    const rangeName = customTabRangeName(customTab);
    return normalizeObjectQuery({
      ...currentObjectQuery,
      [`range_${rangeName}_from`]: from,
      [`range_${rangeName}_to`]: to,
    });
  }

  function appendCustomTabPager(ibody, customTab, entries, totalSize) {
    const bounds = loadedEntryBounds(entries, totalSize);
    const pageSize = customTabPageSize(customTab);
    if (!totalSize || (bounds.count >= totalSize && totalSize <= pageSize)) return;

    const label = history[history.length-1]?.label || currentObjData?.inspection || 'object';
    const bar = document.createElement('div'); bar.className = 'inst-pagination';
    const info = document.createElement('span');
    info.style.cssText = 'font-size:10px;color:#6c7086';
    info.textContent = bounds.count >= totalSize ? `All ${totalSize} entries` : `${bounds.from}-${bounds.to} of ${totalSize}`;
    bar.appendChild(info);

    const prev = document.createElement('button');
    prev.className = 'inst-page-btn';
    prev.textContent = 'Prev';
    prev.disabled = bounds.from <= 1;
    prev.addEventListener('click', () => {
      if (prev.disabled) return;
      const nextFrom = Math.max(1, bounds.from - pageSize);
      const nextTo = Math.min(totalSize, nextFrom + pageSize - 1);
      loadObj(currentOop, label, {
        query: customTabRangeQuery(customTab, nextFrom, nextTo),
        preserveCurrentTab: true,
        keepInstPage: true,
      });
    });
    bar.appendChild(prev);

    const next = document.createElement('button');
    next.className = 'inst-page-btn';
    next.textContent = 'Next';
    next.disabled = !bounds.count || bounds.to >= totalSize;
    next.addEventListener('click', () => {
      if (next.disabled) return;
      const nextFrom = bounds.to + 1;
      const nextTo = Math.min(totalSize, nextFrom + pageSize - 1);
      loadObj(currentOop, label, {
        query: customTabRangeQuery(customTab, nextFrom, nextTo),
        preserveCurrentTab: true,
        keepInstPage: true,
      });
    });
    bar.appendChild(next);

    const loadAll = document.createElement('button');
    loadAll.className = 'inst-page-btn';
    loadAll.textContent = 'Load All';
    loadAll.disabled = bounds.count >= totalSize;
    loadAll.addEventListener('click', () => {
      if (loadAll.disabled) return;
      loadObj(currentOop, label, {
        query: customTabRangeQuery(customTab, 1, totalSize),
        preserveCurrentTab: true,
        keepInstPage: true,
      });
    });
    bar.appendChild(loadAll);

    ibody.appendChild(bar);
  }

  function renderCustomTab(ibody, obj, customTab) {
    if (customTab.kind === 'association-dict') {
      const entries = obj?.[customTab.field] || {};
      const totalSize = obj?.[customTab.sizeField] ?? Object.keys(entries).length;
      renderAssociationPairs(ibody, entries, totalSize, '(empty)', {showSummary: false});
      appendCustomTabPager(ibody, customTab, entries, totalSize);
      return;
    }
    ibody.innerHTML = `<p style="color:#f38ba8;padding:8px">Unsupported custom tab: ${escHtml(customTab.caption || customTab.id || 'custom')}</p>`;
  }

  function appendValChips(row, valV) {
    if (!valV || valV.basetype === 'nilclass') {
      const nil = document.createElement('span'); nil.style.cssText='color:#6c7086;font-family:monospace;font-size:11px'; nil.textContent='nil';
      row.appendChild(nil); return;
    }
    const vText = valV.inspection || (valV.oop != null ? `oop:${valV.oop}` : 'nil');
    const vIsLeaf = isLeafBasetype(valV.basetype);
    if (vIsLeaf || !valV.oop) {
      const sp = document.createElement('span'); sp.style.cssText='color:#a6e3a1;font-family:monospace;font-size:11px'; sp.textContent=vText;
      row.appendChild(sp); return;
    }
    if (valV.basetype === 'hash') {
      // Render as: {▼  ...  }▼  with each instVar as  □ ClassName▼ => value , ...
      row.appendChild(hashBraceChip('{', valV.oop));
      const elipsis = document.createElement('span'); elipsis.style.cssText='color:#6c7086;font-size:11px;margin:0 2px'; elipsis.textContent=' … ';
      row.appendChild(elipsis);
      row.appendChild(hashBraceChip('}', valV.oop));
    } else if (valV.basetype === 'array') {
      row.appendChild(hashBraceChip('[', valV.oop));
      const elipsis = document.createElement('span'); elipsis.style.cssText='color:#6c7086;font-size:11px;margin:0 2px'; elipsis.textContent=' … ';
      row.appendChild(elipsis);
      row.appendChild(hashBraceChip(']', valV.oop));
    } else {
      row.appendChild(assocChip(vText.slice(0,40), valV.oop));
    }
  }

  function makeValCell(valV, label) {
    const td = document.createElement('td'); td.className = 'col-val';
    if (!valV) { td.textContent = 'nil'; return td; }
    const isLeaf = isLeafBasetype(valV.basetype);
    const text = valV.inspection || (valV.oop != null ? `oop:${valV.oop}` : 'nil');
    if (!isLeaf && valV.oop != null) {
      const chip = makeChip(text, valV.oop, id);
      const nav = document.createElement('span'); nav.className='ws-nav'; nav.textContent=' ↗'; nav.style.fontSize='10px';
      nav.addEventListener('click', () => { history.push({label:label||text, oop:valV.oop}); loadObj(valV.oop, label||text); });
      td.append(chip, nav);
    } else { td.textContent = text; }
    return td;
