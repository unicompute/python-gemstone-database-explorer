name: Live UI

# Maintainer note:
# - This workflow is intentionally self-hosted because it needs a real GemStone runtime.
# - Keep tests/ui/live.spec.js focused on real-stone-only regressions; prefer the mock UI
#   suite for ordinary UI coverage. See docs/live-ui-maintainer.md for usage details.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

concurrency:
  group: live-ui
  cancel-in-progress: false

jobs:
  live-ui:
    runs-on: self-hosted
    env:
      GEMSTONE: ${{ secrets.GEMSTONE }}
      GS_USERNAME: ${{ secrets.GS_USERNAME }}
      GS_PASSWORD: ${{ secrets.GS_PASSWORD }}
      GS_STONE: ${{ secrets.GS_STONE }}
      GS_HOST: ${{ secrets.GS_HOST }}
      GS_NETLDI: ${{ secrets.GS_NETLDI }}
      GS_LIB: ${{ secrets.GS_LIB }}

    steps:
      - name: Check live environment
        id: live-env
        shell: bash
        run: |
          if [ -z "$GEMSTONE" ] || [ -z "$GS_USERNAME" ] || [ -z "$GS_PASSWORD" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping live UI suite because GEMSTONE, GS_USERNAME, or GS_PASSWORD is not configured."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        if: steps.live-env.outputs.enabled == 'true'

      - uses: actions/setup-python@v6
        if: steps.live-env.outputs.enabled == 'true'
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v6
        if: steps.live-env.outputs.enabled == 'true'
        with:
          node-version: "22"
          cache: npm

      - name: Create virtualenv
        if: steps.live-env.outputs.enabled == 'true'
        run: python -m venv .venv

      - name: Install Python dependencies
        if: steps.live-env.outputs.enabled == 'true'
        run: |
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -e ".[dev]"

      - name: Install Node dependencies
        if: steps.live-env.outputs.enabled == 'true'
        run: npm ci

      - name: Install Playwright browser
        if: steps.live-env.outputs.enabled == 'true'
        run: npx playwright install chromium

      - name: Run live UI suite
        if: steps.live-env.outputs.enabled == 'true'
        run: npm run test:ui:live
